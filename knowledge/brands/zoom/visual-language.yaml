summary: >-
  Visual language for Zoom. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-zoom-blue"
      touchpoints:
        - "zoom.us homepage and marketing pages"
        - "Zoom brand campaigns and advertising"
        - "Zoom social media channels"
        - "Zoom Events (Zoomtopia)"
      description: >-
        Zoom Blue (#2D8CFF) dominant. the blue that became synonymous
        with video calling during the 2020-2021 pandemic. The 2022 rebrand
        expanded Zoom from 'video meetings' to 'Zoom Workplace'
        removing the camera icon from the logo, brightening the blue, and
        softening the 'M' letterform. Mark Kawano (first CDO, appointed
        November 2024, ex-Apple/Adobe/Microsoft/Slack/Zendesk) oversees
        the visual system. Lato (Łukasz Dziedzic, open-source) serves as
        the UI typeface. The logo uses a custom Kaleko 205-based type
        treatment. The WDS 1.0 design system (atomic design methodology)
        governs product UI with approximately 500 icon instances.
        Compared to Microsoft Teams (purple, enterprise-coded, M365-
        integrated) or Google Meet (Google-branded, Material Design-
        coded), Zoom's visual language carries the strongest single-
        product association. the blue square IS video calling.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this Zoom Blue-
        dominant, Workplace-positioned register.

    - name: "zoom-workplace"
      touchpoints:
        - "Zoom Workplace platform (post-2022 rebrand)"
        - "Zoom Team Chat, Whiteboard, Scheduler, Notes"
        - "Zoom Workplace marketing"
      description: >-
        The 2022 rebrand repositioned Zoom from a video-meeting tool to
        'Zoom Workplace'. a collaboration platform. Sub-product icons
        replace the 'O' letters in 'ZOOM' with product-specific symbols
        (phone for Zoom Phone, chat bubble for Team Chat, whiteboard for
        Zoom Whiteboard). The visual language is broader and more
        colourful than the single-product era. introducing secondary
        colours to distinguish products while maintaining Zoom Blue as
        the unifying element.
      differs_from_default_by: >-
        Multi-product visual vocabulary replaces single-product identity.
        Sub-product icons introduce visual variety. The register shifts
        from 'one tool' to 'platform of tools'. more complex, more
        enterprise-comprehensive.

    - name: "zoom-events-webinar"
      touchpoints:
        - "Zoom Events and Webinars"
        - "Zoom Sessions (premium events)"
        - "Zoomtopia annual conference"
      description: >-
        More dynamic, more event-coded. Zoom Events marketing uses richer
        colour palettes, more dynamic compositions, and more photography
        than the product UI. Zoomtopia (the annual conference) creates
        its own visual identity each year. The visual language signals
        'occasion' and 'gathering' rather than 'daily tool.'
      differs_from_default_by: >-
        Richer colour, more photography, more dynamic compositions.
        Event-specific visual identities complement the brand system.
        The visual register shifts from functional-tool to dynamic-event.

  notes: >-
    Zoom's visual identity carries an unusual cultural weight. the blue
    square became a visual symbol of the pandemic era. The 2022 rebrand
    and Mark Kawano's 2024 appointment as first CDO signal a deliberate
    effort to evolve beyond the single-product video-meeting association.
    The 70% reduction in time-to-market achieved through WDS 1.0 design
    system implementation demonstrates the practical impact of systematic
    design governance.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "zoom.us (observed February 2026)"
    - "Zoom marketing campaigns"
    - "Zoom Workplace product marketing"
  subject_and_framing: >-
    People-in-meetings and people-using-Zoom. the photography shows
    collaborative work contexts, hybrid meetings (in-room plus remote
    participants), and professional communication moments. Device screens
    showing the Zoom interface appear frequently. the product UI is part
    of the photographic content. The photography emphasises connection
    and collaboration across distances. Compared to Microsoft Teams
    (more enterprise-coded, more workplace-contextualised) or Google Meet
    (more casual, more Google-ecosystem-coded), Zoom's photography is
    the most meeting-moment-focused.
  casting_observed: >-
    Professional, diverse, multi-generational. The casting reflects
    Zoom's positioning as a universal communication tool. business
    professionals, educators, healthcare workers, and hybrid teams.
    The diversity spans industries, roles, and meeting contexts. Post-
    pandemic photography emphasises hybrid work (some participants in
    person, some remote) rather than all-remote scenarios.
  lighting_and_colour: >-
    Bright, professional, contemporary office and home-office environments.
    The lighting communicates productivity and professionalism. Zoom Blue
    appears in environmental accents and product-screen display within
    photographs. Natural light predominates in hybrid-work contexts.
  post_production: >-
    Clean, standard commercial photography. Environments are contemporary
    and professional. No distinctive artistic treatment. the photography
    serves product contextualisation and aspirational work scenarios.
  visual_boundaries:
    stated_exclusions: >-
      Zoom avoids imagery that reminds people of pandemic fatigue or
      'Zoom fatigue.' The photography positions Zoom as energising and
      productive rather than exhausting.
    observed_exceptions: >-
      Zoom Events marketing adopts more dynamic, entertainment-influenced
      photography that departs from the workplace-professional default.
    genuine_absence: >-
      Based on zoom.us review: no celebrity photography, no abstract
      photography, no lifestyle photography disconnected from communication
      and work contexts.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Zoom logo (2022 rebrand. removed camera icon, brightened blue)"
    - "WDS 1.0 design system (~500 icon instances)"
    - "zoom.us (observed February 2026)"
  uses_illustration: true
  illustration_style: >-
    Functional and product-explanatory. Zoom uses a flat illustration
    style for feature explanations, onboarding content, and marketing
    visuals. The illustrations use the Zoom Blue palette with
    complementary colours. The style is professional and corporate
    clean lines, consistent stroke weights, and simplified human figures
    in communication scenarios. Compared to Slack (more playful, more
    personality-driven illustration) or Microsoft Teams (Fluent 2 system
    illustrations), Zoom's illustration is the most functionally focused.
  illustration_role: >-
    Feature explanation and marketing support. Illustrations appear in
    product marketing, onboarding flows, and help content. They visualise
    concepts like 'hybrid meetings,' 'AI assistant,' and 'workflow
    automation' that are difficult to photograph.
  icon_style: >-
    The WDS 1.0 design system defines approximately 500 icon instances.
    The sub-product icon system is distinctive: Zoom Phone, Team Chat,
    Whiteboard, Scheduler, and Notes each have their own icon that
    replaces the 'O' in the ZOOM wordmark. a playful system that
    communicates product expansion while maintaining brand recognition.
    Navigation and feature icons follow standard enterprise-SaaS
    conventions. outlined at small sizes, filled at larger sizes.
  graphic_devices: >-
    The Zoom wordmark. the custom Kaleko 205-based type treatment with
    its distinctive rounded 'M.' The blue square. the Zoom app icon
    has become one of the most recognised icons on phone screens
    worldwide. The sub-product 'O' replacement system. a clever graphic
    device that extends the brand to new products. Zoom Blue (#2D8CFF)
    as a colour device. the brand owns this particular shade of blue
    in the video-communication category.
  motion_language: >-
    Functional and minimal. App transitions follow WDS 1.0 motion
    guidelines. Meeting-join and meeting-end animations provide
    contextual feedback. The motion language prioritises speed and
    reliability. Zoom's brand promise is that it 'just works,' so
    motion should never introduce delays. Compared to Microsoft Teams
    (Fluent motion, more atmospheric) or Google Meet (Material motion,
    more playful), Zoom's motion is the most utilitarian.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "medium"
  primary_sources:
    - "Lato (Łukasz Dziedzic, open-source. UI typeface)"
    - "Custom Kaleko 205-based logo type"
    - "Almaden Sans (brand system font)"
    - "zoom.us (observed February 2026)"
  signature_move: >-
    The Zoom wordmark uses a custom treatment based on Kaleko 205. a
    rounded, geometric sans-serif with a distinctive softened 'M' (the
    2022 rebrand blunted the 'M' point). Lato (Łukasz Dziedzic, Warsaw,
    open-source under SIL licence) serves as the primary UI typeface
    a humanist sans-serif with semi-rounded details. Almaden Sans appears
    in broader brand contexts. The typography system is less invested
    than competitors: no custom brand typeface commission (unlike Slack's
    Larsseit or Microsoft Teams' Segoe). Mark Kawano's appointment as
    first CDO (November 2024) may signal future typographic investment.
    Compared to Slack (deliberate typographic personality through Larsseit)
    or Microsoft Teams (Segoe UI Variable, deeply integrated), Zoom's
    typography is the most utilitarian. it works but doesn't express
    strong brand character.
  what_would_look_wrong: >-
    A serif typeface (Zoom is entirely sans-serif). A heavy, condensed
    display typeface (contradicts the friendly, accessible tone). A
    monospace typeface (Zoom is communication-coded, not developer-coded).
    The pre-2022 wordmark with the camera icon embedded in the logo
    (signals the single-product era).
  case_convention: >-
    'Zoom' uses title case. Product names use title case ('Zoom
    Workplace,' 'Zoom Phone,' 'Zoom Team Chat'). Body text uses sentence
    case. Marketing headlines use sentence case. The brand avoids ALL
    CAPS in most contexts.
  display_vs_body: >-
    Display: The custom Kaleko 205-based wordmark for brand identification.
    Almaden Sans or Lato at heavier weights for marketing headlines.
    Body: Lato at regular weight for interface text and product content.
    The typography serves clarity and readability above brand expression
   in a communication tool, legibility during video calls is the
    primary typographic requirement.
  type_and_image: >-
    Typography serves functional roles. participant names, chat messages,
    meeting titles, interface labels. During video calls, type is
    subordinate to video content (the participants' faces). In marketing,
    type and photography share space, with the Zoom Blue palette
    providing visual unity.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "zoom.us (observed February 2026)"
    - "Zoom meeting interface"
    - "Zoom Workplace platform"
    - "WDS 1.0 design system"
  signature_composition: >-
    Video-grid-centred. The Zoom meeting view. a grid of participant
    video tiles with speaker highlighting. defined the visual pattern
    for video conferencing during the pandemic. The 'gallery view' grid
    (up to 49 participants visible simultaneously) is Zoom's most
    distinctive compositional element. Speaker View (active speaker
    dominant, others as filmstrip) provides an alternative. The Zoom
    Workplace platform introduces a more complex composition. Team Chat,
    calendar, and meeting tools create a multi-panel layout. Compared to
    Microsoft Teams (more integrated with M365 tools, denser) or Google
    Meet (simpler, Material Design-governed), Zoom's layout is the most
    video-dominant.
  density_and_whitespace: >-
    The meeting interface is moderate density. video tiles fill available
    space, with minimal chrome. Meeting controls use a clean bottom bar.
    The Zoom Workplace platform is denser. multiple panels and tools
    create a productivity-standard information density. Marketing pages
    use generous whitespace with Zoom Blue section backgrounds.
  format_preferences: >-
    The meeting view adapts to screen dimensions. from mobile single-
    speaker view to desktop 49-tile gallery view. The blue square app
    icon is the most recognisable format element. Marketing materials
    adapt to standard digital and print formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    Zoom set the visual standard for video conferencing (the gallery-view
    grid) and has been selectively expanding its visual identity to
    encompass a broader collaboration platform.
  examples:
    - trend: "Video-grid meeting interface"
      stance: "leader"
      evidence: >-
        Zoom's gallery-view grid. equal-sized participant tiles with
        active-speaker highlighting. became the default visual pattern
        for video meetings during 2020-2021. Every competitor (Teams, Meet,
        Webex) adopted or already used similar patterns, but Zoom's
        implementation became the reference in popular culture.
      reasoning: >-
        Zoom's pandemic-era dominance meant its visual patterns became
        cultural reference points. the 'Zoom grid' appeared in television,
        film, art, and advertising as a visual shorthand for remote work.
    - trend: "Platform expansion from single-product to suite"
      stance: "late-adopter"
      evidence: >-
        The 2022 'Zoom Workplace' rebrand followed Microsoft Teams and
        Slack in positioning as a collaboration platform rather than a
        single tool. The sub-product 'O' replacement icon system was a
        creative visual solution to communicating product expansion.
      reasoning: >-
        Zoom's challenge is expanding its visual identity beyond the
        single meeting-tool association. the blue square is so strongly
        linked to video calls that broadening the visual language
        requires deliberate effort.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    Zoom Blue (#2D8CFF). The 'ZOOM' wordmark. The blue square app icon.
    The video-grid meeting pattern. Lato as the UI typeface.
  what_bends: >-
    Zoom Phone, Team Chat, Whiteboard, and other Workplace products
    introduce their own icon identities within the brand framework.
    Zoom Events creates annual visual identities for Zoomtopia. Partner
    and developer integrations introduce third-party visual elements
    within the Zoom interface. Regional marketing adapts to local
    contexts.
  notable_examples: >-
    Zoom x pandemic culture (2020-2021): the most significant unintentional
    brand-collaboration in recent history. Zoom's visual identity became
    embedded in global culture through Saturday Night Live sketches,
    television productions shot on Zoom, art projects using the gallery
    grid, and 'Zoom backgrounds' as a cultural phenomenon. Zoom x
    virtual backgrounds: users create and share custom backgrounds that
    exist within the Zoom visual framework. millions of user-generated
    visual expressions within the product. Zoom x WDS 1.0 design system:
    the atomic-design-methodology-based system achieved 70% reduction in
    time-to-market for UI development. a significant operational
    collaboration between design and engineering.
