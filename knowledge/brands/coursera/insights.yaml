# ── Data
learned_insights:
  - >-
    Universal access only works when the interface stays simple—complexity anywhere excludes someone somewhere
  - >-
    Learning platforms fail when they celebrate their own scale instead of celebrating learner transformation
  - >-
    Blue (#0056D3) builds trust in educational contexts because it signals institutional reliability without coldness
  - >-
    Learner testimonials and visible progress markers create psychological momentum that course content alone doesn't
  - >-
    "anyone, anywhere" is only credible when pricing, language support, and interface design genuinely flatten barriers
what_nobody_copies: >-
  The focus on learner agency and accomplishment as primary brand narrative rather than institutional prestige or instructional content
