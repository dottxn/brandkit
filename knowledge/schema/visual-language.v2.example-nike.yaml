# Example: visual-language.yaml (v2) populated for Nike
# This shows what a completed chunk looks like under the v2 template.
# Not a live chunk — lives in schema/ as a reference for enrichment.
#
# Key differences from v1:
# - Every section declares confidence and sources
# - Photography is grounded in named references
# - Channels section removed (now in channel-behaviour.yaml)
# - Typography and layout focus on what's distinctive, not generic
# - Trend examples require evidence
# - Visual boundaries replace "what_is_never_in_frame"

chunk_id: "nike-visual-language"
brand: nike
domain: "visual-language"
context_tags:
  - "art-direction"
  - "photography"
  - "visual-system"
  - "design-practice"
depends_on:
  - "nike-visual-dna"
  - "nike-soul"
token_count: 0
format: yaml
version: "2.0"
last_updated: "2026-02-25"
status: active
enrichment_level: enriched
summary: >-
  Visual language for Nike. How Nike looks structurally — photography
  art direction, type treatment, layout, graphic language, and how
  the visual system flexes across sub-brands and collaboration contexts.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "product-commerce"
      touchpoints:
        - "nike.com product detail pages"
        - "Nike App product browsing"
        - "Nike By You customisation tool"
        - "wholesale product catalogues"
      description: >-
        White or light grey background, single product, studio-lit with
        soft shadows. Multiple angles per product. No people. The swoosh
        is always visible. Typography is minimal — product name, price,
        colour options. The product IS the content.
      differs_from_default_by: >-
        This is the baseline. All other modes are departures from this
        systematic, controlled, product-forward approach.

    - name: "campaign-performance"
      touchpoints:
        - "Nike.com homepage takeovers during major launches"
        - "'You Can't Stop Us' (2020, W+K Portland)"
        - "'Winning Isn't For Everyone' (2024 Olympics campaign)"
        - "flagship store window displays during product drops"
      description: >-
        Cinematic, high-contrast, emotionally charged. Full-bleed
        photography or video. Athlete as protagonist. Large uppercase
        type (Nike Custom Sans or Futura Bold Condensed). Monochrome
        palette with one accent colour tied to the product. The swoosh
        is compositional, not just a logo placement.
      differs_from_default_by: >-
        Maximum visual intensity. Type competes with imagery for
        dominance. Negative space is replaced by dramatic scale.
        Everything is larger, bolder, more confrontational.

    - name: "community-grassroots"
      touchpoints:
        - "Nike Running Club app"
        - "Nike Training Club content"
        - "local market activations (e.g. Nike community runs)"
        - "Nike youth programmes"
      description: >-
        Warmer, documentary, participatory. Photography is less heroic —
        real people training, not elite athletes performing. Natural
        light, wider shots, more environmental context. Type is smaller
        and friendlier. The swoosh recedes. The energy is encouragement,
        not aspiration.
      differs_from_default_by: >-
        The brand steps back. Less polish, more authenticity. Feels like
        content made by a local running crew, not a global corporation.

    - name: "sub-brand worlds"
      touchpoints:
        - "Jordan Brand (jumpman.com, Jordan Instagram)"
        - "Nike ACG (outdoor, trail)"
        - "Nike SB (skateboarding)"
        - "SNKRS app"
        - "Nike Sportswear / lifestyle"
      description: >-
        Each sub-brand maintains its own visual register within the Nike
        system. Jordan is luxury streetwear — darker palette, fashion
        photography, celebrity casting. ACG is outdoors — landscape
        photography, earth tones, technical detail shots. SB is skate
        culture — lo-fi, grainy, candid, subculture-native. Sportswear
        and lifestyle content DOES include casual poses, street settings,
        and non-athletic contexts — contradicting the idea that Nike
        never shows relaxation.
      differs_from_default_by: >-
        These modes break the main brand rules to serve their subculture.
        Jordan can be luxurious. SB can be raw. ACG can be quiet. The
        swoosh (or jumpman) is the connective thread.

  notes: >-
    Sub-brand worlds (Jordan, ACG, SB, Sportswear) each operate as
    semi-independent visual systems. A single Nike visual-language
    chunk cannot fully represent them — each warrants its own chunk
    if the brand is being modelled at depth.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "'Winning Isn't For Everyone' (2024 Paris Olympics campaign, W+K Portland)"
    - "'You Can't Stop Us' (2020, W+K Portland, directed by Oscar Hudson)"
    - "Nike.com product photography (observed via web, February 2026)"
    - "Photographer credits from campaigns: Cass Bird, Tim Barber, Devin Allen"
  subject_and_framing: >-
    Two registers. Product: single item on white, shot at 3/4 angle,
    multiple views (lateral, medial, sole, top-down). No people, no
    environment. The shoe occupies roughly 60-70% of the frame.
    Campaign: athlete as subject, typically mid-action or in a moment of
    intense focus. Crops are tight — a face, a foot striking ground, a
    hand gripping a ball. The tighter the crop, the higher the emotional
    intensity. Environmental shots (track, court, field, city streets)
    use wider compositions but always place the athlete as the anchor.
    Reference: Devin Allen's Baltimore running photography for Nike —
    documentary framing, athlete in urban environment, medium-wide shots.
  casting_observed: >-
    Hero campaigns feature elite athletes (LeBron James, Sha'Carri
    Richardson, Kylian Mbappé in recent work). However, the grassroots
    and community content features non-professional athletes — real
    runners, real gym-goers. Nike Running Club content skews younger
    (20s-30s) and explicitly features beginner runners. Nike Sportswear
    and lifestyle content features models and creatives in non-athletic
    contexts — this contradicts the v1 claim that "everyone in frame
    looks like they train." The casting DOES vary by sub-brand: Jordan
    Brand casts fashion-adjacent; Nike SB casts skaters; Nike ACG casts
    outdoor types.
  lighting_and_colour: >-
    Product: high-key studio lighting, even, minimal shadow, designed
    for accurate colour reproduction (critical for e-commerce). Campaign:
    high-contrast, directional. The "Winning Isn't For Everyone" campaign
    uses hard side-lighting that sculpts muscle and creates dramatic
    shadow. Natural light appears in running and community content —
    golden hour, early morning, the quality of light that suggests
    "before the world wakes up." Differs from Adidas (which tends toward
    flatter, more fashion-lit photography) in that Nike's campaign
    lighting is more cinematic and body-focused, emphasising physique
    over garment.
  post_production: >-
    Product photography: clean, colour-accurate, minimal processing.
    Campaign work: contrast is pushed, shadows are deep, skin texture is
    preserved (visible pores, sweat, body hair in recent work). The
    "You Can't Stop Us" split-screen film showed minimal retouching on
    athlete skin. Colour grading in campaigns tends toward desaturated
    environments with product colour popping — the shoe or kit is the
    most saturated element in frame.
  visual_boundaries:
    stated_exclusions: >-
      Nike's brand positioning excludes overt luxury signalling,
      sedentary contexts, and fashion-for-fashion's-sake imagery.
      The brand talks about "the body in motion" as the universal subject.
    observed_exceptions: >-
      Nike Sportswear regularly shows casual, non-athletic contexts —
      people on streets, in cafés, at cultural events. Jordan Brand
      content includes luxury and fashion contexts (galas, fashion shows,
      celebrity events). Nike SB includes non-athletic subculture
      contexts (skate parks, record shops, house parties). The "no one
      is lounging" claim from v1 is inaccurate for at least three
      sub-brands.
    genuine_absence: >-
      Based on observation of nike.com and recent campaign work: no
      visible competitor products in frame. No overtly political
      messaging in visual content (though athlete stories may touch
      political themes). No deliberately ugly or anti-aesthetic visual
      treatments — even SB content, which is lo-fi, is still composed
      with intention.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Nike App UI and Nike Running Club interface"
    - "Nike By You customisation tool"
    - "Campaign graphic overlays (social content, OOH)"
  uses_illustration: true
  illustration_style: >-
    Bold, graphic, flat colour. Limited palette — usually monochrome
    plus one accent. Geometric forms that suggest movement and speed.
    Hand-drawn illustration is rare and reserved for grassroots or
    youth-focused contexts. The dominant illustration language is closer
    to infographic than artistic — data visualisation in Nike Run Club,
    achievement badges, progress graphics.
  illustration_role: >-
    Supporting, never primary. Photography always leads. Illustration
    appears in app UI (achievement animations, run stats, training
    plans), social content overlays (data graphics on athlete imagery),
    and campaign extensions. It annotates or energises — it doesn't
    tell the story independently.
  icon_style: >-
    Custom line icons, consistent stroke weight, rounded terminals.
    Functional — these are interface tools. The swoosh is the only
    icon with emotional weight. Everything else is wayfinding.
  graphic_devices: >-
    The swoosh used compositionally — oversized, cropped, tilted, as a
    frame or divider, not just a logo stamp. Bold horizontal rules.
    Oversized numerals for stats and performance data (split times,
    distances, scores). Colour blocking in monochrome-plus-accent
    system. Diagonal lines implying forward motion.
  motion_language: >-
    Observed in campaign films and social video: fast cuts, not smooth
    transitions. Type enters with weight and impact — slamming in from
    off-screen. Slow motion reserved for athletic detail (foot striking
    ground, muscle flexing, ball leaving hand). Music-driven editing
    with cuts synced to beat. The tempo is urgent. Reference: the
    "You Can't Stop Us" split-screen editing by Oscar Hudson — precise,
    rhythmic, athletic in its editing cadence.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "medium"
  primary_sources:
    - "Nike brand guidelines (Nike Custom Sans, Futura)"
    - "nike.com observed February 2026"
    - "Campaign typography from 'Winning Isn't For Everyone' OOH"
  signature_move: >-
    Uppercase, tight-tracked, heavy-weight display type at extreme scale.
    A Nike campaign headline is unmistakable: black or white Futura Bold
    Condensed (or Nike Custom Sans), all caps, filling the available
    space, often a single word or two-word phrase. The type has the
    visual density of a punch. "JUST DO IT" set the template — three
    words, maximum weight, zero decoration. This is the single most
    recognisable typographic decision in sportswear.
  what_would_look_wrong: >-
    Lowercase campaign headlines. Serif type anywhere. Light or thin
    type weights in headlines. Decorative type treatments (drop shadows,
    outlines, gradient fills). Justified body text. Any headline longer
    than 5-6 words — Nike typography is blunt, not eloquent. A wordy
    Nike headline would immediately read as off-brand.
  case_convention: >-
    Uppercase for campaign headlines and lockups. Sentence case for
    product descriptions and body text. "Just Do It" is title case
    (the exception that proves the uppercase rule). The swoosh replaces
    the full stop.
  display_vs_body: >-
    Display: Nike Custom Sans (proprietary, geometric, bold) or Futura
    Bold / Bold Condensed (Paul Renner, 1927, adopted by Nike in the
    1990s). The display type is the brand's vocal weight — heavy, direct,
    geometric. Body: Helvetica Neue or system sans-serif — invisible,
    functional, receding. The contrast is extreme: display type has total
    personality, body type has zero personality. They never swap roles.
  type_and_image: >-
    In campaigns, type overlays imagery at scale — large enough to
    compete with the photograph. The type sits ON the athlete, not
    beside them. In product contexts, type is minimal and defers to
    the product image. White or black type on the opposite-value
    background. No effects, no outlines, no transparency — just
    weight and scale.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "nike.com product pages and homepage (February 2026)"
    - "Campaign OOH observed via press imagery"
  signature_composition: >-
    Two layouts. Product: systematic grid, generous padding between
    items, white background, product centred in each cell. Campaign:
    full-bleed imagery with one oversized element (either the athlete
    or the type) dominating the composition. The campaign layout is
    deliberately anti-grid — one thing matters, everything else is
    subordinate. The contrast between the systematic product grid and
    the anarchic campaign layout IS the compositional signature.
  density_and_whitespace: >-
    Product pages are spacious — each shoe gets a generous cell with
    padding. Campaign work can be very dense (type and image fighting
    for the same space) or very sparse (single figure against field of
    black). The density modulates with emotional intensity.
  format_preferences: >-
    Square and portrait for social. Wide landscape for OOH and hero
    banners. Vertical for mobile. Nike favours full-bleed over bordered
    compositions. The brand almost never uses frames, borders, or
    contained layouts — everything extends to the edge.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    Nike absorbs trends by filtering them through its athletic identity
    until they feel native. The brand is rarely first to a visual trend
    but never visibly late. When Nike adopts something (variable
    typography, split-screen video, lo-fi documentary), the scale of
    execution makes it feel like Nike originated it.
  examples:
    - trend: "Nostalgic design / Y2K revival"
      stance: "selective-adopter"
      evidence: >-
        Nike Dunk and Air Max 1 re-releases (2020-2025) use retro
        product photography and archive-referencing campaign visuals.
        The SNKRS app regularly features vintage product imagery.
        However, the visual treatment of these products is contemporary
        — the product is nostalgic, the design language around it is not.
      reasoning: >-
        Nike has genuine archive equity and uses it commercially through
        retro product lines. The nostalgia is in the product, not the
        visual system.
    - trend: "Variable and kinetic typography"
      stance: "early-adopter"
      evidence: >-
        Nike's digital and motion content increasingly uses type that
        animates, distorts, or responds to scroll. The "Winning Isn't
        For Everyone" campaign used large-scale kinetic type in digital
        OOH. Nike Custom Sans has been used in variable-weight
        applications across nike.com.
      reasoning: >-
        Kinetic type aligns with the brand's investment in motion and
        energy. Static type is the resting state; type in motion is
        Nike at full volume.
    - trend: "Lo-fi and documentary aesthetics"
      stance: "selective-adopter"
      evidence: >-
        Nike SB consistently uses lo-fi, skater-shot video and grainy
        photography. Nike Running community content uses phone-quality
        and action-cam footage. The "Breaking2" documentary (2017, NatGeo)
        used documentary film language for a brand story.
      reasoning: >-
        Lo-fi serves the grassroots and sub-brand registers but is
        kept away from the main brand's campaign work, which maintains
        high production values.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The swoosh. The athletic narrative as foundation. Bold, heavy
    typography. High-contrast composition. No collaboration makes
    Nike look passive, decorative, or purely fashion-oriented — there
    is always a connection back to the body, movement, or competition.
  what_bends: >-
    Colour palette expands dramatically. Layout can become experimental.
    Photography style shifts to match the collaborator's world.
    Typography can incorporate the collaborator's type system alongside
    Nike's. The swoosh can be modified (reversed, deconstructed, hidden)
    if the collaborator has enough cultural authority.
  notable_examples: >-
    Off-White x Nike (2017-2023): Virgil Abloh's deconstructed
    aesthetic — quotation marks, helvetica labels, exposed foam,
    hand-written annotations. This collaboration changed Nike's mainline
    design language for years (the "revealed construction" trend across
    footwear). Travis Scott x Nike (2019-present): reversed swoosh,
    earth-tone palette, hidden storage pockets. Broke the swoosh
    orientation rule — the single most sacred brand element. Nike x
    Tiffany (2023): Tiffany blue on an Air Force 1, co-branded box.
    Borrowed Tiffany's colour but maintained Nike's silhouette and
    swoosh dominance.
