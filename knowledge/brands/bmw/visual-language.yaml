summary: >-
  Visual language for BMW. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "core-automotive"
      touchpoints:
        - "bmw.com model pages and configurator"
        - "Print advertising in automotive and lifestyle publications"
        - "Dealer showroom visual merchandising"
        - "BMW global OOH campaigns"
      description: >-
        Vehicle-hero photography on dynamic or environmental backgrounds.
        The 2020 flat logo redesign (transparent ring, removed 3D chrome
        effects, retained blue-white Bavarian quadrants) signals a shift
        from engineering-heavy to lifestyle-premium positioning. BMW Blue
        (#5BB4E5, Pantone PMS 2915 C) anchors the brand colour system
        lighter and more accessible than the previous corporate blue.
        Photography emphasises driving dynamics, surface reflection, and
        environmental context. Adrian van Hooydonk (Chief Design Officer
        since February 2009) maintains the design language; Bernd Körber
        (SVP Brand & Product Management since November 2023) oversees
        brand communication. Compared to Mercedes-Benz (darker, more
        formal, more heritage-weighted) or Audi (cooler, more minimal,
        more tech-forward), BMW's visual register is the most dynamic
        and driver-centric of the German premium trio.
      differs_from_default_by: >-
        This is the baseline. All other modes depart from this dynamic,
        vehicle-hero, BMW Blue register.

    - name: "neue-klasse-electric"
      touchpoints:
        - "Neue Klasse concept reveals (2023–2025)"
        - "BMW iX3 launch marketing (first Neue Klasse production model, 2025)"
        - "BMW i sub-brand pages on bmw.com"
        - "CES and IAA Mobility show displays"
      description: >-
        The Neue Klasse design system (2025–2027 rollout, first production
        model iX3) introduces a new visual language for BMW's electric
        future. Simplified kidney grille (slimmer, integrated into a
        wraparound LED display), cleaner surfacing, reduced shut lines.
        Marketing photography uses lighter, more open environments
        architectural settings, clean urban contexts, studio-white
        backgrounds. The visual register is more progressive and more
        tech-forward than the ICE vehicle register. BMW i Blue is a
        brighter, more electric accent than the core BMW Blue. Compared
        to Mercedes EQ (dark, futuristic) or Audi e-tron (minimal,
        silver), BMW's electric visual language is the most optimistic
        and the most colour-forward.
      differs_from_default_by: >-
        Lighter, cleaner, more progressive than the core automotive
        register. The photography shifts from dramatic driving imagery
        to architectural and lifestyle contexts. The colour palette
        brightens. The kidney grille. BMW's primary recognition
        element. is visually transformed.

    - name: "m-performance"
      touchpoints:
        - "BMW M GmbH marketing and bmw.com/m pages"
        - "M division product photography"
        - "Motorsport event branding (DTM, GT racing)"
        - "BMW M social media channels"
      description: >-
        Aggressive, track-focused, high-contrast. The M division tri-colour
        (blue, violet/dark blue, red. representing BMW Motorsport heritage)
        appears on badging, packaging, and marketing accents. Photography
        is darker, more dramatic. lower angles, motion blur, track
        environments, night driving. The visual register communicates
        performance extremity. Compared to Mercedes-AMG (more brutal,
        more chrome) or Audi RS (more technical, more clinical), BMW M
        is the most colour-coded and the most motorsport-heritage-forward.
      differs_from_default_by: >-
        Darker, more aggressive, more contrast-heavy than the core
        register. The M tri-colour stripe is an additional graphic element.
        Photography shifts from lifestyle-dynamic to performance-extreme.
        The target audience shifts from premium lifestyle to driving
        enthusiast.

    - name: "motorrad"
      touchpoints:
        - "BMW Motorrad marketing and bmw-motorrad.com"
        - "Motorrad brand identity (MUTABOR redesign)"
        - "Adventure and touring motorcycle marketing"
      description: >-
        Rugged, adventure-oriented, rider-forward. MUTABOR (design agency)
        redesigned the BMW Motorrad brand identity. Photography features
        riders in dramatic landscapes. alpine passes, desert trails,
        coastal roads. The visual register is more emotional and more
        adventure-narrative than the car brand. The Motorrad roundel
        appears in its own variant. Compared to Ducati (more Italian,
        more fashion-forward) or Harley-Davidson (more American, more
        heritage-heavy), BMW Motorrad is the most adventure-touring-
        focused in its visual language.
      differs_from_default_by: >-
        Landscape-dominant rather than vehicle-dominant. Rider-forward
        rather than product-forward. The visual language is more
        adventurous and more emotionally open than the controlled
        premium register of the car brand.

  notes: >-
    BMW's visual architecture spans core automotive, electric (Neue Klasse),
    M performance, and Motorrad. each with distinct visual registers.
    The 2020 flat logo redesign was designed to work across all sub-brands
    and digital contexts. Serviceplan Group handles European creative;
    Omnicom manages North American media (contract from January 2024).

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "bmw.com product photography (observed February 2026)"
    - "Nick Knight. BMW i7 'Forwardism' campaign"
    - "BMW global advertising (Serviceplan Group)"
    - "Designworks. BMW configurator imagery"
  subject_and_framing: >-
    Vehicle as hero. 3/4 front angle is the signature composition,
    emphasising the kidney grille (BMW's primary recognition element since
    1933) and front stance. Dynamic shots use lower angles to emphasise
    presence and forward motion. Environmental photography places vehicles
    in aspirational contexts. mountain roads, architectural settings,
    urban night driving. The configurator (Designworks) uses controlled
    studio lighting with neutral backgrounds. Nick Knight's i7
    'Forwardism' campaign used more experimental, art-directed
    compositions with dramatic lighting and abstract colour fields.
    Compared to Mercedes (more formal, more studio-controlled) or Porsche
    (more action-oriented, more racing-derived), BMW's photography
    balances dynamism with aspiration.
  casting_observed: >-
    Driver-as-protagonist. BMW marketing typically shows drivers engaged
    with the vehicle and the road. Less talent-dependent than fashion
    brands. the vehicle is the primary subject. When people appear, they
    are active, purposeful, and lifestyle-coded (urban professional,
    adventure seeker, performance driver). The Neue Klasse marketing
    introduces a more diverse and more progressive casting register.
  lighting_and_colour: >-
    BMW Blue (#5BB4E5) anchors all brand communications. Vehicle
    photography uses multi-source lighting to reveal surface quality
    metallic paint, design lines, and the kidney grille are lit for
    maximum dimensional clarity. Night-driving photography uses dramatic
    headlight illumination against dark environments. The colour
    temperature is cooler and more dynamic than Mercedes (warmer, more
    luxurious) but warmer than Audi (cooler, more clinical). Nick
    Knight's work introduced more experimental colour. neon fields
    and abstract gradients.
  post_production: >-
    Heavy CGI integration. Many BMW product images are 3D renders or
    CGI-photography composites. the configurator imagery is entirely
    digital. Vehicle surface rendering is extremely precise. every
    reflection, every highlight mapped to show design lines. Retouching
    maintains a hyper-real but not fantastical quality. the vehicles
    look real but idealised.
  visual_boundaries:
    stated_exclusions: >-
      BMW positions against 'utility' or 'practical' visual codes. the
      brand is premium-dynamic, not family-practical. No visual language
      that undermines the driving experience positioning. The kidney
      grille must be prominently visible in hero product shots.
    observed_exceptions: >-
      The Neue Klasse's simplified kidney grille is a significant
      departure from the traditional double-kidney form. functional
      recognition element becomes an integrated design surface. BMW X
      range (SUVs) uses more lifestyle and family-oriented imagery
      than the core sedan/coupé register.
    genuine_absence: >-
      Based on bmw.com review: no pricing in hero imagery (pricing
      is configurator-specific), no competitive comparisons in marketing
      photography, no discount or promotional visual language in brand
      communications.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "BMW Roundel (1917 origin, 2020 flat redesign)"
    - "Kidney grille (since 1933, BMW 303)"
    - "Hofmeister kink (since 1961, Wilhelm Hofmeister)"
    - "M division tri-colour stripe (blue/violet/red)"
    - "BMW Blue (#5BB4E5, Pantone PMS 2915 C)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Not a traditional icon system. The BMW Roundel is the primary graphic
    mark. circular, divided into four quadrants (blue and white,
    representing Bavarian colours, though the aviation propeller origin
    story is a later marketing addition). The 2020 flat redesign removed
    the 3D chrome ring, making the mark transparent-ready for digital
    contexts. The M tri-colour stripe functions as a secondary graphic
    element for performance products.
  graphic_devices: >-
    The kidney grille. BMW's most recognisable physical design element,
    present on every BMW since the 1933 BMW 303. The dual kidney form
    has evolved from narrow and vertical (1930s–1960s) to wider and more
    horizontal (2000s–2020s) to massive and controversial (2020s 4 Series,
    iX). The Neue Klasse simplifies it into a slimmer, integrated LED
    surface. The Hofmeister kink. a distinctive rearward bend in the
    C-pillar, introduced by designer Wilhelm Hofmeister in 1961 on the
    BMW 1500 Neue Klasse (original). Present on virtually every BMW sedan
    since. The M tri-colour stripe. three diagonal bars (blue, violet/dark
    blue, red) representing BMW Motorsport heritage, appearing on badging,
    stitching, and marketing accents.
  motion_language: >-
    BMW marketing uses dynamic vehicle motion. driving sequences,
    cornering shots, launch acceleration. The 'Forwardism' campaign
    (Nick Knight) introduced more abstract motion language. colour
    fields, light trails, kinetic typography. Digital marketing uses
    smooth reveal animations and configurator rotations. Compared to
    Mercedes (more stately, more processional) or Porsche (more raw,
    more racing-derived), BMW's motion language emphasises fluidity
    and forward momentum.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "BMW Type Next Pro (Robert Strauch, Augsburg, 2019–2021, variable font)"
    - "BMW logotype within the Roundel"
    - "bmw.com observed February 2026"
  signature_move: >-
    BMW Type Next Pro. a custom variable font designed by Robert Strauch
    (Augsburg) between 2019 and 2021 as part of the 2020 brand refresh.
    Variable font technology allows seamless weight transitions from
    Thin to Black, optimised for digital contexts. The typeface is a
    geometric sans-serif with a technical precision that matches the
    engineering brand positioning. Compared to Audi Type (more neutral,
    more Helvetica-adjacent) or Mercedes Corporate (more formal, more
    serif-influenced), BMW Type Next Pro is the most dynamic and the
    most digitally native of the German premium typefaces.
  what_would_look_wrong: >-
    A serif typeface (contradicts the forward-engineering positioning).
    Helvetica or a generic sans-serif (lacks the brand-specific character
    of BMW Type Next Pro). A rounded or soft sans-serif (too friendly,
    not enough engineering precision). Condensed type in brand contexts
    (too aggressive, too motorsport-specific outside M division).
  case_convention: >-
    'BMW' in uppercase (always. it is an initialism). Model designations
    in their established forms (3 Series, X5, i4, M3). Campaign headlines
    in title or sentence case. Body copy in sentence case. The uppercase
    'BMW' provides brand authority; model numbers provide product clarity.
  display_vs_body: >-
    BMW Type Next Pro serves both display and body roles through its
    variable weight range. Display: heavier weights for headlines and
    campaign typography. Body: lighter weights for web content, product
    descriptions, and technical specifications. The single-family
    approach provides consistency across all communications. weight
    variation rather than typeface switching creates hierarchy.
  type_and_image: >-
    Type is subordinate to vehicle photography. Headlines and campaign
    copy appear above or below vehicle imagery, never overlapping
    critical design features (kidney grille, profile). The BMW logotype
    appears at a consistent small scale. In digital contexts, type is
    functional and navigational. the vehicle configurator uses type
    for specification and selection rather than emotional communication.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "bmw.com (observed February 2026)"
    - "BMW global advertising (Serviceplan Group)"
    - "BMW configurator (Designworks)"
  signature_composition: >-
    Vehicle-centred, environment-framed. The hero composition places the
    vehicle in the lower two-thirds of the frame with aspirational
    environment above. bmw.com uses a full-bleed hero approach. large
    vehicle images with minimal text overlay, scrolling to reveal
    specifications and features. The configurator uses a 3D rotation
    view with neutral backgrounds. Campaign layouts follow automotive
    convention: vehicle hero, headline below or above, BMW Roundel in
    corner. Compared to Mercedes (more formal, more symmetrical) or
    Tesla (more minimal, more tech-product-styled), BMW's layouts
    emphasise movement and dynamism.
  density_and_whitespace: >-
    Moderate density. Product pages balance large imagery with technical
    specification content. The 2020 brand refresh increased whitespace
    and simplified page structure. Campaign layouts use generous space
    around the vehicle. the car needs room to breathe. Compared to
    Audi (sparser, more minimal) or Porsche (denser, more specification-
    heavy), BMW sits in a middle register.
  format_preferences: >-
    Landscape 16:9 for hero vehicle photography (emphasises width,
    stance, and driving direction). 3/4 front angle as the default
    product shot composition. Portrait for some lifestyle and campaign
    contexts. The configurator uses interactive 360-degree views.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    BMW selectively adopts design trends through major brand refreshes
    (2020 flat logo, Neue Klasse design language) while maintaining core
    recognition elements (kidney grille, Hofmeister kink, Roundel).
    The brand balances heritage preservation with necessary modernisation.
  examples:
    - trend: "Flat logo redesign (automotive and tech brands simplifying logos)"
      stance: "early-adopter"
      evidence: >-
        BMW's 2020 flat logo redesign removed the 3D chrome ring and
        made the Roundel transparent-ready. part of the broader wave
        including Volkswagen (2019 flat redesign), Kia (2021), GM (2021),
        and Peugeot (2021). BMW was among the earliest premium automakers
        to flatten its logo.
      reasoning: >-
        The transparent Roundel was designed to work natively in digital
        contexts. app icons, social media profiles, connected car
        displays. where the 3D chrome ring appeared dated. The redesign
        maintained all recognition elements while modernising for
        digital-first use.
    - trend: "Electric vehicle visual differentiation"
      stance: "leader"
      evidence: >-
        The Neue Klasse design system (2025–2027, first model iX3) creates
        a distinct visual identity for BMW's electric future. simplified
        kidney grille, cleaner surfacing, new interior architecture with
        BMW Panoramic iDrive. Unlike competitors who applied electric
        badges to existing designs (early Mercedes EQ, Audi e-tron),
        BMW committed to a ground-up visual language for electrification.
      reasoning: >-
        BMW's Neue Klasse represents the most significant visual evolution
        of the brand in decades. the kidney grille transformation alone
        is a statement about the electric transition requiring new visual
        codes rather than adapted ones.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The BMW Roundel. BMW Blue. The kidney grille recognition element in
    product design. BMW Type Next Pro typography. No collaboration
    positions BMW as anything other than a premium brand.
  what_bends: >-
    Colour palette can expand for special editions and collaborations.
    Photography style can adapt to partner contexts (fashion, art,
    lifestyle). The M division allows more aggressive co-branding.
    BMW Designworks collaborates broadly on design projects outside
    automotive contexts.
  notable_examples: >-
    BMW x KITH (2020–ongoing): Ronnie Fieg collaboration across M3
    and M4 special editions. KITH's streetwear visual language applied
    to BMW M division products with custom liveries and co-branded
    merchandise. BMW Art Cars (1975–present): artists including Andy
    Warhol (M1, 1979), Jeff Koons (M3 GT2, 2010), and John Baldessari
    (M6 GTLM, 2016) painting directly on vehicles. the car becomes
    an art canvas. BMW x Nick Knight 'Forwardism' (2023): fashion
    photographer brought experimental visual language to BMW i7
    campaign. abstract colour fields and kinetic imagery departing
    from conventional automotive photography.
