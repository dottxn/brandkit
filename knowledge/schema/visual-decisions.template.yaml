# Chunk Template: visual-decisions.yaml
# Domain: visual-decisions
# Target: variable (Gold Set brands will be large)
# Present for: Gold Set brands in phase one; optional for others.
#
# This chunk captures atomic visual micro-decisions as "ladder rungs"
# (coarse -> mid -> fine), scoped to system and optionally channel/component.
#
# Strict rule (phase one): every decision must have >= 1 evidence item.
# Gold Set rule: evidence must include artifact_path + sha256 + source_url.

chunk_id: "{brand}-visual-decisions"
brand: "{brand}"
domain: "visual-decisions"
context_tags:
  - "micro-decisions"
  - "visual-system"
  - "design-choices"
depends_on:
  - "{brand}-visual-language"
  - "{brand}-visual-dna"
format: "yaml"
version: "1.0"
last_updated: "{YYYY-MM-DD}"
status: "active"
enrichment_level: "enriched"
summary: "Atomic, evidence-backed visual micro-decisions, scoped to systems and channels."

ontology_version: "0.1"

# ── Observation Metadata ────────────────────────
# This is NOT the evidence; it is the capture run context.
observation:
  capture_run_id: ""           # e.g. "2026-03-12-public-v1"
  captured_at: ""              # YYYY-MM-DD (when evidence was captured)
  channels_attempted: []       # e.g. [website, instagram, tiktok]
  channels_succeeded: []       # subset of attempted
  channels_blocked: []         # array of {channel, reason}
  sample_notes: ""             # short, concrete sample description


# ── Decisions ───────────────────────────────────
# Each entry is one rung on a ladder.
#
# Required:
#   axis, system, value, observed, confidence_observed,
#   confidence_rationale, evidence[]
#
# Optional:
#   channels, components, rationale, details, tags
decisions:
  - axis: "illustration.used"
    system: "core"
    value: "no"
    observed: ""
    confidence_observed: "low"      # high|medium|low
    rationale: ""
    confidence_rationale: "low"     # high|medium|low
    evidence:
      - source_url: ""
        artifact_path: ""           # evidence/<brand>/<channel>/<date>/<slug>.webp
        sha256: ""
        captured_at: ""
        channel: "website"
        touchpoint: ""
        note: ""

