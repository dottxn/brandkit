# ── Data
learned_insights:
  - >-
    Luxury brands retain power not through exclusion but through curation. Sephora's open-sell model and 500+ brand selection democratizes luxury while maintaining prestige
  - >-
    "fearless explorer" and "inclusive champion" only work when backed by actual business model (open-sell allowing product testing) and infrastructure (expert services, digital education)
  - >-
    Monochromatic branding (black/white) is sophisticated not boring when paired with vibrant accent color (#E91E63 pink) and bold curved mark
  - >-
    The stripe pattern succeeds as visual identity because it's simultaneously modern, retro, and timeless. working across generations
  - >-
    Sephora's positioning as "beauty playground" works because it suggests joy and experimentation, not authority and expertise
what_nobody_copies: >-
  The architectural decision to center brand identity around inclusivity and fearlessness as core values rather than around products or professional expertise
