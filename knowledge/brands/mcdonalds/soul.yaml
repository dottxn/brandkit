summary: "Soul of McDonald's. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The golden glow of a heat lamp warming a cardboard container of fries. instant comfort, reliable warmth, the physical sensation of being taken care of without pretense. McDonald's doesn't feel aspirational; it feels like home. The golden color (#FFC72C, PANTONE 123 C) radiates familiarity across 119 countries and 68 million daily customers. There's democratic warmth to the experience: no judgment, no exclusion, no pretense. Whether you're a CEO or a kid saving allowance, you're welcomed with the same smile and the same quality. The Arches feel like permission to enjoy something simple without guilt. This is what mass-market warmth actually feels like: genuinely happy, never faked.
core_belief: >-
  Making people happy through accessible food served consistently doesn't require sophistication or premium ingredients. The comfort of reliability is its own luxury.
creative_tension:
  - >-
    McDonald's manufactures food at impossible global scale while maintaining perception of freshness and care. Sixty-eight million customers per day requires ruthless efficiency and centralized supply chains. Yet the brand must feel personal. every location should feel like someone cares about your order. This tension is managed through "flawesome" philosophy: celebrating authentic food imperfections (melting cheese, tapered fries, sprinkled sesame seeds) rather than hiding production reality. By displaying food as it actually comes out of the kitchen rather than idealized versions, McDonald's proves the experience is real rather than manufactured.
  - >-
    The brand is simultaneously everywhere and nowhere. present in 119 countries while maintaining global consistency that makes a Big Mac taste identical in Tokyo and Toronto. Yet local relevance matters. The tension is resolved through selective localization: core menu items and Arches remain constant globally, while regional flavors and breakfast items vary. This strategy maintains identity while proving cultural respect.
decision_filter: >-
  Is this easy? Does this maintain the feel of warmth and accessibility? Can this be executed consistently across 50,000 locations without quality degradation? Would this make a busy parent's life simpler?
signature_move: >-
  The Golden Arches deployed through "Archery" system. used oversized, cropped, angled, implied through whitespace, or subtly integrated into architecture and design. create the most recognizable symbol in the world. Created by Richard and Maurice McDonald's in 1952 as literal architectural feature (the restaurant had two yellow arches), it became pure symbol. The Arches work because they're simple geometric form that feels both modern and timeless. The curves reference speed and movement while the symmetry feels stable and reliable. This signature is so powerful that competitors have failed to create equivalent symbols precisely because it's both original and inevitable.
what_would_break_it: >-
  Abandoning the golden warmth and Arches-centered visual system for trendy design. minimalism, grayscale, contemporary sans-serif would destroy the brand. Moving away from "flawesome" celebration of authentic food imperfections toward hyper-styled, airbrushed perfection would contradict the brand's emotional positioning. Equally fatal: adopting aspirational, lifestyle-focused brand voice ("Treat yourself," "Indulge") that positions food as guilty pleasure rather than permission to enjoy. The moment McDonald's becomes apologetic about serving affordable, accessible food is the moment it stops being McDonald's.
