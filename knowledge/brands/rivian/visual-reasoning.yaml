summary: Visual reasoning for Rivian. Why the design choices work.

# ── Data
type_logic: >-
  Pentagram's custom humanist sans is crucial because it makes cutting-edge tech feel *accessible* rather than austere. The warm character prevents the technology from reading as cold or algorithmic. Notice how the letterforms have slightly increased x-height and open counters—this keeps Rivian from feeling like a tech startup (where geometric coldness is default) while staying modern enough to feel innovative. The mixed weights work because thin weights suggest precision (engineering) while heavier weights suggest boldness (adventure). If Rivian switched to pure geometric sans (like Helvetica or Futura variants), it would immediately sound more like a corporate fleet company. If it went rounded and playful, it would lose credibility for serious capability.
colour_logic: >-
  Compass Yellow (#DEB526) is the linchpin. It's warm enough to evoke natural light and human warmth, but saturated enough to read as technological forward-thinking. It sits between the warmth of copper/gold (which would feel dated) and the coldness of electric blue (which would position Rivian as tech-first rather than adventure-first). Paired with near-black and warm grey, the palette resists the common mistake of "all-EV brands use electric blue"—Rivian uses yellow to say "this is about life, not just power." The minimal range (only three core colors) means every color placement carries intentional weight. A brand with this clear mission can't afford palette sprawl because it dilutes the singularity of purpose. The warmth of the palette matters: cool-toned greys would make the yellow feel unresolved, but warm greys (like #2C2C2C) make it feel like natural light reflecting off a vehicle at golden hour.
composition_philosophy: >-
  Rivian's layouts honor *movement* and *openness* because those are core to adventure. Left-aligned type with generous right margins feels like there's always more space to explore (literally and metaphorically). The compass logo isn't trapped in corners—it moves, it expands, it occupies space with confidence. Lockups balance heavy letterforms against white space (the negative space is active, not passive). This matters because brands that squeeze elements densely together feel constrained; brands with breathing room feel liberated. Notice how the "widened numerals for equal weight" mentioned in the JSON creates visual rhythm—it's not about decoration, it's about readability and precision, which both matter for a vehicle built for serious exploration. The philosophy is: every element earns its space, nothing is decorative, and emptiness is a design choice that means "room for possibility."
what_would_break_it: >-
  Introducing a secondary geometric or tech-forward typeface for supporting text. The moment Rivian mixes humanist warmth with geometric coldness (common mistake: using different type families for different content), it starts communicating internal conflict about whether it's a tech company or an adventure company. It must stay unified. Alternately: shifting the Compass Yellow toward electric blue to "compete" with Tesla's electric vehicle positioning would betray the warm-accessible positioning that makes Rivian's adventure mission credible instead of corporate.
