summary: >-
  Visual language for Aesop. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "product-apothecary"
      touchpoints:
        - "aesop.com product detail pages and collection grids"
        - "Aesop packaging — amber glass, black pump, apothecary labels"
        - "Aesop retail product walls and sink stations"
        - "Email marketing and CRM"
      description: >-
        The amber bottle as protagonist. Product photography is clean,
        warm, and architectural — bottles arranged with precise spacing
        on neutral surfaces. The amber glass, black pump, and cream-stock
        label with Optima (Hermann Zapf, 1958) logo and Neue Helvetica
        product text create a consistent product language across 100+
        SKUs. Suisse International (Ian Party / Swiss Typefaces, adopted
        ca. 2011) handles all digital and marketing typography. The visual
        register is apothecary-clinical: precise, warm-toned, and spare.
        Compared to Aesop's closest competitor Le Labo (darker, rawer,
        more industrial) or Byredo (more fashion-oriented, more minimal),
        Aesop is warmer and more literary.
      differs_from_default_by: >-
        This is the baseline. All other modes depart from this product-
        apothecary register.

    - name: "store-architecture"
      touchpoints:
        - "Aesop signature stores globally (300+ locations)"
        - "Store-specific design by named architects: Snøhetta, CASE-REAL/Koichi Futatsumata, Schemata/Jo Nagasaka, Campana Brothers, Ilse Crawford/StudioIlse, Paulo Mendes da Rocha, Torafu Architects"
        - "aesop.com/nz/r/the-sibling-spaces (store architecture editorial)"
        - "Social media store photography"
      description: >-
        Every Aesop store is designed as a site-specific architectural
        intervention. Marianne Lardilleux (Global Head of Retail Design)
        and Jean-Philippe Bonnefoi (Head of Retail Design Europe) oversee
        a programme where each store responds to its neighbourhood —
        Snøhetta's Oslo store differs fundamentally from Jo Nagasaka's
        Tokyo store. Common elements: the product wall (amber bottles
        arranged by category), the sink station (where customers test
        products), and warm material palettes (timber, stone, brass,
        concrete). No two stores are identical. The visual register is
        gallery-meets-pharmacy. This is Aesop's most distinctive visual
        mode and a key differentiator — no other skincare brand invests
        in store-specific architecture at this level.
      differs_from_default_by: >-
        Three-dimensional, site-specific, architecturally authored. The
        product-apothecary baseline becomes spatial — each store is a
        unique expression of the brand's values in a specific context.

    - name: "editorial-literary"
      touchpoints:
        - "aesop.com/nz/r/the-fabulist (editorial content)"
        - "Aesop gift kits — literary-themed packaging and naming"
        - "In-store reading material and cultural recommendations"
        - "Aesop email campaigns with literary quotations"
      description: >-
        Text-heavy, quotation-driven, intellectual. Aesop's editorial
        voice is distinctively literary — gift kits are named after literary
        concepts ('The Ardent Nomad', 'The Impassioned Wanderer'), email
        campaigns feature reading recommendations, and stores carry
        curated publications. The visual treatment is restrained — Suisse
        International in modest sizes, generous line-height, ample margin.
        Photography recedes and text leads. The visual register is closer
        to an independent bookshop or literary journal than a beauty brand.
      differs_from_default_by: >-
        Text leads where product-apothecary is image-led. The bottle
        recedes and the written word becomes the visual protagonist. The
        intellectual positioning is most explicit in this mode.

    - name: "ingredient-botanical"
      touchpoints:
        - "aesop.com ingredient pages and product formulation information"
        - "In-store ingredient education"
        - "Social media ingredient features"
      description: >-
        Close-up botanical and ingredient photography — plants, seeds,
        oils, bark. The photography is warm, naturalistic, and detailed.
        This mode connects the product to its source ingredients. The
        visual register is scientific-botanical rather than 'natural
        beauty' — Aesop shows ingredients as specimens, not as decorative
        greenery. Compared to brands like Origins (more decorative, more
        'nature') or Grown Alchemist (more clinical), Aesop's botanical
        photography is more composed and more documentary.
      differs_from_default_by: >-
        The amber bottle is absent. The visual focus shifts from finished
        product to raw material. The photography is warmer and more
        textural than the product-apothecary mode.

  notes: >-
    Following L'Oréal's acquisition (August 2023, $2.5B), Aesop's visual
    language has remained remarkably stable. Ai Kato (Global Creative
    Director) oversees a 70-person in-house creative team that maintains
    tight control. Any visual drift post-acquisition should be monitored
    in future updates.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "aesop.com product and store photography (observed February 2026)"
    - "Aesop store architecture programme (Snøhetta, CASE-REAL, Schemata, et al.)"
    - "70-person in-house creative team under Ai Kato (Global CD)"
    - "Work & Co — aesop.com website redesign"
  subject_and_framing: >-
    Product photography: amber bottles on neutral surfaces (stone, timber,
    concrete) shot at 3/4 angle or straight-on. Groupings of 2-4 products
    are composed with precise spacing — the negative space between bottles
    is as considered as the bottles themselves. Store photography:
    architectural, wide-angle, showing the full spatial experience — product
    wall, sink, materials, light. The store is photographed as architecture,
    not as retail. Compared to Le Labo (darker, moodier, more raw) or
    Diptyque (more decorative, more Parisian), Aesop's photography is
    cleaner, warmer, and more architecturally composed.
  casting_observed: >-
    Almost no people in Aesop's visual marketing. The brand is conspicuously
    unpeopled — the product and the architecture are the subjects. When
    hands appear (at the sink station, holding a product), they are shot
    close-up and anonymously. No celebrity, no influencer, no model. This
    is a deliberate strategy: the absence of people reinforces the
    literary, intellectual positioning — the brand speaks to a mind, not
    to an aspiration to look like someone.
  lighting_and_colour: >-
    Warm, natural, amber-toned. The lighting is consistent with the amber
    glass — everything shares the same warm colour temperature. Product
    photography uses soft, diffused studio lighting that mimics natural
    daylight. Store photography uses the store's own lighting — typically
    warm, low, and atmospheric. The overall colour world is muted earth
    tones — amber, cream, warm grey, aged timber, dark green, terracotta.
    No vivid colour, no cold tones, no blue-white. Compared to Glossier
    (pink, brighter, more playful) or The Ordinary (clinical white,
    deliberately cold), Aesop's palette is warmer and more natural.
  post_production: >-
    Minimal and warm. Colour grading pushes warm tones without feeling
    filtered. Materials are accurately represented — the amber glass, the
    cream label stock, the stone counters all look as they do in life.
    The retouching philosophy is invisible — nothing looks manipulated,
    everything looks carefully observed.
  visual_boundaries:
    stated_exclusions: >-
      Aesop's positioning excludes before-and-after skin photography,
      celebrity endorsement, youth-and-beauty aspiration imagery, and any
      visual language that reads as 'beauty industry.' The brand does not
      use models, influencer content, or user-generated imagery in its
      official channels.
    observed_exceptions: >-
      Post-L'Oréal acquisition, Aesop has appeared in some multi-brand
      L'Oréal corporate communications that use a visual language
      inconsistent with the standalone brand. These are corporate contexts,
      not Aesop-controlled channels.
    genuine_absence: >-
      Based on aesop.com review: no faces, no before-and-after, no
      discount or sale language, no seasonal promotional graphics, no
      competitive positioning, no claims or statistics in visual marketing.
      The visual world is remarkably consistent and restrained.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Aesop product labels and packaging system"
    - "aesop.com interface and editorial"
    - "Aesop store signage and wayfinding"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Minimal and functional. aesop.com uses a restrained icon set — no
    custom illustration, no decorative elements. Icons serve navigation
    and function only. The visual restraint extends to every graphic
    element — if it doesn't serve a purpose, it isn't there.
  graphic_devices: >-
    The amber bottle IS the primary graphic device — its silhouette is as
    recognisable as any logo. The cream-stock label with Optima logotype
    and Neue Helvetica product text is the secondary device. The Aesop
    wordmark in Optima (Hermann Zapf, 1958) — a humanist sans-serif with
    subtle stroke variation that reads as warm and literary. Horizontal
    rules separate content sections on web and in print. The absence of
    graphic decoration is itself the brand's most distinctive graphic
    decision.
  motion_language: >-
    Very limited. aesop.com uses subtle transitions — content fading in
    on scroll, smooth page transitions. No animation for animation's sake.
    The pacing is slow and considered — consistent with the brand's overall
    unhurried positioning. No observed campaign video or motion work beyond
    basic product presentation.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Suisse International (Ian Party / Swiss Typefaces, adopted ca. 2011) — primary digital and marketing type"
    - "Optima (Hermann Zapf, 1958) — logotype"
    - "Neue Helvetica — product label body text"
    - "aesop.com observed February 2026"
  signature_move: >-
    Suisse International (Ian Party / Swiss Typefaces) at restrained
    sizes with generous line-height and wide margins. The type is never
    large, never bold, never dominant — it creates a quiet, bookish
    reading experience. The signature is restraint itself: where beauty
    brands typically use display type to create visual impact, Aesop
    uses body-weight type at modest sizes to create intellectual tone.
    The Optima logotype (Hermann Zapf, 1958) provides the only moment
    of typographic warmth — its subtle stroke variation bridges serif
    and sans-serif, literary and modern.
  what_would_look_wrong: >-
    Bold or display-weight headlines (contradicts the quiet, literary
    register). Script or decorative type (too beauty-industry). Geometric
    type like Futura (too cold for a brand that values warmth). Condensed
    type (too urgent — Aesop's type breathes). Any type treatment that
    shouts — the brand's entire typographic strategy is built on speaking
    at a conversational volume.
  case_convention: >-
    Sentence case throughout. Product names in title case ('Parsley Seed
    Anti-Oxidant Serum'). The brand avoids uppercase — even headers and
    navigation use sentence case. This is consistent with the literary,
    unhurried positioning.
  display_vs_body: >-
    Suisse International serves both display and body. Display: Suisse
    International Medium or Regular at modest sizes — 'display' at Aesop
    means slightly larger body text, not large type. Body: Suisse
    International Regular or Light, generous line-height (1.5-1.7x),
    wide margins. The distinction between display and body is subtle —
    both are quiet and readable. On packaging: Optima for the Aesop
    logotype, Neue Helvetica for product names, ingredients, and
    instructions.
  type_and_image: >-
    Type and imagery are separated — text occupies its own clean zones,
    images occupy theirs. Type is never overlaid on photography. The
    reading experience is sequential: image, then text, or text, then
    image. On aesop.com, the editorial sections privilege text — long-form
    content with minimal illustration, the type IS the visual experience.
    This text-respecting approach is distinctive: most beauty brands
    subordinate text to imagery, Aesop gives text equal or greater weight.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "aesop.com (observed February 2026, redesigned by Work & Co)"
    - "Aesop store spatial design"
    - "Aesop packaging layout"
  signature_composition: >-
    Wide margins, single-column content, deliberate pacing. aesop.com
    (redesigned by Work & Co) uses a layout that reads more like a book
    than a website — generous margins, one idea per section, text and
    image in alternating blocks. The product grid is clean and spacious —
    fewer products per row than competitors, each given room to breathe.
    Compared to Glossier (denser, more playful, more social-media-native)
    or The Ordinary (clinical, data-dense, product-forward), Aesop's
    layout is the most bookish in the skincare category.
  density_and_whitespace: >-
    Very low density. The whitespace is the most distinctive layout
    element — aesop.com uses more whitespace per unit of content than
    almost any other beauty brand. Product pages show one product with
    its description, ingredients, and usage — nothing competes for
    attention. The whitespace signals the same unhurried confidence as
    the typography: there is no urgency to fill space.
  format_preferences: >-
    Square for product photography. Landscape for store architecture.
    Vertical for mobile. The product photography format is consistent —
    square or near-square compositions that give the bottle room. Store
    photography uses wider landscape formats to capture spatial depth.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "resister"
  relationship_to_trends: >-
    Aesop has maintained a remarkably consistent visual language for over
    a decade. The brand actively resists beauty-industry trends — no
    influencer content, no seasonal visual refreshes, no trend-responsive
    packaging redesigns. Changes are slow, architectural, and considered.
  examples:
    - trend: "Influencer and social-media-native beauty marketing"
      stance: "resister"
      evidence: >-
        While competitors (Glossier, Fenty, Rhode) built visual identities
        around social media content and influencer partnerships, Aesop has
        maintained an almost anti-social-media visual approach — no faces,
        no UGC, no influencer content in official channels. The brand's
        social media presence uses the same product and store photography
        as its website.
      reasoning: >-
        Aesop's positioning as a literary, intellectual brand requires
        distance from beauty-industry promotional conventions. The
        consistency IS the luxury signal — the brand doesn't need to
        chase attention because its physical retail presence and product
        quality drive demand.
    - trend: "Minimal-clinical skincare branding (The Ordinary, CeraVe)"
      stance: "resister"
      evidence: >-
        Aesop was 'minimal' decades before The Ordinary launched (2016).
        But where The Ordinary's minimalism is cold, clinical, and
        ingredient-data-forward, Aesop's is warm, literary, and
        architecturally rich. The brand has not moved toward the clinical-
        minimal trend despite its surface similarity — the warmth of
        amber glass, timber, and Optima distinguishes it from the white-
        and-helvetica clinical school.
      reasoning: >-
        Aesop's minimalism predates and differs from the clinical-minimal
        trend. The brand maintains its own warmer, more humanist version
        of restraint.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The amber bottle and packaging system. Suisse International typography.
    The warm, restrained colour palette. The literary tone. Production
    quality. No collaboration introduces vivid colour, celebrity presence,
    or promotional visual language.
  what_bends: >-
    Store architecture adapts radically for each architect — the physical
    space is the primary collaboration canvas. Limited-edition gift kits
    introduce partner's design sensibility in packaging inserts and kit
    naming. The product formulation can change; the visual presentation
    rarely does.
  notable_examples: >-
    Aesop x Snøhetta (multiple stores): the Norwegian studio's material
    and spatial language applied to Aesop's retail format — the stores
    in Oslo and London use Snøhetta's distinctive material palette within
    Aesop's product-wall framework. Aesop x Jo Nagasaka / Schemata
    (Tokyo stores): Japanese architectural sensibility — concrete, timber,
    and spatial restraint. The architect collaborations are Aesop's most
    significant visual partnerships and demonstrate the pattern: the
    product system stays constant while the architectural container
    transforms. Non-architectural collaborations are rare and typically
    limited to gift kit packaging.
