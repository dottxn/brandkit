summary: Visual reasoning for Figma. Why the design choices work.

# ── Data
type_logic: >-
  Figma Sans is a custom grotesque (geometric sans-serif) that's designed to feel friendly and modern without losing legibility at small scales or power at large scales. The typeface family (Sans, Condensed, Mono, Hand) offers flexibility—different contexts get different versions, modeling how good design systems work. Figma Sans's slightly generous proportions and warm curves prevent the geometric grotesque family from feeling cold or corporate. When rendered in bold weights (which Figma does frequently), it creates visual presence without requiring size. The custom nature signals investment in craft and differentiation from generic tech typefaces.
colour_logic: >-
  The five-color palette (#F24E1E orange-red, #FF7262 lighter red, #A259FF purple, #1ABCFE cyan, #0ACF83 green) is expansive and deliberately varied. Each color has distinct personality and saturation—they're not harmonized or muted. The colors work together because they're so different that they occupy separate visual space rather than competing. This models the design principle Figma teaches: clear contrast beats subtle sophistication. The palette is deployed with hierarchy: primary brand color appears in UI chrome and buttons, while secondary colors appear in illustrations and visual storytelling. The overall effect is bold without being chaotic because saturation and context placement remain disciplined.
composition_philosophy: >-
  Figma's design system embraces layering, overlap, and visual density in ways that contradict traditional "clean" design. Illustrations often violate layout boundaries—shapes extend beyond containers, colors break frame rules. The philosophy is "the composition should feel alive and expressive, not like it's sitting in a grid." This models creative freedom within systematic constraints. Layouts use generous whitespace selectively (around text for readability) while allowing visual elements to occupy space freely. The composition language says "art direction matters, systems enable it rather than restrict it."
what_would_break_it: >-
  Flattening the design system into a minimalist, restrained identity. The moment Figma's own visual language becomes quiet or understated, it stops modeling the boldness and expression the platform enables. The brand's visual design must prove that systematic thinking doesn't require sacrifice of creative personality. Stripping to a monochrome logo or removing color from core branding would hollow the entire message about what design can accomplish.
