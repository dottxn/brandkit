summary: "Anti-patterns for Figma. What this brand would never do."

# ── Data
visual:
  - pattern: "Subtle, sophisticated, quiet visual identity"
    reasoning: >-
      Figma's refresh deliberately embraced "unapologetically graphic" and "jumbo" expression. Restraint would undermine the core message that design is bold. The brand must model the boldness it encourages.
  - pattern: Consistent color usage across all applications
    reasoning: >-
      Figma uses dramatic color blocking and high-contrast color combinations. Palette restraint would contradict the expansive visual thinking the brand teaches. The colors work because they're deployed with intention, not because they're limited.
  - pattern: Serif typography or traditional design formality
    reasoning: >-
      Figma Sans is custom grotesque—geometric but thoughtful. Historical typefaces would signal heritage and stability; Figma needs to signal innovation and creative possibility. The sans-serif choice says "we're building what's next."
  - pattern: "Photography-based lifestyle imagery"
    reasoning: >-
      Figma uses abstract illustration and product visualization almost exclusively. Photography would add realism that contradicts the tool's function (which is abstraction and plan-making). Real photos of people designing would cheapen the idea back toward traditional product marketing.
strategic:
  - pattern: Selling design system templates and solutions
    reasoning: >-
      Figma could position itself as "pre-designed solutions for fast teams," but instead positions itself as a canvas for infinite creativity. Template-first framing would limit imagination to predetermined categories. Open canvas framing creates category expansion.
  - pattern: "Designer-only brand positioning"
    reasoning: >-
      Figma increasingly markets toward product managers, developers, and cross-functional teams. Designer-exclusive positioning would cap the market and reinforce silos that the tool actually breaks down. Inclusive language matters to the business model.
  - pattern: Competing on features and integrations
    reasoning: >-
      Figma rarely lists features in marketing. The brand focuses on what becomes possible, not what the tool contains. Feature-led marketing would commoditize against competitors; possibility-led marketing creates category ownership.
  - pattern: "Localized or market-specific design systems"
    reasoning: >-
      Figma's design system is global and consistent because the message is "design is universal language." Regional variations would fragment that coherence. The flexibility of the system supports local languages, not local aesthetics.
tonal:
  - pattern: Formal or instructional voice
    reasoning: >-
      Figma's tone is conversational and confident without being didactic. Explaining how to use the tool would position Figma as utility; celebrating what teams create positions it as catalyst. The voice stays curious rather than commanding.
  - pattern: Apologetic about disrupting traditional workflows
    reasoning: >-
      Figma never says "we know this is different, we're sorry." The tone assumes that the future of work is already here. Defensive positioning would undermine the brand's authority to lead the category forward.
  - pattern: "Hype-focused or trendy language"
    reasoning: >-
      While Figma participates in cultural moments, the voice doesn't rely on trend cycles. Slang-heavy or overly meme-driven communication would date quickly. Timeless confidence matters more than being currently cool.
  - pattern: Solitary genius mythology
    reasoning: >-
      Figma's messaging around creativity always includes "nothing great is made alone." Celebrating individual brilliance would contradict the collaborative core. The tone positions individual talent as amplified through collaboration, not replaced by it.
cultural:
  - pattern: Gatekeeping design expertise
    reasoning: >-
      Design gatekeeping creates scarcity (you need a degree, a portfolio, years of experience). Figma positions design thinking as accessible and teachable. Anti-elitist messaging that doesn't come across as patronizing is difficult; Figma threads this carefully through product design rather than explicit communication.
  - pattern: Design as separate function vs. design as organizational practice
    reasoning: >-
      Figma markets design as connected to product strategy, engineering velocity, and organizational decision-making. Positioning design as aesthetic choice alone would miss the actual competitive advantage. Cultural positioning emphasizes design as systematic thinking.
  - pattern: "Tool-centric vs. outcome-centric narrative"
    reasoning: >-
      "We have better features than Sketch" would be tool-focused and defensive. "Your teams ship better products 40% faster" is outcome-focused and suggests transformation. Figma's culture positioning is always upstream of the tool to user impact.
  - pattern: Creator economy mythology vs. team collaboration
    reasoning: >-
      Earlier design tool positioning celebrated the solo designer as hero. Figma explicitly reframes this around teams and distributed expertise. The cultural shift matters because it attracts organizations rather than just individuals, changing who leads purchase decisions.
