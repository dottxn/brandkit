studios:
  - name: "Snøhetta"
    type: architecture
    url: "https://www.snohetta.com/"
    relationship: "Designed 8+ Aesop stores globally. Oslo, London Duke of York Square, Singapore ION, Sydney Pitt Street"

  - name: "Schemata Architects"
    type: architecture
    url: "https://schemata.jp/"
    relationship: "Jo Nagasaka's studio. designed Tokyo stores with Japanese architectural sensibility"

  - name: "CASE-REAL"
    type: architecture
    url: "https://www.casereal.com/"
    relationship: "Koichi Futatsumata's studio. store design in Fukuoka and beyond"

  - name: "Barozzi Veiga"
    type: architecture
    url: "https://barozziveiga.com/"
    relationship: "Designed Aesop Barcelona store (Passeig de Gràcia). stucco walls, terrazzo, burnished steel"

  - name: "StudioIlse"
    type: interior-design
    url: "https://www.studioilse.com/"
    relationship: "Ilse Crawford. humanist interior design for select Aesop retail spaces"

  - name: "Torafu Architects"
    type: architecture
    url: "http://torafu.com/"
    relationship: "Japanese architecture practice. Aesop store collaborations in Japan"

  - name: "Work & Co"
    type: digital-design
    url: "https://work.co/"
    relationship: "Redesigned aesop.com. the site reads more like a book than a commerce platform"

  - name: "Commission Studio"
    type: creative-direction
    url: "https://www.commission.studio/"
    relationship: "Creative direction on Always On campaign and Gloam fragrance campaign. art direction across stills and motion"

  - name: "Swiss Typefaces"
    type: type-foundry
    url: "https://www.swisstypefaces.com/"
    relationship: "Foundry behind Suisse International, Aesop's primary digital and marketing typeface since ~2011"

people:
