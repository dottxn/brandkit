summary: Visual reasoning for Prada. Why the design choices work.

# ── Data
type_logic: >-
  The custom Prada serif (similar to Rosan) with its distinctive cut-out under the R is architectural typography. every letter is a composition problem, not just a shape. The serif character is "editorial" rather than "elegant," which positions Prada as a publisher of ideas, not a promoter of beauty. The mixed weight system (thick and thin strokes) creates visual tension. no letter is passive or purely functional. This mirrors the brand's philosophy: even the smallest element should create conceptual friction. Using Futura as a secondary (geometric sans-serif) creates deliberate ugliness alongside the serif. it's a methodological choice that says "we choose what works, not what's pretty."
colour_logic: >-
  Black (#000000) and white (#FFFFFF) are the minimum palette necessary to create contrast. Prada uses this limitation to force focus onto construction, silhouette, and material. Color would be decorative; monochrome is argumentative. The palette is almost austere. it refuses chromatic seduction. When competing luxury brands use jewel tones or metallics to signal preciousness, Prada uses the absence of color to demand intellectual engagement. The strategy is: if you can't prove it's beautiful without color, the design wasn't strong enough.
composition_philosophy: >-
  Prada compositions deliberately mix "beauty" and "questionable" (as stated in brand principles). This means: architectural precision alongside conceptual disruption, classical balance alongside asymmetrical tension. Layouts should feel carefully measured AND deliberately uncomfortable. Use grids and proportional systems, then violate them with intention. Negative space should feel productive, not restful. Every compositional choice should be defensible intellectually, not just aesthetically. When most brands use composition to create harmony, Prada uses composition to create friction.
what_would_break_it: >-
  Adding emoji, pastels, playful illustration, or any visual element that prioritizes warmth over rigor. The moment Prada's visual language becomes approachable, it stops being about thinking and starts being about feeling. The austerity (the high contrast, the clinical photography, the severe typography) is the barrier that separates Prada from fashion brands that simply dress people. Remove the barrier and you remove the concept.
