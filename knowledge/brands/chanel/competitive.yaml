industry_norms_it_breaks: "The interlocking CC monogram—two letters that have become so loaded with meaning they function as permission structures. You don't wear the monogram; the monogram permits you to wear the object. | The willingness to make products that are visually identical for decades (the quilted bag, the camellia, the two-tone shoe) and then create entire campaigns celebrating stasis rather than innovation.  | When faced with a fork, Chanel chooses what Coco would have rejected in her era, not what she would create in ours."
