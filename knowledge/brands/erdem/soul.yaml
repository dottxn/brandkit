summary: "Soul of ERDEM. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The moment you realize beauty and knowledge are inseparable, when a garment feels like it contains stories worth hearing
core_belief: "Fashion is history, art, and storytelling woven into fabric—superficiality is the only true failure"
creative_tension:
  - Forensic historical research vs. contemporary cultural moment
  - Romantic femininity vs. intellectual rigor
decision_filter: >-
  Does this garment advance the conversation about culture, identity, and femininity, or does this just look pretty?
signature_move: >-
  Custom floral prints that are forensically researched, appearing as visual manifestations of narrative—each print tells a story
what_would_break_it: >-
  Removing the historical research process from brand narrative, simplifying prints to decorative level, adopting minimalist aesthetics, or treating femininity as surface instead of structural intelligence
