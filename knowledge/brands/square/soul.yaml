summary: "Soul of Square. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A physical object scaled down—a payment reader you can hold in your hand that makes money tangible and commerce personal, not abstract.
core_belief: >-
  Economic freedom should be available in a pocket-sized form factor, not locked behind corporate infrastructure and boardroom approvals.
creative_tension:
  - >-
    Celebrating the physical hardware that enables commerce while remaining a software-first platform for the digital age.
  - >-
    Maintaining childlike simplicity in a product that must handle complex financial transactions with absolute reliability.
decision_filter: >-
  Does this remove barriers for someone with $100 and a smartphone to start selling? If not, it's enterprise bloat.
signature_move: >-
  The concentric rounded squares (#FFFFFF, #6C757D, #000000) that represent a card reader physical shape—the icon literally shows how the product works.
what_would_break_it: >-
  Adding ornamental design, gradients, or skeuomorphic detail to the visual system. The brand is powerful because it's aggressively minimal.
