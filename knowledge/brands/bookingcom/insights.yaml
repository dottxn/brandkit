summary: Deep insights for Booking.com. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    Minimalism scales better than richness when managing global complexity—the fewer variables, the easier translation to 39 languages
  - >-
    The booking moment itself is where delight lives—Booking.com's restraint everywhere else builds tension that the transaction releases
  - >-
    Verified reviews integrated into visual design aren't information architecture; they're authenticity proof embedded in the experience
  - >-
    "core blue" as non-negotiable brand anchor prevents drift when scaling across teams, markets, and 20-year timespans
  - >-
    Playfulness works best when grounded—Booking.com's humor comes from unexpected moments within strict visual systems, not from flexible brand guidelines
what_nobody_copies: >-
  The discipline to keep core brand "sacred" while building flexible creative principles that allow personality within constraints
