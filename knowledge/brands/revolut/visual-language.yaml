summary: >-
  Visual language for Revolut. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-revolut"
      touchpoints:
        - "revolut.com homepage and marketing pages"
        - "Revolut brand campaigns and advertising"
        - "Revolut social media channels"
        - "Revolut corporate communications"
      description: >-
        Shark (#191C1F, near-black primary) and Cornflower Blue (#7F84F6)
        dominant. The 2023 rebrand (Revolut's third since 2015) established
        the current visual system: Aeonik Pro (CoType Foundry/Joe
        Leadbeater & Mark Bloom, supporting 200+ languages) as the brand
        typeface, a monochromatic wordmark with a distinctive 'R'
        letterform, and a comprehensive 3D illustration system. Dmitry
        Zlokazov (Head of Retail/Product) and Diomidis Papas (Head of
        Engineering/Design System) oversee the visual infrastructure.
        The visual language is dark, confident, and technology-forward —
        it positions Revolut as a global financial super-app rather than
        a challenger bank. Compared to Monzo (hot coral, more playful,
        UK-focused) or N26 (teal, more minimal, European), Revolut's
        visual language is the most globally ambitious and the most
        product-feature-dense.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this dark,
        Aeonik Pro-set, globally-scaled register.

    - name: "revolut-ultra-premium"
      touchpoints:
        - "Revolut Ultra subscription marketing"
        - "Metal card marketing and premium features"
        - "Private (high-net-worth) tier"
      description: >-
        Darker, more luxurious. Revolut Ultra and Metal card marketing
        use a premium register — darker backgrounds, metallic textures,
        and exclusive visual treatments. The metal card itself (physical
        weighted metal) is a key visual element — product photography
        emphasises material quality and craftsmanship. Gradient effects
        and metallic finishes signal premium status. Compared to Revolut's
        standard register (functional, product-forward), Ultra is more
        atmospheric and status-coded.
      differs_from_default_by: >-
        Darker, more atmospheric. Metallic textures and premium material
        photography. The visual register shifts from functional fintech
        to aspirational finance.

    - name: "revolut-business"
      touchpoints:
        - "Revolut Business platform"
        - "Revolut Business marketing"
        - "Enterprise and corporate features"
      description: >-
        More structured, more data-driven. Revolut Business uses the
        same visual foundations (Shark, Cornflower Blue, Aeonik Pro) but
        with a more corporate register — dashboard interfaces, data
        visualisations, expense-management tools, and multi-currency
        features. The visual language must communicate both the fintech
        innovation and the corporate reliability that business customers
        require.
      differs_from_default_by: >-
        More corporate and structured. Data interfaces and business-
        tool aesthetics replace consumer-app playfulness. The visual
        language bridges fintech innovation with enterprise trust.

  notes: >-
    Revolut's three rebrands since 2015 reflect the company's rapid
    evolution from currency-exchange app to global financial super-app.
    The 2023 rebrand established the most mature visual system to date.
    Sub-brands (Business, Junior, Ultra, Pay, Open Banking) create
    significant visual complexity that the design system must manage.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "revolut.com (observed February 2026)"
    - "Revolut marketing campaigns"
    - "2023 rebrand materials"
  subject_and_framing: >-
    The 2023 rebrand shifted photography from hipster-lifestyle-coded to
    candid companionship — real moments of people using financial services
    in everyday contexts. The photography shows diverse, contemporary
    urban life: friends splitting bills, travellers exchanging currency,
    freelancers managing payments. Product-in-context photography shows
    the Revolut card and app in use. Metal card photography emphasises
    material quality and premium positioning. Compared to Monzo (warmer,
    more community-coded, UK-centric) or Wise (more global, more travel-
    coded), Revolut's photography is the most urban and contemporary.
  casting_observed: >-
    Young, urban, globally diverse. The casting reflects Revolut's
    international user base — multiple ethnicities, urban settings across
    European and global cities. The demographic skews millennial-to-Gen-Z
    professional — the digitally native audience that banks on their
    phone. The 2023 shift from 'hipster' to 'candid' made the casting
    feel more natural and less styled.
  lighting_and_colour: >-
    Natural, urban, contemporary. The photography uses ambient lighting
    from urban environments — restaurants, streets, airports, offices.
    The dark brand palette (Shark near-black) influences background
    treatment in composited marketing materials. Metal card photography
    uses controlled studio lighting to emphasise metallic surfaces.
  post_production: >-
    Moderate processing. The 2023 shift toward candid photography means
    less aggressive post-production than the earlier styled-lifestyle
    approach. Colour treatment aligns with the brand palette — slightly
    cool, slightly desaturated. Metal and Ultra product photography
    receives more premium post-production.
  visual_boundaries:
    stated_exclusions: >-
      Revolut avoids traditional banking photography (suits, handshakes,
      corporate environments). The brand positions against legacy
      financial institutions — the photography must look nothing like
      a high-street bank.
    observed_exceptions: >-
      Revolut Business marketing adopts slightly more conventional
      corporate photography to build enterprise credibility.
    genuine_absence: >-
      Based on revolut.com review: no celebrity photography, no
      aspirational-luxury lifestyle photography (even Ultra maintains
      an understated register), no rural or suburban settings in primary
      brand photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "2023 rebrand 3D illustration system"
    - "190+ functional icons, 60+ transaction icons"
    - "revolut.com (observed February 2026)"
  uses_illustration: true
  illustration_style: >-
    3D photorealistic renders — the 2023 rebrand introduced a comprehensive
    3D illustration system with 190+ functional icons and 60+ transaction-
    specific icons. The style uses photorealistic rendering with the brand
    colour palette — objects (currency symbols, cards, phones, globes)
    rendered as tangible 3D objects floating in dark environments. The
    illustrations make abstract financial concepts (currency exchange,
    stock trading, crypto) feel concrete and graspable. Compared to Wise
    ('Tapestries' geometric pattern system) or Monzo (warmer, flatter
    illustration), Revolut's 3D illustration is the most visually rich
    and the most product-feature-dense.
  illustration_role: >-
    Feature explanation, marketing hero content, and product category
    identification. The 190+ functional icons illustrate specific
    features (send money, exchange currency, buy crypto, invest in
    stocks). The 60+ transaction icons identify payment categories in
    the spending feed. The 3D illustrations serve as marketing hero
    content — large renders that communicate product capabilities in
    campaign materials.
  icon_style: >-
    The 3D icon system: 190+ functional icons rendered as photorealistic
    3D objects. Transaction-category icons (60+) use a consistent 3D
    style to identify spending categories (groceries, transport, dining,
    entertainment). Navigation icons follow standard fintech-app
    conventions. The Revolut 'R' mark serves as the app icon.
  graphic_devices: >-
    The Revolut 'R' — the distinctive letterform from the monochromatic
    wordmark. The 3D illustration system — photorealistic renders that
    make financial concepts tangible. The Cornflower Blue (#7F84F6)
    accent — a distinctive blue-purple that identifies Revolut in
    fintech contexts. The metal card itself — the physical weighted
    card is a graphic device that signals premium fintech. The dark
    mode default — Shark (#191C1F) backgrounds create a distinctive
    visual environment.
  motion_language: >-
    The 3D illustrations animate with rotation, assembly, and floating
    movements. App transitions use smooth, responsive motion. Card-
    activation and payment-confirmation animations provide satisfying
    feedback. Marketing videos use dynamic 3D object choreography —
    currencies exchanging, cards materialising, features assembling.
    The motion language is polished and contemporary — it communicates
    technological sophistication and financial capability.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Aeonik Pro (CoType Foundry / Joe Leadbeater & Mark Bloom, 200+ languages)"
    - "2023 rebrand"
    - "revolut.com (observed February 2026)"
  signature_move: >-
    Aeonik Pro (CoType Foundry, Joe Leadbeater & Mark Bloom) — a
    geometric sans-serif with humanist touches, supporting 200+ languages.
    CoType Foundry is a London-based independent foundry; Aeonik was
    designed for broad global application. The 200+ language support is
    critical for Revolut's global operation across 35+ countries. The
    typeface's geometry is clean and contemporary — it reads as
    technologically capable without being cold. The distinctive 'R' in
    the Revolut wordmark is a custom treatment that extends Aeonik's
    geometry into a brand-specific letterform. Compared to Monzo (no
    publicly identified custom type) or N26 (system fonts in product),
    Revolut's typographic investment reflects its global ambitions.
  what_would_look_wrong: >-
    A serif typeface (Revolut is entirely sans-serif). A rounded, playful
    typeface (contradicts the confident, technology-forward register). A
    typeface with poor multi-script support (Revolut operates in 35+
    countries — typographic coverage is a functional requirement). Any
    typeface that reads as traditional banking.
  case_convention: >-
    'Revolut' uses title case. Product names use title case ('Revolut
    Ultra,' 'Revolut Business,' 'Revolut Junior'). Body text uses
    sentence case. Marketing headlines use sentence case. The brand
    avoids ALL CAPS in most contexts.
  display_vs_body: >-
    Display: Aeonik Pro at heavier weights for marketing headlines and
    campaign type. The geometric precision is most effective at display
    sizes against the dark brand backgrounds. Body: Aeonik Pro at regular
    weight for all interface text, product descriptions, and content.
    The single-typeface system (Aeonik Pro for everything) creates
    consistency across 35+ country-specific marketing materials — the
    200+ language support ensures typographic quality in all markets.
  type_and_image: >-
    Typography provides financial information — account balances,
    exchange rates, transaction details, feature descriptions. In the
    app, type is the primary interface — numbers (balances, rates) are
    the hero content. In marketing, type and 3D illustration share
    space — the illustrations visualise what the type describes.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "revolut.com (observed February 2026)"
    - "Revolut app interface"
    - "2023 rebrand materials"
  signature_composition: >-
    Super-app dashboard. The Revolut app uses a card-based dashboard
    layout — account cards, feature shortcuts, transaction feeds, and
    promotional banners. The design must accommodate the breadth of
    Revolut's product range (banking, crypto, stocks, insurance, travel,
    subscriptions, rewards) without overwhelming. The dark background
    creates a unified canvas. revolut.com uses sectioned layouts with
    full-width dark backgrounds and centred content blocks. Compared to
    Monzo (simpler, more banking-focused layout) or Wise (more transfer-
    focused, cleaner), Revolut's layout is the most feature-dense —
    reflecting its super-app ambitions.
  density_and_whitespace: >-
    High density in the app — the super-app model requires showing many
    features and services. The dark background helps manage visual
    complexity. Marketing pages use more generous spacing. The 3D
    illustrations provide visual breathing room between dense feature
    sections.
  format_preferences: >-
    Mobile-first — the Revolut app is the primary product. Card format
    for dashboard elements. The website adapts from mobile to desktop.
    Marketing materials use standard digital advertising formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "early-adopter"
  relationship_to_trends: >-
    Revolut adopts design trends quickly — three rebrands since 2015
    reflect a willingness to evolve the visual identity as the company
    scales and the fintech market matures.
  examples:
    - trend: "3D illustration in fintech"
      stance: "early-adopter"
      evidence: >-
        The 2023 rebrand's comprehensive 3D illustration system (190+
        functional icons, 60+ transaction icons) is one of the most
        extensive 3D illustration investments in fintech. The
        photorealistic renders make abstract financial concepts tangible.
      reasoning: >-
        3D illustration helps Revolut communicate complex financial
        products (crypto, stocks, insurance) to a consumer audience —
        making the abstract concrete is a critical design challenge for
        super-apps.
    - trend: "Dark-mode-default fintech branding"
      stance: "early-adopter"
      evidence: >-
        Revolut's Shark (#191C1F) near-black default predates the broader
        fintech trend toward dark-mode-default branding. The dark
        environment suits the app's data-rich interface (numbers read
        more clearly on dark backgrounds) and the premium positioning.
      reasoning: >-
        Dark mode in fintech signals both modernity (screen-native, not
        print-derived) and premium quality (dark environments suggest
        exclusivity).

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    Shark (#191C1F) and Cornflower Blue (#7F84F6). Aeonik Pro typeface.
    The distinctive 'R' wordmark. The 3D illustration system. The dark-
    mode-default environment.
  what_bends: >-
    Sub-brands introduce visual variations: Junior (more colourful, more
    playful for under-18 users), Ultra (darker, more premium), Business
    (more corporate and structured). Pay and Open Banking platforms
    maintain Revolut's visual DNA while serving partner-integration
    contexts. Regional marketing adapts to 35+ country-specific
    requirements.
  notable_examples: >-
    Revolut x 2023 rebrand (third since 2015): the most comprehensive
    visual overhaul in the company's history — new typeface, new
    illustration system, new photography direction. The rapid rebrand
    cadence reflects Revolut's growth from startup to global financial
    platform. Revolut x CoType Foundry (Aeonik Pro): the 200+ language
    support requirement made typographic selection a strategic decision —
    the typeface needed to work across Latin, Cyrillic, Arabic, and
    Asian scripts for global operations. Revolut Junior: the youth sub-
    brand introduces a more colourful, more playful visual register —
    demonstrating the brand system's flexibility to accommodate
    dramatically different audience demographics.
