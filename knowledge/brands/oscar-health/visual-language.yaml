summary: >-
  Visual language for Oscar Health. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-oscar-blue"
      touchpoints:
        - "hioscar.com homepage and marketing pages"
        - "Oscar Health brand campaigns"
        - "Oscar Health social media channels"
        - "Oscar Health corporate communications"
      description: >-
        'Hot Blue' dominant — a vibrant blue updated from Oscar's original
        royal blue to add vibrancy while maintaining brand equity. Heldane
        (Klim Type Foundry, serif) and Lettera (Lineto, sans-serif) serve
        as the dual typeface system. David Mikula (VP Design) and Heather
        Santana (Head of Creative, ex-American Express) lead visual
        direction. Cathy Lee (Brand Designer) developed the colour and
        typography strategy. Franklyn (design studio) developed the
        comprehensive brand system in partnership with the internal team.
        The visual language is built on 'optimistic realism' (2020 refresh)
        — sophisticated, fun, warm, and human while acknowledging
        healthcare's complexity. A distinctive illustration system (Laura
        Alejo, Pochen Chia) featuring characters with realistic proportions
        and genuine expressions is Oscar's most recognisable visual
        element. Compared to UnitedHealthcare (corporate-institutional,
        conservative) or Aetna (CVS-system-coded, purple), Oscar's visual
        language is the most human-centred and the most illustration-
        distinctive in health insurance.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this blue,
        Heldane/Lettera-set, illustration-rich, optimistically realistic
        register.

    - name: "oscar-member-product"
      touchpoints:
        - "Oscar Health member portal"
        - "Oscar Health iOS/Android app"
        - "Claims and benefits management"
        - "Doctor search and telemedicine"
      description: >-
        More functional, product-icon-coded. The member experience uses
        the 'Anatomy' design system — a comprehensive component library
        built on Atomic Design methodology. Kate Apostolou designed
        product icons that translate the illustration style into smaller,
        more graphic forms for the app and website. The visual language
        must make health insurance management — traditionally confusing
        and stressful — feel clear, accessible, and even pleasant. Clean
        interfaces, clear information hierarchy, and the illustration
        system's warmth combine.
      differs_from_default_by: >-
        Product icons replace full illustrations. The 'Anatomy' design
        system provides systematic consistency. The visual register shifts
        from brand storytelling to healthcare-management utility. Lettera
        (sans-serif) dominates over Heldane (serif).

    - name: "oscar-marketing-advertising"
      touchpoints:
        - "Oscar Health out-of-home advertising"
        - "Billboard and transit campaigns"
        - "Open enrolment marketing"
        - "Digital advertising"
      description: >-
        Full-scale illustration, maximum personality. Marketing and
        advertising deploy the illustration system at its most expressive
        — large-format character illustrations, scene compositions, and
        the full chromatic range of the flexible colour palette. Billboards,
        bus ads, and out-of-home placements use the illustration style at
        scale. Open enrolment campaigns receive dedicated visual treatments.
        Franklyn developed the brand system specifically for this high-
        impact application.
      differs_from_default_by: >-
        Illustration at maximum scale and expressiveness. The visual
        register is the most personality-rich mode — designed for
        attention and differentiation in the competitive open-enrolment
        advertising environment.

  notes: >-
    Oscar Health's illustration system is its most distinctive visual
    asset — the 'optimistically realistic' characters with genuine
    expressions set Oscar apart in a category of generic stock photography
    and corporate abstraction. The 'Anatomy' design system ensures
    consistency across web and mobile. The six brand attributes (Clear,
    Caring, Credible, Diverse, Inventive, Imperfect) guide all visual
    decisions.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "hioscar.com (observed February 2026)"
    - "Oscar Health brand guidelines"
    - "Dani Balenson (Creative Director/Illustrator)"
  subject_and_framing: >-
    Authentic, lifestyle-healthcare-coded. Oscar Health uses photography
    alongside illustration — real people in real healthcare moments. The
    photography avoids post-production tricks and heavy styling. Subjects
    include genuine healthcare interactions (doctor visits, family wellness
    moments, everyday health management) framed with warmth and
    naturalness. The photography aims to make healthcare feel human and
    accessible rather than clinical or corporate. Compared to
    UnitedHealthcare (more staged, more corporate) or Cigna (more
    aspirational-wellness-coded), Oscar's photography is the most
    naturalistic and the least corporate.
  casting_observed: >-
    Diverse, genuine, all-ages. Oscar's photography shows people of
    varied ethnicities, ages, body types, and family structures —
    reflecting the brand's commitment to representing 'all people.'
    Healthcare professionals are shown as collaborative partners rather
    than authority figures. The casting aligns with the illustration
    system's diverse character design.
  lighting_and_colour: >-
    Warm, natural, non-clinical. Photography uses natural and warm
    artificial lighting — homes, community settings, medical offices
    that feel welcoming. The colour palette supports illustration-style
    vibrancy — clothing and settings often echo the brand's flexible
    colour system. No harsh clinical lighting or sterile-environment
    colour temperature.
  post_production: >-
    Minimal, authenticity-preserving. Oscar's guidelines emphasise
    avoiding post-production manipulation. The photography maintains
    natural skin tones, real expressions, and genuine environments.
    This authenticity commitment mirrors the illustration system's
    emphasis on realistic proportions and genuine emotions.
  visual_boundaries:
    stated_exclusions: >-
      Oscar avoids clinical, sterile, or intimidating medical imagery.
      The brand avoids corporate-suited healthcare-executive photography.
      No stock-photo-generic wellness imagery.
    observed_exceptions: >-
      Some healthcare-professional imagery uses slightly more formal
      settings while maintaining warmth.
    genuine_absence: >-
      Based on hioscar.com review: no celebrity or influencer health
      imagery, no aspirational-body or fitness photography, no abstract
      medical-technology visualisations.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Laura Alejo (lead illustrator, year-long rebranding, 2017-2018)"
    - "Pochen Chia (illustrator/animator, Something New/Output)"
    - "Kate Apostolou (product icon designer, 2020)"
    - "Franklyn (brand system development)"
  uses_illustration: true
  illustration_style: >-
    'Optimistic realism' — characters with realistic physical proportions,
    natural skin tones, diverse body types, real facial expressions, and
    genuine emotions. Fun but grown-up and sophisticated. The handmade
    feel conveys humanity and warmth without losing charm, magic, and wit.
    Laura Alejo (lead illustrator) collaborated with Something New
    (formerly Output) for a year-long rebranding effort (2017-2018),
    developing characters, spot illustrations, and icons. Pochen Chia
    contributed expressive, handmade-feeling illustrations. The system
    includes comprehensive rules for generating unlimited characters
    while maintaining consistent style. Three categories: characters
    (full-figure people), illustration spots (scenes), and icons (product,
    illness, feature, service, business, location, prescription types).
    Compared to Lemonade (more graphic, more geometric illustration) or
    traditional health insurers (stock photography only), Oscar's
    illustration is the most characterful and the most systematically
    developed.
  illustration_role: >-
    Primary brand differentiator. Illustration IS Oscar's visual identity
    — it appears on the website, app, printed materials, billboards, bus
    ads, wall installations, Instagram, and educational content. The
    illustration system does the heavy lifting of making health insurance
    feel human, accessible, and even enjoyable — a role that photography
    alone cannot achieve in healthcare. Kate Apostolou's product icons
    translate the illustration style for smaller, more functional app
    contexts.
  icon_style: >-
    Product icons (Kate Apostolou, 2020) — simplified, graphic translations
    of the illustration style for app and website use. Icon categories
    include product features, illnesses, services, business functions,
    locations, and prescription types. The icons maintain the illustration
    system's warmth at functional scales. Art-directed for consistency
    with the broader character-illustration system.
  graphic_devices: >-
    The Oscar 'O' mark — functions as the primary brand mark and app
    icon. Hot Blue — the vibrant primary blue that updated Oscar's
    original royal blue, maintaining brand equity while adding vibrancy.
    The illustration character system — diverse, realistic, emotionally
    genuine characters that ARE Oscar's brand. The flexible colour
    palette — designed to shift into various tonal combinations for
    different content types (hard news vs good news in healthcare
    contexts). The 'Imperfect' brand attribute — the deliberate embrace
    of imperfection (handmade illustration quality, genuine expressions)
    as a design principle.
  motion_language: >-
    2D animation extending the illustration style. Animations playfully
    demonstrate how Oscar helps in everyday health situations — product
    demos, educational explainers, and marketing content. The motion
    maintains the handmade, expressive quality of the static
    illustrations. Available in English and Spanish. Oscar is currently
    hiring for Senior Motion Designer positions to build and evolve the
    motion brand system.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Heldane (Klim Type Foundry, serif)"
    - "Lettera (Lineto, sans-serif)"
    - "Cathy Lee (Brand Designer, typography strategy)"
    - "hioscar.com (observed February 2026)"
  signature_move: >-
    Heldane (Klim Type Foundry) paired with Lettera (Lineto) — a serif-
    sans pairing that encodes Oscar's dual communication need. Heldane
    (upright, quirky serif) brings maturity and authority — essential for
    a health insurance company delivering serious medical and financial
    information. Lettera (conversational, almost monospaced grotesque
    sans-serif) brings warmth and tech-forward character — reflecting
    Oscar's technology-first approach to healthcare. Cathy Lee developed
    the typography strategy. The pairing was chosen because together they
    help Oscar communicate 'in all the ways it needs to — delivering both
    hard news and good news.' Lettera replaced Avenir as the body face,
    creating a more conversational tone on hioscar.com. Compared to
    UnitedHealthcare (generic corporate sans-serif) or Aetna (CVS system
    typography), Oscar's typeface pairing is the most distinctive and
    the most emotionally considered in health insurance.
  what_would_look_wrong: >-
    A single generic sans-serif for everything (removes the serif/sans
    tonal range). Avenir (now superseded, signals the pre-refresh
    identity). A cold, geometric typeface (contradicts the warm, human
    register). Any typeface that reads as traditional insurance-corporate.
  case_convention: >-
    'Oscar' and 'Oscar Health' use title case. Body text uses sentence
    case. Marketing headlines use sentence case. The brand avoids ALL
    CAPS — the tone is caring and conversational, not authoritative.
  display_vs_body: >-
    Display: Heldane at heavier weights for brand headlines and campaign
    type — the serif character provides authority and maturity at display
    sizes. Body: Lettera at regular weight for website text, app
    interface, and marketing body copy — the conversational, slightly
    monospaced quality creates an approachable reading experience. The
    serif/sans duality creates meaningful emotional range within a single
    brand.
  type_and_image: >-
    Typography works alongside illustration — Heldane headlines and
    character illustrations create compositions where text and image
    share emotional warmth. In the app, Lettera provides clear, functional
    information alongside product icons. Numbers (copays, deductibles,
    plan costs) require clear typographic hierarchy — critical financial
    information in healthcare contexts.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "hioscar.com (observed February 2026)"
    - "Oscar 2.0 mobile redesign (Regy Perlera)"
    - "'Anatomy' design system"
  signature_composition: >-
    Clean, minimal-cognitive-load, illustration-integrated. hioscar.com
    uses clean layouts that simplify health insurance — clear information
    hierarchy guides users through coverage options and services. The
    'Anatomy' design system (Atomic Design: atoms, molecules, organisms,
    templates) provides systematic composition structure. Illustration
    appears prominently alongside text — making abstract insurance
    concepts (coverage, deductibles, networks) visually concrete and
    approachable. Measurable results: 22% bounce rate reduction, 31%
    task-completion-time decrease. Compared to UnitedHealthcare (dense,
    corporate-portal-coded) or Blue Cross (institution-coded),
    Oscar's layout is the most consumer-accessible.
  density_and_whitespace: >-
    Low-to-moderate density. Oscar deliberately reduces information
    density — health insurance is inherently complex, and the visual
    language simplifies by eliminating unnecessary content. Generous
    whitespace around illustration and key information. The overall
    impression is of designed simplicity in a complex category.
  format_preferences: >-
    Mobile-first for the app (React Native). Responsive for the website.
    Marketing materials use various formats including large-format OOH
    (billboards, bus shelters) where the illustration system has
    maximum impact.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    Oscar established the visual standard for technology-first health
    insurance branding — the illustration system and human-centred design
    approach have influenced how insurtech companies present themselves.
  examples:
    - trend: "Illustration as primary visual language in insurtech"
      stance: "leader"
      evidence: >-
        Oscar's character illustration system (Laura Alejo, 2017-2018,
        expanded through Kate Apostolou's product icons in 2020) established
        the template for using illustration rather than photography as
        the primary visual language in health insurance. Multiple insurtech
        companies have adopted similar approaches.
      reasoning: >-
        Health insurance photography tends toward either corporate
        sterility or stock-photo genericness. Oscar proved that a
        systematic illustration approach could create more warmth,
        distinctiveness, and brand recognition than photography in
        the health insurance category.
    - trend: "Consumer-tech design in healthcare"
      stance: "leader"
      evidence: >-
        Oscar's 'Anatomy' design system, React Native app (Oscar 2.0),
        and consumer-friendly typography (Lettera's conversational
        quality) apply consumer-tech design standards to healthcare —
        a category traditionally served by institutional, portal-style
        interfaces.
      reasoning: >-
        Oscar's founders (Mario Schlosser, Joshua Kushner, Kevin Nazemi)
        approached health insurance as a technology problem — the visual
        language reflects this technology-first mindset by applying
        consumer-tech design conventions to healthcare.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    Hot Blue primary colour. Heldane + Lettera typeface pairing. The
    character illustration system. The 'optimistic realism' register.
    The 'Anatomy' design system structure.
  what_bends: >-
    The flexible colour palette shifts tonally for different content
    types (delivering good news vs difficult healthcare information).
    Product icons provide simplified illustration translations for
    functional contexts. Marketing campaigns (open enrolment, expansion
    announcements) receive dedicated visual treatments within the system.
    Spanish-language content maintains visual consistency with English.
  notable_examples: >-
    Oscar x Franklyn (brand system): the design studio developed the
    comprehensive brand system hand-in-hand with Oscar's internal team
    — a strategy-led approach that created the visual vocabulary for
    Oscar's expansion. Oscar x Laura Alejo (illustration, 2017-2018):
    the illustrator created the character system during a year-long
    collaboration with Something New/Output — establishing the visual
    asset that most defines Oscar's brand. Oscar x Kate Apostolou
    (product icons, 2020): the designer (later at Stripe, previously
    Dropbox) translated the illustration style into functional product
    icons — bridging brand illustration with product design. Oscar x
    Klim Type Foundry + Lineto (Heldane + Lettera): the dual-foundry
    typeface pairing encodes Oscar's communication range — authority
    (serif) and approachability (sans) in a single system.
