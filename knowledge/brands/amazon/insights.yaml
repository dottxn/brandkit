# ── Data
learned_insights:
  - >-
    Amazon's real genius is making scale invisible. the infrastructure is so transparent it disappears and becomes environment
  - >-
    Warmth in corporate branding doesn't come from rounded edges; it comes from removing obstacles
  - >-
    A smile is the only visual device that survives across 50 sub-brands because it's genuine function (customer delight), not decoration
  - >-
    "It's still Day 1" works because it makes expansion feel like discovery, not monopoly
  - >-
    Amazon's visual restraint isn't minimalism for aesthetic purity. it's cognitive load reduction at scale
what_nobody_copies: >-
  The structural courage to subordinate visual identity to customer utility, while maintaining unmistakable brand presence
