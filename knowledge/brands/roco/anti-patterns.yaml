    reasoning: Marketing to people avoiding traditional healthcare due to shame/judgment
  - pattern: Hiding treatment options through complex interface
    reasoning: "Transparent, straightforward treatment access"
tonal:
  - pattern: Clinical medical language
    reasoning: "Conversational, non-judgmental patient language"
  - pattern: Physician authority as primary trust marker
    reasoning: Patient autonomy as primary trust marker
  - pattern: Healthcare as service received
    reasoning: Healthcare as partnership between patient and provider
  - pattern: Condition treatment as isolated transaction
    reasoning: Condition treatment as part of ongoing wellness relationship
cultural:
  - pattern: Healthcare stigma
    reasoning: Healthcare normalization
  - pattern: "Some conditions are \"acceptable\" to discuss"
    reasoning: All health conditions deserve equal access and dignity
  - pattern: Patients as passive recipients
    reasoning: Patients as informed partners
