# ── Data
learned_insights:
  - >-
    The brands defining AI's perception do so through tone, not through technological explanations—nobody understands the math, so personality becomes credibility
  - >-
    Custom typefaces matter most when they're invisible (OpenAI Sans works because you see the words, not the typeface)
  - >-
    Geometric precision in logo design (Blossom's uniform line weights) makes something that could feel algorithmic instead feel intentional
  - >-
    Motion-first design in AI contexts says "this is alive and responsive" rather than "this is a static tool"
  - >-
    Research-driven credibility (ChatGPT adoption) matters infinitely more than marketing claims
what_nobody_copies: >-
  The decision to use motion and organic flow in an AI context—counterintuitive because AI is defined by computation, yet this choice fundamentally positioned OpenAI as human-facing rather than technical
