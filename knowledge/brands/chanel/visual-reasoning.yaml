summary: Visual reasoning for CHANEL. Why the design choices work.

# ── Data
type_logic: >-
  Chanel's custom sans-serif and Couture typeface are geometric and bold, built on proportions that reference architectural precision rather than human gesture. These typefaces feel drawn with a ruler, not a pen. The boldness is absolute. there's no medium weight, no compromise. When these fonts appear, they occupy space with authority rather than asking permission. Compare this to a typeface like Circular (which Aesop uses). Circular is designed to be friendly, approachable, inviting. Chanel's typeface says "stop and read this." It's typographic grandeur.
colour_logic: >-
  The absolute limitation to black (#000000), white (#FFFFFF), gold (referenced as accent), and pearl creates a color language that is simultaneously timeless and exclusionary. These colors have no cultural associations with trends; they're the colors of absolute certainty. Black and white photography has been the language of serious art and fashion for over a century. By refusing color, Chanel announces that it doesn't need color to be memorable. the opposite of every trend-chasing competitor. Gold accents appear only on objects (hardware, button details) never on backgrounds, which maintains the white/black integrity. The austerity is a form of power: "We don't need color to convince you."
composition_philosophy: >-
  Every element exists in mathematical relationships to other elements. Grid systems are visible but appear natural. White space is generous. products breathe rather than crowd. Symmetry is often employed, not as a limitation but as proof that the composition is so controlled that it can afford to be predictable. Asymmetry, when used, is deployed with such precision that it feels intentional rather than casual. Photography is lit with dramatic side-lighting or sculptural backlighting that creates dimension without narrative. The effect is that every image feels like a still life in a museum, not a moment captured in the world.
what_would_break_it: >-
  The introduction of any "warm" color palette would fundamentally undermine Chanel's authority. A rose-gold accent, a cream background, or even a sophisticated taupe would shift the brand toward coziness and away from austerity. Similarly, any typeface that curves (Montserrat, any neo-grotesque with terminals) or any typeface that feels contemporary (GT America, Maax) would instantly age the house because it would date the design choice itself. Finally, any photography that is candid, environmental, or lifestyle-focused would destroy the formal grandeur. Chanel dies the moment it looks human, comfortable, or accessible. The power is in the inhuman perfection.
