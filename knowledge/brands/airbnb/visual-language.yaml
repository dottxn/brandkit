summary: >-
  Visual language for Airbnb. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "marketplace-core"
      touchpoints:
        - "airbnb.com homepage and listing pages"
        - "Airbnb mobile app (iOS, Android)"
        - "Search results and category browsing"
        - "Host dashboard and management tools"
      description: >-
        Clean, white-background, photography-driven marketplace interface.
        Rausch pink (#FF5A5F, named after Airbnb's first address at 19
        Rausch Street, San Francisco) as the primary accent colour on
        buttons, icons, and interactive elements. Airbnb Cereal typeface
        (Dalton Maag, May 2018, 6 weights) throughout. The 2025 redesign
        introduced an all-in-one homepage expanding beyond accommodation
        into services. Brian Chesky (CEO, RISD graduate) is heavily design-
        involved — the company's visual direction reflects his design
        education. Hiroki Asai (Chief Experience Officer, ex-Apple VP
        Marcom) oversees experience design. Compared to Booking.com
        (denser, more deal-oriented, more blue) or Vrbo (more family-
        focused, warmer), Airbnb's interface is the most design-refined
        and the most photography-dependent.
      differs_from_default_by: >-
        This is the baseline. All other modes depart from this clean,
        white, Rausch pink, photography-forward marketplace register.

    - name: "icons-experiences"
      touchpoints:
        - "Airbnb Icons programme (launched May 2024)"
        - "Icons-specific marketing and social media"
        - "Celebrity experience landing pages"
      description: >-
        Elevated, editorial, experience-forward. The Icons programme
        (May 2024) offers celebrity-hosted experiences — the visual
        language shifts from property photography to experiential
        storytelling. Campaign imagery is more cinematic, more art-
        directed, and more talent-forward than the marketplace baseline.
        Set design and environmental photography reflect the specific
        experience (e.g., recreated film sets, musician home studios).
        The visual register borrows from entertainment marketing more
        than from travel marketing.
      differs_from_default_by: >-
        People-forward and experience-forward rather than property-
        forward. The photography is more cinematic and more art-directed.
        The visual register elevates from marketplace-functional to
        entertainment-aspirational.

    - name: "category-exploration"
      touchpoints:
        - "Airbnb Categories (launched May 2022)"
        - "Category icons and browsing interface"
        - "Category-specific landing pages"
      description: >-
        3D isometric category icons — over 60 categories (treehouses,
        cabins, beachfront, design, tiny homes, etc.) each with a
        distinctive icon. The category system introduced a browsing-by-
        inspiration interface — visual discovery rather than search-first.
        Karri Saarinen (Design Systems Lead) developed the system. The
        icons are clean, geometric, and culturally neutral — designed to
        work across 220+ countries and territories. The Lottie animation
        framework (open source, developed by Airbnb) and Lava 3D micro-
        animation format power animated icon states.
      differs_from_default_by: >-
        Icon-and-illustration-forward rather than photography-forward.
        The browsing experience uses graphic elements as the primary
        visual navigation. The register is more playful and more
        discovery-oriented than the property-listing baseline.

  notes: >-
    Airbnb's visual language is unusually design-led for a marketplace
    platform — Brian Chesky's RISD background and Hiroki Asai's Apple
    experience (Chief Experience Officer, ex-Apple VP Marcom) create a
    design-first culture. Alex Schleifer (VP Design, now at HUMAN
    COMPUTER) built the design systems foundation. The 2025 expansion
    into services beyond accommodation will extend the visual system
    into new categories.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "airbnb.com listing photography (observed February 2026)"
    - "Airbnb Icons programme campaign photography (May 2024)"
    - "Airbnb brand campaigns (2022–2025)"
    - "Host photography guidelines"
  subject_and_framing: >-
    Property photography: wide-angle interior shots emphasising space,
    natural light, and design quality. The best listings use professional
    architectural photography — the platform's visual quality varies by
    host but Airbnb's editorial selections feature magazine-quality
    interiors. Exterior shots emphasise location and setting — mountain
    views, beachfront, city skylines. Icons programme: talent-and-
    experience-forward with cinematic set design. Brand campaigns use
    a mix of property beauty shots and human-moment storytelling (guests
    arriving, cooking, exploring). Compared to Booking.com (more
    standardised hotel photography) or Vrbo (more family-activity-focused),
    Airbnb's photography is the most design-aspirational and the most
    architecturally focused.
  casting_observed: >-
    Brand campaigns: diverse, multi-generational, globally representative.
    Guests shown as couples, families, friend groups, solo travellers.
    The casting is warm and relatable rather than aspirational-exclusive.
    Icons programme: celebrity talent (the specific celebrity hosting
    the experience). The casting strategy communicates belonging and
    accessibility — anyone can be an Airbnb guest.
  lighting_and_colour: >-
    Property photography: natural light dominant, warm tones. The best
    interior photography uses golden-hour natural light or carefully
    balanced interior lighting to create warmth and livability. Brand
    campaigns use warm, inviting colour grading — soft contrast, slightly
    lifted shadows, warm white balance. Compared to Booking.com (cooler,
    more standardised) or hotel chains (more controlled studio lighting),
    Airbnb's photography is the warmest and the most residential.
    Rausch pink (#FF5A5F) does not typically appear in photography —
    it lives in the UI layer.
  post_production: >-
    Property photography: varies by host, but Airbnb's editorial
    selections show clean, lightly retouched architectural photography.
    Vertical perspective correction (straightening architectural lines)
    is standard. Colour grading is warm and consistent in brand contexts.
    No heavy stylisation — the aesthetic is 'real but inviting.'
  visual_boundaries:
    stated_exclusions: >-
      Airbnb positions against cold, corporate, or hotel-standardised
      visual codes. The brand's 'belong anywhere' positioning requires
      warmth, authenticity, and human presence. No stock photography
      aesthetic, no generic travel imagery.
    observed_exceptions: >-
      Luxury listings (Airbnb Luxe) use a more formal, hotel-quality
      photography register that approaches the professional standards
      Airbnb typically contrasts itself against. Icons programme uses
      entertainment-industry-quality production values.
    genuine_absence: >-
      Based on airbnb.com review: no pricing in hero or brand photography
      (pricing appears in search results, not in brand imagery), no
      competitive references, no discount or promotional visual language
      in brand communications.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Bélo symbol (DesignStudio, London, 2014, 'symbol of belonging')"
    - "Rausch pink (#FF5A5F, named after 19 Rausch Street, San Francisco)"
    - "Airbnb Categories icons (3D isometric, 60+ categories)"
    - "Lottie animation framework (Airbnb open source)"
    - "Lava 3D micro-animation format"
  uses_illustration: true
  illustration_style: >-
    3D isometric icons — clean, geometric, culturally neutral. Over 60
    category icons (treehouses, cabins, beachfront, tiny homes, design,
    pools, etc.) designed by the Airbnb design systems team. Each icon
    is a simplified 3D representation of the property type or experience.
    The style is more dimensional and more playful than typical flat
    icon systems — Airbnb uses 3D to create visual warmth and tactility
    in a digital interface.
  illustration_role: >-
    Category icons serve as the primary navigation for the Categories
    browsing experience (launched May 2022). They appear above the
    property grid as a horizontal scrolling bar. The icons replace
    text-only category labels — visual-first discovery. The illustration
    system is a navigational tool, not a decorative element.
  icon_style: >-
    3D isometric with consistent proportions and geometric simplification.
    Designed to work at small scale (mobile browsing bar) and large scale
    (category landing pages). The Lottie animation framework provides
    micro-animation states (hover, selected, loading). Karri Saarinen
    (Design Systems Lead) developed the system. The icon style is
    distinctive from Booking.com (flat, more utilitarian) or Google Maps
    (2D, more cartographic).
  graphic_devices: >-
    The Bélo — a symbol designed by DesignStudio (London, 2014), described
    by Airbnb as a 'symbol of belonging.' An abstract mark combining a
    person, a location pin, a heart, and the letter 'A.' Initially
    controversial (internet mockery of its anatomical resemblance), it
    has become one of the most recognised tech brand marks. Rausch pink
    (#FF5A5F) — the brand's signature colour, named after Airbnb's first
    office address. Extended palette includes Babu teal (#00A699), Arches
    orange (#FC642D), and Hof grey (#484848). The Bélo and Rausch pink
    together create a distinctive and instantly recognisable brand
    presence.
  motion_language: >-
    Lottie (open-source animation framework developed by Airbnb) powers
    micro-animations throughout the interface — loading states, category
    icon transitions, booking confirmations. Lava is Airbnb's proprietary
    3D micro-animation format. The motion language is smooth, functional,
    and delightful — small moments of animation that reinforce the
    brand's warmth. Compared to Booking.com (more utilitarian transitions)
    or Google (more material-design-systematic), Airbnb's motion is
    the most characterful and the most emotionally warm.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Airbnb Cereal (Dalton Maag, May 2018, 6 weights)"
    - "airbnb.com observed February 2026"
    - "Airbnb brand guidelines"
  signature_move: >-
    Airbnb Cereal — a custom typeface designed by Dalton Maag (May 2018)
    in 6 weights (Thin, Light, Book, Medium, Bold, Extra Bold). A
    geometric sans-serif with rounded terminals that create warmth and
    approachability. The name 'Cereal' references morning routines and
    everyday comfort. Supports 120+ languages for global deployment. The
    typeface replaced Circular (Lineto) which was costing significant
    licensing fees at Airbnb's scale. Compared to Netflix Sans (more
    cinematic) or Google Sans (more neutral), Airbnb Cereal is the
    warmest and the most residential-feeling tech typeface.
  what_would_look_wrong: >-
    A cold, geometric typeface without rounded terminals (would lose the
    warmth that distinguishes Airbnb from other tech platforms). An
    overly decorative or display typeface (too editorial for a functional
    marketplace). Circular or Gotham (the predecessors — would read as
    'pre-2018 Airbnb'). A serif typeface (too formal for the belonging-
    and-community positioning).
  case_convention: >-
    Sentence case for most UI and marketing applications. 'Airbnb' with
    capital A only (not 'AirBnB' or 'AIRBNB'). Category names in
    sentence case. The typography is deliberately non-aggressive —
    lowercase-friendly, warm, and conversational.
  display_vs_body: >-
    Display: Airbnb Cereal Bold or Extra Bold — used for headlines and
    hero text. Body: Airbnb Cereal Book or Medium — used for listing
    descriptions, UI text, and navigation. The weight range provides
    sufficient hierarchy within a single family. The consistency of a
    single typeface across all contexts reinforces the unified platform
    experience.
  type_and_image: >-
    Type is functional and subordinate to photography. In the marketplace,
    type provides listing information (title, price, rating, location)
    while photography provides the emotional pull. In brand campaigns,
    type appears as minimal overlays or as separate text frames — never
    competing with the property or experience imagery. The hierarchy is:
    photography first, information second, brand typography third.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "high"
  primary_sources:
    - "airbnb.com (observed February 2026)"
    - "Airbnb mobile app (iOS)"
    - "Airbnb Categories system (May 2022)"
  signature_composition: >-
    Card-based grid with consistent proportions. Every listing is a card
    with a photo carousel, location, rating, price, and dates. The
    card system provides visual consistency across millions of listings
    with varying photo quality. The Categories horizontal scrollbar
    sits above the grid — icon-led navigation into a photo-led grid.
    The 2025 redesign introduced an all-in-one homepage merging
    accommodation with services. Compared to Booking.com (list-based,
    more information-dense, less photo-dependent) or Vrbo (similar
    grid but less design-refined), Airbnb's layout is the most visually
    curated marketplace in travel.
  density_and_whitespace: >-
    Moderate density with generous card spacing. Each listing card has
    breathing room — the grid never feels crowded. White backgrounds
    dominate, creating a gallery-like presentation. The mobile experience
    is even sparser — one card at a time with swipeable photo carousels.
    Compared to Booking.com (much denser, more text, more promotional
    badges) or Amazon (maximum density), Airbnb uses whitespace as a
    design-quality signal.
  format_preferences: >-
    Square or near-square for listing card photos (consistent crop across
    varied source photography). Landscape for hero and brand campaign
    imagery. The photo carousel within each card supports multiple aspect
    ratios but crops to a consistent card format. Mobile-first design
    drives the portrait-optimised layout.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    Airbnb has led several design-industry trends — the custom typeface
    movement, the Lottie animation framework, and the category-browsing
    interface pattern have all been adopted by competitors and the
    broader tech industry.
  examples:
    - trend: "Custom corporate typefaces to reduce licensing costs"
      stance: "early-adopter"
      evidence: >-
        Airbnb Cereal (Dalton Maag, May 2018) was part of the 2017–2019
        wave of tech companies commissioning custom typefaces — alongside
        Netflix Sans (2018), Apple San Francisco (2015), and Google
        Product Sans (2015). The business case was clear: Circular (Lineto)
        licensing was escalating at Airbnb's global scale.
      reasoning: >-
        At Airbnb's scale (150M+ users across 220+ countries), font
        licensing costs compound. Airbnb Cereal was both a brand
        investment and a cost reduction — the warm, rounded design also
        provided stronger brand differentiation than the widely-used
        Circular.
    - trend: "Open-source design tooling (Lottie animation framework)"
      stance: "leader"
      evidence: >-
        Airbnb developed and open-sourced Lottie (2017) — a framework
        for rendering After Effects animations natively on mobile. Lottie
        has been adopted across the tech industry (Uber, Google, Microsoft,
        and thousands of others use it). Airbnb created a design-tooling
        standard that extends well beyond its own products.
      reasoning: >-
        Lottie solved a genuine cross-platform animation challenge. By
        open-sourcing it, Airbnb established itself as a design-engineering
        leader — the framework's adoption amplified Airbnb's design
        reputation beyond its consumer product.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The Bélo symbol. Rausch pink (#FF5A5F). Airbnb Cereal typography.
    The card-based listing format. The warmth and human-centred
    photography style. No collaboration undermines the 'belong anywhere'
    positioning.
  what_bends: >-
    The Icons programme (May 2024) introduces partner-led visual
    languages within the Airbnb framework — celebrity experiences can
    feature the celebrity's aesthetic alongside Airbnb branding.
    Co-branded marketing adapts photography style and colour palette
    for partner contexts. The extended colour palette (Babu teal,
    Arches orange) provides flexibility beyond the core Rausch pink.
  notable_examples: >-
    Airbnb Icons programme (May 2024): celebrity-hosted experiences
    (including recreation of famous film sets, musician home studios)
    with entertainment-quality production values and partner-specific
    visual treatment. Airbnb x Pantone (ongoing colour-themed stays):
    colour-specific interior design collaborations. Airbnb for Work
    (corporate travel): professional, corporate-adapted visual register
    with more muted colour palette and business-context photography.
