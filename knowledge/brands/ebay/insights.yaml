# ── Data
learned_insights:
  - >-
    EBay's competitive advantage is access to hard-to-find, rare items that mainstream retail doesn't offer—the brand positioning should celebrate serendipity and discovery
  - >-
    The four-color wordmark works because it's literally visual representation of diversity—no color dominates; all colors speak equally
  - >-
    Trust mechanisms (seller badges, authentication services) become invisible when they're integrated into user experience rather than advertised as features
  - >-
    Marketplaces only scale when sellers feel empowered—eBay's growth correlates with seller success visibility, not with corporate communications
  - >-
    Authentic, sometimes imperfect photography (actual items, real sellers) creates more trust than styled, professional imagery
what_nobody_copies: >-
  The commitment to visual democracy (no single color dominates the logo) as a brand philosophy that extends throughout the entire system
