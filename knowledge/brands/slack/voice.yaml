chunk_id: "slack-voice"
brand: slack
domain: voice
context_tags:
  - "tone-of-voice"
  - "brand-personality"
  - "communication-style"
depends_on:
  - "slack-soul"
token_count: 85
format: yaml
version: 1.0
last_updated: "2026-02-20"
status: active
