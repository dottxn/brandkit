summary: >-
  Visual language for Delta Air Lines. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-delta"
      touchpoints:
        - "delta.com homepage and marketing pages"
        - "Delta Air Lines brand campaigns ('Keep Climbing')"
        - "Delta social media channels"
        - "Delta corporate communications"
      description: >-
        Delta Red (#E3132C) and Delta Blue (#003268) dominant — a red-
        white-blue palette that communicates American heritage, premium
        quality, and operational confidence. The 2025 centennial refresh
        (DixonBaxi, London) introduced Delta Serif and Delta Sans
        (Pangram Pangram Foundry) as the new typographic system. Mauricio
        Parise (VP Brand Experience Design) oversees the visual system.
        The Widget — Delta's triangle/delta symbol, in continuous use
        since 1959 — is one of aviation's most enduring brand marks.
        The 'Keep Climbing' motion system provides the brand's kinetic
        language. Delta Aura — a fluid colour treatment — adds atmospheric
        depth to brand applications. Lippincott (2007 post-bankruptcy
        rebrand) established the modern Delta identity; DixonBaxi (2025)
        evolved it for the centennial. FUGO Studios created the 'Midnight
        Oil' in-flight welcome video (180M+ views/year). Compared to
        United (blue, more corporate-coded) or American (eagle-flag-coded,
        more traditional), Delta's visual language is the most premium-
        lifestyle-coded and the most design-invested among US carriers.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red-blue,
        Delta Serif/Sans-set, Widget-anchored register.

    - name: "delta-one-premium"
      touchpoints:
        - "Delta One (international business class)"
        - "Delta Sky Club lounges"
        - "Delta Premium Select marketing"
        - "SkyMiles premium tier communications"
      description: >-
        Darker, more atmospheric. Delta's premium products (Delta One,
        Sky Club lounges) use a more luxurious visual register — darker
        backgrounds, Delta Blue dominant over Delta Red, atmospheric
        photography of premium cabin interiors, lounge spaces, and
        elevated dining. The Delta Aura colour treatment is more
        prominent in premium contexts — fluid, gradient-rich compositions
        that suggest exclusivity and sophistication.
      differs_from_default_by: >-
        Darker, more atmospheric. Delta Blue dominates over Delta Red.
        Premium-product photography replaces general travel imagery.
        The visual register shifts from accessible airline to premium
        travel brand.

    - name: "delta-digital-experience"
      touchpoints:
        - "Delta app (Fly Delta)"
        - "delta.com booking flow"
        - "Delta digital boarding pass and trip management"
        - "SkyMiles digital experience"
      description: >-
        Functional, travel-utility-coded. The digital experience mode
        serves booking, trip management, and SkyMiles loyalty. The visual
        language adapts for utility — clear typography, functional icons,
        status indicators, and travel-data presentation. The Delta app
        uses the brand palette in a restrained, information-hierarchy-
        coded application. Compared to the brand marketing mode (more
        atmospheric, more aspirational), the digital mode prioritises
        functional clarity.
      differs_from_default_by: >-
        Functional utility dominates. Data and status indicators replace
        atmospheric imagery. The visual register serves travel-management
        efficiency rather than brand aspiration.

  notes: >-
    Delta's 2025 centennial represents a significant visual-identity
    moment — the DixonBaxi refresh honours 100 years of brand heritage
    while modernising the visual system. The Widget's 66+ years of
    continuous use make it one of the longest-running brand marks in
    commercial aviation. The 'Distinctly Delta' uniform programme (2025-
    2027, Lands' End + Missoni collaboration) extends the visual identity
    into fashion.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "delta.com (observed February 2026)"
    - "Delta marketing campaigns"
    - "FUGO Studios ('Midnight Oil' welcome video)"
  subject_and_framing: >-
    Premium travel experience and destination aspiration. Delta's
    photography shows aircraft interiors (particularly premium cabins),
    destination landscapes, airport moments (boarding, arrival, reunion),
    and in-flight service details. The photography emphasises the travel
    experience as aspirational — not just transportation but a quality
    journey. FUGO Studios' 'Midnight Oil' in-flight welcome video (180M+
    views/year) demonstrates cinematic-quality travel imagery at scale.
    Compared to United (more corporate-functional) or Southwest (more
    casual, value-coded), Delta's photography is the most premium-
    lifestyle-coded among US airlines.
  casting_observed: >-
    Diverse, premium-traveller-coded. Delta's photography shows business
    travellers, families, and leisure travellers in contexts that suggest
    premium experience — Sky Club lounges, Delta One cabins, destination
    experiences. The 'Distinctly Delta' uniform programme (Lands' End +
    Missoni) casts Delta crew as fashion elements.
  lighting_and_colour: >-
    Atmospheric, warm, premium. Cabin photography uses the warm glow
    of in-flight lighting. Destination photography uses golden-hour and
    blue-hour treatments. The Delta Aura colour treatment introduces
    fluid, gradient-rich colour overlays. Delta Red and Delta Blue
    influence the overall colour temperature — warm but authoritative.
  post_production: >-
    Polished, premium processing. Photography receives careful colour
    grading that maintains the warm, aspirational quality. The Delta
    Aura treatment adds fluid colour overlays in brand applications.
    The processing is more premium than typical airline photography.
  visual_boundaries:
    stated_exclusions: >-
      Delta avoids budget-airline visual conventions (price-dominant
      messaging, promotional-coded imagery). The photography never
      shows the utilitarian or uncomfortable aspects of air travel.
    observed_exceptions: >-
      Safety communications and regulatory materials follow aviation-
      standard visual conventions.
    genuine_absence: >-
      Based on delta.com review: no celebrity-endorsement photography,
      no price-dominant promotional imagery, no comparison-competitive
      photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "The Widget (delta symbol, since 1959)"
    - "Delta Aura fluid colour treatment"
    - "DixonBaxi (2025 centennial refresh)"
    - "delta.com (observed February 2026)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    The Widget functions as the primary icon — Delta's triangle/delta
    symbol, in continuous use since 1959, appears on aircraft tails,
    digital interfaces, and all brand touchpoints. Travel-service icons
    (booking, check-in, baggage, seat selection) follow aviation-UI
    conventions. SkyMiles tier icons provide loyalty-status visual
    hierarchy.
  graphic_devices: >-
    The Widget — Delta's equilateral-triangle delta symbol, in use since
    1959. One of aviation's most enduring brand marks, the Widget appears
    on aircraft tails, at airport gates, and across all brand applications.
    Its geometric simplicity scales from aircraft livery to app favicon.
    Delta Aura — a fluid, gradient-rich colour treatment introduced in
    the 2025 DixonBaxi refresh. The Aura creates atmospheric, shifting
    colour fields using Delta Red and Delta Blue — adding depth and
    sophistication to brand applications. Delta Red (#E3132C) and Delta
    Blue (#003268) — the dual-colour system carries emotional weight:
    red for energy and passion, blue for trust and reliability. The
    'Keep Climbing' positioning — while textual, it drives visual
    compositions upward and forward, influencing the directional energy
    of layouts and motion.
  motion_language: >-
    'Keep Climbing' motion system — upward, forward, ascending. The
    Widget animates with ascending, climbing movements. Delta Aura
    colours shift and flow in video and digital contexts. FUGO Studios'
    'Midnight Oil' welcome video (180M+ views/year) sets the standard
    for in-flight motion content — cinematic, atmospheric, premium.
    Aircraft-in-motion footage uses dramatic angles and smooth tracking.
    The motion language is confident and premium — never rushed, never
    chaotic.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Delta Serif + Delta Sans (Pangram Pangram + DixonBaxi, 2025)"
    - "Lippincott (2007 rebrand typography)"
    - "delta.com (observed February 2026)"
  signature_move: >-
    Delta Serif and Delta Sans (Pangram Pangram Foundry + DixonBaxi,
    2025 centennial) — a dual-typeface system created for Delta's 100th
    anniversary. Pangram Pangram (the foundry behind typefaces for
    Spotify, Discord, and others) developed the faces under DixonBaxi's
    creative direction. Delta Serif brings heritage authority — its serif
    character references the gravitas of Delta's century of operation.
    Delta Sans provides the modern, functional companion for digital
    interfaces and body text. The dual system allows Delta to shift
    between heritage (serif for premium, editorial, and centennial
    contexts) and contemporary (sans for digital, functional, and
    everyday contexts). Compared to United (no distinctive custom type)
    or American (system fonts), Delta's typographic investment is the
    most significant among US airlines.
  what_would_look_wrong: >-
    A generic sans-serif like Helvetica or Arial (removes the centennial
    typographic investment). A decorative or novelty typeface (contradicts
    the premium, authoritative register). The pre-2025 typography (signals
    the pre-centennial era). A condensed, aggressive display typeface
    (Delta's tone is confident and premium, not aggressive).
  case_convention: >-
    'Delta' and 'Delta Air Lines' use title case. Product names use title
    case ('Delta One,' 'Delta Premium Select,' 'Sky Club'). SkyMiles uses
    camelCase. Body text uses sentence case. The brand uses selective ALL
    CAPS for the Widget-accompanied wordmark in certain contexts.
  display_vs_body: >-
    Display: Delta Serif at heavier weights for premium, editorial, and
    centennial campaign type — the serif character is most impactful at
    display sizes, communicating heritage and authority. Delta Sans at
    bold for functional headlines and digital marketing. Body: Delta Sans
    at regular weight for all digital interfaces, body text, and
    functional communications. The serif/sans duality creates meaningful
    tonal variation.
  type_and_image: >-
    Delta Serif and atmospheric photography create premium compositions
    — the heritage typeface and travel imagery share a quality register.
    Delta Sans serves functional travel information — flight times,
    gate numbers, booking details. In premium contexts (Delta One, Sky
    Club), serif type and atmospheric photography work together. In
    functional contexts (booking, check-in), sans type provides clarity.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "delta.com (observed February 2026)"
    - "Fly Delta app interface"
  signature_composition: >-
    Booking-funnel-centred with aspirational framing. delta.com leads
    with the booking search (origin, destination, dates) framed by
    destination imagery — combining functional utility with travel
    aspiration. The composition balances operational information (flight
    schedules, booking forms) with brand atmosphere (Delta Aura colour
    treatments, destination photography). The Fly Delta app uses a
    trip-management-centred layout. Compared to United (more corporate-
    functional) or Southwest (more value-promotion-centred), Delta's
    layout is the most aspirationally framed.
  density_and_whitespace: >-
    Moderate density. Marketing pages use generous whitespace with Delta
    Aura colour treatments providing atmospheric depth. Booking and trip-
    management interfaces are appropriately dense with travel data. The
    overall impression is of designed restraint — premium rather than
    cluttered.
  format_preferences: >-
    Desktop for complex booking. Mobile-first for the Fly Delta app
    (trip management, boarding passes, SkyMiles). In-flight entertainment
    uses landscape screen formats. Aircraft livery follows aviation-
    standard format requirements.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    Delta adopts design trends that reinforce its premium positioning
    while maintaining continuity with its century of brand heritage.
  examples:
    - trend: "Heritage typography revival in corporate branding"
      stance: "early-adopter"
      evidence: >-
        Delta Serif (Pangram Pangram + DixonBaxi, 2025) — a custom
        serif typeface for a centennial refresh — brings heritage
        authority to digital-first brand applications. The serif/sans
        dual system allows Delta to honour its 100-year history while
        maintaining contemporary digital functionality.
      reasoning: >-
        Airlines with century-long histories face a tension between
        heritage trust and contemporary relevance. Delta's dual-typeface
        solution addresses both without compromising either.
    - trend: "Fluid colour treatments in brand systems"
      stance: "early-adopter"
      evidence: >-
        Delta Aura — a fluid, gradient-rich colour treatment using Delta
        Red and Delta Blue — represents the trend of dynamic, shifting
        colour fields replacing static brand-colour applications.
      reasoning: >-
        Static colour blocks read as corporate. Fluid colour treatments
        add atmosphere and sophistication — appropriate for a premium
        travel brand competing with luxury hospitality.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The Widget (delta symbol). Delta Red (#E3132C) and Delta Blue
    (#003268). Delta Serif and Delta Sans typefaces. The 'Keep Climbing'
    positioning. The premium, aspirational visual register.
  what_bends: >-
    Alliance partnerships (SkyTeam) introduce partner-airline visual
    elements. Co-branded credit cards (American Express) blend Delta
    and partner visual identities. Airport lounge partnerships accommodate
    shared spaces. Destination-specific marketing adapts imagery for
    local contexts. The 'Distinctly Delta' uniform programme (Lands' End
    + Missoni) introduces fashion-collaboration visual elements.
  notable_examples: >-
    Delta x DixonBaxi (2025 centennial refresh): the London agency
    created Delta Serif, Delta Sans, and Delta Aura for Delta's 100th
    anniversary — the most significant visual update since the 2007
    Lippincott post-bankruptcy rebrand. Delta x Pangram Pangram (Delta
    Serif + Delta Sans, 2025): the foundry created a dual-typeface system
    that bridges heritage (serif) and contemporary (sans) registers —
    one of the most significant typographic investments in US aviation.
    Delta x Lippincott (2007 post-bankruptcy rebrand): the consultancy
    established the modern Delta visual identity that carried the airline
    from bankruptcy to premium positioning. Delta x FUGO Studios
    ('Midnight Oil'): the welcome video viewed 180M+ times per year sets
    the standard for in-flight brand content. Delta x Lands' End + Missoni
    ('Distinctly Delta' uniforms, 2025-2027): extending the visual
    identity into fashion — Missoni's zigzag pattern meets Delta's brand
    colours in crew uniforms.
