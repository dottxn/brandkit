# Visual Decisions Ontology (v0.1)
#
# Purpose:
# - Provide a shared vocabulary for micro-decisions so we can:
#   - validate data is well-formed
#   - compute category norms and alternatives
#   - compose coherent territories as "spaces" (levers + ranges)
#
# Design notes:
# - We model "decision ladders" as multiple axes (coarse -> mid -> fine).
# - Axes can be gated via applies_if (simple dependency constraints).
# - We intentionally start with a finite set of axes; new nuance is captured
#   in the decision record's freeform `details` until it repeats enough to
#   justify promoting it into a new axis.
#
# This file is the contract for:
#   - brands/<brand>/visual-decisions.yaml
#   - scripts/qa/validate_visual_decisions.py

version: "0.1"
last_updated: "2026-03-12"

systems_allowed:
  - core
  - campaign
  - commerce
  - product_ui
  - packaging
  - retail
  - editorial

channels_allowed:
  - website
  - instagram
  - tiktok
  - youtube
  - x
  - app_store
  - email
  - ooh
  - print

# Canonical components (optional) — used when decisions are component-scoped.
# Keep this list short; components are not required to be enumerated.
components_suggested:
  - hero_module
  - product_tile
  - primary_button
  - secondary_button
  - form_field
  - nav_header
  - feed_post
  - story
  - reel
  - video_thumb


axes:
  # ──────────────────────────────────────────────
  # Illustration ladder
  # ──────────────────────────────────────────────
  illustration.used:
    type: enum
    allowed: [no, yes]
    description: "Whether illustration is a material in this system."

  illustration.medium:
    type: enum
    allowed: [hand_rendered, vector, collage, 3d, generative, photography_based, mixed]
    applies_if:
      axis: illustration.used
      value_in: [yes]
    description: "Primary illustration production medium."

  illustration.tool:
    type: enum
    allowed: [pencil, ink, marker, charcoal, paint, digital_brush, mixed]
    applies_if:
      axis: illustration.medium
      value_in: [hand_rendered]
    description: "Tooling language for hand-rendered work."

  illustration.line_system:
    type: enum
    allowed: [single_line, multi_line, no_line, mixed]
    applies_if:
      axis: illustration.medium
      value_in: [hand_rendered, vector]
    description: "Line construction style (where relevant)."

  illustration.rendering:
    type: enum
    allowed: [outline_only, flat_fill, shaded, textured, painterly, mixed]
    applies_if:
      axis: illustration.used
      value_in: [yes]
    description: "Rendering style and depth."

  illustration.texture:
    type: enum
    allowed: [none, paper_grain, pencil_grain, ink_bleed, halftone, mixed]
    applies_if:
      axis: illustration.used
      value_in: [yes]
    description: "Surface/texture signal used in illustration."

  illustration.role:
    type: enum
    allowed: [primary_storytelling, annotation, pattern_texture, icon_system, data_viz, rare_moment]
    applies_if:
      axis: illustration.used
      value_in: [yes]
    description: "What illustration does in the system."

  illustration.type_integration:
    type: enum
    allowed: [separate, overlay_restrained, overlay_bold, integrated, type_is_image]
    applies_if:
      axis: illustration.used
      value_in: [yes]
    description: "How typography interacts with illustration."


  # ──────────────────────────────────────────────
  # Photography ladder
  # ──────────────────────────────────────────────
  photo.subject:
    type: enum
    allowed: [product_only, people_only, environment_only, mixed]
    description: "Primary subject of photography in this system."

  photo.camera_feel:
    type: enum
    allowed: [studio, documentary, cinematic, editorial, ugc, mixed]
    description: "Capture language / production feel."

  photo.framing:
    type: enum
    allowed: [macro, close, medium, wide, mixed]
    description: "Typical framing distance."

  photo.angle_bias:
    type: enum
    allowed: [straight_on, three_quarter, overhead, low_angle, mixed]
    description: "Common camera angles."

  photo.lens_feel:
    type: enum
    allowed: [clean_modern, vintage, distorted, telephoto_compressed, mixed]
    description: "Lens character and distortion posture."

  photo.lighting:
    type: enum
    allowed: [sourceless_studio, soft_diffuse, hard_key, natural, mixed]
    description: "Lighting strategy."

  photo.color_grade:
    type: enum
    allowed: [neutral, warm, cool, desaturated, high_saturation, mixed]
    description: "Color grading bias."

  photo.contrast:
    type: enum
    allowed: [low, medium, high]
    description: "Tonal contrast posture."

  photo.grain:
    type: enum
    allowed: [none, subtle, heavy, mixed]
    description: "Grain/noise presence."

  photo.retouche_level:
    type: enum
    allowed: [none, light, high, cg_like]
    description: "Retouching / finish level."

  photo.motion:
    type: enum
    allowed: [still, implied_motion, explicit_motion, mixed]
    description: "Whether motion is a primary visual signal."


  # ──────────────────────────────────────────────
  # Typography ladder
  # ──────────────────────────────────────────────
  type.primary_class:
    type: enum
    allowed: [custom, commercial, system]
    description: "Primary type system provenance."

  type.primary_genre:
    type: enum
    allowed: [humanist_sans, geometric_sans, grotesk_sans, serif, slab, mono, mixed]
    description: "Perceptual genre of primary typography."

  type.secondary_present:
    type: enum
    allowed: [no, yes]
    description: "Whether a secondary typeface is used as a systematic contrast."

  type.hierarchy_driver:
    type: enum
    allowed: [scale, weight, space, color, mixed]
    description: "How hierarchy is expressed."

  type.case_bias:
    type: enum
    allowed: [sentence, title, upper, mixed]
    description: "Casing posture in headlines and key copy."

  type.tracking_posture:
    type: enum
    allowed: [tight, normal, loose, mixed]
    description: "Letterspacing posture in display sizes."

  type.numerals_voice:
    type: enum
    allowed: [default, tabular, oldstyle, mono_like, mixed]
    description: "Numerals and data voice."

  type.type_image_relationship:
    type: enum
    allowed: [separate, overlay_restrained, overlay_bold, integrated, type_is_image]
    description: "Rules for type interacting with imagery."

  type.brand_mark_typography_relationship:
    type: enum
    allowed: [lockup_rigid, lockup_flexible, mark_only, type_only, mixed]
    description: "How the wordmark/mark relates to typographic system."


  # ──────────────────────────────────────────────
  # Layout ladder
  # ──────────────────────────────────────────────
  layout.grid_type:
    type: enum
    allowed: [strict_modular, flexible_grid, freeform, mixed]
    description: "Underlying layout system."

  layout.alignment_bias:
    type: enum
    allowed: [left, center, asymmetrical, mixed]
    description: "Alignment tendency."

  layout.whitespace_level:
    type: enum
    allowed: [generous, balanced, dense]
    description: "Whitespace envelope."

  layout.layering:
    type: enum
    allowed: [flat, subtle_depth, bold_overlap, mixed]
    description: "How elements layer (depth, overlaps)."

  layout.container_language:
    type: enum
    allowed: [no_containers, soft_cards, hard_cards, frames_rules, mixed]
    description: "Whether UI/cards/frames are a primary signal."


  # ──────────────────────────────────────────────
  # Color ladder
  # ──────────────────────────────────────────────
  color.base_palette:
    type: enum
    allowed: [neutral, warm, cool, mixed]
    description: "Base palette bias."

  color.accent_strategy:
    type: enum
    allowed: [none, rare_punctual, frequent_systematic, seasonal, mixed]
    description: "How accents are deployed."

  color.contrast_envelope:
    type: enum
    allowed: [low, medium, high, mixed]
    description: "How contrast is used across the system."


  # ──────────────────────────────────────────────
  # UI ladder (minimal phase-one)
  # ──────────────────────────────────────────────
  ui.radius:
    type: enum
    allowed: [square, subtle_round, round, pill, mixed]
    description: "Corner radius posture for UI primitives."

  ui.elevation:
    type: enum
    allowed: [flat, subtle_shadow, strong_shadow, glow, mixed]
    description: "Elevation/shadow strategy."

  ui.button_style:
    type: enum
    allowed: [text_only, outline, filled, filled_soft, pill, mixed]
    description: "Primary button construction style."

  ui.motion_posture:
    type: enum
    allowed: [none, subtle, expressive, functional, mixed]
    description: "Motion/animation posture."

  ui.density:
    type: enum
    allowed: [spacious, balanced, dense]
    description: "UI density / padding posture."

