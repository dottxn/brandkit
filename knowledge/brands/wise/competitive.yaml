industry_norms_it_breaks: >-
  Banks profit from complexity. Wise's entire positioning breaks this norm by revealing
  what complexity obscures. The bright green (#9FE870) signals this rejection visually. 
  not the color itself, but that Wise dares to look radically different when incumbents
  use identical palettes. Industry norm: premium pricing requires premium experience
  (private banking, concierge, status). Wise breaks this by making low-cost, transparent
  pricing the premium experience. Industry norm: speed is the selling point. Wise breaks
  this by making transparency the selling point, with speed as a consequence. Industry
  norm: trust is built through heritage and regulation. Wise breaks this by building trust
  through visibility. Industry norm: fintech disrupts banking by feature addition
  (Revolut's super-app, Monzo's beautiful UX). Wise disrupts by feature subtraction. by
  refusing to add complexity that would require opacity to justify.

visual_cluster: "bold-challenger"

visual_fingerprint:
  - cluster: "bold-challenger"
    role: "dominant"
    where: >-
      Wise Green, transparent, disruptive money transfer. The bright green is the
      visual punctuation mark for "this breaks the old rules." Unlike red, which signals
      danger, or orange, which signals energy, green signals life and growth. The specific
      green (#9FE870) is just bright enough to feel slightly uncomfortable in traditional
      banking contexts, which is exactly the point.
  - cluster: "data-native"
    role: "secondary"
    where: >-
      Exchange rates, fee transparency, financial data as visual hero. Unlike other
      fintechs that hide data in minimalist interfaces, Wise's data IS the interface.
      The fee calculator shows the math; the rate display shows what you're getting.
  - cluster: "geometric-clean"
    role: "accent"
    where: >-
      Wise Sans (humanist but systematic), Tapestries (geometric but culturally
      grounded), Fast Flag logo (simplified but directional). These work together to
      communicate: "Systematic AND human. Clean AND global."

