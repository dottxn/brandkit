summary: "Visual reasoning for Coca-Cola. Why the design choices work."

# ── Data
type_logic: >-
  Spencerian script is non-negotiable. it's the wordmark. TCCC Unity is custom supporting type that provides contrast (precise, geometric) against the flowing script. This duality (romantic script + technical sans) mirrors Coca-Cola's dual nature (ritual magic + industrial scale)
colour_logic: >-
  Coca-Cola Red (#F40009) is almost primary color pure. there's no orange tint (warmth) or purple tint (sophistication). It's pure red signal, associated with energy, appetite, action. White (#FFFFFF) and black (#000000) provide absolute clarity without mediating the red's intensity. Gradients and accent colors are campaign-specific, not permanent
composition_philosophy: >-
  The Dynamic Ribbon creates movement and life. it's never static. Bottle silhouettes appear as anchors. Spencerian curves echo throughout compositions, creating visual harmony. White space is abundant, allowing the script to breathe. All compositions serve the moment (the pause, the gathering) not the product
what_would_break_it: >-
  Redesigning the script wordmark, removing the Dynamic Ribbon as compositional device, shifting to cool colors, geometric modernization, or treating heritage as visual baggage
