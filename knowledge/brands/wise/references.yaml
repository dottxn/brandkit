      use the design system consistently and understand WHY consistency matters.
      For Wise, this is critical because the brand's global philosophy depends
      on visual consistency while allowing market adaptation.
    design_systems_philosophy: >-
      Grixti represents a newer design systems lineage focused on adoption and
      cultural change, not just documentation. This descends from contemporary
      leadership writing on design systems (Nathan Curtis, Jina Bolton, Dan
      Mall on design systems governance) but with specific focus on the human
      factors that prevent adoption. Her award-winning adoption work suggests
      her philosophy: "Good design systems fail not because they're badly
      designed, but because teams don't understand the philosophy behind them."
      For Wise, Grixti's contribution is ensuring that the Ragged Edge brand
      philosophy (every choice serves transparency) actually guides decisions
      across a global organization, not just at headquarters.

  - name: "Caio Orio"
    role: "Lead Brand Designer, Wise"
    url: "https://c-orio.com/"
    background: >-
      Visual designer with portfolio focused on brand identity and creative
