summary: "Soul of Apple. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A carefully curated museum where every object has been designed to fit your hand and your mind before you knew you needed it. You don't walk through Apple; you're seduced into understanding.
core_belief: >-
  Simplicity is not the absence of features; it's the absence of confusion. technology should disappear, leaving only purpose.
creative_tension:
  - >-
    Apple is a maximally secretive company revealing its products in moments of maximum theater. The brand is controlled, yet its marketing feels like witnessing truth.
  - >-
    Apple designs for everyone (universal accessibility is core) yet maintains a premium price that excludes. This contradiction is never resolved; it's the engine that drives desire.
decision_filter: >-
  When faced with a fork, Apple removes a third option nobody expected to need. The brand doesn't ask "what features should we include?" but "what can we eliminate?" Constraint is the creative tool.
signature_move: >-
  The negative space in the bitten apple logo. A single bite removes an entire hemisphere, creating a symbol that's simultaneously whole and compromised. perfection acknowledged as unattainable.
what_would_break_it: >-
  A sans-serif with high contrast and geometric extremism like DM Sans or Space Mono. Apple's San Francisco font is humanist. it curves slightly, breathes, acknowledges the human hand that designed it. A pure geometric font would make Apple feel cold and algorithmic, destroying the "it just works" intimacy.
