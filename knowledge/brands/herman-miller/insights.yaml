summary: Deep insights for Herman Miller. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    Expanding the color palette after 25 years of Herman Miller Red (#E02B20) felt radical but was actually about reclaiming modernism's historical boldness. The 1960s Herman Miller palette was vibrant. blues, greens, oranges. The era's geometric patterns used color expressively. The brand had become locked into red-only identity out of commercial necessity. The 2024 rebranding gave permission to be modernist in the original sense: bold, expressive, multichromatic. This required confidence that the brand's identity was strong enough to survive color multiplication.
  - >-
    Söhne typeface by Klim Type Foundry. a humanist sans-serif drawing from Akzidenz-Grotesk through warm interpretation. is the perfect choice because it balances authority with approachability. Where corporate brands use sterile sans (Helvetica, Univers), Herman Miller chose a typeface with character. The letterforms feel drawn rather than constructed, suggesting craftsmanship while maintaining geometric precision. This typographic choice telegraphs that modernism doesn't mean coldness.
  - >-
    Documentary photography showing real people in real spaces is more convincing than styled scenarios. A Aeron chair photographed in an actual office with actual humans moving naturally is more persuasive than a clean, staged product shot. This reflects the design philosophy: the chair solves a real problem for real people. Marketing that shows reality rather than aspiration proves confidence in the product.
  - >-
    Problem-solving language is more powerful than design language. Rather than "This chair is beautifully proportioned," saying "This chair supports your spine naturally for 8-hour workdays" is more honest and more persuasive. Marketing that leads with the solution rather than the aesthetic proves that function drives form, not the reverse.
  - >-
    The M symbol as infinite pattern (appearing in branding, architecture, textile design) represents the modular design philosophy visually. Modular design means infinite combinations of core elements. The M can be combined, scaled, colored differently, and the system remains coherent. This visual principle (flexibility within constraint) is the essence of mid-century modernism applied to contemporary problems.
what_nobody_copies: >-
  Herman Miller's 120-year commitment to the intersection of art and industry. The brand refuses to choose between beauty and function. Competitors split: IKEA chooses affordability and convenience; Vitra chooses design prestige; Steelcase chooses corporate efficiency. Herman Miller insists on all three. beautiful, sustainable, and functional simultaneously. This integration is structurally difficult and expensive, which is why nobody copies it.
