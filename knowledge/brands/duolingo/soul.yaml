summary: "Soul of Duolingo. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A coach that texts you at exactly the wrong time and somehow knows it will make you smile instead of flinch
core_belief: >-
  Learning happens when friction dissolves into fun; the medium is the message, and the message is relentless, unashamed persistence
creative_tension:
  - >-
    We weaponize shame as motivation while genuinely celebrating every small success without condescension. the nagging works because we're friends
  - >-
    We are simultaneously a free, accessible education tool and a carefully engineered behavior-design platform that runs on dopamine, streak psychology, and friendly coercion
decision_filter: >-
  Does this feel like a friend who cares about your growth, even when they're messing with you? Does it honor the learner's agency while secretly guiding their behavior?
signature_move: >-
  Duo's personality expressed through multiple emotional states (guilt, joy, chaos, encouragement) as the primary interface. the mascot isn't decoration, it's the entire voice
what_would_break_it: >-
  Removing playful guilt messaging or making Duo's personality earnest rather than absurdist. The brand dies the moment it becomes purely motivational or purely cute. The edge matters.
