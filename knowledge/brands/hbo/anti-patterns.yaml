summary: "Anti-patterns for HBO. What this brand would never do."

# ── Data
visual:
  - pattern: Adding vibrant color beyond black and white to the logo or system
    reasoning: >-
      This immediately destroys the monochromatic authority. A colored HBO logo would feel less premium, less distinctive. The discipline of black and white creates the visual hierarchy that says "this matters."
  - pattern: "Adopting warm, rounded sans-serifs like Montserrat, Poppins, or Circular for primary branding"
    reasoning: >-
      These typefaces communicate friendliness and accessibility. HBO needs geometric precision and confidence. Warm typefaces would position the brand alongside streaming commodities like Apple TV+ or Netflix.
  - pattern: "Lifestyle photography with casual, warm lighting replacing cinematic, high-contrast approach"
    reasoning: >-
      HBO photographs with theatrical lighting—dramatic shadows, edge definition, color grading that references cinema. Casual lifestyle imagery would undermine the premium positioning and position the brand alongside accessible entertainment.
  - pattern: Logo proliferation across interface or adding mascots/character elements
    reasoning: >-
      HBO's power comes from the wordmark alone. Adding decorative elements, brand characters, or excessive logo visibility would complicate the brand's elegant simplicity. The logo is so strong it needs protection through minimal application.
strategic:
  - pattern: "Chasing trending topics or algorithm-driven content decisions"
    reasoning: >-
      HBO's authority comes from creative excellence as the decision metric, never trending or viral potential. If content decisions became influenced by algorithm optimization, the brand would lose the authenticity that makes "It's not TV, it's HBO" true.
  - pattern: "Positioning as \"streaming for everyone\" or attempting mass-market accessibility"
    reasoning: >-
      This is Netflix and Apple TV+'s positioning. HBO's power comes from accepting that it's not for everyone—it's for people who value quality. Attempting to be all things to all people would dilute the prestige positioning.
  - pattern: "Over-explaining the difference between HBO and HBO Max in marketing"
    reasoning: >-
      The brand should trust that quality speaks for itself. Defensive explanation ("Here's why HBO is better than...") would undermine the confidence positioning. Excellence doesn't need justification.
  - pattern: Expanding content library size beyond focus on quality
    reasoning: >-
      When streaming wars began, HBO faced pressure to match Netflix's 10,000+ hours. Resisting this and maintaining 1,000-2,000 curated hours was the right choice and proved that quantity isn't the competitive advantage. Abandoning this discipline would be fatal.
tonal:
  - pattern: "Casual, conversational voice using slang or humor to seem relatable"
    reasoning: >-
      "Your new obsession is here," "Binge-worthy entertainment"—these are competitor tones. HBO maintains formal, authoritative language. The tone should feel like it comes from film critics or cultural arbiters, not marketing departments trying to seem cool.
  - pattern: Apologetic or uncertain messaging about pricing or exclusivity
    reasoning: >-
      "Premium entertainment at a fair price," "Making prestige accessible"—these undermine the positioning. HBO should state its value matter-of-factly. The price reflects the quality; the exclusivity reflects the curation. No apology needed.
  - pattern: Inspirational messaging unrelated to content quality
    reasoning: >-
      "Find yourself," "Become inspired," "Join the movement"—generic brand building that dilutes focus on excellence. HBO's messaging should be entirely about the quality of storytelling, never about self-improvement or personal transformation.
  - pattern: "Over-reliance on nostalgia or \"prestige\" language that feels manipulative"
    reasoning: >-
      Simply saying "prestige" repeatedly would feel insecure. The brand should trust that the work is prestigious and let viewers discover it themselves. Defensive "prestige" language sounds like marketing; real quality doesn't need the label.
cultural:
  - pattern: "Attempting to go viral through memes, TikTok content, or social media trends"
    reasoning: >-
      HBO's cultural power comes from slow build, word-of-mouth reputation, and critical acclaim. Chasing viral moments would feel beneath the brand. Content should be shared because it's excellent, not because it's optimized for social platforms.
  - pattern: Collaborating with celebrities or influencers for promotional purposes
    reasoning: >-
      HBO doesn't need external validation. When celebrities appear on HBO, it's because they want the creative freedom, not because HBO paid for endorsement. Any explicit partnership would undermine the brand's position of cultural authority.
  - pattern: "Positioning content as \"important\" or \"must-watch\" rather than letting excellence be self-evident"
    reasoning: >-
      Marketing copy that says "this will change how you think about..." signals insecurity. Great work doesn't need preamble. HBO should trust the work.
  - pattern: "Attempting to be \"edgy\" or countercultural as a brand positioning"
    reasoning: >-
      While HBO content can be provocative, the brand shouldn't position itself as rebel or outsider. It's an institution. The positioning is authoritative, not transgressive. Content can push boundaries; the brand stays composed and refined.
