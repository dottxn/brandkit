summary: "Soul of Zillow. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A crystal ball that shows you not just the house you can afford, but the life you're about to live. data made tangible as emotion.
core_belief: >-
  Real estate decisions are life decisions; the tools that enable them should feel like trusted counsel, not commercial transaction facilitators.
creative_tension:
  - >-
    Providing data-driven confidence while respecting that home buying is the most emotionally fraught decision most people make.
  - >-
    Operating as a commercial marketplace while positioning itself as a consumer-first advocate against traditional real estate industry exploitation.
decision_filter: >-
  Does this tool make someone feel more confident and less manipulated by the real estate industry? If not, it's not serving Zillow's deeper mission.
signature_move: >-
  The bright blue (#006AFF) used as the color of clarity and certainty. when you get your Zestimate, the blue highlight says "here's what your home is really worth."
what_would_break_it: >-
  Becoming too aligned with real estate agents and traditional brokers, or abandoning the consumer empowerment positioning for margin optimization.
