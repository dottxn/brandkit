summary: "Soul of Uber. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The promise that friction collapses. tap, arrive, go. the simplification of movement itself into pure instantaneous access.
core_belief: >-
  Movement should be as frictionless as thinking about needing to move; the technology should disappear from the experience.
creative_tension:
  - >-
    Celebrating how technology enables movement while maintaining human connection between driver and rider.
  - >-
    Being a startup culture company at massive institutional scale. maintaining agility while operating in 70+ regulated markets.
decision_filter: >-
  Does this reduce friction between "I need to get somewhere" and "I'm there"? Anything else is unnecessary complexity.
signature_move: >-
  The refined 'U' monogram used as a symbol of motion and direction. not a decorative logo but a directional indicator that means "go this way."
what_would_break_it: >-
  Introducing complexity into the booking flow or sacrificing interface clarity for brand expression. The app is the brand; the brand is the app.
