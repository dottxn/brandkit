summary: >-
  Visual language for HBO. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "hbo-prestige"
      touchpoints:
        - "HBO original series key art and campaigns"
        - "HBO brand marketing and promotional materials"
        - "HBO linear channel identity"
        - "hbo.com and social media channels"
      description: >-
        Black (#000000) and white (#FFFFFF) dominant. a monochrome palette
        that signals prestige television authority. The Modified Avant Garde
        Gothic logotype (Bemis Balkind, 1975) has been essentially unchanged
        for 50+ years. HBO Street (Carvalho Bernau + LettError, 2015) is
        a screen-first graded variable font designed for broadcast and
        digital contexts. The 'Static Angel' intro animation (created on
        a Quantel Paintbox. the 5-second animation took 3 days to produce)
        remains one of the most recognisable brand sounds and visuals in
        television. Dave Curry (Senior Director Product Design & UX)
        oversees the digital visual system. Compared to Netflix (red-and-
        black, algorithm-driven, quantity-forward) or Apple TV+ (minimal,
        Apple-coded, premium), HBO's visual language carries the heaviest
        cultural weight. the brand itself is a quality signal.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this monochrome,
        prestige-authority, Avant Garde Gothic-logotyped register.

    - name: "max-streaming"
      touchpoints:
        - "Max streaming platform (HBO Max rebranded to Max, May 2023)"
        - "Max app interface across devices"
        - "Max marketing and subscriber acquisition"
        - "Max original content branding"
      description: >-
        The May 2023 rebrand from HBO Max to Max (DixonBaxi, Karun Agimal
        Design Director) introduced Max Sans (F37 Foundry + DixonBaxi) as
        the streaming platform's typeface. The visual language is broader
        and more accessible than HBO. Max carries HBO content alongside
        Discovery+, Warner Bros., DC, and other Warner Bros. Discovery
        properties. Blue-purple gradients and a wider colour palette
        distinguish Max from HBO's monochrome austerity. May 2025: the
        platform is rebranding back to HBO Max. David Zaslav (CEO) stated
        'bringing back HBO' acknowledges the brand equity lost in the Max
        simplification.
      differs_from_default_by: >-
        Colour replaces monochrome. Broader content range (not just prestige
        HBO originals). Max Sans replaces HBO Street. The visual language
        is more accessible and less exclusive than the HBO linear brand.
        The 2025 return to HBO Max signals a recalibration toward HBO's
        prestige equity.

    - name: "series-specific"
      touchpoints:
        - "Individual series key art and title sequences"
        - "Series-specific social media campaigns"
        - "Series merchandise and ancillary products"
        - "Series premiere events and screenings"
      description: >-
        Each HBO original series develops its own visual identity. this
        is the most distinctive aspect of HBO's visual system. The Sopranos
        (Annie Leibovitz, 1999. iconic family-portrait key art), Game of
        Thrones (elaborate medieval-fantasy visual world), Succession
        (Andrij Parekh DOP. cold, institutional, green-tinted photography),
        The White Lotus (tropical, saturated, resort-aesthetic). Each series
        operates as a visual sub-brand with its own typography, colour
        palette, photography style, and title sequence. The HBO logo
        appears as a quality seal rather than a visual system.
      differs_from_default_by: >-
        Series-specific visual identities override the HBO brand system.
        Each series has its own colour palette, typography, photography,
        and motion language. The HBO brand provides authority (the HBO
        name signals quality) but doesn't constrain the visual approach.

  notes: >-
    HBO's visual strategy is unique in entertainment. the brand functions
    as a quality endorsement rather than a visual system. Individual series
    carry their own visual identities. The May 2025 return to HBO Max
    (from Max) represents a significant moment for the brand's visual
    positioning within streaming.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "Annie Leibovitz. The Sopranos key art (1999)"
    - "HBO series key art and promotional photography"
    - "Succession. Andrij Parekh (Director of Photography)"
    - "hbo.com (observed February 2026)"
  subject_and_framing: >-
    Series-specific, world-class. HBO's photography is defined by its
    series rather than a unified brand style. Annie Leibovitz's Sopranos
    family portrait (1999) set the standard for prestige-TV key art
    a single image that communicated the entire show. Succession uses
    cold, institutional photography that mirrors its power-dynamics
    narrative. The White Lotus uses saturated, resort-lifestyle imagery.
    Each series hires photography talent at the level of its ambition.
    Compared to Netflix (more algorithmic, more test-driven, multiple
    key-art variants per title) or Amazon Prime Video (varied quality),
    HBO key art is the most consistently art-directed in streaming.
  casting_observed: >-
    Series-determined. Each show's cast defines the photography casting.
    HBO brand marketing (not series-specific) uses minimal people
    photography. the brand communicates through titles and quality
    association rather than faces.
  lighting_and_colour: >-
    Series-specific. The range spans from Succession's cold, desaturated,
    institutional lighting (Andrij Parekh. natural light, cool tones,
    shallow depth of field) to Euphoria's saturated, neon-lit, high-
    contrast aesthetic. HBO's brand photography (non-series-specific)
    defaults to high-contrast black-and-white.
  post_production: >-
    Series-specific post-production. Each show has its own colour grade
    and retouching philosophy. HBO brand materials use clean, high-contrast
    black-and-white processing. The overall standard is cinematic. post-
    production matches the production value of the content.
  visual_boundaries:
    stated_exclusions: >-
      HBO brand photography avoids promotional, sale-driven, or subscriber-
      acquisition-coded imagery. The brand doesn't use generic streaming-
      platform photography conventions (grids of faces, 'watch now' overlay
      graphics).
    observed_exceptions: >-
      Max streaming platform marketing adopted more conventional streaming-
      platform visual conventions. content grids, promotional banners,
      free-trial graphics. that departed from HBO's prestige register.
    genuine_absence: >-
      Based on HBO brand materials: no stock photography, no generic
      lifestyle imagery, no promotional pricing graphics in brand
      photography contexts. Each image serves a specific series or brand
      moment.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Modified Avant Garde Gothic logotype (Bemis Balkind, 1975)"
    - "'Static Angel' intro animation (Quantel Paintbox)"
    - "DixonBaxi (Max rebrand, 2023)"
    - "Trollbäck+Company (HBO Max identity, 2019)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Minimal. The HBO lettermark IS the icon. Within the Max streaming
    platform, content category icons follow standard streaming UI
    conventions. Series-specific iconography (Game of Thrones sigils,
    Succession's 'S' mark) operates independently of the HBO brand system.
  graphic_devices: >-
    The HBO lettermark (Modified Avant Garde Gothic, Bemis Balkind, 1975)
   three letters that have communicated prestige television for 50+
    years. The 'Static Angel' intro. the visual-noise-to-logo animation
    that precedes every HBO broadcast. This 5-second animation (Quantel
    Paintbox, reportedly taking 3 days to create) is one of the most
    recognisable brand animations in entertainment. The monochrome
    palette. black and white as a graphic device that communicates
    exclusivity and authority.
  motion_language: >-
    The 'Static Angel' is the motion signature. the television static
    that resolves into the HBO logo. This animation has been updated over
    the decades while maintaining the static-to-clarity narrative. Series
    title sequences represent HBO's highest motion-design investment
    each series has a bespoke opening sequence (Game of Thrones' mechanical
    map, Succession's home-video-quality family footage, True Detective's
    double-exposure landscapes). Compared to Netflix (the 'ta-dum' sound
    is the primary signature, visual logo animation is secondary) or
    Disney+ (castle animation), HBO's motion language is more cinematic
    and more varied.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Modified Avant Garde Gothic (Bemis Balkind, 1975). HBO logotype"
    - "HBO Street (Carvalho Bernau + LettError, 2015). broadcast/digital typeface"
    - "Max Sans (F37 Foundry + DixonBaxi, 2023). streaming platform typeface"
  signature_move: >-
    The Modified Avant Garde Gothic logotype (Bemis Balkind, 1975)
    three geometric sans-serif letters that have been essentially unchanged
    for 50+ years. The simplicity is the signature: no tagline, no symbol,
    no colour (beyond black or white). just 'HBO.' The logotype's
    geometric precision and the brand's refusal to redesign it communicate
    confidence and permanence. HBO Street (Carvalho Bernau + LettError,
    2015) extended the typographic system. a screen-first graded variable
    font designed to render consistently across broadcast and digital
    at various sizes. The graded axis adjusts stroke weight based on
    size, maintaining optical consistency.
  what_would_look_wrong: >-
    A script or decorative logotype (the geometric precision is the
    identity). Colour in the logo (it's always black or white). A
    redesigned logotype (50+ years of consistency creates expectation).
    A serif typeface in brand contexts (HBO's typographic world is
    entirely sans-serif at the brand level, though series title treatments
    vary widely).
  case_convention: >-
    The HBO logotype is uppercase (always). Brand text uses title case
    or sentence case. Series titles follow their own conventions. The
    brand name is always 'HBO' (uppercase, no periods).
  display_vs_body: >-
    Display: The HBO logotype for brand identification. it appears at
    the beginning of content and on all marketing. HBO Street at heavier
    weights for marketing headlines and promotional text. Body: HBO Street
    at regular weight for digital content, descriptions, and interface
    text. Max Sans (F37 Foundry, 2023) for the Max streaming platform
    a separate typographic system for the streaming context.
  type_and_image: >-
    The HBO logotype sits above or apart from imagery. it's a stamp of
    quality, not an integrated design element. Series key art uses its
    own typography; the HBO logo appears as an endorsement. In brand
    marketing, the logotype dominates. it IS the brand, more than any
    image. The type-image relationship is: the logo certifies, the series
    visual identity communicates.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "hbo.com (observed February 2026)"
    - "Max streaming platform interface"
    - "HBO brand marketing materials"
  signature_composition: >-
    Content-grid streaming layout for the Max platform. horizontal
    scrolling rows of title cards, hero banners for featured content,
    algorithmic personalisation. The streaming layout follows industry
    conventions established by Netflix. HBO brand marketing uses simpler
    compositions: logo + series title + key art image. The brand's
    compositional signature is restraint. fewer elements, more impact.
    Compared to Netflix (busier, more algorithmically varied) or Disney+
    (more family-friendly, more promotional), HBO's layout is the most
    restrained.
  density_and_whitespace: >-
    HBO brand materials use generous whitespace. the monochrome palette
    and the confidence of the logotype create compositions that don't
    need density. The Max streaming platform is standard streaming density
   content-rich, algorithmically populated. Series key art ranges from
    minimal (Succession. a single image, restrained type) to complex
    (Game of Thrones. elaborate fantasy compositions).
  format_preferences: >-
    Landscape for streaming hero banners and title cards. Portrait for
    series key art in certain contexts. The HBO logotype is horizontal.
    Series title sequences use widescreen (16:9 or wider) cinematic
    formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    HBO's brand identity resists trends. the 50-year-old logotype and
    monochrome palette are anti-trend by definition. Individual series
    adopt or lead trends within their own visual worlds.
  examples:
    - trend: "Streaming platform visual homogenisation"
      stance: "resister"
      evidence: >-
        While Netflix, Disney+, Apple TV+, and Amazon Prime Video
        converged on similar streaming-platform visual languages (content
        grids, algorithmic personalisation, promotional overlays), HBO
        maintained its distinction through the quality-endorsement model.
        The May 2025 return to HBO Max (from Max) explicitly re-centres
        the HBO brand. resisting the trend of generic platform branding.
      reasoning: >-
        HBO's brand equity (built over 50+ years) is more valuable than
        platform-generic visual conventions. The return to HBO Max
        acknowledges that the Max simplification diluted this equity.
    - trend: "Prestige-TV visual identity design"
      stance: "leader"
      evidence: >-
        HBO defined the genre of prestige-TV visual identity. from The
        Sopranos' Annie Leibovitz key art (1999) to Game of Thrones'
        elaborate visual world-building to Succession's institutional-
        cold aesthetic. Other networks and streamers have followed HBO's
        model of investing heavily in series-specific visual identities.
      reasoning: >-
        HBO established the standard that prestige TV series require
        prestige visual identities. bespoke typography, world-class
        photography, and cinematic title sequences.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The HBO logotype (Modified Avant Garde Gothic). The monochrome
    palette. The 'Static Angel' intro. The quality-endorsement
    positioning. the HBO name appears on everything it produces.
  what_bends: >-
    Individual series develop their own complete visual identities
    the most radical form of visual collaboration within a brand. The
    Max streaming platform introduced a distinct visual system that
    coexists with (but doesn't replace) the HBO brand. Warner Bros.
    Discovery corporate contexts introduce additional branding layers.
  notable_examples: >-
    HBO x Game of Thrones: the series developed the most elaborate
    visual world in television history. custom typography, detailed
    map-based title sequence, extensive world-building across marketing,
    merchandise, and immersive experiences. The HBO logo appeared as an
    endorsement, not a constraint. HBO x Succession: cold, institutional
    visual identity that deliberately contrasted with HBO's warmth
    demonstrating the brand's willingness to let series define their own
    aesthetic. HBO x DixonBaxi (Max rebrand, 2023): the most significant
    visual collaboration at the brand level. creating a streaming-
    platform identity that attempted (controversially) to expand beyond
    the HBO prestige register.
