summary: Visual reasoning for MasterClass. Why the design choices work.

# ── Data
type_logic: >-
  Söhne as primary typeface is a geometric sans-serif designed by Florian Fischer, specifically created to balance geometric precision with warmth. It's not as cold as Futura, not as friendly as modern humanist fonts. it occupies the exact middle ground between technical and approachable. Tiempos Headline (used in logo) is an editorial serif that brings sophistication and print credibility. Each instructor receives a custom serif nameplate, which personalizes the visual identity and honors the individual contribution of the expert. This mixed-type system (geometric sans for system communication, serif for instructor identity, implied underscore as connecting device) allows both coherence and personality. The typography discipline reflects editorial design sophistication rather than software design pragmatism.
colour_logic: >-
  Black (#000000) as primary color is the core strategic choice. Black is cinematic; it's the color of film, theater, and premium entertainment. Paired with modular instructor colors (pink #FF69B4, blue #87CEEB, green #98FB98, gold #FFD700), the system allows each course to feel visually distinct while the black anchor maintains coherence. This color strategy is unusual in educational technology (which typically uses bright, optimistic colors) and completely shifts the cultural positioning from "educational software" to "entertainment content." The high contrast between black and instructor colors ensures legibility while maintaining visual intensity. There's no neutral gray or safe colors. every choice is decisive.
composition_philosophy: >-
  Filmstrip-inspired layouts with letterboxed compositions reference cinema language throughout. Content appears in frames reminiscent of film stills, which primes viewers to expect cinematic-quality production. The underscore device appears as connector (joining ideas), divider (separating sections), selector (highlighting important content), and highlighter (drawing attention). This consistent use across all applications creates a unifying visual language that feels cohesive without being rigid. Asymmetrical layouts and generous whitespace suggest editorial design rather than software interface design. Compositions feel like they could appear in a film magazine or high-end publication, reinforcing the premium positioning.
what_would_break_it: >-
  Adopting the color and composition language of educational software (bright blues, greens, friendly interfaces, dense information layouts) would immediately position MasterClass as learning platform rather than entertainment-quality experience. Using rounded, friendly sans-serif typefaces instead of geometric precision would soften the positioning and undermine credibility. learning from mastery requires rigorous, precise communication, not warmth. Reducing production quality noticeably in cinematography, sound design, or editing would be catastrophic. the visual and audio excellence is the message that this is premium content. Flattening the underscore system or adopting generic UI patterns would lose the signature device that creates visual coherence and psychological ownership. Using algorithmic composition or grid-heavy layouts would position the experience as systematic rather than curated, destroying the feeling that you've been chosen by someone with taste. Adopting the visual language of competitors (Skillshare, Udemy, Coursera) would position MasterClass as interchangeable rather than distinctive.
