summary: >-
  Visual language for Monzo. How Monzo actually operates visually
  photography art direction, type treatment, channel behaviour, and how
  the brand flexes between approachable fintech and trusted financial
  institution.

# ── Visual Modes ─────────────────────────────────────────

visual_modes:
  primary:
    cluster: warm-humanist
    context: >-
      Monzo app UI, website, everyday marketing, blog posts, customer
      communications, help content, social media
    description: >-
      Warm, clear, approachable. The hot coral card edge threads through
      everything. Oldschool Grotesk headlines feel friendly. Navy anchors
      the system with trust. Generous whitespace, rounded corners, and
      the coral accent create a feeling of a friend explaining money
      not a bank lecturing you.
  secondary:
    cluster: bold-challenger
    context: >-
      Brand campaigns, out-of-home advertising, product launches,
      Monzo Premium and Plus marketing, competitive positioning moments
    description: >-
      Bolder, more assertive, making a claim. The coral becomes more
      dominant. full colour fields, large type, confidence. The brand
      shifts from friendly helper to challenger brand, asserting that
      banking should work differently. Typography is larger, statements
      are shorter, and the visual impact is immediate.
  contextual:
    - cluster: editorial-contemporary
      context: >-
        Annual reports, investor communications, press materials,
        regulatory content, Monzo Business marketing
      description: >-
        More restrained, more institutional. but still distinctly Monzo.
        The coral recedes to accent status. Navy takes the lead.
        Typography is cleaner and more structured. The warmth is still
        there but it is wearing a slightly more professional suit.

# ── Photography ──────────────────────────────────────────

photography:
  subject_focus: >-
    People and their money situations. not literally cash, but the
    moments where money matters. A group splitting a bill, someone
    checking their phone on the bus, a couple budgeting in a kitchen.
    The Monzo card appears frequently but naturally. in a wallet, in
    a hand at a terminal, peeking from a pocket. The card is a
    character, not a product shot.
  casting: >-
    Real people in real financial situations. Diverse in age, ethnicity,
    and economic context. Monzo serves everyone, and the casting must
    reflect that. Young professionals are prominent but not exclusive.
    People look comfortable and confident, not anxious about money. The
    vibe is "people who have figured something out" rather than "people
    who are wealthy."
  lighting: >-
    Natural, warm, contemporary. Daylight-forward with soft, even
    illumination. Indoor scenes use warm practical lighting. the glow
    of a screen, kitchen lights, cafe ambiance. Studio lighting is warm
    and diffused. Nothing cold, nothing dramatic, nothing that suggests
    the fluorescent chill of a traditional bank branch.
  post_production: >-
    Warm colour grading that lifts the coral and reinforces the friendly
    palette. Shadows are open, not crushed. Skin tones are accurate and
    warm. The card's hot coral colour must always be true to hex
    #FF5C59 is the brand's most recognisable physical asset and colour
    drift would weaken it. Overall feeling is bright, optimistic, honest.
  composition: >-
    Contextual and environmental. people in their spaces, money moments
    captured in situ. The card is always placed naturally, never floating
    on white or in an aspirational lifestyle setting. Compositions are
    relaxed and slightly candid. Close-ups of the card focus on the
    coral edge, which is the most distinctive physical feature.
  texture_and_finish: >-
    Clean, bright, contemporary. There is no vintage treatment, no
    grain, no analogue nostalgia. Monzo is digitally native and the
    photography reflects that. Surfaces are smooth, lighting is even,
    and the overall feeling is modern and fresh without being sterile.
  what_is_never_in_frame: >-
    Traditional bank imagery. marble lobbies, handshakes in suits,
    gold accents, skyscrapers. Obvious wealth signifiers. luxury cars,
    expensive watches, champagne. Anxiety about money. stressed faces,
    piles of bills, overdue notices. The frame contains confidence and
    clarity, never financial stress or institutional coldness.

# ── Illustration & Graphic Language ──────────────────────

graphic_language:
  uses_illustration: true
  illustration_style: >-
    Playful, rounded, warm. Illustrations use a limited palette anchored
    in coral, navy, and supporting colours. The style is clean and
    contemporary. flat or lightly dimensional, with rounded forms that
    mirror the brand's shape language. Never corporate clip-art, never
    overly detailed.
  illustration_role: >-
    Explaining complex financial concepts simply. Illustration appears
    in the app (onboarding, empty states, error pages), blog posts,
    help articles, and social content. It translates jargon into visual
    clarity. a spending pie chart, a savings pot growing, a budget
    graph that makes sense. Illustration is educational and encouraging,
    making money feel manageable.
  icon_style: >-
    Rounded, friendly, consistent stroke weight. The icon set mirrors
    the brand's approachability. circles and rounded rectangles are
    preferred over sharp corners. Functional first but warm in
    character. The spending categories in the app are icon-led, making
    financial data feel personal and human.
  graphic_devices: >-
    The coral thread. a coral line or edge that runs through layouts
    connecting elements like a visual heartbeat. Rounded corners on
    everything (cards, buttons, containers, images). The hot coral
    colour field as a graphic element. The Monzo "M" monogram. Gradient
    treatments from coral to warm tones for premium products.
  motion_language: >-
    Snappy, optimistic, responsive. Interactions in the app are quick
    and satisfying. a payment confirmation, a savings pot filling.
    Easing curves are rounded and bouncy, never robotic. Motion creates
    a feeling of positive feedback. the interface celebrates financial
    actions rather than just confirming them. Transitions are fast but
    not aggressive.

# ── Typography in Practice ───────────────────────────────

type_treatment:
  case_convention: >-
    Sentence case for almost everything. This is deliberate. sentence
    case is how people actually write and read. It communicates clarity
    and normalcy in a category that loves uppercase authority.
    Headlines, buttons, labels: sentence case. The brand name "Monzo"
    is always capitalised as a proper noun.
  size_philosophy: >-
    Bold and generous for headlines. large enough to be confident but
    not aggressive. Oldschool Grotesk at display sizes is warm and
    inviting. The type is big enough to be clear, not big enough to
    shout. In-app type is functional and readable. accessibility is a
    priority, not an afterthought.
  spacing_approach: >-
    Comfortable tracking, generous line height. Nothing is cramped. The
    typographic system breathes, reflecting the brand's commitment to
    clarity. Whitespace around type is purposeful. each piece of
    information has room to be understood before the next one arrives.
  hierarchy_pattern: >-
    Oldschool Grotesk for display headlines. warm, bold, personality-
    forward. Monzo Sans for body and functional text. clear, readable,
    efficient. The two-tier system creates a hierarchy where the
    headline is emotionally warm and the body text is functionally
    clear. Colour (coral accents, navy for authority) adds a third
    layer of hierarchy.
  type_and_image: >-
    Type and image share space comfortably. In campaign work, bold type
    sits over coral colour fields or alongside photography. In the app,
    type is the primary interface. the numbers, labels, and headings
    are the design. The typography does more work than the imagery
    because financial services are fundamentally about words and numbers.
  display_vs_body: >-
    Oldschool Grotesk for display. the face that carries Monzo's
    personality. Rounded, warm, with enough character to feel human and
    enough clarity to feel trustworthy. Monzo Sans for body
    purpose-built for readability at small sizes, optimised for screens.
    The display type welcomes; the body type informs.

# ── Layout & Composition ─────────────────────────────────

layout:
  grid_system: >-
    Modular, responsive, app-first. The grid is designed for mobile
    screens and scales up to web and marketing materials. Card-based
    layouts reflect the product's own interface. spending categories,
    pots, and transactions are all cards. The grid is clean but not
    rigid; rounded corners and colour accents soften the structure.
  density: >-
    Balanced. The app is information-dense by necessity (financial data)
    but manages density through clear hierarchy, colour coding, and
    progressive disclosure. Marketing materials are more spacious.
    Campaign work can be very minimal. a bold statement on coral.
  whitespace_role: >-
    Clarity. Whitespace means "you can understand this." In a category
    where traditional banks use density to imply sophistication (and
    obscure complexity), Monzo uses whitespace to demonstrate simplicity.
    The whitespace is democratic. it makes information accessible to
    everyone, not exclusive to those who can parse financial complexity.
  visual_hierarchy: >-
    Colour-led. The coral thread guides the eye to the most important
    element. Navy provides authority and anchoring. Size and weight
    create secondary hierarchy. The physical card. hot coral edge
    visible in a dark wallet. is the ultimate visual hierarchy device,
    designed to be the most noticeable object in your pocket.
  format_preferences: >-
    Vertical and mobile-first for everything. Square for social.
    Landscape only for OOH and wider web layouts. The brand thinks
    phone-first because the product is phone-first. Every visual
    decision asks "does this work on a 6-inch screen?"

# ── Channel Behaviour ────────────────────────────────────

channels:
  instagram:
    grid_strategy: >-
      A mix of product moments, financial tips, customer stories, and
      bold typographic posts on coral backgrounds. The feed reads as
      warm and helpful rather than aspirational. Consistency comes from
      the coral palette and rounded visual language rather than rigid
      templates.
    content_types:
      - "typographic tips on coral backgrounds"
      - "card-in-context lifestyle shots"
      - "customer story portraits"
      - "product feature explainers"
      - "illustrated financial concepts"
      - "community and team content"
    visual_rules: >-
      Warm throughout. Coral is the unifying colour across all posts.
      Text-based content uses Oldschool Grotesk on coral or navy
      backgrounds. Photography is warm, natural, and never aspirational.
      Stories and Reels are more informal and playful. the brand's
      personality shines brightest in ephemeral content.
  website:
    approach: >-
      Product-led with a warm editorial layer. The website is primarily
      a conversion tool (sign up, download the app) but presents
      Monzo's features with the same clarity and friendliness as the
      app. Blog content is plain-language financial guidance that serves
      the brand's demystification mission.
    hero_treatment: >-
      Bold statements on coral colour fields. The card prominently
      featured, often with a phone screen showing the app. Hero
      treatments are confident and clear. one message, one visual,
      one call to action. No clutter, no confusion, just coral warmth
      and a clear proposition.
  packaging:
    approach: >-
      The card IS the packaging. The hot coral card with its distinctive
      edge is Monzo's most powerful physical brand asset. Card delivery
      packaging is minimal and clean. white envelope, simple unboxing,
      the coral card revealed as the centrepiece. No luxury theatre;
      the card speaks for itself.
    material_choices: >-
      Clean cardboard mailer for card delivery. The card itself is the
      material statement. the coral colour is precisely matched and
      consistent across every batch. Recycled and sustainable materials
      for any physical communications, reflecting the brand's modern
      values.
  advertising:
    approach: >-
      Bold, simple, conversational. OOH uses large type on coral
      backgrounds. statements about money that sound like a friend
      talking, not a bank advertising. Digital advertising is targeted
      and contextual. the right financial message at the right moment.
      The brand rarely shows the app in detail; instead it shows the
      feeling of financial confidence.
    format_preferences: >-
      Large-format OOH on coral backgrounds for brand building. Vertical
      video for social and mobile. Static cards for digital. Monzo
      invests in bold, simple formats that communicate quickly. the
      message should land in under two seconds.
  editorial:
    approach: >-
      Plain-language financial education. The Monzo blog and help
      content demystify money with the same clarity as the app. Tone is
      conversational, helpful, never condescending. Visual treatment is
      clean with illustrations explaining concepts. This is the brand's
      demystification engine. every article asks "would a friend
      explain it this way?"
  retail:
    approach: >-
      No physical branches. deliberately. Monzo's absence from the
      high street is a brand statement. Presence at events and pop-ups
      is warm, coral-branded, and focused on conversation rather than
      transaction. The app is the branch; the card is the physical proof.

# ── Trend Posture ────────────────────────────────────────

trend_posture:
  overall: early-adopter
  relationship_to_trends: >-
    Monzo is a digitally native brand that helped define the neobank
    visual language. the bold colour, the card-as-identity, the
    app-first experience. It adopts design trends quickly when they
    serve usability and clarity (dark mode, accessibility improvements,
    motion design) but resists trends that would dilute the coral
    identity or make the brand feel like every other fintech. The coral
    card is the anchor. everything evolves around it.
  examples:
    - trend: "Dark mode interfaces"
      stance: early-adopter
      reasoning: >-
        Adopted for accessibility and user preference. The coral
        actually pops more on dark backgrounds, making the brand's
        signature colour even more distinctive in dark mode.
    - trend: "AI-powered financial features"
      stance: early-adopter
      reasoning: >-
        Consistent with the demystification mission. AI that explains
        spending patterns and predicts bills serves the core promise
        of financial clarity. The visual treatment keeps AI features
        warm and human rather than technical.
    - trend: "Gradient and aurora colour trends"
      stance: selective-adopter
      reasoning: >-
        Used subtly in Monzo Plus and Premium products where a warmer
        gradient from coral signals a premium tier without abandoning
        the core colour. Monzo never uses gradients that disconnect
        from the coral foundation.

# ── Collaboration Rules ──────────────────────────────────

collaboration:
  flexibility: selective
  what_stays: >-
    The hot coral. The approachable typography. The rounded form
    language. The conversational tone. No partnership makes Monzo look
    like a traditional bank or loses the warmth that distinguishes it
    from every other financial institution.
  what_bends: >-
    The card design can incorporate partner branding for co-branded
    products. Photography style can shift to match a partner's world
    while maintaining warm lighting and natural casting. The supporting
    colour palette can expand for specific campaigns or products.
  notable_examples: >-
    Monzo's integration partnerships (energy switching, salary advance)
    maintain the coral thread in partner-facing UI while adapting to
    the partner's category. The card always stays coral. the physical
    object is the non-negotiable brand anchor across every partnership.
