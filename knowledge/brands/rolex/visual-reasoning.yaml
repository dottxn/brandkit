summary: Visual reasoning for Rolex. Why the design choices work.

# ── Data
type_logic: >-
  Garamond (and custom Rutex) works because it's editorial. the typeface of permanent things (books, law documents, historical records). Using serif typography signals that Rolex isn't trendy; it's part of the permanent cultural record. Bold weight (as noted in metadata) is unusual because watches typically whisper. Bold Garamond says authority without aggression. The custom letterforms ensure it can be reproduced across manufacturing tolerances (watches use engravings, dials, etc.). A typeface that can't be simplified becomes unusable; Rolex's custom type is designed for precision reproduction, not display elegance.
colour_logic: >-
  The five-pointed crown (#A37E2C. warm gold) against forest green (#006039) is sophisticated color strategy. Gold speaks to value and permanence; forest green is a color almost never used in modern luxury (too traditional, too risky). Together they create visual authority that feels historical, not contemporary. The third color (#957327. deeper gold) creates depth rather than variety. The palette refuses the blues and blacks that dominate luxury positioning. Green and gold together feel inherited rather than designed. like something that was always true, just waiting to be discovered.
composition_philosophy: >-
  All Rolex compositions use concentric circles and watch-face geometry as a conceptual framework. Marketing layouts, website architecture, even print materials reflect the mathematics of the watch itself. This isn't decorative. it signals that every element of Rolex's expression comes from the same precision mindset as the product. Avoid asymmetrical layouts, diagonal compositions, or organic shapes. All layouts should feel measured, deliberate, inevitable. Whitespace in Rolex compositions isn't breathing room; it's precision. Each margin is calibrated like a watch movement.
what_would_break_it: >-
  Adopting a flat design aesthetic or updating to contemporary sans-serif typography. The moment Rolex's visual language looks "modern," it starts aging. A 2024 design update would be outdated by 2030. The brand's visual system must feel like it was created in 1960 and could exist in 2060 unchanged. This level of permanence requires serif fonts, dimensional photography, and compositions that resist trend. Flat design, gradient overlays, or rounded corners would immediately date the brand.
