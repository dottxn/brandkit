summary: "Soul of CHANEL. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A private library where all the books have been read, understood, and long since stopped needing to prove anything. Everything on the shelf earned its place through decades of weight, not weeks of marketing.
core_belief: "True luxury is the courage to remove everything except what you'd miss if it disappeared."
creative_tension:
  - >-
    A house that worships innovation but refuses to look like it's trying, creating endless pressure to make revolutionary choices that appear inevitable in retrospect.
  - >-
    Coco Chanel was a radical rule-breaker, but her house has become the arbiter of what the rules should be. paradoxically conservative about revolution.
decision_filter: >-
  When faced with a fork, Chanel chooses what Coco would have rejected in her era, not what she would create in ours.
signature_move: >-
  The interlocking CC monogram. two letters that have become so loaded with meaning they function as permission structures. You don't wear the monogram; the monogram permits you to wear the object.
what_would_break_it: >-
  Any color that isn't black, white, gold, or pearl. The moment Chanel releases a collection in electric blue or millennial pink, it surrenders the authority of restraint and becomes just another fashion brand.
