summary: Visual reasoning for Apple. Why the design choices work.

# ── Data
type_logic: >-
  San Francisco Pro is a custom humanist sans-serif designed specifically to replace dynamic optical sizing across Apple's ecosystem (from Watch screens to iPad to Mac). Unlike geometric sans-serifs that prioritize mathematical perfection, SF Pro has subtle curves and counter forms that acknowledge human perception. The typeface looks perfectly natural because it's designed to serve legibility above all, especially at small sizes. This is the opposite of designer-forward typography; it's psychology-forward typography. Bold weights are used sparingly (headlines and key messages) because the typeface's humanist character carries the message without needing weight to emphasize.
colour_logic: >-
  The palette of #000000, #FFFFFF, and #F5F5F7 is not a design limitation; it's a philosophical statement. Black and white are pure contrast with no ambiguity. The grey (#F5F5F7) is so light it's almost white, creating subtle depth without visual noise. This extreme restraint means that when color is introduced (only in specific contexts like the watch bands or iPhone aluminum options), it carries maximum significance. The color system is designed to recede, allowing the product and interface to emerge. This is the opposite of the maximalist approach; it's the aesthetic of "designed to fade into the background of your life."
composition_philosophy: >-
  Apple's layouts use extreme white space and centered compositions. Nothing is left-aligned or edge-aligned without purpose. Symmetry is the baseline. The grid is invisible but absolute. This creates a sense of calm authority. not authoritarian, but authoritative. The space is not emptiness; it's breathing room. It suggests that the message is so clear it doesn't need to fill the frame. In advertising, a single product in the center of a composition surrounded by white space is Apple's signature. This is compositional restraint as strategic choice.
what_would_break_it: >-
  A lively, rounded humanist sans-serif like Poppins or Inter would immediately inject warmth and friendliness that contradicts Apple's core belief in precise simplicity. These typefaces are designed to feel approachable and contemporary, which would shift Apple's tone from "this is how things should work" to "we understand you and we're here to help." Apple's design power comes from the confidence that beautiful, simple design doesn't need to explain itself or earn trust through friendliness. A warmer typeface would undermine this core position by introducing emotional softness where intellectual clarity should reign.
