summary: Deep insights for PepsiCo. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    The most powerful brands in CPG acknowledge their own cultural dominance rather than hiding it—Pepsi leans into "we're everywhere" as strength
  - >-
    Custom typography in lowercase for a multi-billion dollar brand is a radical act of humility that simultaneously signals confidence
  - >-
    The forest green smile (#228B22) in the Pepsi logo redesign works because it connects to sustainability without looking preachy
  - >-
    "smiles as currency" only works when the brand actually demonstrates smile-creation through actual product experience, not just messaging
  - >-
    Circular composition (P surrounded by symbolic elements) works for a portfolio company because it suggests containment and unity
what_nobody_copies: >-
  The decision to make the logo type in lowercase across 500+ brands globally—a visual humility that somehow increases rather than decreases authority
