# ── Data
learned_insights:
  - >-
    Audio brands need visual metaphors for sound—the 30-degree angle is Bose's waveform, making sound visible without resorting to abstract representation
  - >-
    60 years of acoustic research only matters as a brand asset when customers can *feel* the difference, not just read the specification
  - >-
    The handwritten wordmark survived the 2024 rebrand because it's genuine history—customers recognize Bose wordmark across generations, making it a moat
  - >-
    Premium audio positioning works through comparative listening experiences, not through lifestyle marketing
  - >-
    Chromatic color systems (colors as musical notes) create coherent visual language without requiring ornamental patterns
what_nobody_copies: >-
  The willingness to make a 60-year-old handwritten wordmark feel contemporary through supporting system design, not through redesign
