# ── Data
learned_insights:
  - >-
    100+ years of heritage is only valuable if it makes contemporary storytelling feel more powerful. Disney's genius is evolving the IP universe while the wordmark stays constant
  - >-
    Magical brands work when magic is systemic (every touchpoint builds wonder) not just visceral (the movie moment alone)
  - >-
    Iconic characters (Mickey, Cinderella Castle) function as visual shorthand for permission to believe in impossible things
  - >-
    Disney's competitive moat isn't any single story. it's the ecosystem where old stories inform new ones, creating cumulative emotional investment
  - >-
    "Where dreams come true" becomes credible when the brand invests consistently in physical spaces (theme parks), not just digital/film experiences
what_nobody_copies: >-
  The maintenance of heritage authenticity across 100+ years while producing culturally relevant contemporary storytelling that expands the definition of what Disney is
