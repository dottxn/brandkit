summary: >-
  Visual language for Sephora. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-stripe"
      touchpoints:
        - "sephora.com homepage and marketing"
        - "Sephora app"
        - "Store exterior and interior signage"
        - "Shopping bags and packaging"
        - "Social media channels"
      description: >-
        Black-and-white stripe pattern — Sephora's most recognisable
        graphic device. The custom type system (Mucca Design / Matteo
        Bologna + Schriftlabor Vienna, 2015-2016) comprises Sephora Sans,
        Serif Text, Serif Display, Script Editor, and Script Collection —
        6 families, 22 styles. The Flame mark S symbol (introduced 1995)
        serves as the primary logo. Core palette: Black (#000000), White
        (#FFFFFF), Red/Crimson (#E2001A), and Denim Blue (#136BEA).
        LVMH-owned since 1997. Zena Srivatsa Arnold (US CMO) oversees
        brand marketing. 'We Belong to Something Beautiful' is the
        positioning line. Compared to Ulta (more promotional, value-coded,
        orange-accented) or MAC (darker, more editorial, M·A·C·-branded),
        Sephora's visual language is the most systematically designed in
        prestige beauty retail.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this stripe-
        patterned, Flame-marked, custom-type-system register.

    - name: "retail-store"
      touchpoints:
        - "Sephora store interiors (2024 redesign — 111 stores)"
        - "Product display and shelving systems"
        - "Store window displays"
        - "In-store digital screens"
        - "Sephora at Kohl's shop-in-shop"
      description: >-
        The 2024 store redesign (described as the largest capital project
        in Sephora's history, 111 stores) introduced updated fixtures,
        lighting, and navigation. The retail environment uses black
        fixtures, white walls, and dramatic product lighting. The stripe
        pattern appears on shopping bags, tissue paper, and packaging.
        Product displays use category-coded colour accents. The store
        experience is self-service-forward — open testers, discovery
        tables, and interactive screens. Compared to Space NK (more
        boutique, more curated, more editorial) or Ulta (more promotional,
        wider range, value-inclusive), Sephora's retail environment is the
        most systematically branded in beauty retail.
      differs_from_default_by: >-
        The physical environment introduces three-dimensional brand
        expression — lighting, materials, spatial composition. Product
        brands introduce their own visual languages within Sephora's
        black-and-white framework. The retail mode is more experiential
        and less typographically driven than digital.

    - name: "digital-commerce"
      touchpoints:
        - "sephora.com product pages"
        - "Sephora app browsing and purchase flow"
        - "Virtual try-on and colour matching tools"
        - "Beauty Insider loyalty programme interface"
      description: >-
        Commerce-optimised, product-photography-forward. sephora.com
        uses a clean grid layout with white backgrounds, product hero
        shots, and structured navigation. The Beauty Insider loyalty
        programme introduces red (#E2001A) and gold tiers with distinct
        visual treatments. Virtual try-on tools use the camera feed with
        minimal brand overlay. Compared to Ulta (denser, more promotional,
        more sale-driven), Sephora's digital commerce is cleaner and more
        prestige-coded.
      differs_from_default_by: >-
        Product photography from hundreds of brands replaces brand-
        controlled imagery. The layout is commerce-functional rather than
        brand-expressive. The stripe pattern and Flame mark are present
        but subordinate to product content.

  notes: >-
    Sephora hosts thousands of beauty brands, each with its own visual
    identity. Sephora's role is to provide a consistent, prestige-coded
    visual framework that elevates all brands within it. The Sephora
    Collection (own-brand products) and Sephora Favorites (curated sets)
    need distinct visual treatment within the broader system.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "sephora.com (observed February 2026)"
    - "Sephora social media channels"
    - "BETC Paris (agency partner)"
    - "'We Belong to Something Beautiful' campaign"
  subject_and_framing: >-
    Beauty close-ups and product hero shots. Campaign photography focuses
    on faces — diverse casting with emphasis on skin texture, colour, and
    product application. Product photography uses consistent white-background
    studio shots. Campaign imagery is warmer and more editorial — beauty
    portraits with professional lighting and styling. Compared to MAC
    (more fashion-editorial, more dramatic) or Ulta (more promotional,
    more everyday), Sephora's photography balances accessibility with
    prestige.
  casting_observed: >-
    Diverse across skin tone, age, gender expression, and beauty aesthetic.
    'We Belong to Something Beautiful' explicitly centres inclusivity.
    Sephora campaigns feature a wider range of beauty expressions than
    most prestige beauty retailers. No single celebrity face — the
    casting represents the Sephora customer (beauty-curious, diverse,
    self-expressing).
  lighting_and_colour: >-
    Beauty-standard lighting — diffused, flattering, designed to showcase
    product on skin. Highlights skin texture and product finish. Colour
    grading is warm-to-neutral. Product-specific colour accuracy is
    critical (lipstick reds, foundation matches). The lighting is more
    glamorous than natural — closer to beauty-editorial than documentary.
  post_production: >-
    Moderate retouching. Skin texture is visible but refined. Product
    colours must match actual product (colour accuracy is commerce-critical
    in beauty). The retouching philosophy has evolved toward 'real beauty'
    — less airbrushing than historical beauty-industry standards.
  visual_boundaries:
    stated_exclusions: >-
      Sephora avoids exclusionary beauty standards, single-tone casting,
      and imagery that suggests one definition of beauty. The 'We Belong
      to Something Beautiful' positioning explicitly rejects beauty
      industry homogeneity.
    observed_exceptions: >-
      Brand-partner campaigns within Sephora may use their own casting
      and beauty standards, which don't always align with Sephora's
      inclusivity positioning.
    genuine_absence: >-
      Based on sephora.com review: no aggressive airbrushing in Sephora-
      controlled imagery, no exclusionary casting, no competitor
      references, no value/discount-coded photography in brand contexts
      (sale graphics are separated from brand photography).

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Mucca Design (Matteo Bologna, CD) + Schriftlabor Vienna (2015-2016, type system)"
    - "The Flame mark S symbol (introduced 1995)"
    - "Black-and-white stripe pattern"
    - "sephora.com and Sephora stores (observed February 2026)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Clean, minimal icons for navigation and product categories. Black
    outline on white, consistent stroke weight. Category icons (skincare,
    makeup, fragrance, hair) use simple, recognisable silhouettes. The
    Flame mark itself functions as the primary icon.
  graphic_devices: >-
    The black-and-white stripe pattern — Sephora's most ownable visual
    device. It appears on shopping bags, tissue paper, packaging, and
    as a background pattern in marketing. The Flame mark S (1995) — a
    stylised flame/S that serves as the primary symbol. The Sephora
    custom type system (Mucca Design + Schriftlabor, 2015-2016) — 6
    families, 22 styles, one of the most comprehensive custom type
    investments in retail. Red (#E2001A) as an accent colour for emphasis,
    CTAs, and the Beauty Insider programme. Denim Blue (#136BEA) as a
    secondary accent for digital contexts.
  motion_language: >-
    Observed on sephora.com: smooth, functional transitions. Product
    carousels scroll, category pages load with gentle fade-ins. No
    distinctive motion signature. The motion language is commerce-
    functional rather than brand-expressive.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Sephora custom type system (Mucca Design / Matteo Bologna + Schriftlabor Vienna, 2015-2016)"
    - "Sephora Sans, Serif Text, Serif Display, Script Editor, Script Collection"
    - "sephora.com (observed February 2026)"
  signature_move: >-
    The Sephora custom type system (Mucca Design / Matteo Bologna, CD +
    Schriftlabor Vienna, 2015-2016) — 6 families, 22 styles: Sephora Sans,
    Serif Text, Serif Display, Script Editor, and Script Collection. This
    is one of the most comprehensive bespoke typographic investments in
    retail — a beauty-specific type system designed to handle everything
    from product labels to campaign headlines to editorial content. The
    range from sans-serif to serif to script gives Sephora typographic
    flexibility that most competitors lack (MAC uses Helvetica-derived
    type; Ulta uses standard retail type). The Script variants provide
    a handwritten, personal register for beauty-education content and
    personal recommendations.
  what_would_look_wrong: >-
    A standard retail sans-serif (Helvetica, Roboto, Open Sans) replacing
    the bespoke system. A single typeface used for all contexts (the
    multi-family system is the signature). Heavy, bold display type in
    the style of fast-fashion brands. Any typeface that reads as cold
    or clinical rather than beauty-informed.
  case_convention: >-
    Uppercase for brand name 'SEPHORA' in logo contexts. Mixed case for
    product names and descriptions. Sentence case for editorial and
    educational content. Category navigation uses uppercase. The Script
    variants are inherently mixed case.
  display_vs_body: >-
    Display: Sephora Serif Display for campaign headlines — elegant, high-
    contrast, beauty-magazine quality. Sephora Sans at bold weights for
    promotional and commerce contexts. Body: Sephora Sans at regular
    weight for product descriptions and interface text. Sephora Serif
    Text for editorial long-form content. Script Editor and Script
    Collection for personal, handwritten touches — beauty tips, product
    recommendations, personalised elements.
  type_and_image: >-
    Type provides structure and navigation; product photography and beauty
    portraits dominate visually. In campaign contexts, Sephora Serif Display
    headlines complement beauty photography. On sephora.com, Sephora Sans
    serves a functional role — product names, prices, descriptions — while
    the visual hero is always the product or the face.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "sephora.com (observed February 2026)"
    - "Sephora app interface"
    - "Sephora store environments (2024 redesign)"
  signature_composition: >-
    Grid-based commerce with prestige-coded editorial sections. sephora.com
    uses a structured product grid with category navigation, promotional
    banners, and editorial content sections. The layout balances commerce
    functionality (find and buy products) with editorial aspiration
    (beauty trends, tutorials, new arrivals). Compared to Ulta (denser,
    more promotional, more sale-driven) or NET-A-PORTER Beauty (more
    editorial, more luxury-coded), Sephora balances commerce and content.
  density_and_whitespace: >-
    Moderate density. Product grids are standard e-commerce density.
    Campaign and editorial sections use more generous whitespace. The
    Beauty Insider section introduces additional visual density with
    tier-specific graphics and promotional content. The store environment
    uses moderate density — products are accessible but not cluttered.
  format_preferences: >-
    Product images are square or near-square. Campaign imagery uses wide
    landscape formats for hero banners. Beauty close-ups use portrait or
    square formats. The mobile-first app design favours vertical scrolling
    with full-width imagery.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "early-adopter"
  relationship_to_trends: >-
    Sephora adopts beauty and retail design trends early, driven by its
    role as a prestige beauty curator. The brand's visual system evolves
    to reflect current beauty culture while maintaining its black-and-
    white stripe foundation.
  examples:
    - trend: "Inclusive beauty representation"
      stance: "leader"
      evidence: >-
        'We Belong to Something Beautiful' (brand positioning) centres
        inclusivity in casting, shade ranges, and brand selection. The
        visual representation of diverse beauty is a brand commitment,
        not a trend response. Sephora was among the first prestige beauty
        retailers to sign the 15 Percent Pledge (2020).
      reasoning: >-
        Sephora has led inclusive beauty representation in prestige retail,
        influencing how beauty brands present themselves within the Sephora
        ecosystem.
    - trend: "AR/virtual try-on in beauty commerce"
      stance: "early-adopter"
      evidence: >-
        Sephora's Virtual Artist (launched 2016, powered by ModiFace,
        acquired by L'Oréal 2018) was one of the first AR try-on tools
        in prestige beauty retail. Virtual try-on is now integrated across
        product pages and the app.
      reasoning: >-
        Early investment in AR try-on established Sephora as a technology-
        forward beauty retailer and influenced competitor adoption.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    The black-and-white stripe. The Flame mark. The Sephora custom type
    system. The prestige-coded, beauty-focused visual register. The
    inclusive casting commitment.
  what_bends: >-
    Brand partners bring their own visual identities into Sephora's
    ecosystem — each brand's product page, in-store display, and
    promotional materials reflect the brand's own design language within
    Sephora's framework. Sephora Collection (own brand) adapts its visual
    identity per product category. Seasonal campaigns shift colour
    emphasis and photography tone.
  notable_examples: >-
    Sephora at Kohl's (2021-present): adapted Sephora's visual identity
    into Kohl's retail environment — maintaining the stripe pattern,
    black fixtures, and Flame mark within a department-store context.
    Sephora Favorites (curated product sets): create their own visual
    identities per theme while maintaining the Sephora black-and-white
    framework. Sephora x brand exclusives: brands like Rare Beauty, Fenty
    Beauty, and Sol de Janeiro create Sephora-specific visual treatments
    that blend both identities.
