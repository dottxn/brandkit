industry_norms_it_breaks: "The transparent cube logo with the serif 'N'—a single gesture showing structure (the grid), openness (you can see through it), and humanity (serif letterform in otherwise sans-serif system). | Notion's refusal to use color. Most SaaS tools use color as a brand crutch. Notion uses color as a distraction tax and won't pay it. This is a form of brand courage most companies don't have. | \"Does this feature enable or disable the user's ability to shape their own system? Will it add cognitive load or remove it?\""
