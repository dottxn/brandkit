summary: "Soul of Impossible Foods. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  Sizzling meat on a grill at a backyard barbecue. warm, meaty, unapologetic, defiant of expectation. The smoke curls up, the char forms, the juice runs. and it came from plants. This brand refuses the apologetic energy of plant-based food; instead, it leans into the sensory confidence of meat preparation. You're not making a ethical choice; you're eating what tastes better. The brand feels like permission to enjoy delicious food without guilt, without compromise, without compromise on flavor. Impossible Foods tastes like the future while tasting like Saturday dinner at your neighbor's house.
core_belief: >-
  Plant-based meat doesn't need to apologize for being plants; if it tastes like meat and behaves like meat, meatiness is achieved. Impossible Foods rejects the entire ethical framing that plant-based protein markets have inherited. It's not "better for the planet" as primary positioning; it's "tastes like meat, costs less, and happens to be better for everything else." The brand separates meat experience from meat source. Meatiness is a sensory fact, not an ethical category.
creative_tension:
  - >-
    Science credibility vs. meat-eater accessibility: Impossible's proprietary heme technology is genuinely novel food science. creating the molecular conditions for actual meat behavior (bleeding, browning, protein structure). But explaining heme at food science level alienates the target audience. Meat-eaters don't want a biochemistry lecture; they want assurance that this tastes like meat. The tension requires speaking in butcher language while delivering laboratory innovation. "Plant-based" becomes almost invisible in marketing; the focus is meat preparation and sensory experience. The science backs the promise, but the marketing speaks the target's language.
  - >-
    Provocative positioning vs. mainstream adoption: Impossible's "solving the meat problem with more meat" explicitly challenges both traditional environmentalists (who want veganism) and traditional meat industry (who see plant-based as threat). This provocation generates noise and media attention, but it also risks alienating the mainstream middle who just want good food without argument. The brand must stay bold enough to generate category-defining conversation while becoming mainstream enough to achieve scale. Too soft, and it loses identity; too hard, and it never reaches average dinner tables.
decision_filter: >-
  Would a barbecue enthusiast buy this? Does this claim feel honest or performative? The brand asks whether every design and messaging choice serves meat-eaters first. If something prioritizes environmental claims or ethical signaling, it fails the test. The decision filter is: would this appeal to someone who loves meat and doesn't care about sustainability, or is it sneaking in wellness messaging that contradicts brand positioning?
signature_move: >-
  Butcher-shop-inspired red packaging with custom Sans Meat typeface. flared strokes referencing hand-painted meat counter signs and vintage butcher shop aesthetic. The red isn't corporate branding red; it's meat-counter red, the color of displayed cuts. The typeface is bold without being modern, referencing analog signage rather than digital design. Every packaging element echoes actual butcher shop visual language: cut diagrams, weight labeling, color gradients from raw to cooked. This is the visual equivalent of saying: "We're in the meat category, competing for the same mindshare, serving the same ritual." It's positioning by aesthetic immersion, not clever marketing language.
what_would_break_it: >-
  Wellness language or health claims that center environmental impact or ethical eating. Plant-forward messaging that emphasizes sustainability rather than taste. Design that looks trendy rather than butcher-shop authentic. Apologetic tone toward plant-source that reads as contradiction. Adopting the aesthetic of wellness brands (pastels, modern sans-serif, lifestyle photography). Shifting to vocabulary like "sustainable protein" or "ethical eating." Using lifestyle imagery showing salads or wellness culture. Incorporating environmental claims into primary packaging. Moving to a minimal, contemporary design that obscures the butcher shop lineage. Adopting influences from the vegan food movement's aesthetic language. Any visual or tonal choice that centers plant-based identity over meat-eating experience.
