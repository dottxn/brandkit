studios:
- name: Turner Duckworth
  type: branding
  url: https://turnerduckworth.com/
  relationship: Developed the 'Archery' identity system that repositions the Golden
    Arches as a compositional device. Global brand architecture and visual system
    design.
  project_url: https://turnerduckworth.com/work/mcdonalds
- name: Pearlfisher
  type: branding
  url: https://pearlfisher.com/
  relationship: Redesigned global packaging system (February 2021) with vector character
    illustrations replacing photographic packaging. Created graphic system for product
    differentiation.
- name: Dalton Maag
  type: type-foundry
  url: https://www.daltonmaag.com/
  relationship: Designed Speedee custom typeface (2018) specifically for McDonald's
    headline and UI applications.
- name: Wieden+Kennedy New York
  type: creative-direction
  url: https://www.wknewyork.com/
  relationship: Lead creative agency for campaign work including cultural moment activations,
    celebrity meal partnerships, and brand communications.
