composition_logic: >-
  <cite index="21-20,21-21,21-22,21-23">All of this is built on the foundation of color, typography, voice & tone, illustration, and our brand attributes. This is to say that things further from our front door, like live-action commercials or varying illustration styles, can flex away from our core identity and change frequently. Things inside the house should be true to the foundation and remain recognizable over time. This approach helps orient our audience at all times. so that they know they're hanging out at Oscar's house.</cite>
