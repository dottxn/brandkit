# ── Data
feels_like: The moment you stop being trapped by circumstance and start being enabled by capability
core_belief: >-
  Real estate's function (moving your life forward) matters infinitely more than its rituals (staging, touring, negotiating)
creative_tension:
  - "Technology-driven efficiency paired with deeply human (neighborly) tone and approach"
  - "Disrupting an industry while maintaining trustworthiness (the antithesis of \"disruption as brand)"
decision_filter: "Does it remove friction or just add speed? Opendoor obsesses over removed friction"
signature_move: >-
  Primary blue (#1C85E8) as the trust color applied consistently, supported by terra cotta accent for warmth
what_would_break_it: >-
  Adding trendy design movements (neumorphism, glassmorphism) or adopting the cold efficiency aesthetic of pure fintech would destroy the "neighborly" positioning
