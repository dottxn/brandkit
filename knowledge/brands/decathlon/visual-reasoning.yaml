summary: Visual reasoning for Decathlon. Why the design choices work.

# ── Data
type_logic: >-
  Decathlon Sans is bespoke because it needed to feel playful without being childish, technical without being cold. The typeface's grotesque foundation (geometric, straightforward) supports the performance positioning, while generous letterforms and open counters create warmth. This combination makes Decathlon feel both trustworthy and fun simultaneously
colour_logic: >-
  Decathlon Blue (#0082C3) is neither corporate blue nor sky blue. it's active, energetic, specific. The palette rejects warm colors; cool colors signal modernity and sport technology. White (#FFFFFF) and black (#000000) provide clarity. Color hierarchy is democratic. no color dominates; all colors speak equally
composition_philosophy: >-
  L'Orbit's tilt appears everywhere. headlines tilt, image angles echo the orbit principle, white space flows along the tilted axis. This creates visual motion and joy without decoration. Diverse body representation is compositionally equal (no hierarchy by body type). Grid structures echo the orbit's rotation, creating rhythm and movement throughout layouts
what_would_break_it: >-
  Removing the tilt, centering elite athletes exclusively, professional-only aesthetic, cool blue dominance without warmth, or design that signals exclusivity instead of invitation
