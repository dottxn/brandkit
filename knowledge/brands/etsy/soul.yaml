summary: "Soul of Etsy. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  Waking into a light-filled studio at dawn, when creative work feels like prayer rather than labor. The amber glow on half-finished objects, the scent of materials and honest process, the sudden awareness that every person in this marketplace carries the weight of their own vision. Etsy feels like standing in a room full of people who chose difficulty over convenience—makers who could have turned their talent into a factory but refused. It's not the objects themselves; it's the fingerprint of choice embedded in every stitch, glaze, and hand-bound page.
core_belief: >-
  The market's greatest failure is treating human creativity as fungible. Every decision a maker makes—which yarn, which color, which technique—is an expression of their irreplaceable taste. To erase that in pursuit of efficiency is to destroy the thing itself.
creative_tension:
  - >-
    Celebrating maker authenticity while operating infrastructure at billion-dollar scale. Every addition to Etsy's system (search, recommendations, payments) risks reducing sellers from visionaries to vendors. The tension is irresolvable—growth demands efficiency, but maker culture demands friction. Etsy's identity survives only by choosing friction over optimization at every turn.
  - >-
    The paradox of "precious things at accessible prices." Etsy positioned itself against luxury (no gatekeeping) and against fast fashion (no disposability), but this means sellers cannibalizes each other on price. Etsy's real proposition isn't "affordable luxury"—it's "permission to value your work." That's a harder sell and requires constant reinforcement.
decision_filter: >-
  Does this amplify the maker's voice or muffle it? Does this celebrate difficulty or erase it? When choosing between efficiency and authenticity, does Etsy sacrifice the soul of the platform for growth metrics? The brand survives when the answer is visibly "no."
signature_move: >-
  The seller's name positioned larger than the product photograph—sometimes bolder, sometimes even more central. This inverts every e-commerce convention where the product is god. On Etsy, the maker IS the product. The inverse hierarchy is structural rebellion against retail logic.
what_would_break_it: >-
  Applying the design language of luxury retail (Helvetica, perfect lighting, styling) would instantly destroy Etsy's core value. The moment the brand looks "professional" in the traditional sense—polished, sterile, optimized—it has surrendered the thing that makes it matter. Etsy's design must always feel slightly rough, like it was made by someone learning, not someone who already knows all the answers.
