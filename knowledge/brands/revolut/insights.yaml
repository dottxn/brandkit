# ── Data
learned_insights:
  - >-
    Fintech brands positioned as anti-establishment still need design confidence to win trust—Revolut's geometric precision suggests "we've thought this through," not "we're fast and loose"
  - >-
    Custom typography (Aeonik Pro) matters most in categories like fintech where security and authority are communicated through design
  - >-
    The 2024 refresh from gradient to gradient shows Revolut prioritizing coherence over trend-following—the gradients had to be refined, not removed
  - >-
    3D coin graphics serve dual purpose: functional (they show different currencies/products) and emotional (they suggest value and physicality in digital context)
  - >-
    "Never Settle" as core value only works when demonstrated through constant visual and strategic refinement
what_nobody_copies: >-
  The architectural decision to occupy third space (between traditional banks and disruptive challengers) and design for that position rather than fighting incumbents or joining the chaos
