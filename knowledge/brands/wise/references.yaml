      honesty." The naked bodies were not gratuitous; they were metaphor. Franco's
      direction made the metaphor work visually and culturally, generating 27M+
      impressions through earned media (viral sharing). For Wise, this campaign
      established that fintech could use radical imagery and audience engagement
      techniques normally reserved for social activism. It positioned Wise not
      just as a product but as a philosophical position.
    creative_lineage: >-
      Franco's work descends from provocative advertising traditions (Diesel's
      shock campaigns, Benetton's controversial imagery) combined with
      contemporary social media virality understanding. His influence on Wise
      is part of a broader trend: fintech marketing moving from "efficient"
      (minimize cost per acquisition) to "cultural" (generate audience
      conversation and brand narrative). Franco's campaign proved that financial
      services could use avant-garde creative techniques without losing credibility.

# ── Publications & Intellectual Tradition ────

publications:
  - title: "Going Everywhere: How Wise Designed for Global Scale"
    authors:
      - "Cameron Worboys"
    date: published
    publication_type: "Design article"
    significance: >-
      Worboys documents how Wise's design system operationalizes global-scale
      design decisions. The article explains the philosophy underlying the
      "Going Everywhere" design system—treating consistency and localization
      not as opposing forces but as simultaneous requirements. This article
      represents Wise's willingness to share its design thinking publicly,
      positioning design as intellectual property rather than protecting it as
      trade secret. The article's approach (explaining the why, not just the
      how) reflects a broader "open design thinking" movement visible in
      companies like Stripe, Figma, and Framer that publish their design
      philosophy and process.
    intellectual_lineage: >-
      This article belongs to the "design systems documentation" tradition
      descended from Brad Frost's "Atomic Design" (2013) and contemporary
      design system writing by Nathan Curtis, Jina Bolton, and others. Worboys's
      contribution is specific: showing how to maintain brand philosophical
      coherence across global teams. The article's title ("Going Everywhere")
      echoes Wise's mission statement and suggests that design systems exist
      in service of brand mission, not as operational infrastructure that exists
      separate from brand purpose.

  - title: "Design System Awards 2023: Best Adoption"
    authors:
      - "Zeroheight"
    date: 2023
    publication_type: "Industry recognition"
    significance: >-
      Recognizes Ness Grixti's work at Wise for achieving exceptional design
      system adoption across a global organization. This award signals that Wise
      has solved a difficult challenge: making teams across 80+ countries use the
      design system consistently while understanding the philosophy behind it.
      The award's focus on "adoption" (not design beauty, not completeness)
      suggests that Wise's design system success depends not on having the
      "perfect" system but on creating organizational culture around design
      consistency. This represents a shift in how the design industry measures
      system success: from artifact (is the Figma file beautiful?) to impact
      (do teams understand and use it?).
    intellectual_lineage: >-
      This award represents the design systems maturation movement (2020s) where
      success is measured by adoption and organizational impact, not by design
      excellence alone. The award acknowledges that Grixti solved a cultural
      and organizational problem, not just a design problem. This lineage
      descends from contemporary leadership writing on design systems governance,
      design change management, and organizational design thinking.

