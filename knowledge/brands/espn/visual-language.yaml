  Visual language for ESPN. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-espn-red"
      touchpoints:
        - "ESPN broadcast graphics and on-screen identity"
        - "espn.com homepage and digital platforms"
        - "ESPN app"
        - "ESPN social media channels"
        - "ESPN SportsCenter and studio shows"
      description: >-
        ESPN Red (#E52534) dominant. the colour that has identified
        sports broadcasting for four decades. The ESPN wordmark uses a
        custom typeface inspired by ITC Machine Bold and 'Stop' (Aldo
        Novarese, 1971). heavy, italic, unmistakable. Chin Wang (VP
        Design, Creative Systems & Strategy) oversees the visual system
        with a team of 50+ designers, animators, and artists. The
        signature 12-degree italic slant runs through the entire brand
        system. creating a forward-leaning, action-coded visual
        language. Emmy-winning broadcast graphics (multiple wins across
        sports packages) set the production standard for sports media.
        Compared to Fox Sports (blue, more aggressive, more graphics-
        heavy) or CBS Sports (blue, more traditional, more conservative),
        ESPN's visual language carries the most cultural weight. the
        red wordmark IS sports television.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red-dominant,
        italic-angled, broadcast-graphics-driven register.

    - name: "sport-specific"
      touchpoints:
        - "ESPN NFL broadcasts and graphics packages"
        - "ESPN NBA coverage"
        - "ESPN College Football and Basketball"
        - "ESPN MLB, MLS, and other sport-specific packages"
      description: >-
        Each sport receives its own visual package. custom graphics,
        colour palettes, and motion treatments. The NBA rebrand (October
        2022) introduced an iridescent chrome aesthetic. The College
        Football rebrand (2025) uses a shield logo. These sport-specific
        packages allow ESPN to honour each sport's visual culture while
        maintaining the ESPN identity through the red wordmark and italic
        angle. Sport-specific graphics teams produce hundreds of on-screen
        elements per season. score bugs, lower thirds, transitions,
        statistical graphics, and promotional animations.
      differs_from_default_by: >-
        Sport-specific colour palettes and graphic treatments layer on
        top of the ESPN base. The 12-degree italic angle and the red
        wordmark persist, but the surrounding visual language adapts to
        each sport's culture and audience expectations.

    - name: "espn-digital-streaming"
      touchpoints:
        - "ESPN+ streaming platform"
        - "ESPN app editorial and scores"
        - "ESPN Fantasy sports"
        - "espn.com editorial content"
      description: >-
        More information-dense, more data-driven. ESPN's digital platforms
        prioritise scores, statistics, and editorial content. ESPN+
        (Trollbäck+Company, 2021 visual identity) uses a darker register
        with the ESPN Red as accent. The Fantasy Sports visual language
        introduces gamification elements. leaderboards, player cards,
        achievement badges. ESPN's digital visual language must balance
        real-time data (scores updating during games) with editorial
        content (analysis, opinion, features) and streaming video.
      differs_from_default_by: >-
        Higher information density. Data visualisation becomes primary
        visual content. The broadcast-graphics polish gives way to
        functional, fast-updating digital interfaces. ESPN Red appears
        as accent rather than dominant colour.

    - name: "espn-bet"
      touchpoints:
        - "ESPN BET platform (launched November 2023)"
        - "ESPN BET marketing and advertising"
        - "ESPN BET in-app experience"
      description: >-
        Mint green and navy blue. a deliberate visual departure from
        ESPN Red to distinguish the betting product from the editorial
        and broadcast brand. ESPN BET (launched November 2023 in
        partnership with Penn Entertainment) uses a distinct colour
        palette that signals 'wagering' without contaminating the core
        ESPN sports-journalism identity. The separation is strategic
        betting and editorial must be visually distinct for regulatory
        and credibility reasons.
      differs_from_default_by: >-
        Mint green and navy replace ESPN Red. The visual register signals
        entertainment-betting rather than sports journalism. The visual
        separation protects the editorial brand's credibility.

  notes: >-
    ESPN's visual system is one of the most complex in media. operating
    across live broadcast, digital editorial, streaming, betting, and
    sport-specific packages simultaneously. The 50+ person creative team
    produces thousands of visual assets per week during peak sports
    seasons. The 12-degree italic slant provides the connective thread
    across all visual modes.

# ── Photography ──────────────────────────────────

photography:
  confidence: "high"
  primary_sources:
    - "espn.com (observed February 2026)"
    - "ESPN broadcast and editorial photography"
    - "ESPN The Magazine (discontinued 2019, set the standard)"
  subject_and_framing: >-
    Action sports photography. the definitive visual language of American
    sports media. ESPN's photography captures athletic moments with
    cinematic quality: dramatic angles, peak-action freezes, emotional
    intensity. The ESPN Body Issue (2009-2019, ESPN The Magazine) set a
    benchmark for athlete portraiture. artistic, body-positive, celebrated.
    Editorial photography for features and profiles uses dramatic lighting
    and compositional sophistication above typical sports-media standards.
    Compared to Sports Illustrated (similar quality, more classic/archival
    register) or Bleacher Report (more digital-native, more meme-coded),
    ESPN's photography carries the most broadcast-production-value.
  casting_observed: >-
    Athletes across all major sports. the casting is determined by sports
    coverage. ESPN editorial features photograph athletes with the care
    and art direction typically reserved for fashion or entertainment
    publications. The photography celebrates athletic bodies and
    competitive emotion across genders, sports, and competition levels.
  lighting_and_colour: >-
    Action photography uses arena and stadium lighting. often dramatic,
    high-contrast environments. Editorial and portrait photography uses
    controlled studio lighting with ESPN's signature dramatic quality.
    ESPN Red appears in environmental elements (studio sets, graphic
    overlays) rather than influencing the photographic palette.
  post_production: >-
    Action photography: standard sports-media processing. sharpness,
    contrast, colour accuracy for broadcast and digital. Editorial
    photography: more artistic post-production, especially for features
    and profiles. the ESPN Body Issue set a particularly high bar for
    post-production craft.
  visual_boundaries:
    stated_exclusions: >-
      ESPN editorial photography maintains separation from betting and
      gambling imagery. The brand avoids non-sports contexts. the
      photography is exclusively sports-coded.
    observed_exceptions: >-
      ESPN's entertainment-adjacent content (30 for 30 documentaries,
      E:60 features) adopts more documentary-cinema photography
      conventions.
    genuine_absence: >-
      Based on espn.com review: no lifestyle photography, no product
      photography, no celebrity photography outside of sports contexts.
      The photography is exclusively sports-coded.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "ESPN broadcast graphics (Emmy-winning, 50+ person team)"
    - "12-degree italic slant system"
    - "Sport-specific graphics packages"
    - "espn.com (observed February 2026)"
  uses_illustration: true
  illustration_style: >-
    Broadcast-graphics-coded. ESPN's illustration is primarily motion
    graphics. animated statistical displays, player comparisons,
    tactical breakdowns, and promotional sequences. These are produced
    at broadcast-production quality by the 50+ person creative team.
    Sport-specific packages (NBA iridescent chrome, College Football
    shield system) create distinct graphic worlds for each sport.
    Compared to Fox Sports (more aggressive, more 3D-rendered) or NBC
    Sports (cleaner, more restrained), ESPN's graphics are the most
    production-intensive and the most culturally referenced.
  illustration_role: >-
    Statistical visualisation, promotional animation, and sport-specific
    identity. On-screen graphics communicate game information (scores,
    statistics, player data) with the visual sophistication of designed
    infographics rather than simple data displays. Promotional graphics
    build excitement for upcoming broadcasts.
  icon_style: >-
    The BottomLine ticker. ESPN's scrolling scores bar along the bottom
    of the screen is both an icon and a graphic device. Score bugs (the
    on-screen scoreboard during live events) follow sport-specific
    conventions while maintaining the ESPN italic angle. Sport-specific
    logos and icons create distinct visual vocabularies for each league
    and competition covered.
  graphic_devices: >-
    The ESPN wordmark. the heavy, italic, custom letterforms are
    instantly recognisable. The 12-degree italic slant. this angle runs
    through the entire brand system, from the wordmark to graphic
    elements, creating a forward-leaning, action-coded visual language.
    The BottomLine. the scrolling scores ticker that ESPN pioneered
    and that has become standard in sports broadcasting. Score bugs
    the on-screen scoreboards that ESPN designs with sport-specific
    treatments. The ESPN Red (#E52534). the colour that identifies
    sports broadcasting globally.
  motion_language: >-
    Broadcast-production-quality motion graphics. transitions, reveals,
    statistical animations, and promotional sequences. Each sport package
    has its own motion language: the NBA package uses fluid, iridescent
    transitions; college football uses bolder, more impact-coded motion.
    SportsCenter uses signature transition effects between segments. The
    motion language is high-energy, precision-timed, and production-
    valued. it sets the standard for sports-broadcast graphics globally.
    Emmy-winning quality across multiple sports packages.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Custom ESPN wordmark (inspired by ITC Machine Bold + 'Stop' by Aldo Novarese, 1971)"
    - "12-degree italic slant"
    - "A2 Beckett (headlines), Klavika (body)"
    - "espn.com (observed February 2026)"
  signature_move: >-
    The ESPN wordmark uses a custom typeface inspired by ITC Machine Bold
    and 'Stop' (Aldo Novarese, 1971). heavy, italic, mechanically
    precise. The 12-degree italic slant is the typographic signature
    it suggests forward motion, urgency, and athletic dynamism. This
    angle has been consistent since the early ESPN identity and creates
    a kinetic quality that no other sports brand matches. A2 Beckett
    serves as the headline typeface for editorial and marketing contexts.
    Klavika provides a more neutral sans-serif for body text and digital
    interfaces. Compared to Fox Sports (more aggressive, sharper angles)
    or CBS Sports (more traditional, less kinetic), ESPN's typography
    is the most dynamically italic.
  what_would_look_wrong: >-
    Upright, static type in brand contexts (the 12-degree italic is the
    identity). A lightweight, delicate typeface (ESPN's typography is
    heavy and bold). A serif typeface in broadcast graphics (sports
    broadcasting is sans-serif territory). Rounded, friendly type
    (contradicts the competitive, high-energy register).
  case_convention: >-
    'ESPN' is always uppercase. Show names use title case ('SportsCenter,'
    'Monday Night Football'). Ticker and score-bug text is uppercase for
    scanability at broadcast speed. Editorial headlines use title case.
    Body text uses sentence case. The uppercase convention reinforces
    authority and urgency.
  display_vs_body: >-
    Display: The custom ESPN wordmark and A2 Beckett for headlines
    heavy, italic, high-impact. Broadcast graphics use bespoke display
    type treatments for each sport package. Body: Klavika for digital
    editorial text, scores, and interface content. The display-to-body
    contrast is dramatic. headlines are bold and kinetic, body text
    is functional and readable.
  type_and_image: >-
    Type and sports photography work in constant dialogue on espn.com and
    in broadcast graphics. Headlines overlay athlete photography. Score
    graphics float above live game footage. The BottomLine ticker
    occupies a permanent typographic layer across the broadcast image.
    Typography in sports broadcasting must be instantly readable at
    television viewing distance. legibility under time pressure is the
    primary design constraint.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "espn.com (observed February 2026)"
    - "ESPN broadcast graphics layout"
    - "ESPN app"
  signature_composition: >-
    Information-dense, multi-panel. espn.com uses a dense editorial
    layout. top stories, scores, multiple content modules, editorial
    features, and advertising coexisting on a single page. The broadcast
    layout layers multiple information streams simultaneously. live game
    footage, score bug, BottomLine ticker, promotional graphics, and
    occasional split-screen analysis. The ESPN app prioritises scores
    and personalised content. Compared to The Athletic (cleaner, more
    editorial-coded) or Bleacher Report (more social-media-coded),
    ESPN's layout is the most information-dense in sports media.
  density_and_whitespace: >-
    High density across all platforms. espn.com packs significant content
    into every screen. Broadcast graphics layer multiple information
    streams. The ESPN app balances scores, editorial, and streaming
    content. Marketing materials use slightly more whitespace but remain
    energetic and content-rich. The high density reflects the always-on
    nature of sports. there is always a score, a headline, a game to
    highlight.
  format_preferences: >-
    16:9 landscape for broadcast. The broadcast frame accommodates the
    BottomLine ticker, score bug, and game footage simultaneously. Digital
    adapts to responsive formats. The ESPN app is mobile-first for scores
    and alerts.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    ESPN defines visual trends in sports broadcasting. The network's
    graphics packages, broadcast innovations, and digital experiences
    set the standard that competitors follow.
  examples:
    - trend: "Sports-broadcast graphics production"
      stance: "leader"
      evidence: >-
        ESPN's Emmy-winning broadcast graphics set the production standard
        for sports television globally. The NBA iridescent chrome package
        (October 2022), the College Football shield system (2025), and
        the consistently evolving SportsCenter graphics demonstrate
        ongoing creative leadership.
      reasoning: >-
        ESPN's scale (50+ person creative team), budget, and broadcast
        reach mean its graphics innovations become the reference point
        for the entire sports-broadcasting industry.
    - trend: "Sports betting visual integration"
      stance: "early-adopter"
      evidence: >-
        ESPN BET (November 2023) required solving a novel visual design
        challenge. how to create a betting brand identity that is
        clearly ESPN while being visually distinct from the editorial
        brand. The mint green and navy palette solution provides clear
        visual separation.
      reasoning: >-
        As sports betting legalises across the US, ESPN's approach to
        visually separating betting from editorial will likely influence
        how other sports media brands handle the same challenge.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    ESPN Red (#E52534). The custom italic wordmark. The 12-degree italic
    slant. The BottomLine concept. The broadcast-graphics production
    standard.
  what_bends: >-
    Sport-specific packages create distinct visual worlds within the ESPN
    framework. ESPN+ has its own streaming-platform visual identity.
    ESPN BET uses an entirely different colour palette. Tim O'Shaughnessy
    (Creative Director, College Sports) and sport-specific creative leads
    develop packages that honour each sport's visual culture. ESPN
    Deportes adapts the visual language for Spanish-language markets.
  notable_examples: >-
    ESPN x NBA (October 2022): the iridescent chrome graphics package
    introduced a premium, contemporary aesthetic to basketball broadcasting
   demonstrating ESPN's ability to evolve sport-specific graphics
    while maintaining brand coherence. ESPN x College Football (2025
    rebrand): the shield logo and updated graphics system modernised
    college football's visual identity within the ESPN ecosystem. ESPN x
    Trollbäck+Company (ESPN+, 2021): the design studio created the
    streaming platform's visual identity. bridging the broadcast brand
    with digital-streaming conventions. ESPN x Penn Entertainment (ESPN
    BET, 2023): the partnership required creating a visually distinct
    betting brand within the ESPN identity ecosystem.
