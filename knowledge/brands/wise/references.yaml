      where consistency and flexibility coexist. This is consistent with Wise's
      design system philosophy.

  # ── Film & Campaign Direction ──
  - name: "Nick Franco"
    role: "Director, 1185 Films"
    url: "https://www.1185films.com/"
    background: >-
      Commercial director specializing in provocative, high-concept campaigns.
