summary: "Anti-patterns for Patagonia. What this brand would never do."

# ── Data
visual:
  - pattern: "Bright, optimistic photography of pristine wilderness"
    reasoning: >-
      Patagonia's documentary aesthetic shows real wilderness conditions and real athletes in hard environments. Bright, sanitized nature photography is greenwashing. The aesthetic must acknowledge that nature is not a playground; it's something to be respected and protected.
  - pattern: "Modern geometric sans-serifs like DIN or Helvetica Neue"
    reasoning: >-
      These suggest efficiency and contemporary design. Patagonia's use of Belwe Bold (an historical serif) signals that the brand's values predate modern environmentalism — this is about the earth itself, not today's trend. A modern sans would seem like the brand is fashionizing activism.
  - pattern: Vibrant color saturation or trend colors like coral or emerald
    reasoning: >-
      Patagonia's muted palette (#000000, #4A90E2, #8E44AD) represents the actual colors of the landscape: stone, sky, shadow. Bright synthetic colors would suggest fashion first, environmental protection second. The restraint is the statement.
  - pattern: Lifestyle photography with models in urban or polished settings
    reasoning: >-
      Patagonia's imagery must be documentary — real athletes in real mountains, real climbers on real rock, real surfers in real waves. Any artifice or styling would undermine the brand's core claim to authenticity.
strategic:
  - pattern: Corporate social responsibility as marketing
    reasoning: >-
      Patagonia would never create a sustainability report designed to deflect criticism. The brand publishes impact data and admits where it falls short. This radical transparency is the opposite of CSR theater.
  - pattern: Sponsoring only winning teams or safe causes
    reasoning: >-
      Patagonia's environmental work is often political and controversial. The brand has sued the Trump administration over public lands. This willingness to take fights other brands would avoid is core to credibility.
  - pattern: Encouraging growth through aggressive sales tactics
    reasoning: >-
      "Don't Buy This Jacket" is not a marketing gimmick; it's a philosophical position. The company would rather have 100 customers who use their products for 20 years than 1000 customers who treat them as disposable. This requires saying no to growth.
  - pattern: Separating the brand message from operational reality
    reasoning: >-
      Patagonia's supply chain transparency is not separate from the brand message — it IS the brand message. If the supply chain were exploitative, the brand would collapse. There's no gap between what Patagonia says and what it does because it can't afford one.
tonal:
  - pattern: Corporate optimism or aspirational positivity
    reasoning: >-
      Patagonia's tone is frank and sometimes dark. "We're in business to save our home planet" is not a happy thought; it's an urgent one. The brand doesn't offer comfort; it offers clarity about what's at stake. Softening this would dilute the urgency.
  - pattern: Preaching or moral superiority
    reasoning: >-
      While the brand is activist, it doesn't position customers as bad if they don't buy Patagonia. The tone is: here's what we're doing, here's the impact, decide for yourself. There's a trust in human judgment rather than a demand for moral alignment.
  - pattern: "Irony or self-aware humor about activism"
    reasoning: >-
      Patagonia is serious about its mission. A winking tone that acknowledges "environmentalism is trendy" would undermine the brand's credibility. The tone must be earnest, even if it sounds old-fashioned.
  - pattern: Corporate speak or bureaucratic language
    reasoning: >-
      Patagonia's communication is direct and written for humans, not boardrooms. "Earth is now our only shareholder" is not how corporations usually communicate. The language is activist, not corporate.
cultural:
  - pattern: Aligning with mainstream environmental movements that avoid structural criticism
    reasoning: >-
      Patagonia's activism isn't about climate awareness (which is now mainstream); it's about systems change. The brand has criticized capitalism's growth imperative. This radical positioning would be diluted by co-opting mainstream environmental messaging.
  - pattern: Competing primarily on fashion or performance innovation
    reasoning: >-
      While Patagonia makes excellent technical gear, the brand doesn't lead on fashion or cutting-edge materials. Innovation in durability and repairability matters; trend-setting fashion leadership doesn't. This restraint is cultural.
  - pattern: "Decoupling the brand from Yvon Chouinard's personal activism"
    reasoning: >-
      The founder's beliefs are inseparable from the brand. Patagonia without Chouinard's commitment to environmental activism becomes a luxury outdoor brand like any other. The leadership and values must remain cohesive.
  - pattern: Pursuing growth in markets that conflict with environmental protection
    reasoning: >-
      Patagonia won't manufacture in regions with loose environmental standards just to reduce costs. It won't expand in markets where supply chain transparency is impossible. Growth is strategic, not automatic.
