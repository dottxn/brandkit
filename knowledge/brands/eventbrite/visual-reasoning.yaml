summary: Visual reasoning for Eventbrite. Why the design choices work.

# ── Data
type_logic: >-
  Founders Grotesk is a geometric grotesque designed by Keutekel B.V., chosen for its bold presence and contemporary feel without being trendy or generic. Geometric fonts (like Futura) suggest precision and modernity. Grotesques specifically have personality—they're not trying to be invisible or neutral. Bold weight is non-negotiable for Eventbrite; thin or regular weights would whisper when the brand needs to shout. The typeface's geometry suggests systematic thinking, but its grotesque character prevents it from sounding cold or corporate. This is exactly what Eventbrite needs: structured enough to be readable at scale and on mobile, but bold enough to feel like it's speaking directly to you with confidence and authority about the events that matter to your community. Heavy weight also creates visual density that mirrors event chaos.
colour_logic: >-
  Brite Orange (#FF8000) as primary is warm and social—it suggests gathering, warmth, human connection. Paired with neon gradients (combinations of orange, pink, yellow, and other highlighter hues), the system creates visual intensity that matches event energy. The gradients are non-static; they move and evolve, suggesting motion toward connection. High contrast between neon colors and dark photographic backgrounds ensures that type and graphic elements remain legible while the vibrancy doesn't overwhelm content. The Energy Auras system creates neon texture without looking chaotic or amateur—this is sophisticated because it's difficult to execute cleanly. Most brands either avoid neon (corporate restraint) or embrace it fully (amateur appearance). Eventbrite's systematic application of neon makes it feel intentional and design-literate.
composition_philosophy: >-
  The Path monogram acts as connective tissue, appearing as organizing element throughout the system. Layering is essential—photography, gradients, illustrations, and typography coexist in compositions that feel dense with information without being illegible. This mix-and-match approach allows flexibility across different event categories (art gallery openings look different from music festivals, which look different from sports events, yet all feel unified). Asymmetrical, organic composition (the opposite of rigid grids) respects the chaotic energy of actual community gathering. Whitewhite space is minimal—the system prioritizes abundance of visual signals over breathing room. This density is not laziness; it's strategic. The visual abundance mirrors the emotional experience of discovering new events and finding your community.
what_would_break_it: >-
  Adopting minimalist design (like Ticketmaster or other utilities) would reposition Eventbrite as efficient tool rather than community hub. Events aren't about efficiency; they're about joy and connection. Using traditional corporate sans-serifs instead of bold Founders Grotesk would soften the presence and weaken the tone. Reducing the neon gradient system to flat, muted colors would immediately position Eventbrite as bland corporate platform rather than cultural hub. Using refined photography or minimalist layouts (like Netflix or Apple) would contradict the category energy. Events are chaotic, not serene. Adopting serif typefaces or delicate, thin fonts would undermine the confidence and directness required to shout recommendations about your community. Implementing transparent algorithms or reducing the impression of human curation would make discovery feel systematic rather than taste-based. Attempting to look "professional" through corporate design restraint would destroy the positioning that Eventbrite understands youth culture and community from inside, not from outside observing.
