summary: Deep insights for CVS Pharmacy. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    Healthcare brands succeed when they make complexity feel simple—CVS Health's integration of pharmacy, insurance, and clinics is powerful because the brand makes connected care feel seamless
  - >-
    Red is powerful in healthcare because it signals both care (red heart) and alertness (warning)—CVS Red combines both, suggesting "we pay attention to your health"
  - >-
    Scale (9,600 locations) only creates brand advantage when marketing emphasizes accessibility not dominance—"everywhere you are" not "we're everywhere"
  - >-
    Healthcare trust is earned through reliability and consistency, not through emotional manipulation—CVS's clean design signals competence, the heart signals care
  - >-
    Personal health data protection messaging works when built into design language (simplicity, clarity) rather than added as disclaimers
what_nobody_copies: >-
  The integration of clinical authority with genuine neighborhood presence, making institutional health scale feel intimate
