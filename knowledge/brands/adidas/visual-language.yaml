summary: >-
  Visual language for adidas. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "originals-heritage"
      touchpoints:
        - "adidas.com/originals"
        - "adidas Originals social media (@adidasoriginals)"
        - "Heritage campaign photography (Samba, Gazelle, Superstar)"
        - "Originals retail spaces and pop-up stores"
      description: >-
        Trefoil logo (1972, three-leaf design representing the continents),
        black-and-white primary palette with archival colour accents. The
        Samba/Gazelle revival drove 19% YoY growth in Q4 2024 — the
        visual language leverages this heritage momentum. Chadwick Tyler
        shot the Originals heritage campaign (September 2023) featuring
        Jenna Ortega, Zinedine Zidane, and Pusha T — a mix of cultural
        icons across music, sport, and entertainment. The visual register
        is street-level, documentary-inflected, and culturally credible.
        Compared to Nike (more cinematic, more athlete-hero) or New
        Balance (more preppy, more Americana), adidas Originals is the
        most subcultural and the most European-street-coded.
      differs_from_default_by: >-
        This is the baseline cultural register. The Trefoil logo, heritage
        silhouettes, and street-cultural casting define the brand's most
        visible mode.

    - name: "performance-sport"
      touchpoints:
        - "adidas.com/sport (running, football, training)"
        - "adidas Performance campaigns"
        - "Professional athlete endorsement marketing"
        - "Event-specific branding (FIFA, Olympics, marathons)"
      description: >-
        Three Slanted Bars logo (Performance division, mountain/challenge
        symbolism). Photography is action-focused — athletes in motion,
        sweat-visible, environment-authentic. The visual register is
        technical, dynamic, and performance-credible. Jess Kohl
        photographed major performance campaigns (2024–2025). Alasdhair
        Willis (Chief Creative Officer, appointed 2022) oversees creative
        direction across divisions. Compared to Nike (more emotional,
        more narrative-driven) or Under Armour (more aggressive, more
        intensity-coded), adidas Performance is the most technically
        grounded and the most sport-science-forward.
      differs_from_default_by: >-
        More technical, more action-focused, more athlete-hero than
        the Originals heritage register. The Three Slanted Bars replace
        the Trefoil. The colour palette expands for sport-specific
        contexts. The photography shifts from street-cultural to
        stadium-athletic.

    - name: "collaboration-fashion"
      touchpoints:
        - "Wales Bonner x adidas campaigns (Chris Rhodes photographer)"
        - "Bad Bunny x adidas (5-year partnership)"
        - "Y-3 (Yohji Yamamoto collaboration, ongoing since 2003)"
        - "adidas x Gucci FW22"
        - "Pharrell Williams collaborations"
      description: >-
        Partner-led visual language — each collaborator brings their own
        art direction. Wales Bonner collaborations (Chris Rhodes
        photographer) use a warm, Afro-Caribbean-inflected editorial
        register with soft natural lighting and cultural specificity.
        Bad Bunny collaborations use a Latin pop, high-saturation,
        maximalist register. Y-3 (since 2003, Yohji Yamamoto) uses
        a monochrome, avant-garde, fashion-forward register. The visual
        identity shifts dramatically per partner — adidas provides the
        product platform and Three Stripes, the collaborator provides
        the creative vision. This is the most visually diverse mode
        in the brand system.
      differs_from_default_by: >-
        Collaborator's visual language dominates over adidas brand
        standards. The Three Stripes persist as a recognition element
        but everything else — photography style, colour palette, casting,
        set design — adapts to the partner's aesthetic world.

    - name: "post-yeezy-pivot"
      touchpoints:
        - "adidas brand marketing post-October 2022"
        - "The Farm (Brooklyn creative studio) output"
        - "OG L.A. Creative Division (established 2024)"
      description: >-
        Following the termination of the Yeezy partnership (October 2022),
        adidas pivoted to a heritage-first strategy — amplifying the
        Samba, Gazelle, and Superstar silhouettes. The visual language
        shifted from Yeezy's earth-toned, fashion-forward minimalism to
        a broader, more colourful, more culturally diverse register.
        The Farm (Brooklyn creative studio) and the OG L.A. Creative
        Division (established 2024) drive creative output. The brand's
        visual recovery strategy relied on existing heritage equity
        rather than individual creative partnership — a democratic
        visual language vs. the singular Yeezy aesthetic.
      differs_from_default_by: >-
        Strategic context rather than distinct visual register. The
        visual language is essentially the Originals heritage mode
        amplified — broader casting, more colour, more silhouette
        diversity, less dependence on any single creative partnership.

  notes: >-
    adidas operates a Three Stripes / Trefoil / Three Bars multi-logo
    architecture. The brand name is officially lowercase ('adidas') per
    brand guidelines. Alasdhair Willis (CCO, 2022) oversees creative
    direction. The post-Yeezy pivot has recentred the visual language on
    heritage silhouettes and cultural collaboration.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "Chadwick Tyler — adidas Originals heritage campaign (September 2023)"
    - "Jess Kohl — adidas Performance campaigns (2024–2025)"
    - "Chris Rhodes — Wales Bonner x adidas campaigns"
    - "adidas.com observed February 2026"
  subject_and_framing: >-
    Originals: street-level, environmental, documentary-inflected. Talent
    photographed in urban settings — basketball courts, street corners,
    recording studios, cultural venues. The product is worn in context,
    never isolated on a pedestal. Chadwick Tyler's Originals campaign
    used a mix of studio portraiture and environmental shots with a
    filmic, analogue quality. Performance: athletic action, close-up
    product-on-body, motion-captured sport moments. Jess Kohl's work
    brings a more cinematic, emotionally resonant quality to sports
    photography. Compared to Nike (more epic, more story-driven) or
    Puma (more playful, more pop-culture), adidas photography is the
    most documentary-authentic.
  casting_observed: >-
    Originals heritage campaign (September 2023, Chadwick Tyler): Jenna
    Ortega (actor), Zinedine Zidane (football legend), Pusha T (rapper) —
    a deliberate cross-cultural mix. Wales Bonner collaborations: models
    reflecting Afro-Caribbean cultural specificity. Bad Bunny partnership:
    Latin cultural casting. Performance: professional athletes in their
    sport context. The casting strategy is culturally specific per campaign
    rather than demographically broad — each campaign targets a cultural
    community rather than a mass audience.
  lighting_and_colour: >-
    Originals: natural and available light dominant, warm tones, visible
    grain and film quality. The black-and-white-with-accent approach
    uses the Three Stripes' black/white identity as a base with product
    colour as the accent. Performance: brighter, more saturated, more
    dynamic lighting — stadium and outdoor environments. Wales Bonner:
    warm, golden, soft natural light (Chris Rhodes). Compared to Nike
    (more dramatic, more high-contrast) or New Balance (more cool-toned,
    more editorial), adidas is the warmest and most documentary-natural.
  post_production: >-
    Originals: intentionally analogue — visible grain, slight desaturation,
    warm colour cast. The aesthetic references 1990s–2000s street
    photography and music photography. Performance: cleaner, higher
    contrast, more digitally precise. Collaboration campaigns follow the
    collaborator's retouching sensibility.
  visual_boundaries:
    stated_exclusions: >-
      adidas positions against luxury-exclusive visual codes — the brand
      is culturally democratic, not aspirationally exclusive. No imagery
      that undermines the sport-authentic or street-credible positioning.
    observed_exceptions: >-
      Y-3 (Yohji Yamamoto) operates in a high-fashion register that
      contradicts the street-democratic baseline. Gucci x adidas FW22
      placed adidas in an explicitly luxury context.
    genuine_absence: >-
      Based on adidas.com review: no Yeezy imagery or references post-
      October 2022, no pricing prominence in campaign imagery, no
      competitive references in brand photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Three Stripes (1949, acquired from Karhu for two bottles of whiskey and €1,600)"
    - "Trefoil logo (1972, Originals/heritage)"
    - "Three Slanted Bars / Badge of Sport (Performance)"
    - "Golden Dream yellow (#EDE734, accent colour)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Not a traditional icon system. The three logos function as the primary
    graphic marks: Three Stripes (the brand's most fundamental recognition
    element, acquired from Finnish brand Karhu in 1949), Trefoil (1972,
    three-leaf representing the continents, used for Originals/heritage),
    and Three Slanted Bars / Badge of Sport (Performance division,
    mountain/challenge symbolism). Each logo signals a different brand
    context rather than functioning as a navigational icon system.
  graphic_devices: >-
    The Three Stripes — three parallel lines appearing on every adidas
    shoe, apparel side seam, and marketing material. Acquired from
    Finnish brand Karhu in 1949 for two bottles of whiskey and €1,600.
    The most legally defended graphic device in sportswear — adidas has
    litigated the Three Stripes trademark extensively. The stripes
    function simultaneously as brand mark, design element, and product
    feature. Golden Dream yellow (#EDE734) — an accent colour appearing
    in select campaigns and on heritage products, providing warmth against
    the black-white base palette. The Trefoil and Badge of Sport logos
    serve as division identifiers rather than decorative devices.
  motion_language: >-
    Campaign videos follow the photography register — Originals videos
    are street-paced, music-driven, culturally embedded. Performance
    videos use athletic slow-motion and technical product reveals.
    adidas.com uses functional, smooth transitions. No singular motion
    signature comparable to Nike's 'Just Do It' end-frame or the
    Three Stripes appearing in motion.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Adineue PRO (MCKL Type, Jeremy Mickel expansion 2015, Joancarles Casasín original)"
    - "adidas brand guidelines (lowercase 'adidas')"
    - "adidas.com observed February 2026"
  signature_move: >-
    Adineue PRO — a custom typeface originally designed by Joancarles
    Casasín, expanded by Jeremy Mickel (MCKL Type) in 2015. A geometric
    sans-serif with a mechanical, sportswear-precision quality. The brand
    name 'adidas' is officially lowercase in all contexts — a deliberate
    choice that reads as democratic and accessible rather than corporate
    and authoritative. The lowercase convention is the single most
    distinctive typographic decision: where Nike uses uppercase 'NIKE' and
    Puma uses uppercase 'PUMA', adidas insists on lowercase — anti-
    hierarchical, street-level, and culturally confident.
  what_would_look_wrong: >-
    'ADIDAS' in uppercase (violates the brand's most fundamental
    typographic rule). A serif typeface (contradicts the sport-technical
    positioning). A humanist or handwritten typeface (too warm, too
    personal for the geometric brand system). Thin or ultralight weights
    in brand contexts (too delicate for the sportswear register).
  case_convention: >-
    Lowercase 'adidas' in all contexts — brand name, headlines, body
    copy references. Product names in their established forms (Samba,
    Gazelle, Superstar, Ultraboost). Sub-brand names follow their own
    conventions (Y-3, YEEZY was uppercase). The lowercase rule is
    absolute and non-negotiable.
  display_vs_body: >-
    Adineue PRO serves both display and body roles through weight
    variation. Display: bold weights for headlines, campaign titles.
    Body: regular weights for product descriptions, web content.
    The geometric precision remains consistent across scales — the
    mechanical quality is the constant, weight provides hierarchy.
  type_and_image: >-
    Type is integrated with imagery rather than subordinate to it.
    Campaign layouts often feature bold typographic statements alongside
    or overlapping photography — more integrated than Nike (where
    photography dominates) but less type-forward than Oatly (where
    type IS the visual). The Three Stripes frequently appear as a
    graphic element bridging type and image.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "adidas.com (observed February 2026)"
    - "adidas Originals campaign layouts"
    - "adidas retail environmental design"
  signature_composition: >-
    Grid-based with high visual impact. adidas.com uses a modular tile
    system — large hero images alternate with product grids. Campaign
    pages feature full-bleed photography with bold typographic overlays.
    Product pages use clean grids with consistent backgrounds (white
    for product shots, environmental for lifestyle). The layout is
    denser and more content-rich than Nike.com (sparser, more story-
    driven) but cleaner than Puma (busier, more promotional). The
    Originals section uses a more editorial, magazine-style layout
    with cultural content mixed into product presentation.
  density_and_whitespace: >-
    High density — adidas packs more products and content per page
    than most competitors. The visual impact comes from the size of
    hero imagery and the boldness of typography rather than from
    whitespace. Compared to Nike (more breathing room, more editorial
    whitespace) or New Balance (more curated, fewer items), adidas
    prioritises discovery and product volume.
  format_preferences: >-
    Landscape for hero campaign photography. Square for product tiles
    and social media. Portrait for mobile-first campaign content.
    Video content uses 16:9 and 9:16 (mobile-optimised) in equal
    measure. The Originals section favours more cinematic aspect
    ratios.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    adidas selectively participates in trends while anchoring its visual
    identity in heritage assets (Samba, Gazelle, Trefoil). The brand's
    strongest visual positions come from reactivating its own archive
    rather than following external trends.
  examples:
    - trend: "Heritage sneaker revival (Samba, Gazelle resurgence 2023–2025)"
      stance: "leader"
      evidence: >-
        The Samba and Gazelle silhouettes drove 19% YoY growth in Q4 2024.
        adidas reactivated heritage designs with updated colourways and
        cultural collaborations (Wales Bonner x Samba, Bad Bunny x Gazelle)
        — the visual language positioned 1970s–1980s silhouettes as
        contemporary fashion through casting and cultural context rather
        than product redesign.
      reasoning: >-
        After the Yeezy partnership termination, adidas pivoted to heritage
        silhouettes that it fully owned. The visual strategy was to let
        cultural collaborators (Wales Bonner, Bad Bunny, Pharrell) provide
        contemporary relevance while the product provided heritage
        credibility. This archive-forward approach became the dominant
        sneaker trend of 2024–2025.
    - trend: "Luxury-sportswear crossover"
      stance: "early-adopter"
      evidence: >-
        Gucci x adidas FW22 — GG monogram merged with Three Stripes,
        Alessandro Michele creative direction. Wales Bonner x adidas
        elevated the Samba into a fashion-week staple. Y-3 (Yohji
        Yamamoto, since 2003) was one of the earliest luxury-sportswear
        collaborations in the industry.
      reasoning: >-
        Y-3 pioneered the luxury-sportswear space two decades before it
        became mainstream. The Wales Bonner and Gucci collaborations built
        on this foundation, making adidas the sportswear brand with the
        deepest luxury collaboration history.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    The Three Stripes. The Trefoil (Originals) or Badge of Sport
    (Performance) logos. Lowercase 'adidas' convention. The product
    silhouette's Three Stripes side panel. Product quality and sport-
    authentic construction standards.
  what_bends: >-
    Everything else. Colour palette adapts completely to the collaborator.
    Photography style follows the partner's creative vision. Campaign
    art direction is collaborator-led. Materials and finishes can depart
    from standard sportswear. The Three Stripes themselves can be
    reimagined in the collaborator's visual language (gold GG-monogram
    stripes for Gucci, tonal stripes for Wales Bonner).
  notable_examples: >-
    Wales Bonner x adidas (ongoing): warm, Afro-Caribbean editorial
    register by Chris Rhodes — elevated the Samba into fashion-week
    footwear. Gucci x adidas FW22: luxury-sportswear mashup merging
    GG monogram with Three Stripes — Glen Luchford photography. Bad
    Bunny x adidas (5-year partnership, 2022–): Latin pop maximalism
    across Campus, Gazelle, Response CL silhouettes. Y-3 (Yohji
    Yamamoto, since 2003): monochrome avant-garde fashion-sport —
    the longest-running luxury collaboration in sportswear. Pharrell
    Williams x adidas (Humanrace): colourful, inclusive, craft-focused.
