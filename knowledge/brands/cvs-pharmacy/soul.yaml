summary: "Soul of CVS Pharmacy. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  Someone who genuinely cares about your wellbeing, standing beside you in the moment when health matters most
core_belief: "Healthcare is a relationship, not a transaction; presence matters as much as competence"
creative_tension:
  - "Scale and efficiency (9,600+ locations) vs. intimate, personal health care moments"
  - Pharmacist expertise (clinical authority) vs. neighborhood trusted friend (approachability)
decision_filter: >-
  Does this make customers feel seen as individuals or processed as transactions? Does this signal "we're here to help you get better" or "here's your prescription"?
signature_move: >-
  The red heart as flexible design element. not decorative but structural, appearing in unexpected places to signal care in practical moments
what_would_break_it: >-
  Removing the heart from primary visual language, using clinical/sterile aesthetics, making the brand feel corporate instead of caring, or treating health as transactional
