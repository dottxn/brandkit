summary: Deep insights for Strava. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    Athlete communities succeed when effort is celebrated over outcome—Strava positioned the act of moving your body as the victory, not the podium finish.
  - >-
    International Orange (#FC5200) was chosen because it matches the exact color athletes see on themselves during effort—the bib, the jersey, the visible proof of commitment.
  - >-
    Clean geometric sans-serif (Inter) was correct because it has no personality of its own—the athlete's data becomes the personality, not the interface.
  - >-
    Boathouse (custom typeface) in branding reinforces the sport-centric positioning—not a generic tech font but a bespoke design tool built for athletic context.
  - >-
    Avoiding leaderboard-centric design language was counterintuitive but correct—the brand's strength is in segments and personal records, not global rankings.
what_nobody_copies: >-
  The unwillingness to weaponize gamification despite having perfect infrastructure for it. Strava could have created addiction loops; instead they emphasize community and personal improvement.
