visual:
  - pattern: "Clinical healthcare beige-and-navy palette"
    reasoning: "Cool, minimal modern palette with specific color coding per condition"
  - pattern: Aspirational lifestyle imagery
    reasoning: Documentary photography showing actual people in actual contexts
  - pattern: Medical photography suggesting clinical settings
    reasoning: Home imagery suggesting comfort and privacy
  - pattern: Vague abstract health concepts
    reasoning: "Specific, direct condition naming and treatment documentation"
strategic:
  - pattern: Separating different conditions into different brands
    reasoning: Unified Ro platform treating all conditions equally
  - pattern: "Positioning as \"telemedicine convenience\""
    reasoning: "Positioning as \"healthcare dignity and access\""
