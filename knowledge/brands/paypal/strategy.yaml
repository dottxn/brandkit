# ── Data
purpose: >-
  We believe that now is the time to democratize financial services so that managing and moving money is a right for all citizens, not just the affluent.
mission: >-
  To democratize financial services to ensure that everyone, regardless of background or economic standing, has access to affordable, convenient, and secure products and services to take control of their financial lives.
vision: >-
  To be the commerce platform powering the global economy, creating a world where everyone has access to simple, secure, and convenient financial services.
values:
  - Inclusion
  - Innovation
  - Collaboration
  - Wellness
