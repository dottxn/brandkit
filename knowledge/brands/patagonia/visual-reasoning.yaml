summary: Visual reasoning for Patagonia. Why the design choices work.

# ── Data
type_logic: >-
  Belwe Bold is a historical serif typeface created in 1912, long before contemporary branding. Its use signals that Patagonia's values are not invented for marketing; they're rooted in a longer, deeper tradition of craftsmanship and integrity. The serif form conveys editorial authority and seriousness. Bold weight creates gravitas without aggression. Unlike modern sans-serifs that signal contemporary efficiency, Belwe feels permanent and deliberate. The typeface announces: we've been thinking about this for a century, and we're not changing course because of trend cycles. This is the opposite of fashion-forward typography; it's principle-forward typography.
colour_logic: >-
  The muted palette of #000000 (stone), #4A90E2 (sky), and #8E44AD (shadow/sunset) is pulled directly from Patagonia's landscape. These are the actual colors of the Andes, the Atacama Desert, and the Southern Ocean. This is not an abstract color system; it's a geographical one. The restraint means that when color is used, it carries meaning. blue represents the sky worth protecting, purple represents both the earth and the radical nature of the brand's activism. The use of earth tones and muted saturation rejects the bright, synthetic colors of fashion and trend-driven design.
composition_philosophy: >-
  Patagonia's layouts use generous white space and often minimal typography, letting the image (usually a landscape or athlete) dominate. The Mount Fitz Roy logo may be the only graphical element on a page. This compositional restraint reflects the brand's philosophy: the earth speaks for itself, our job is to get out of the way. The grid is clean and minimal because complexity is seen as a luxury we can't afford when the stakes are this high. Minimal composition is honest composition.
what_would_break_it: >-
  A sleek, contemporary sans-serif like Montserrat or Circular would immediately signal that Patagonia has become a fashion brand. These typefaces are designed to feel current, approachable, and trend-friendly. They would position Patagonia as a lifestyle brand competing on style rather than substance. The brand's power comes from the conviction that it predates fashion and will outlast it. A modern, fashionable typeface would suggest the brand is following design trends, which would undermine the core belief that values matter more than aesthetics. The historical Belwe Bold typeface is the entire argument condensed into typography: we're serious, we're permanent, and we were serious before environmentalism became fashionable.
