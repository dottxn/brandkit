studios:
  - name: "Forsman & Bodenfors"
    type: "branding"
    url: "https://www.fbagency.com/"
    project_url: "https://www.forsman.com/work/oatly/"
    relationship: "Swedish agency that executed the May 2015 'Wow! No Cow!' rebrand. Completely redesigned Oatly's visual identity from clinical health-food to hand-crafted, conversational brand."

  - name: "Department of Mind Control"
    type: "creative-direction"
    url: "https://oatly.com/"
    relationship: "Oatly's in-house creative team (51 people) producing campaign work, marketing, and brand communications. Named with deliberate irony by John Schoolcraft."

people:
  - name: "John Schoolcraft"
    role: "Chief Creative Officer, Oatly"
    url: "https://oatly.com/"
    context: "Joined Oatly (2012) as creative director. Led the May 2015 rebrand with Forsman & Bodenfors. Established Oatly's conversational tone and hand-crafted visual identity. Named John Rounded typeface after himself."

  - name: "Lars Elfman"
    role: "Art Director and Hand-Lettering Artist, Forsman & Bodenfors"
    url: "https://www.fbagency.com/"
    context: "Created all hand-drawn typography and illustrations for the 2015 Oatly rebrand. Established Oatly's signature handmade aesthetic."

  - name: "Caroline Laudon"
    role: "Type Designer"
    url: "https://www.fbagency.com/"
    context: "Designed John Rounded (named after Schoolcraft) and Toni Grotesk (named after CEO Toni Petersson) custom typefaces for Oatly."

  - name: "Toni Petersson"
    role: "CEO and Co-founder, Oatly"
    url: "https://oatly.com/"
    context: "Toni Grotesk typeface named after CEO. Shaped Oatly's anti-corporate brand philosophy and positioning."

