# ── Data
learned_insights:
  - >-
    Udemy's competitive advantage isn't course quality (which varies widely) but access psychology—making learning feel like a right, not a luxury reserved for the educated.
  - >-
    The purple (#A435F0) works because it's not a corporate color—it's the color of thinking deeply, of neural activation, of the moment before understanding crystallizes.
  - >-
    Diverse, authentic instructor photography was essential because student confidence depends on seeing people like themselves as teachers, not just traditional credentialed authorities.
  - >-
    The brand's strength comes from transparent course pricing and ratings—hiding costs or manufacturing credibility would destroy the trust required in marketplace education.
  - >-
    Avoiding elite university aesthetics (dark academia, minimalism, serifs) was a strategic choice to make the platform feel accessible to the self-taught and the credential-skeptical.
what_nobody_copies: >-
  The willingness to serve low-priced courses alongside full-price courses with equal visual prominence. Competitors filter by price and create aspirational tiers; Udemy's design treats all learning as equal.
