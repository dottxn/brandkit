summary: "Soul of Monzo. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A friend who works in finance but actually gives a damn about your financial anxiety—they translate jargon into human language and make it feel like you're not alone in being confused by money.
core_belief: >-
  Financial clarity is an act of kindness, and money's complexity is not inevitable but a choice made by industries that profit from your confusion.
creative_tension:
  - >-
    Monzo positions itself as a "magical" fintech (the Magician archetype), yet its actual strength is radical transparency—exposing the mechanisms that create the illusion of complexity, eliminating magic through clarity.
  - >-
    The brand aims to serve "everyone" (Everyman archetype) with cutting-edge technology (luxury positioning), creating an internal conflict between exclusivity and universality.
decision_filter: >-
  When faced with a fork, Monzo asks "Does this demystify money or does it hide behind jargon?" and always chooses demystification, even when obfuscation would increase perceived value.
signature_move: >-
  The hot coral card edge (#FF5C59) functioning as a threading device throughout the brand system—it appears on the physical card, in layouts, in app interactions, creating a visual continuity that transforms a color from branding into a lived experience. The coral isn't decorative; it's tactile proof of the brand.
what_would_break_it: >-
  Adopting a cold, authoritative, blue-dominated visual system (like traditional banks). Blue signals "trust through size and history"; coral signals "trust through warmth and closeness." Any shift toward institutional color language would undermine the brand's entire positioning as a friend, not a corporation.
