summary: Deep insights for Eventbrite. Learned wisdom and what nobody copies.

# ── Data
learned_insights:
  - >-
    Discovery requires visual joy and density. boring event browse feels like a spreadsheet, not an adventure. Minimal design signals corporate efficiency. Event discovery should feel overwhelming with possibility, slightly chaotic, full of conflicting visual signals that mirror the chaotic energy of actual community. This is counter to minimalist design conventions but structurally aligned with the category.
  - >-
    Neon gradients work for Gen Z not because they're trendy, but because they feel honest about being artificial. Gen Z rejects the false naturalism of "authentic" design. Neon is technology made visible. it's artificial and they appreciate that honesty. The gradients also suggest motion and energy, which is energetically opposite to static design systems.
  - >-
    "Find what moves you" works because it operates simultaneously on literal and emotional levels. discovering events that move you (literally, activities) and being moved emotionally (finding community). This double meaning is possible because the language bridges the mechanical (event discovery) and the emotional (community formation) without privileging one over the other.
  - >-
    Community platforms need eccentric personalities baked into voice, not smoothed into consensus. Eventbrite's voice should sound slightly weird, surprising, culturally aware in unpredictable ways. Consensus-seeking tone would position the brand as neutral utility. Eccentricity signals "we're in this together, we're part of the culture we're serving."
  - >-
    Founders Grotesk in bold reads as confidence. not careful design-school thinking, but unapologetically present and loud. Grotesque typefaces feel modern without being trendy, geometric but not sterile. Bold weight makes the presence undeniable. In a crowded attention landscape, whispered tone loses. Eventbrite's typeface should shout.
what_nobody_copies: >-
  The Energy Auras system. neon gradients applied systematically across visual elements, creating vibrancy without appearing chaotic. Most brands either commit fully to maximalism (Spotify's color diversity) or minimize (Netflix's darkness). Eventbrite found a middle path: systematic neon that feels organic, mathematical gradients that feel emotional. This is difficult to execute and almost impossible to fake in a way that doesn't look amateurish.
