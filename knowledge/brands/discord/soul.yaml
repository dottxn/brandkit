summary: "Soul of Discord. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A server room where humans accidentally built a home. chaos organized just enough to function, loud and real and never trying to be polished
core_belief: >-
  Belonging happens at the edges of intentional design, in the gaps where people are allowed to be authentically themselves without corporate surveillance
creative_tension:
  - >-
    Sophisticated modular design systems creating the *infrastructure* for complete chaos and authentic self-expression within those boundaries
  - >-
    Massive global platform (Discord is enterprise-scale) that maintains the intimacy and unfiltered voice of an inside joke between close friends
decision_filter: >-
  Does this give users more agency to create their own spaces and express themselves authentically? If it requires them to perform or conform, it fails.
signature_move: >-
  Clyde, the mascot, rendered not as a brand ambassador but as a *mood ring*. expressions shift to match community energy, never teaching, only reflecting
what_would_break_it: >-
  Polishing the brand voice into professional friendliness (like Slack). The moment Discord sounds like it's from a corporate communications handbook instead of from a real person at 11pm in a voice chat, the core community leaves. Authenticity is the actual product.
