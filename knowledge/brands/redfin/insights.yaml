# ── Data
learned_insights:
  - >-
    Trust in real estate markets doesn't come from looking premium—it comes from making data visible and understandable
  - >-
    Redfin's competitive edge (salaried agents aligned with customer interests) only matters if the brand communicates that agents work for you, not for commission
  - >-
    Color-coded property status indicators are functional and beautiful simultaneously—they serve clarity AND create visual hierarchy
  - >-
    Data-heavy interfaces need extreme typographic discipline to remain comprehensible—Redfin's sans-serif choices reflect this understanding
  - >-
    A real estate platform succeeds when it makes the process less theatrical, not more—transparency creates trust faster than aspiration
what_nobody_copies: >-
  The architectural decision to center the brand around transparency-through-information rather than around agent relationships or lifestyle dreaming
