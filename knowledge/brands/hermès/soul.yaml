summary: "Soul of Hermès. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The hand of a master craftsperson worn smooth from forty years of work. not flashy, but undeniable. Walking into a Hermès boutique feels like entering a temple where silence is louder than conversation; the objects speak through their presence, their weight, their refusal to explain themselves. It's the aesthetic opposite of attention-seeking: maximum confidence disguised as restraint. You feel the absence of noise as luxury. no logos screaming from every surface, no influencer partnerships desperate for validation. This is what power looks like when it no longer needs to perform.
core_belief: >-
  Mastery is expressed through restraint, not excess. The time invested in learning a craft is more valuable than the time saved through efficiency.
creative_tension:
  - >-
    Hermès is simultaneously one of the most exclusive luxury brands and one of the most emotionally accessible. The orange (#F37022) born from wartime material shortage becomes the signature. limitation breeds identity. Yet within that exclusivity lives an almost artisanal intimacy. The brand doesn't position itself above you; it positions itself beside the object, serving as its custodian rather than its owner. This tension between "I could never afford this" and "this person understands what I value" is where Hermès lives.
  - >-
    The brand champions slow production. handcrafted leather goods with waiting lists stretching years. while operating as a global powerhouse. The Evelyne bag takes 15 hours to construct by a single artisan who may spend their entire career on that single product category. This contradiction between scale and intimacy would break most brands, but Hermès has made scarcity and slowness into its core differentiator against the speed of fast fashion.
decision_filter: >-
  Would an artisan in the Hermès workshops of 1837 recognize this method? Would this object justify a customer keeping it for 50 years? Does this choice serve longevity or quarterly earnings? The filter is uncompromising. it asks whether each decision extends heritage rather than dilutes it.
signature_move: >-
  The horse-drawn carriage logo created by Robert Ledoux in the 1954, inspired by Alfred de Dreux's 19th-century painting, remains unmodified and unanimated. a historical artifact that refuses modernization. In an era where every brand constantly refreshes and updates, Hermès treats its logo like a museum piece. This signature is so restrained that competitors have tried to copy the strategy but failed, because copying requires understanding why stillness is powerful. The carriage represents craftsmanship frozen in time, a deliberate rejection of the evolution that every luxury competitor pursues.
what_would_break_it: >-
  A sans-serif typeface like Helvetica or Montserrat used for primary branding would immediately destroy Hermès' soul. The Memphis Bold serif feels handdrawn and artistic. it honors craft. Move to a sterile corporate sans-serif and the brand becomes indistinguishable from a financial services company. Equally fatal: logo proliferation across products (making the H-monogram as visible as the actual leather), trending design choices that feel dated by next season, or worse. explaining the craft in marketing copy rather than letting decades of patina speak for itself. The moment Hermès begins defensive explanation is the moment it stops being Hermès.
