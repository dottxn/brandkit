summary: "Soul of Eventbrite. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The electric moment in a concert venue two minutes before the show starts. the air is heavy with anticipation, you're surrounded by strangers who share your passion, the lights dim and something alive is about to happen. Eventbrite feels like being let in on a secret that everyone you want to know is attending. It's FOMO crystallized into positive action: not the anxiety of missing out, but the joy of finding your people. The neon colors feel honest about being artificial. Gen Z doesn't want the fake naturalism of traditional design; they want to feel the electricity of human connection. Eventbrite isn't a ticketing platform; it's proof that you're not alone in your interests, no matter how niche.
core_belief: >-
  Live experiences are how humans prove they're alive. The marketplace that enables gathering changes culture. Every event is an act of community formation. the economic transaction is almost incidental to the cultural value of people choosing to be in the same place.
creative_tension:
  - >-
    Transactional utility vs. emotional discovery. Eventbrite must function as efficient ticketing system while creating FOMO and desire for events users haven't found yet. The utilitarian (purchasing tickets) and the emotional (discovering your community) must coexist without contradiction. Most platforms optimize for transactions and sacrifice discovery; Eventbrite's tension is choosing discovery even when it complicates transactions.
  - >-
    Cultural curation vs. algorithmic scale. AI recommendations democratize discovery but risk homogenizing what gets discovered. Eventbrite must use algorithms powerful enough to surface micro-events and niche communities to the exact people who want them, without the algorithm flattening everything to popular-culture middle. This is technically sophisticated and strategically risky.
decision_filter: >-
  Does this celebrate the event creator's vision or optimize for conversion metrics? Is the experience about people connecting or tickets converting? Would an independent event organizer feel empowered or exploited? When the metrics conflict with creator empowerment, Eventbrite chooses the creator.
signature_move: >-
  The Path. a tripartite abstract monogram that moves and evolves, suggesting movement toward connection. The mark is flexible enough to animate, enough to remix, abstract enough that each viewer constructs their own meaning. This is design maturity: a symbol that doesn't need explanation but accumulates meaning through encounter.
what_would_break_it: >-
  Minimalist visual restraint would destroy Eventbrite's core positioning. The brand NEEDS visual exuberance to signal the energy of gathering and community. Design simplicity would betray the philosophy that live events are joyful, loud, and unafraid to be chaotic.
