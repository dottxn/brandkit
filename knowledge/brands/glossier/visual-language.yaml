summary: >-
  Visual language for Glossier. How Glossier actually operates visually —
  photography art direction, type treatment, channel behaviour, and how
  the brand flexes between product commerce and community intimacy.

# ── Visual Modes ─────────────────────────────────────────

visual_modes:
  primary:
    cluster: soft-minimal
    context: >-
      Glossier.com product pages, e-commerce, packaging inserts,
      brand guidelines, corporate communications
    description: >-
      Clean, airy, pink-accented. White backgrounds with the signature
      Glossier Pink as a warm thread. Products are central but never
      clinical — there is always a softness to the framing. Typography
      is lowercase, confident, unbothered. This is Glossier at its most
      polished and systematic.
  secondary:
    cluster: warm-humanist
    context: >-
      Instagram feed, community content, social campaigns, user
      stories, Into The Gloss editorial, in-store experiences
    description: >-
      Candid, textured, human. Photography feels like a friend's camera
      roll — close-up skin textures, product in actual use, real hands
      and faces. The pink recedes and human warmth fills the space.
      This is Glossier at its most authentic and participatory.
  contextual:
    - cluster: editorial-contemporary
      context: >-
        Major campaign launches, collaborations, seasonal collections,
        Glossier You fragrance, brand anniversary moments
      description: >-
        More editorial, more intentional. Photography has a fashion
        sensibility but stops short of glamour. Styling is more
        considered, compositions are tighter, and the brand takes more
        visual authority while still maintaining the soft, accessible
        foundation.

# ── Photography ──────────────────────────────────────────

photography:
  subject_focus: >-
    Skin, product, and the relationship between the two. The subject is
    almost always a person using or wearing the product, or the product
    itself in a casual context — on a bathroom shelf, in a hand, in a
    bag. Product-only shots are soft and approachable, never sterile.
  casting: >-
    Real skin is the casting brief. Diverse skin tones, visible texture,
    freckles, pores — skin that looks like skin, not a retouched surface.
    Age range skews young (18-30) but the unifying quality is confidence,
    not youth. No professional models in the traditional sense — everyone
    looks like someone you would know. The vibe is "your friend who just
    has great skin," not "beauty campaign."
  lighting: >-
    Natural, diffused, daylight-forward. Window light is the default.
    Never harsh, directional, or dramatic. The light source should feel
    like morning or early afternoon — warm, even, forgiving. Studio
    lighting when used is soft and wraps around the subject, mimicking
    natural conditions. Flash photography is reserved for community and
    social contexts where it reads as candid.
  post_production: >-
    Minimal retouching is a philosophical position, not just a style
    choice. Skin texture is preserved — pores, fine lines, unevenness
    are features. Colour grading is warm with lifted shadows, creating
    a gentle, approachable feel. No heavy contrast, no desaturation, no
    dramatic colour work. Product colour must be accurate because the
    customer is making a purchase decision.
  composition: >-
    Close crops — intimate distance between camera and subject. Macro
    shots of skin texture and product application. Generous negative
    space around product-only shots. Compositions feel casual and
    slightly off-centre, as if someone took the photo mid-conversation
    rather than posing for it. Environmental shots are minimal —
    bathrooms, vanities, pockets of everyday life.
  texture_and_finish: >-
    Soft, dewy, tactile. The photography should feel like the products
    themselves — smooth, slightly luminous, touchable. Matte finishes
    and flat photography would undermine the product promise. There is
    always a hint of glow or moisture in the frame.
  what_is_never_in_frame: >-
    Dramatic lighting. Heavily retouched skin. Studio glamour setups.
    High fashion styling. Excessive props or lifestyle staging. Men in
    suits. Corporate environments. Anything that says "aspirational" in
    the traditional beauty industry sense — the frame contains real life,
    not a performance of beauty.

# ── Illustration & Graphic Language ──────────────────────

graphic_language:
  uses_illustration: true
  illustration_style: >-
    Hand-drawn, naive, slightly imperfect. The G monogram is the
    template — gestural linework that feels personal and spontaneous.
    When illustration appears it is warm and sketchy, never polished
    or geometric. Sticker aesthetic — illustrations that feel like they
    belong on a laptop or phone case.
  illustration_role: >-
    Supporting and playful. Illustration appears in packaging details,
    sticker sheets included with orders, social content, and brand
    storytelling moments. It breaks the clean minimalism of the product
    system with moments of personality and warmth. The hand-drawn G is
    the most important illustration in the system.
  icon_style: >-
    Simple line icons, rounded, warm. Consistent with the brand's soft
    geometry. Icons are functional in the e-commerce context but always
    maintain the approachable character of the broader system.
  graphic_devices: >-
    The Glossier Pink (#F5DADF) as a colour field or accent. The G
    monogram as a stamp or watermark. Rounded corners on containers and
    UI elements. Soft drop shadows. The sticker — physical stickers
    shipped with product that extend the brand into the customer's
    personal space.
  motion_language: >-
    Gentle, smooth, unhurried. Transitions are soft fades and eases,
    not sharp cuts. Product reveals are slow and tactile. Scrolling is
    fluid. Nothing snaps or bounces aggressively. The motion language
    mirrors the brand's temperament — patient, warm, confident without
    urgency.

# ── Typography in Practice ───────────────────────────────

type_treatment:
  case_convention: >-
    Lowercase as philosophy. Headlines, product names, and campaign
    lines are set in lowercase. This is not laziness — it is a
    deliberate rejection of proclamation in favour of conversation.
    "boy brow" not "Boy Brow." The brand name itself is lowercase.
    Uppercase appears only in navigational and legal contexts where
    convention demands it.
  size_philosophy: >-
    Moderate to large for headlines, but never aggressive. The type
    does not shout. Size creates gentle emphasis rather than visual
    urgency. Product names are often set at body size or slightly
    larger — they are meant to be read, not seen from across a room.
  spacing_approach: >-
    Generous tracking on headlines gives type room to breathe,
    consistent with the overall spaciousness of the design system.
    Body text is set for comfortable reading. Whitespace around type
    is plentiful — text blocks never feel compressed or competing
    for space.
  hierarchy_pattern: >-
    Two main levels: a headline (Apercu Bold, lowercase) and supporting
    text (lighter weight or smaller size). The hierarchy is gentle —
    there is no dramatic jump between levels. Information is offered,
    not demanded. Product pages layer in a third level for details and
    ingredients, but the overall feel is conversational, not structured.
  type_and_image: >-
    Type sits alongside or below images, rarely overlapping. The
    photography and typography share space without competing. On
    editorial content, type may float over generous negative space in
    an image, but never obscures a face or product. The relationship
    is respectful and balanced.
  display_vs_body: >-
    Apercu Bold for display — geometric but warm, bold without being
    aggressive. Body text shifts to lighter weights of the same family
    or a neutral system sans. The display type carries the brand's
    personality; the body type is transparent and functional. Both
    maintain the lowercase convention.

# ── Layout & Composition ─────────────────────────────────

layout:
  grid_system: >-
    Clean, invisible grid. Product pages use standard e-commerce grids
    but with generous padding and breathing room. Editorial layouts are
    looser, with asymmetric placement that feels curated rather than
    designed. The grid is never visually apparent — the impression is
    of natural, effortless arrangement.
  density: >-
    Minimal to moderate. Product pages are spacious. Social and
    community content can be denser but still maintains breathing room.
    The brand never overloads — every layout feels like there was room
    for one more element but they chose restraint.
  whitespace_role: >-
    Breathing room, not luxury statement. Glossier's whitespace is warm
    and inviting, not cold and exclusionary. Where Chanel uses
    whitespace to create distance, Glossier uses it to create comfort.
    The space says "take your time" not "this is expensive."
  visual_hierarchy: >-
    Image-led. Photography is almost always the dominant element, with
    type and colour playing supporting roles. The pink accent guides
    the eye gently. Hierarchy is established through size and position
    rather than weight or colour contrast.
  format_preferences: >-
    Square for social and product. Vertical for mobile and stories.
    Wide formats for editorial and brand campaigns. Glossier favours
    product-on-white and product-in-use over complex lifestyle
    compositions.

# ── Channel Behaviour ────────────────────────────────────

channels:
  instagram:
    grid_strategy: >-
      The feed tells a story rather than forming a visual mosaic. Mix
      of product close-ups, skin textures, UGC reposts, and typographic
      moments in the brand pink. Consistency comes from the warm, soft
      colour palette and intimate crop style rather than rigid templates.
    content_types:
      - "product close-ups on pink or white"
      - "skin texture macro shots"
      - "UGC and community reposts"
      - "product-in-use candids"
      - "typographic posts in Glossier Pink"
      - "behind-the-scenes and team content"
    visual_rules: >-
      Always warm, always soft. Flash photography is acceptable for
      candid social content but never for product. UGC is celebrated
      and reposted with minimal curation — the community aesthetic is
      part of the brand. Stories are more playful and lo-fi than the
      feed.
  website:
    approach: >-
      Clean product commerce with editorial storytelling woven through.
      The website is primarily a shopping experience but it never feels
      transactional — product pages have the warmth of a recommendation
      from a friend. Into The Gloss editorial content bridges the gap
      between commerce and community.
    hero_treatment: >-
      Product hero images are soft, glowing, and intimate. Campaign
      heroes use real people photographed in the brand's signature
      natural light. Hero moments are inviting rather than aspirational
      — you want to be there, not just look at it.
  packaging:
    approach: >-
      The pink pouch is iconic — a reusable, recognisable object that
      becomes the customer's property. Packaging is minimal, playful,
      and designed to feel like a gift from a friend rather than a
      luxury unboxing experience.
    material_choices: >-
      The pink bubble-wrap pouch in Glossier Pink. Stickers included
      in every order. Clean white boxes with minimal typography.
      Recycled materials increasingly featured. The packaging is
      tactile and fun without being wasteful or overwrought.
  advertising:
    approach: >-
      Community-forward. Advertising uses real customers and UGC-style
      photography rather than traditional beauty campaign imagery. OOH
      is bold with pink colour fields and simple product shots. Digital
      advertising mirrors the social feed — warm, candid, intimate.
    format_preferences: >-
      Square and vertical for digital and social. Billboard and transit
      for OOH using bold pink fields. Video is short-form, casual, and
      focuses on application and texture rather than transformation
      narratives.
  editorial:
    approach: >-
      Into The Gloss is the editorial engine — long-form beauty content
      that reads like a smart magazine, not a brand blog. Photography
      is bathroom-vanity intimate. The editorial voice matches the
      brand's conversational, knowledgeable tone.
  retail:
    approach: >-
      Glossier flagship stores are pink-drenched immersive environments.
      Product is displayed for touch and play. The stores feel like
      walking into the Instagram feed — every surface is photographable.
      Staff are "editors" not salespeople. The experience is social,
      communal, and designed for discovery.

# ── Trend Posture ────────────────────────────────────────

trend_posture:
  overall: leader
  relationship_to_trends: >-
    Glossier helped define the current beauty aesthetic — the dewy look,
    the "less is more" approach, the UGC-driven visual identity. The
    brand does not chase trends because its visual system became the
    trend. It is cautious about adopting new aesthetics that would
    distance it from the community-driven foundation. When beauty trends
    swing toward maximalism or heavy makeup, Glossier doubles down on
    skin and subtlety.
  examples:
    - trend: "Clean girl aesthetic"
      stance: leader
      reasoning: >-
        Glossier essentially created this trend. The brand's visual
        language of minimal makeup, dewy skin, and effortless beauty
        became the template that TikTok named and codified years later.
    - trend: "Maximalist / bold colour makeup"
      stance: resister
      reasoning: >-
        Heavy colour application contradicts the "skin first" philosophy.
        Even Glossier's colour products (Cloud Paint, Lidstar) are
        designed for sheer, buildable application — the brand resists
        the visual language of dramatic transformation.
    - trend: "AI-generated beauty imagery"
      stance: resister
      reasoning: >-
        Glossier's entire visual identity depends on real skin, real
        texture, real imperfection. AI-generated beauty imagery would
        fundamentally undermine the authenticity that is the brand's
        core currency.

# ── Collaboration Rules ──────────────────────────────────

collaboration:
  flexibility: selective
  what_stays: >-
    The pink. The lowercase typography. The commitment to real skin and
    minimal retouching. The warmth. No collaboration makes Glossier look
    cold, corporate, or traditionally glamorous.
  what_bends: >-
    Photography style can shift toward more editorial or artistic
    contexts. The palette can expand beyond pink-black-white for limited
    edition collaborations. Layout can become more experimental for
    special projects. The brand is willing to play in someone else's
    aesthetic world as long as the warmth and accessibility translate.
  notable_examples: >-
    Glossier x Olivia Rodrigo: maintained the brand's visual warmth
    while introducing a slightly edgier, younger energy through purple
    accents and concert-adjacent imagery. The collaboration expanded
    the palette but preserved the intimate, candid photography style.
