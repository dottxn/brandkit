summary: Visual reasoning for Bose Corporation. Why the design choices work.

# ── Data
type_logic: >-
  The custom Bose typeface transforms the 30-degree italic into a complete typographic system. every letter carries the waveform angle, making type feel kinetic. This is radical because it prioritizes motion over readability, betting that customers will lean in rather than quickly scan. Bold weights (for confidence) and extended italic (for movement) work together
colour_logic: >-
  Black (#000000) and white (#FFFFFF) provide contrast without distraction. Pink (#FF6B9D), blue (#4169E1), and gold (#FFD700) appear as chromatic accents representing different frequencies or musical moods. The palette rejects pastels; colors must feel like full-volume sound, not background
composition_philosophy: >-
  Motion-driven layouts use the italic angle as an organizing principle. headlines tilt, image angles echo the 30-degree logic, white space flows toward the angle rather than resisting it. Sonic waveform patterns emerge subtly in supporting graphics (not dominating composition). Everything implies sound in motion
what_would_break_it: >-
  Upright typography, literal sound visualizations, cool grey-dominant color palettes, symmetrical centered layouts, or removing italic angle as foundational principle
