summary: >-
  Visual language for Arc (The Browser Company). How the brand looks
  structurally — photography art direction, type treatment, layout, graphic
  language, visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-arc"
      touchpoints:
        - "arc.net homepage and marketing pages"
        - "The Browser Company social media"
        - "Arc brand campaigns and announcements"
        - "Company blog and communications"
      description: >-
        Warm, human, design-forward. Arc's visual identity is built around
        a dynamic colour system with warm oranges (#EF8C62) as the signature
        hue — distinctive in a browser category dominated by blues (Chrome),
        reds (Opera), and purples (Firefox). Dustin Senos (Head of Design)
        and Karla Cole (Brand Lead, ex-Facebook/Instagram/NYT) established
        a visual language that feels more like a design studio than a
        software company. No custom typeface — Arc uses SF Pro (Apple's
        system font) as its primary typeface, reflecting a macOS-native
        design philosophy. The visual language is warm, crafted, and
        deliberately un-corporate — hand-drawn elements, organic shapes,
        and human-scale imagery replace the engineering-coded aesthetics
        typical of browser marketing. Robert Irwin's light-and-space art
        inspired the 'scrim' concept — the browser as a frame around web
        content. Compared to Chrome (Google Material, engineering-coded,
        utilitarian) or Firefox (more activist, more illustration-heavy),
        Arc's visual language is the most design-cultured and the most
        emotionally warm.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this warm, design-
        forward, human-scale register.

    - name: "arc-search-mobile"
      touchpoints:
        - "Arc Search iOS app"
        - "Arc Search marketing materials"
        - "Arc Search App Store presence"
      description: >-
        Minimal, gesture-first. Arc Search strips the browser visual
        language to its most essential elements — a single search bar,
        minimal chrome, and content-first presentation. The mobile app's
        visual identity is simpler and more focused than the desktop
        browser — fewer visual elements, more whitespace, gesture-driven
        interaction replacing visible UI controls. The 'Browse for Me'
        AI feature introduces a unique visual mode where AI-generated
        summaries replace traditional web pages.
      differs_from_default_by: >-
        Radically simplified. The visual complexity of the desktop browser
        (sidebar, spaces, easel) is reduced to near-zero chrome. The
        visual register shifts from design-forward to invisible-design.

    - name: "dia-ai-browser"
      touchpoints:
        - "Dia browser (announced October 2024)"
        - "Dia marketing and preview materials"
        - "The Browser Company AI-first product vision"
      description: >-
        AI-first, conversational. Dia represents The Browser Company's
        pivot toward AI-native browsing — the visual language shifts from
        Arc's rich, customisable interface toward a more conversational,
        AI-mediated interaction model. The visual identity for Dia is
        emerging but signals a more minimal, agent-coded aesthetic where
        the AI assistant becomes the primary visual interface rather than
        traditional browser chrome.
      differs_from_default_by: >-
        AI-mediated interaction replaces direct browser manipulation. The
        visual register shifts from user-customised richness to AI-curated
        simplicity. Dia's visual language is still developing.

  notes: >-
    The Browser Company's visual identity is unusually personal for a
    software company — founder Josh Miller and the team appear regularly
    in product videos, creating a human face for the brand. Marco Triverio
    (Lead Designer, ex-Apple Safari, joined January 2026) brings Apple-
    level design craft. The transition from Arc to Dia represents a
    significant visual identity evolution.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "arc.net (observed February 2026)"
    - "The Browser Company YouTube channel"
    - "Arc social media content"
  subject_and_framing: >-
    People-first, behind-the-scenes. Arc's visual content emphasises the
    team building the product — founder Josh Miller's product update videos,
    team members demonstrating features, real people using Arc in everyday
    contexts. The photography and video content feels more like a design
    studio documentary than corporate marketing. Product screenshots are
    heavily featured but always contextualised with human use cases.
    Compared to Chrome (abstract, product-feature-coded) or Safari (Apple's
    controlled, minimal product photography), Arc's imagery is the most
    personal and team-visible.
  casting_observed: >-
    The team itself is the primary cast. Josh Miller (CEO) appears in
    product announcement videos. Team members demonstrate features. User
    community members appear in testimonials. No celebrity endorsement or
    aspirational casting — the authenticity of the team IS the casting
    strategy.
  lighting_and_colour: >-
    Warm, natural, casual. Video content uses natural office and home
    lighting. Product screenshots emphasise Arc's distinctive colour
    customisation — users' own colour choices become visual content. The
    warm orange palette (#EF8C62) influences the overall colour temperature
    of marketing materials.
  post_production: >-
    Light, natural processing. Video content is minimally produced —
    conversational style, casual framing. Product screenshots receive
    careful treatment to showcase Arc's visual features. The overall
    approach prioritises authenticity over polish.
  visual_boundaries:
    stated_exclusions: >-
      Arc avoids corporate-technology photography (suited professionals,
      glass offices, stock business imagery). The brand positions against
      Big Tech visual conventions.
    observed_exceptions: >-
      Some marketing materials use more polished product photography for
      feature announcements.
    genuine_absence: >-
      Based on arc.net review: no stock photography, no celebrity imagery,
      no abstract technology visualisations, no conventional software-
      marketing photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Arc browser interface (sidebar, spaces, easel)"
    - "arc.net (observed February 2026)"
    - "Robert Irwin 'scrim' concept"
  uses_illustration: true
  illustration_style: >-
    Hand-drawn, organic, human-crafted. Arc uses hand-drawn elements,
    sketchy annotations, and organic shapes in its marketing materials —
    a deliberate contrast to the precision of typical software branding.
    The illustration style feels like a designer's notebook rather than
    a corporate asset library.
  illustration_role: >-
    Marketing differentiation and product explanation. Hand-drawn elements
    appear in feature explanations, social media content, and brand
    communications — making technical browser features feel approachable
    and human.
  icon_style: >-
    The Arc browser uses custom iconography for its sidebar navigation,
    spaces, and split-view features. Icons are clean, slightly rounded,
    and follow macOS design conventions. The sidebar icon system is
    distinctive — combining favourites, pinned tabs, and spaces in a
    visual hierarchy unique to Arc.
  graphic_devices: >-
    The 'scrim' concept — inspired by Robert Irwin's light-and-space art,
    the browser frame functions as a translucent boundary between the user
    and web content. The sidebar — Arc's vertical sidebar replaced the
    traditional horizontal tab bar, creating a distinctive visual signature.
    Spaces — colour-coded workspace containers that create a visual
    organisation system unique to Arc. The curved arc-motion animation
    principle — interface elements follow curved, arc-shaped trajectories
    rather than linear movements. Dynamic colour — users customise Arc's
    interface colour, making each instance visually unique.
  motion_language: >-
    Curved, organic, arc-shaped. Interface animations follow curved
    trajectories — the arc motion principle gives the browser its kinetic
    personality. Tab transitions, sidebar reveals, and space switches use
    smooth, curved movements. The motion language feels handcrafted rather
    than mechanical — reflecting the brand's human-centred design philosophy.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "medium"
  primary_sources:
    - "SF Pro (Apple system font)"
    - "arc.net (observed February 2026)"
    - "Arc browser interface"
  signature_move: >-
    SF Pro as a design choice, not a default. Arc uses Apple's SF Pro
    system font across the product and brand — but as a deliberate macOS-
    native design decision rather than a lazy fallback. The typography
    is clean, readable, and perfectly integrated with macOS system
    conventions. The distinctive typographic element is not the typeface
    itself but how Arc uses colour, weight, and hierarchy within the
    interface — tab titles, sidebar labels, and command bar text create a
    typographic rhythm unique to Arc's sidebar-first layout. Compared to
    Chrome (Roboto/Google Sans, Material Design-coded) or Firefox (custom
    type, more expressive), Arc's typography is the most platform-native
    and the least brand-typeface-dependent.
  what_would_look_wrong: >-
    A heavy, branded display typeface (contradicts the macOS-native,
    invisible-design philosophy). A monospaced or developer-coded typeface
    (Arc is for everyone, not just developers). A serif typeface (contradicts
    the modern, clean interface). Any typeface that creates friction with
    macOS system conventions.
  case_convention: >-
    'Arc' uses title case. Feature names use title case ('Spaces,' 'Easel,'
    'Boosts,' 'Browse for Me'). Interface text follows macOS conventions
    with sentence case. Marketing headlines use sentence case.
  display_vs_body: >-
    Display: SF Pro at medium and semibold weights for marketing headlines
    and feature announcements. The warm colour palette provides visual
    distinction rather than typographic weight. Body: SF Pro at regular
    weight for all interface and marketing text. The single-typeface
    approach creates consistency between product and brand.
  type_and_image: >-
    Typography serves the interface rather than competing with visual
    content. In the browser, type is minimal — tab titles truncate, the
    URL bar is clean, sidebar labels are concise. In marketing, type and
    product screenshots share space — the product interface itself is the
    primary visual content, with typography providing context.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "arc.net (observed February 2026)"
    - "Arc browser interface layout"
  signature_composition: >-
    Sidebar-first, vertical organisation. Arc's most distinctive layout
    contribution is the vertical sidebar replacing the horizontal tab bar
    — a fundamental composition shift that influenced the entire browser
    category (Chrome later tested a similar approach). The sidebar creates
    a left-anchored visual hierarchy: pinned favourites at top, active
    tabs in the middle, spaces at the bottom. The marketing website
    reflects this vertical organisation — scrolling narratives that
    mirror the sidebar's top-to-bottom flow. Compared to Chrome (horizontal
    tab bar, minimal layout innovation) or Safari (minimal chrome, content-
    first), Arc's layout is the most organisationally inventive.
  density_and_whitespace: >-
    The sidebar is information-dense by design — many tabs, folders, and
    spaces in a compact vertical space. The content area is generous —
    Arc hides the URL bar and tab bar, giving web content maximum screen
    space. Marketing pages use moderate whitespace with product screenshots
    as the primary visual content.
  format_preferences: >-
    Desktop-first for Arc browser. Mobile-first for Arc Search. The
    sidebar layout is optimised for landscape displays. Product screenshots
    dominate marketing materials, requiring landscape formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    Arc established multiple design trends in the browser category —
    the vertical sidebar, colour-customisable chrome, and spaces-based
    organisation have been widely imitated.
  examples:
    - trend: "Vertical sidebar navigation in browsers"
      stance: "leader"
      evidence: >-
        Arc's vertical sidebar (launched 2022) replaced the decades-old
        horizontal tab bar convention. Chrome, Edge, and other browsers
        subsequently tested similar vertical tab approaches. Arc proved
        that the browser chrome itself could be a design innovation
        rather than a fixed convention.
      reasoning: >-
        The horizontal tab bar was an unchallenged convention since the
        first tabbed browsers. Arc demonstrated that rethinking this
        fundamental layout element could create a meaningfully different
        user experience.
    - trend: "Human-scale software branding"
      stance: "leader"
      evidence: >-
        Arc's team-visible, warm, un-corporate brand approach — with
        founder Josh Miller presenting product updates conversationally
        — influenced how developer-focused software companies present
        themselves. The approach contrasts sharply with Big Tech's
        polished, impersonal product marketing.
      reasoning: >-
        Arc proved that a browser company could brand itself like a
        design studio rather than a technology corporation — warmth
        and personality rather than scale and feature lists.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    Warm colour palette (orange #EF8C62 signature). SF Pro typography.
    The sidebar-first layout concept. Hand-drawn, organic visual elements.
    Team-visible, personal brand voice.
  what_bends: >-
    Arc Search simplifies the visual language dramatically for mobile.
    Dia (AI browser) introduces a new visual register. Boosts (user-
    created web customisations) introduce unpredictable visual diversity.
    Community-created themes and colour customisations extend the visual
    language beyond company control.
  notable_examples: >-
    Arc x Robert Irwin (conceptual influence): the light-and-space
    artist's 'scrim' concept inspired Arc's philosophy of the browser
    as a frame — the most art-world-influenced design decision in
    browser history. Arc x Apple design ecosystem: Arc's deep integration
    with macOS visual conventions (SF Pro, system-native UI elements,
    Handoff support) represents a design collaboration with Apple's
    platform rather than a traditional brand partnership. Arc x user
    customisation: Arc's colour-customisable interface means every user
    creates their own visual variation — the brand identity is designed
    to be personalised rather than uniform.
