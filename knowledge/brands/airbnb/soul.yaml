summary: "Soul of Airbnb. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The moment you realize the stranger who picked you up at the airport is now showing you the hidden café their grandmother took them to as a child—belonging happens when someone trusts you with their own story.
core_belief: >-
  Belonging is not a destination you visit; it's a permission you give yourself to be fully present in a place and let a place be fully present with you.
creative_tension:
  - >-
    A technology platform built on data matching, yet positioned around human emotion and authentic connection—the algorithm is invisible precisely because the brand wants you to believe in serendipity.
  - >-
    Airbnb promises "Belong Anywhere," but belonging requires friction, vulnerability, and risk. The brand must make strangers feel safe while maintaining the anxiety that creates genuine connection.
decision_filter: >-
  When faced with a fork, Airbnb asks "Does this increase trust between host and guest?" not "Does this maximize conversion?"
signature_move: >-
  The Belo symbol—a single glyph that represents simultaneously arms raised in welcome, a location pin, a heart, and the letter A. One mark that can be drawn by hand, customized infinitely, yet remains unmistakable. It's democratic design in a single gesture.
what_would_break_it: >-
  Using a stock sans-serif like Gotham or Montserrat instead of Airbnb Cereal. It would transform the brand from "designed specifically for humans" to "designed for efficiency." The custom typeface is a promise that Airbnb created something specifically for you, not for anyone.
