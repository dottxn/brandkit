summary: "Soul of Udemy. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A library that follows you home. millions of teachers in your pocket, each one waiting to unlock something you didn't know you could do.
core_belief: >-
  The best teachers in the world should be accessible to anyone with $10 and internet connection; gatekeeping knowledge is a species-level tragedy.
creative_tension:
  - >-
    Democratizing education through marketplace scale while maintaining course quality standards that protect students from mediocrity.
  - >-
    Creating emotional connection to learning (growth, capability) while maintaining transactional simplicity and affordability.
decision_filter: >-
  Would someone intimidated by formal education see themselves in this platform and feel like they belong? Everything flows from this single filter.
signature_move: >-
  The purple (#A435F0) used not as brand decoration but as the visual representation of moments of understanding. the color of epiphanies and "aha" insights.
what_would_break_it: >-
  Introducing premium tiers that create visual hierarchy between wealthy and budget learners, or adopting the aesthetic of elite universities.
