  Visual language for OpenAI. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-openai"
      touchpoints:
        - "openai.com homepage and research pages"
        - "OpenAI brand campaigns and announcements"
        - "OpenAI social media channels"
        - "OpenAI corporate communications and safety publications"
      description: >-
        Black and white dominant with strategic colour accents. The
        February 4, 2025 rebrand (OpenAI's first ever, led by in-house
        designers Veit Moeller and Shannon Jager with type from ABC
        Dinamo) introduced OpenAI Sans. a custom typeface that serves
        as the centrepiece of the visual identity. The hexagonal six-
        looped knot logo received a subtle 2025 refinement. Michael
        Tabtabai (VP Global Creative) oversees brand expression. Studio
        Dumbar/DEPT (since Spring 2024) handles motion design. The 2025
        rebrand established four design values: simplify, space,
        imperfection, vivid. The Jony Ive/LoveFrom acquisition (May 2025,
        $6.5B) signals future hardware-influenced visual evolution.
        Compared to Google DeepMind (blue, research-institutional) or
        Anthropic (minimal, text-heavy, academic-coded), OpenAI's visual
        language is the most consumer-polished and the most design-
        invested among AI companies.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this monochrome,
        OpenAI Sans-set, knot-logoed register.

    - name: "chatgpt-product"
      touchpoints:
        - "ChatGPT web interface"
        - "ChatGPT mobile apps (iOS, Android)"
        - "ChatGPT marketing and user acquisition"
        - "ChatGPT Plus and Pro subscription marketing"
      description: >-
        ChatGPT Green (#74aa9c / #00A67E) identifies the consumer product.
        The 'Emotive Point'. a pulsing blue-green disc. serves as
        ChatGPT's visual avatar during conversations. ChatGPT Pro uses
        a purple accent (#ab68ff) to distinguish its premium tier. The
        sparkle icon (now an AI-industry visual convention that OpenAI
        helped establish) indicates AI-generated content. The product
        interface is minimal. generous whitespace, centred conversation
        layout, no visual clutter. Ian Silber (Head of Product Design)
        oversees the product visual system. Compared to Claude (warm,
        text-focused, orange-accented) or Gemini (Google-branded, Material
        Design-coded), ChatGPT's interface is the most conversational and
        the least corporate-feeling.
      differs_from_default_by: >-
        Green replaces monochrome as the primary accent. The Emotive Point
        and sparkle icon introduce visual elements not present in the
        corporate brand. The register is warmer and more conversational
        than the research-focused corporate identity.

    - name: "api-developer"
      touchpoints:
        - "OpenAI API documentation (platform.openai.com)"
        - "Developer-facing marketing and communications"
        - "OpenAI Playground"
        - "API pricing and usage dashboards"
      description: >-
        More technical, more structured. The API documentation uses a
        developer-standard layout. left sidebar navigation, code examples,
        endpoint references. AREA 17 designed the original website
        architecture. The visual language is functional and information-
        dense. code blocks with syntax highlighting, structured parameter
        tables, and minimal decorative elements. Monospace type appears
        alongside OpenAI Sans for code contexts.
      differs_from_default_by: >-
        Information density increases. Code-formatted content dominates.
        The visual register shifts from consumer-polished to developer-
        functional. The brand personality recedes behind technical utility.

  notes: >-
    OpenAI's visual identity is evolving rapidly. from research lab
    (2015-2022) to consumer brand (ChatGPT launch, November 2022) to the
    February 2025 rebrand establishing a mature visual system. The Jony
    Ive/LoveFrom acquisition (May 2025) will likely introduce hardware-
    design principles to the visual language. The brand must balance
    consumer accessibility (ChatGPT) with research credibility (papers,
    safety publications) and developer trust (API platform).

# ── Photography ──────────────────────────────────

photography:
  confidence: "low"
  primary_sources:
    - "openai.com (observed February 2026)"
    - "OpenAI blog and research publications"
    - "2025 rebrand materials"
  subject_and_framing: >-
    OpenAI uses minimal brand photography. The visual identity relies on
    typography (OpenAI Sans), the hexagonal knot logo, colour, and the
    Emotive Point rather than photographic content. Research publications
    use technical diagrams and model outputs rather than photography. When
    photography appears, it shows OpenAI team members, event moments, or
    abstract/conceptual imagery. Compared to Google (extensive lifestyle
    and product photography) or Apple (world-class product photography),
    OpenAI's visual identity is the least photography-dependent among
    major tech companies.
  casting_observed: >-
    Limited. Team photography in blog posts and about pages. OpenAI events
    feature leadership (Sam Altman, Mira Murati before departure, Greg
    Brockman) in standard tech-executive contexts. No distinctive casting
    direction. the brand communicates through AI outputs and typography
    rather than people photography.
  lighting_and_colour: >-
    When photography appears, it tends toward clean, bright, contemporary
    settings. No distinctive lighting treatment. The 2025 rebrand's 'vivid'
    design value suggests a direction toward more colour-rich visual
    content, but photography remains secondary.
  post_production: >-
    Minimal and standard. Photography is not a significant brand tool.
  visual_boundaries:
    stated_exclusions: >-
      OpenAI avoids science-fiction-coded imagery (no glowing brains, no
      Terminator references, no dystopian aesthetics). The brand positions
      AI as useful and accessible, not threatening or alien.
    observed_exceptions: >-
      AI-generated imagery (DALL-E, Sora outputs) appears in product
      demonstrations and marketing. this AI-generated content exists
      in a space between photography and illustration.
    genuine_absence: >-
      Based on openai.com review: no lifestyle photography, no product
      photography (OpenAI is software, not hardware. at least until the
      LoveFrom partnership produces devices), no celebrity endorsement
      imagery.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Hexagonal knot logo (subtle 2025 refinement)"
    - "Emotive Point (pulsing disc. ChatGPT avatar)"
    - "February 2025 rebrand"
    - "Studio Dumbar/DEPT (motion, since Spring 2024)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    The sparkle icon. a four-pointed star that indicates AI-generated
    content and has become an industry-wide convention for AI features.
    OpenAI established this visual shorthand before Google (Gemini sparkle),
    Apple (Apple Intelligence), and others adopted similar iconography.
    Product icons are minimal and geometric. The hexagonal knot logo
    reduces cleanly to a favicon.
  graphic_devices: >-
    The hexagonal six-looped knot. a topologically complex mark that
    suggests interconnection and intelligence. The 2025 refinement
    maintained the structure while cleaning proportions. The Emotive
    Point. a pulsing, colour-shifting disc that serves as ChatGPT's
    avatar during conversations, expressing a 'thinking' state through
    animation. The sparkle icon. the four-pointed star that signals
    AI capability. OpenAI Sans itself functions as a graphic device
    the typeface's distinctive letterforms (particularly the lowercase 'a'
    and 'g') carry brand recognition in text-heavy contexts.
  motion_language: >-
    Studio Dumbar/DEPT (since Spring 2024) developed the motion language.
    The Emotive Point's pulsing behaviour during ChatGPT conversations is
    the most widely experienced AI-interaction animation in the world
    hundreds of millions of users see it regularly. The motion language
    is subtle and organic. no mechanical or robotic movements. The
    hexagonal knot animates with fluid, continuous rotation. Brand
    transitions use smooth, considered motion that communicates
    intelligence without aggression.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "OpenAI Sans (ABC Dinamo + in-house Veit Moeller/Shannon Jager, February 2025)"
    - "February 2025 rebrand"
    - "openai.com (observed February 2026)"
  signature_move: >-
    OpenAI Sans (ABC Dinamo, Zurich + in-house designers Veit Moeller
    and Shannon Jager, February 4, 2025). the centrepiece of OpenAI's
    first-ever rebrand. ABC Dinamo (the Zurich foundry behind Whyte,
    Diatype, and Discord's gg sans logotype Ginto) collaborated with
    OpenAI's in-house team to create a typeface that embodies the brand's
    four values: simplify, space, imperfection, vivid. The 'imperfection'
    value is notable. the typeface includes deliberate optical
    irregularities that prevent it from feeling sterile or machine-perfect,
    a philosophical statement about AI's relationship to human craft.
    Ludwig Pettersson (historical Creative Director, ex-Stripe) influenced
    the brand's earlier typographic direction. Compared to Anthropic
    (system fonts, no custom type investment) or Google DeepMind
    (Google Sans, inherited from parent), OpenAI Sans represents the
    most significant typographic investment by an AI company.
  what_would_look_wrong: >-
    A geometric, perfectly regular sans-serif (contradicts the 'imperfection'
    value). A serif typeface (the brand is entirely sans-serif). System
    fonts like Inter or SF Pro (generic, no brand distinction). The pre-
    2025 typography (no consistent type system existed before the rebrand).
    Any typeface that reads as cold, mechanical, or threatening.
  case_convention: >-
    'OpenAI' uses camelCase (capital O, capital AI). Product names use
    capitalisation specific to each: 'ChatGPT' (camelCase), 'DALL-E'
    (stylised), 'Sora,' 'GPT-4o.' Body text uses sentence case. Marketing
    headlines use sentence case. the tone is conversational and
    accessible, not corporate or declarative.
  display_vs_body: >-
    Display: OpenAI Sans at heavier weights for marketing headlines, brand
    moments, and announcement pages. The typeface's distinctive character
    is most visible at display sizes. Body: OpenAI Sans at regular weight
    for all brand and product text. The single-typeface system creates
    consistency across research publications, product interfaces, and
    marketing. everything speaks in the same typographic voice.
  type_and_image: >-
    Type dominates OpenAI's visual identity. In the absence of significant
    photography or illustration, OpenAI Sans carries the brand's visual
    personality. The hexagonal knot logo and the Emotive Point provide
    graphic counterpoints, but text. research findings, product
    descriptions, model capabilities. is the primary visual content.
    This is appropriate for a company whose products are fundamentally
    text-based.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "openai.com (observed February 2026)"
    - "ChatGPT interface"
    - "OpenAI API documentation"
  signature_composition: >-
    Centred, spacious, single-column. openai.com uses a clean, centred
    layout with generous margins and vertical rhythm. The ChatGPT
    conversation interface is centred single-column with a wide text input
    at the bottom. a layout pattern that has become the default for AI
    chat interfaces worldwide (Claude, Gemini, Copilot all follow a
    similar pattern). The 2025 rebrand emphasised 'space' as a design
    value. compositions use whitespace as a deliberate element rather
    than empty space. Compared to Microsoft (denser, more structured) or
    Google (more visually active, more colour), OpenAI's layouts are the
    most restrained.
  density_and_whitespace: >-
    Low density, high whitespace. The 2025 rebrand's 'space' value is
    expressed through generous margins, ample line spacing, and
    compositions that let content breathe. The ChatGPT interface is
    deliberately sparse. nothing competes with the conversation. API
    documentation is necessarily denser but still maintains clean
    information hierarchy.
  format_preferences: >-
    Vertical-scroll single-column for the website and ChatGPT. Standard
    documentation layout (sidebar + main content) for API docs. Social
    media adapts to platform-specific formats. The hexagonal knot logo
    is compact enough for all format contexts.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    OpenAI is creating visual conventions for the AI industry. The ChatGPT
    interface pattern, the sparkle icon, and the Emotive Point are being
    adopted or referenced by competitors.
  examples:
    - trend: "AI-interface visual conventions"
      stance: "leader"
      evidence: >-
        The ChatGPT conversation interface. centred text input, Emotive
        Point avatar, streaming text output, sparkle icon for AI content
       established the visual template that Claude, Gemini, Copilot,
        and dozens of other AI products have adopted. The sparkle icon
        has become the universal signifier for AI features across the
        entire tech industry.
      reasoning: >-
        ChatGPT's first-mover status (November 2022) and massive adoption
        (100M+ users within months) meant its visual conventions became
        the default expectation for AI interfaces.
    - trend: "Custom typography for AI companies"
      stance: "leader"
      evidence: >-
        OpenAI Sans (February 2025) represents the first significant
        custom-type investment by an AI company. The philosophical
        approach (embedding 'imperfection' as a value) sets a
        typographic precedent for how AI brands communicate humanity
        through type design.
      reasoning: >-
        As the AI industry matures from research to consumer brands,
        OpenAI's investment in custom typography signals that AI companies
        need the same brand-design sophistication as established tech
        companies.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The hexagonal knot logo. OpenAI Sans. The monochrome base palette.
    The 'simplify, space, imperfection, vivid' design values. The sparkle
    icon as AI signifier.
  what_bends: >-
    ChatGPT introduces green and the Emotive Point. ChatGPT Pro introduces
    purple. DALL-E and Sora have product-specific visual treatments.
    API documentation adopts developer-standard visual conventions. The
    Jony Ive/LoveFrom acquisition will likely introduce hardware-design
    visual elements.
  notable_examples: >-
    OpenAI x ABC Dinamo (February 2025 rebrand): the Zurich foundry
    collaborated on OpenAI Sans. bringing type-design craft to the AI
    industry's most prominent brand. OpenAI x Studio Dumbar/DEPT (motion,
    since Spring 2024): established the motion language including the
    Emotive Point animation. OpenAI x AREA 17 (2019 original website):
    the digital agency designed the information architecture that
    structured OpenAI's transition from research lab to public-facing
    organisation. The Jony Ive/LoveFrom acquisition (May 2025) represents
    the most significant design collaboration in OpenAI's history. Ive's
    influence will likely reshape the visual language as OpenAI moves
    into hardware.
