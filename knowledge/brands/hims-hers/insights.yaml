# ── Data
learned_insights:
  - >-
    Neutral gray + white is more trustworthy than cheerful color for healthcare. not cold (the gray is warm enough), but respectful of user anxiety. #333333 (Mine Shaft) and #FFFFFF (white) communicate "we're serious about medicine" without feeling clinical or intimidating. The restraint itself is the message: we're focused on solving your problem, not entertaining you.
  - >-
    Showing real people (not actors) in advertising dismantles healthcare shame faster than messaging. Documentary photography on film (not retouched), real human bodies (not perfect models), real environments (not studio sets). this signals authenticity in an industry drowning in artifice. When you see someone who looks like you getting healthcare, you feel permission to get it yourself.
  - >-
    The distinction between Hims (functional, clinical, for erectile dysfunction and general male health) and Hers (softer, more aesthetic, for sexual wellness and skin health) lets each service own its tone without contradiction. Hims can be more direct and clinical; Hers can be more playful. One brand architecture, two tonal registers. This solves the tension of being simultaneously serious and approachable.
  - >-
    Simple, lowercase typography (custom sans-serif, sparse visual hierarchy) makes healthcare feel less institutional and more human. When you're anxious about health decisions, you don't want to be intimidated by formal, hierarchical design. Lowercase reads as conversational; all caps reads as shouting. The typeface choice carries emotional weight equal to the visual design itself.
  - >-
    The 2025 Super Bowl campaign shift toward anti-establishment positioning (fighting "the system," challenging Big Pharma, positioning Hims & Hers as the alternative) represents a major brand evolution. moving from neutral/clinical to confrontational. This tonal shift works because it acknowledges user frustration with traditional healthcare, positioning the brand not just as convenient alternative but as challenge to medical gatekeeping. The brand matured from "healthcare without friction" to "healthcare that fights the system."
what_nobody_copies: >-
  The commitment to showing non-retouched film photography in healthcare advertising at scale. most beauty and health brands over-polish imagery, creating impossible standards. Hims & Hers' documentary photography aesthetic (real skin, real bodies, unglamorous settings) requires operational confidence that authenticity sells better than perfection. Most competitors chase perfection; Hims & Hers chose authenticity as competitive advantage. This is structurally difficult to replicate because it requires accepting that some users will see flaws and imperfections in brand imagery. and believing that this builds more trust than hiding them.
