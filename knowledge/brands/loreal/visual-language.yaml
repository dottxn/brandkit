summary: >-
  Visual language for L'Oréal Paris. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-worth-it"
      touchpoints:
        - "lorealparisusa.com and global L'Oréal Paris websites"
        - "Global brand campaigns. print, digital, broadcast"
        - "Product packaging and counter displays"
        - "Social media channels"
      description: >-
        Glamorous, aspirational, ambassador-driven. The enlarged 'O' from
        L'Oréal Paris serves as the primary graphic device. L'Oréal
        Essentielle (custom geometric sans, 4 weights) and L'Oréal Royale
        (custom serif, 2 weights, Robert Granjon-influenced) form the
        type system. Core palette: Black (#000000), Earls Green (#BBCA31),
        Mine Shaft (#313131). 'Because We're All Worth It' (changed from
        'Because You're Worth It' in January 2023. the shift from 'You'
        to 'We' reflecting inclusivity) anchors the positioning. Delphine
        Viguier-Hovasse (Global Brand President through June 2025, succeeded
        by Laetitia Toupet-Delon July 2025) oversaw the brand's visual
        evolution. McCann Worldgroup is the lead agency. Compared to Estée
        Lauder (more luxury-coded, more restrained) or Maybelline (more
        youth-oriented, more playful), L'Oréal Paris positions as
        democratic luxury. accessible glamour with a Parisian authority.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this ambassador-
        driven, glamour-forward, Parisian-authority register.

    - name: "product-hero"
      touchpoints:
        - "Product launch campaigns"
        - "Retail shelf and counter displays"
        - "E-commerce product pages"
        - "Product-specific social media content"
      description: >-
        Product as protagonist. L'Oréal Paris has developed distinctive
        product design language. the 'Carron' signature bottle shape for
        certain lines creates recognisable silhouettes on shelf. Product
        photography uses dramatic lighting, often against dark backgrounds,
        to create a luxury register. Packaging design varies by line
        (Elvive/Elsève haircare, True Match foundation, Colour Riche
        lipstick) but shares the L'Oréal Paris wordmark and the enlarged
        'O' device.
      differs_from_default_by: >-
        The product replaces the ambassador as the visual hero. More
        structured, more commerce-focused. The glamour is expressed through
        product design and lighting rather than celebrity presence.

    - name: "ambassador-editorial"
      touchpoints:
        - "Celebrity ambassador campaigns"
        - "Red carpet and event photography"
        - "Cannes Film Festival (official partner since 1998)"
        - "Paris Fashion Week (official partner)"
      description: >-
        Ambassador-led glamour photography. The ambassador roster includes
        Kendall Jenner, Cara Delevingne, Helen Mirren, Eva Longoria, and
        Viola Davis. representing multi-generational, multi-ethnic
        glamour. Cannes Film Festival partnership (official beauty partner
        since 1998) provides the ultimate glamour stage. red carpet
        photography, backstage beauty content, and celebrity moments.
        Paris Fashion Week partnership connects the brand to haute couture
        authority. The photography is high-glamour. professional lighting,
        beauty close-ups, product integration, aspirational but not
        exclusionary.
      differs_from_default_by: >-
        Celebrity presence dominates. Photography is the highest-glamour
        register in the L'Oréal Paris system. Event contexts (Cannes,
        PFW) add cultural authority. More editorial and more aspirational
        than everyday brand marketing.

  notes: >-
    L'Oréal Paris is one brand within the L'Oréal Group portfolio (which
    includes Lancôme, YSL Beauty, Kérastase, La Roche-Posay, and others).
    Each brand has its own visual identity. L'Oréal Paris specifically
    occupies the 'democratic luxury' position. accessible price,
    aspirational presentation.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "L'Oréal Paris global campaigns (observed February 2026)"
    - "lorealparisusa.com"
    - "McCann Worldgroup (lead creative agency)"
    - "Cannes Film Festival and Paris Fashion Week partnerships"
  subject_and_framing: >-
    Two primary photography modes: ambassador-led beauty portraits and
    product-hero studio shots. Ambassador photography uses beauty-standard
    framing. close-up face/beauty shots with professional lighting and
    product integration. Celebrity ambassadors (Kendall Jenner, Cara
    Delevingne, Helen Mirren, Eva Longoria) are photographed with glamour
    lighting and minimal background. Product photography uses dramatic
    studio lighting against dark or gradient backgrounds. Compared to
    Maybelline (more street-level, more youth-coded, more editorial-
    playful) or Revlon (more classic, more traditional glamour), L'Oréal
    Paris photography is the most consistently polished and aspirational
    in mass-market beauty.
  casting_observed: >-
    Multi-generational, multi-ethnic ambassador roster. Helen Mirren
    (age 80+), Kendall Jenner (20s), Eva Longoria (50s), Viola Davis (50s),
    Cara Delevingne (30s). The casting deliberately spans age decades
    a visual expression of 'Because We're ALL Worth It.' The inclusivity
    is more generational than size-inclusive (the casting still leans
    toward conventional beauty standards within each age group).
  lighting_and_colour: >-
    Glamour lighting. diffused, warm, flattering. Beauty photography uses
    classic beauty-lighting setups (butterfly/Paramount lighting, ring
    light, softbox). Colour grading is warm with golden undertones. the
    Parisian glamour register. Product photography uses more dramatic,
    directional lighting with darker backgrounds. The overall colour
    temperature is warmer than Estée Lauder (cooler, more porcelain) but
    less saturated than Maybelline (brighter, more pop).
  post_production: >-
    Beauty-industry standard retouching. skin is refined but not plastic.
    The brand has moved toward more natural skin texture in recent years,
    influenced by industry-wide 'real beauty' trends. Product colours are
    precisely matched to actual products. Hair photography (Elvive/Elsève)
    shows movement, shine, and texture.
  visual_boundaries:
    stated_exclusions: >-
      L'Oréal Paris avoids clinical or dermatological visual language (that's
      La Roche-Posay and CeraVe territory within the L'Oréal Group). The
      brand avoids niche or subculture-coded imagery. the visual language
      is mainstream glamour.
    observed_exceptions: >-
      Digital and social content occasionally adopts more casual, less
      polished photography. influenced by TikTok and creator culture.
      This represents a tension between the glamour baseline and the
      platform-native content demands.
    genuine_absence: >-
      Based on lorealparisusa.com review: no unpolished or lo-fi
      photography in brand contexts, no competitive references, no
      value/discount-coded imagery in brand photography, no user-
      generated content in primary brand presentations.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "The enlarged 'O' graphic device"
    - "L'Oréal Essentielle and L'Oréal Royale type systems"
    - "lorealparisusa.com (observed February 2026)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Minimal, functional icons for digital navigation. No distinctive
    custom icon system. Product category icons follow beauty-industry
    conventions (lipstick silhouette for makeup, bottle for skincare).
  graphic_devices: >-
    The enlarged 'O'. extracted from the L'Oréal Paris wordmark and used
    as a standalone graphic device. The 'O' functions as a frame, a
    window, and a brand signature across marketing contexts. The Eiffel
    Tower appears as a subtle Parisian authority signal in certain
    marketing contexts. The 'Carron' bottle shape for select product
    lines creates ownable product silhouettes. Earls Green (#BBCA31) as
    an unexpected accent colour within the beauty category. most
    competitors use gold, rose gold, or neutral metallics.
  motion_language: >-
    Observed in L'Oréal Paris campaign films and digital content: glamorous,
    slow-motion beauty moments. Hair campaigns use signature slow-motion
    hair movement (the 'hair flick'). Product reveals use dramatic
    lighting reveals. Ambassador films use cinematic pacing with musical
    scoring. The motion language is polished and aspirational. nothing
    raw, fast, or gritty.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "medium"
  primary_sources:
    - "L'Oréal Essentielle (custom geometric sans, 4 weights)"
    - "L'Oréal Royale (custom serif, 2 weights, Robert Granjon-influenced)"
    - "Trade Gothic LT Std (Jackson Burke). used in logo"
    - "lorealparisusa.com (observed February 2026)"
  signature_move: >-
    The dual type system. L'Oréal Essentielle (geometric sans, 4 weights)
    for modern, accessible contexts and L'Oréal Royale (serif, 2 weights,
    influenced by Robert Granjon's 16th-century French typographic
    tradition) for elevated, luxurious moments. The serif carries Parisian
    heritage and typographic authority; the sans-serif carries contemporary
    accessibility. The L'Oréal Paris wordmark uses Trade Gothic LT Std
    (Jackson Burke), modified with the enlarged 'O.' Compared to Estée
    Lauder (custom serif-forward, more restrained) or Maybelline (more
    contemporary, more sans-serif), L'Oréal Paris's type system spans
    the widest range from heritage to modern.
  what_would_look_wrong: >-
    A playful or casual typeface (contradicts the Parisian authority).
    Ultra-heavy display type in the style of streetwear brands. A purely
    sans-serif approach without the serif companion (loses the heritage
    dimension). Type that competes with ambassador photography for visual
    dominance.
  case_convention: >-
    The L'ORÉAL PARIS wordmark is uppercase. Body text uses sentence case.
    Product names use title case. Campaign headlines use uppercase or
    sentence case depending on the register. uppercase for authority,
    sentence case for warmth.
  display_vs_body: >-
    Display: L'Oréal Royale for elevated, heritage moments. beauty
    campaign headlines, luxury product launches, Cannes and PFW contexts.
    L'Oréal Essentielle at bold weights for everyday campaign headlines.
    Body: L'Oréal Essentielle at regular weight for product descriptions,
    digital content, and general marketing. The serif-to-sans relationship
    mirrors the brand's dual identity: Parisian heritage (Royale) meets
    democratic accessibility (Essentielle).
  type_and_image: >-
    Type supports and frames photography. it never dominates. Campaign
    headlines appear above or below beauty photography, providing context
    without competing. The 'Because We're All Worth It' tagline is the
    most prominent text element in many campaigns, set in a register that
    feels spoken (warm, personal) rather than designed (cold, typographic).

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "lorealparisusa.com (observed February 2026)"
    - "L'Oréal Paris print and digital campaigns"
  signature_composition: >-
    Ambassador-centred compositions. Campaign layouts place the celebrity
    face as the visual anchor, with product integration (product image in
    lower-right is a beauty-advertising convention) and headline. Digital
    layout on lorealparisusa.com uses standard beauty-commerce patterns:
    hero banners, product carousels, category navigation. The composition
    is more celebrity-driven than product-driven at the brand level, and
    more product-driven at the retail level.
  density_and_whitespace: >-
    Moderate density. Campaign compositions use generous space around the
    ambassador and product. E-commerce pages are standard beauty-retail
    density. The brand avoids cluttered compositions. the enlarged 'O'
    and the ambassador face create clear focal points.
  format_preferences: >-
    Portrait orientation for beauty close-ups and ambassador shots.
    Landscape for campaign hero banners. Square for social media product
    content. Product images use consistent aspect ratios per category.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    L'Oréal Paris selectively adopts visual trends that align with its
    'democratic luxury' positioning. neither too avant-garde nor too
    conservative. The brand follows beauty-industry visual trends rather
    than leading them.
  examples:
    - trend: "Inclusive multi-generational casting"
      stance: "leader"
      evidence: >-
        The ambassador roster spanning Helen Mirren (80+) to Kendall
        Jenner (20s). with 'Because We're ALL Worth It' (changed from
        'You're' in January 2023). makes age inclusivity a visual brand
        commitment rather than a campaign moment.
      reasoning: >-
        L'Oréal Paris was among the first mass-market beauty brands to
        use age-diverse celebrity casting as a core brand strategy rather
        than a one-off initiative.
    - trend: "AR beauty try-on technology"
      stance: "early-adopter"
      evidence: >-
        L'Oréal Group acquired ModiFace (AR beauty technology) in 2018.
        L'Oréal Paris integrates virtual try-on across digital touchpoints.
        Asmita Dubey (Chief Digital & Marketing Officer) drives technology
        integration across the brand.
      reasoning: >-
        The ModiFace acquisition positioned L'Oréal Group (and L'Oréal
        Paris by extension) as a technology leader in beauty.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    The L'Oréal Paris wordmark with enlarged 'O.' The glamour photography
    standard. The ambassador model. The Parisian authority tone. The
    'Worth It' positioning.
  what_bends: >-
    Ambassador casting evolves with cultural moments. Campaign creative
    adapts to platforms (TikTok-native content differs from broadcast).
    Product-specific campaigns (Elvive/Elsève, True Match, Colour Riche)
    have their own visual registers within the brand framework.
  notable_examples: >-
    L'Oréal Paris x Cannes Film Festival (official partner since 1998):
    the red carpet provides the ultimate glamour stage. backstage content,
    beauty looks, celebrity moments all produced within L'Oréal Paris's
    visual language. L'Oréal Paris x Paris Fashion Week: backstage beauty
    content that connects the brand to haute couture authority. L'Oréal
    Paris x Balmain (lipstick collaboration, 2017): Olivier Rousteing's
    aesthetic applied to mass-market beauty. gold packaging, fashion-
    runway photography.
