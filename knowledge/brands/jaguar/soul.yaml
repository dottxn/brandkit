summary: "Soul of Jaguar. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A brushstroke of pure color across white canvas—bold, unprecedented, impossible to ignore, unapologetically artistic. Like standing in a contemporary art museum where the car itself becomes the sculpture. Every visual decision is intentional, almost defiant, refusing the safety of tradition. This is luxury reimagined as creative expression rather than accumulated heritage, where 100 years of history becomes a canvas to paint over rather than preserve. It feels like permission to be extraordinary.
core_belief: >-
  In an industry bound by tradition, refusing tradition IS the tradition—delete ordinary and the extraordinary becomes possible. Jaguar believes that luxury in the electric age must be visual poetry, not automotive engineering in fancy packaging. Restraint is the enemy of desirability. The only path forward is complete discontinuity with what came before.
creative_tension:
  - >-
    100 years of British motoring heritage vs. complete visual erasure: The Jaguar rebrand (November 2024) explicitly abandons visual cues that consumers spent decades recognizing—the leaper emblem, the sleek curves, the understated elegance. This creates a permanent tension: do you honor legacy or burn it to signal rebirth? Jaguar chose fire. The brand risks alienating the "Jag man" demographic that built equity over a century, trading them for younger design-conscious consumers who couldn't care less about the E-Type. This is not brand evolution; it's brand suicide masquerading as resurrection.
  - >-
    Provocation as positioning strategy vs. commercial viability: The strikethrough graphics, mixed-case typography, and painter's palette primaries generate intense conversation and media coverage—exactly what Jaguar calculated. But provocation isn't a business model; it's a marketing tactic with an expiration date. Once the novelty fades and the 2026 EV launch arrives, can bold design language alone carry a £100,000+ electric luxury car? Jaguar positioned itself as anti-commercial (anti-copy, anti-ordinary) but must still convince affluent buyers to trust their money with a brand that just torched its own playbook.
decision_filter: >-
  Is this fearlessly creative or recklessly destructive? Does it excite new audiences at the precise cost of legacy trust? Jaguar asks whether a creative decision generates conversation AND advances the ultra-luxury positioning. If it plays it safe, it fails. If it confuses the market, it also fails. The brand is threading a needle: boldness without incoherence.
signature_move: >-
  The strikethrough as universal graphic language—horizontal lines striking through imitation, signaling deletion of ordinary. Not just a decorative pattern but a philosophical gesture. Every application of the strikethrough says: "We reject this category; we're destroying the rules." Deployed across packaging, digital, fashion collaborations, and physical spaces, it's become the visual equivalent of Jaguar's entire rebrand philosophy. It's simple. It's memorable. It reads as revolutionary in an industry that trades in subtlety.
what_would_break_it: >-
  Returning to heritage visual identity would instantly destroy everything the rebrand stands for—it would read as capitulation. Adopting minimalist restraint (the Dieter Rams approach) would contradict the brand's core belief in exuberance. Losing fearless color use in favor of corporate grays and blacks would immediately flatten the brand into a luxury commodity. Adopting professional corporate design language—clean grids, readable hierarchies, comfortable sans-serifs—would demolish the artistic positioning. Moving to a lowercase wordmark or traditional script would erase the mixed-case tension. Any retreat toward "normalization" would instantly validate every critic who said the rebrand was a stunt.
