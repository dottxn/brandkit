summary: >-
  Visual language for CVS Pharmacy (CVS Health). How the brand looks
  structurally. photography art direction, type treatment, layout,
  graphic language, visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-cvs-red"
      touchpoints:
        - "cvs.com homepage and marketing pages"
        - "CVS Pharmacy retail stores"
        - "CVS Health corporate communications"
        - "CVS social media channels"
      description: >-
        CVS Red (#CC0000, PMS 485 C) dominant. a high-visibility red
        that anchors one of America's most recognisable retail healthcare
        brands. Helvetica Black (CVS wordmark) and Helvetica Neue (body
        text) serve as the primary typefaces. The 2014 rebrand (Siegel+Gale)
        introduced the heart logo. a teardrop-geometry heart that connects
        CVS to health and care. Erin Condon (CMO) oversees marketing.
        Heart Haus (in-house creative agency) produces brand content. The
        Digital Pulse design system manages visual consistency across
        digital touchpoints. The CVS Beauty Mark (2018). a commitment
        to no digital alteration in beauty imagery. is one of the most
        significant visual-ethics decisions in retail. Compared to
        Walgreens (blue/red, more pharmacy-coded) or Rite Aid (blue/green,
        more traditional), CVS's visual language is the most health-
        integrated and the most corporate-health-system-coded following
        the 2018 Aetna acquisition.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red,
        Helvetica-set, heart-logoed register.

    - name: "cvs-health-corporate"
      touchpoints:
        - "CVS Health corporate website and investor relations"
        - "CVS Health annual reports"
        - "Aetna integration materials"
        - "CVS Health B2B communications"
      description: >-
        More corporate, more health-system-coded. CVS Health (the parent
        company) uses a more restrained visual register than CVS Pharmacy
        retail. the heart logo in a darker red, more whitespace, more
        data-driven content. Sub-brands Aetna (purple palette), Caremark
        (pharmacy benefits), and MinuteClinic each maintain their own
        visual identities within the CVS Health framework. The visual
        language must communicate corporate scale, regulatory compliance,
        and healthcare-system credibility.
      differs_from_default_by: >-
        More restrained, more corporate. Aetna's purple palette introduces
        colour variation. Data and compliance content replace retail
        marketing. The visual register serves investor and enterprise
        audiences rather than consumers.

    - name: "cvs-beauty-wellness"
      touchpoints:
        - "CVS Beauty in-store sections"
        - "Beauty and skincare marketing"
        - "CVS Beauty Mark initiative"
        - "Wellness and self-care content"
      description: >-
        Warmer, more lifestyle-coded. CVS Beauty uses the CVS red as an
        anchor but introduces warmer, more aspirational visual treatments
       lifestyle photography, product beauty shots, and wellness-coded
        imagery. The CVS Beauty Mark (2018) is the defining visual
        commitment: a watermark indicating beauty imagery has not been
        materially altered. no reshaping bodies, no smoothing skin
        texture, no altering eye/skin colour. This visual-ethics position
        distinguishes CVS from beauty retailers that heavily retouch.
        Pearlfisher (2024-2025) redesigned CVS store-brand packaging in
        this beauty/wellness context.
      differs_from_default_by: >-
        Warmer, more lifestyle-oriented. The CVS Beauty Mark adds visual-
        ethics signalling. Pearlfisher packaging design elevates store-
        brand visual quality. The register shifts from pharmacy utility
        to beauty/wellness aspiration.

  notes: >-
    CVS Health's visual system must manage an unusually broad sub-brand
    portfolio. CVS Pharmacy (retail), Aetna (insurance, purple), Caremark
    (pharmacy benefits), MinuteClinic (walk-in clinics), ExtraCare
    (loyalty programme), and Oak Street Health. The 2014 Siegel+Gale
    rebrand and the 2018 CVS Beauty Mark represent the most significant
    visual-identity decisions.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "cvs.com (observed February 2026)"
    - "CVS Beauty Mark initiative (2018)"
    - "CVS marketing campaigns"
  subject_and_framing: >-
    Health, wellness, and community-care contexts. CVS's photography
    shows pharmacists helping customers, families managing health,
    wellness and beauty product usage, and community health services.
    The photography emphasises the human relationship between healthcare
    providers and patients/customers. Product photography for store-brand
    items (Pearlfisher packaging redesign) is clean and consumer-accessible.
    Compared to Walgreens (more pharmacy-counter-coded) or Target (more
    lifestyle-retail-coded), CVS's photography is the most health-system-
    integrated.
  casting_observed: >-
    Diverse, community-representative. CVS photography shows a broad
    demographic. families, seniors, young adults, pharmacists of varied
    backgrounds. The casting reflects CVS's community pharmacy positioning
   serving everyone in the neighbourhood. The CVS Beauty Mark ensures
    beauty photography represents unretouched, real appearances.
  lighting_and_colour: >-
    Bright, clean, clinical-but-warm. Pharmacy and health contexts use
    bright, well-lit environments. Beauty photography uses warmer, more
    flattering but unmanipulated lighting (per the Beauty Mark commitment).
    The CVS Red (#CC0000) appears in branded elements rather than
    influencing photographic colour grade.
  post_production: >-
    Minimal in beauty contexts (CVS Beauty Mark commitment: no reshaping,
    no skin-texture smoothing, no eye/skin colour alteration). Standard
    clean processing for pharmacy and health contexts. The Beauty Mark
    commitment makes CVS's post-production philosophy the most publicly
    transparent in retail.
  visual_boundaries:
    stated_exclusions: >-
      CVS Beauty Mark (2018): no material alteration of beauty imagery.
      CVS ended tobacco sales in 2014. no tobacco-related imagery.
      Avoids imagery that contradicts the health-and-wellness positioning.
    observed_exceptions: >-
      Third-party brand imagery within CVS stores may not follow CVS's
      Beauty Mark standards. National brand advertising on CVS platforms
      follows brand-specific standards.
    genuine_absence: >-
      Based on cvs.com review: no tobacco imagery (since 2014 sales
      cessation), no aspirational luxury photography, no celebrity-
      endorsement photography in CVS-branded contexts.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Heart logo (Siegel+Gale, 2014)"
    - "CVS Beauty Mark watermark (2018)"
    - "cvs.com (observed February 2026)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Functional, healthcare-standard. Pharmacy icons, health-service icons,
    and navigation icons follow standard retail-healthcare conventions.
    The heart logo functions as the primary icon and brand mark. Digital
    Pulse design system provides consistent iconography across digital
    touchpoints. ExtraCare loyalty programme uses its own icon system
    for rewards and benefits.
  graphic_devices: >-
    The heart logo. a teardrop-geometry heart (Siegel+Gale, 2014) that
    replaced the sunburst star mark. The heart connects CVS to health,
    care, and human connection. CVS Red (#CC0000, PMS 485 C). the red
    is the strongest chromatic identifier in US pharmacy retail. The
    CVS Beauty Mark. a watermark-style badge indicating unretouched
    imagery, functioning as both ethical signal and graphic device.
    The ExtraCare card/programme branding. a visual system within the
    system, with its own colour treatments and promotional graphics.
  motion_language: >-
    Functional, retail-standard. Digital interfaces use standard retail
    interaction patterns. Marketing videos follow pharmaceutical and
    retail conventions. No distinctive motion language observed.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Helvetica Black (CVS wordmark)"
    - "Helvetica Neue (CVS Health body text)"
    - "cvs.com (observed February 2026)"
  signature_move: >-
    Helvetica Black for the CVS wordmark. bold, authoritative, and
    maximally legible at any scale from prescription labels to highway
    signage. Helvetica Neue serves as the body typeface for CVS Health
    communications. The choice of Helvetica (the world's most ubiquitous
    sans-serif) is functionally strategic rather than creatively
    distinctive. CVS serves 9,000+ locations and 100+ million customers,
    requiring absolute legibility across every touchpoint from pharmacy
    labels to digital interfaces. The typography is designed to be
    invisible rather than expressive. health information must be clear,
    not stylish. Compared to Walgreens (custom script 'W') or Rite Aid
    (no distinctive type), CVS's Helvetica use is the most functionally
    optimised for mass-market healthcare retail.
  what_would_look_wrong: >-
    A decorative or display typeface (healthcare information requires
    maximum clarity). A serif typeface (contradicts the modern, digital-
    first register). A lightweight or thin typeface (CVS's type must be
    bold and legible at small sizes on pharmacy packaging). Any typeface
    that prioritises style over legibility in health contexts.
  case_convention: >-
    'CVS' in all caps (abbreviation). 'CVS Health' and 'CVS Pharmacy'
    use title case. Sub-brand names use title case ('MinuteClinic,'
    'ExtraCare,' 'Caremark'). Body text uses sentence case. Prescription
    and health information follows pharmaceutical typography conventions.
  display_vs_body: >-
    Display: Helvetica Black for the CVS wordmark and primary headlines
   maximum weight for maximum visibility. Body: Helvetica Neue at
    regular weight for all corporate and marketing text. The single-
    family approach (Helvetica across the system) provides absolute
    consistency but no typographic personality.
  type_and_image: >-
    Typography serves functional healthcare communication. prescription
    information, product ingredients, health guidance, pricing. In retail
    contexts, type provides price and product information alongside
    product photography. In corporate contexts, type and data
    visualisations share space. Typography defers to imagery in beauty
    and wellness marketing.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "cvs.com (observed February 2026)"
    - "CVS Pharmacy retail store layout"
    - "Digital Pulse design system"
  signature_composition: >-
    Pharmacy-retail-coded, service-navigation-centred. cvs.com prioritises
    service navigation. prescription refills, appointment scheduling,
    MinuteClinic visits, ExtraCare management. The composition reflects
    CVS's transformation from pharmacy retailer to health-services
    company. Product browsing is secondary to healthcare service access.
    In-store visual composition uses CVS Red signage, aisle navigation,
    and pharmacy-counter design. Compared to Walgreens (more traditional
    pharmacy-retail layout) or Amazon Pharmacy (digital-only, delivery-
    coded), CVS's layout bridges physical retail and digital health
    services.
  density_and_whitespace: >-
    High density in pharmacy and retail contexts. product information,
    pricing, promotions, and health services compete for attention.
    Corporate communications use more generous whitespace. The Digital
    Pulse design system aims to create clarity within the inherent
    complexity of healthcare retail.
  format_preferences: >-
    Mobile-first for prescription management and health services. In-store
    signage uses standard retail format sizes. Marketing materials adapt
    to standard digital and print formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    CVS's visual evolution is driven by healthcare-industry transformation
    rather than design trends. Visual changes follow strategic business
    decisions (tobacco exit, Aetna acquisition, health-services pivot).
  examples:
    - trend: "Unretouched beauty imagery in retail"
      stance: "leader"
      evidence: >-
        The CVS Beauty Mark (2018). a commitment to no material
        alteration of beauty imagery across CVS store-brand marketing
       was the first initiative of its kind by a major US retailer.
        The Beauty Mark watermark signals unretouched photography,
        creating a visual-ethics standard.
      reasoning: >-
        CVS's 2014 tobacco exit and 2018 Beauty Mark established a
        pattern of using visual-identity decisions as health-values
        signals. The Beauty Mark positioned CVS as a health-first
        retailer in the beauty category.
    - trend: "Healthcare-retail convergence branding"
      stance: "early-adopter"
      evidence: >-
        The 2014 heart logo (Siegel+Gale) and the integration of Aetna
        (insurance), MinuteClinic (clinics), and Oak Street Health
        required a visual system that communicates 'health company'
        rather than 'pharmacy chain.'
      reasoning: >-
        CVS Health's transformation from retail pharmacy to healthcare
        company required visual identity that bridges consumer retail
        and healthcare institutional credibility.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    CVS Red (#CC0000, PMS 485 C). Heart logo (teardrop geometry).
    Helvetica typeface family. CVS Beauty Mark commitment. The health-
    and-care positioning.
  what_bends: >-
    Sub-brands maintain distinct palettes: Aetna (purple), Caremark
    (its own identity), MinuteClinic (clinic-coded), ExtraCare (loyalty-
    promotion-coded). Pearlfisher (2024-2025) redesigned store-brand
    packaging with elevated visual quality. National brands within CVS
    stores maintain their own visual identities. Heart Haus (in-house
    agency) creates campaign-specific visual treatments.
  notable_examples: >-
    CVS x Siegel+Gale (2014 rebrand): the brand consultancy created the
    heart logo and established the 'health-first' visual positioning that
    accompanied the tobacco sales exit. one of the most mission-
    significant visual-identity transformations in US retail. CVS x
    Pearlfisher (2024-2025 packaging redesign): the London agency elevated
    CVS store-brand packaging design. bringing premium visual quality to
    affordable healthcare products. CVS Beauty Mark (2018): the unretouched-
    imagery commitment created a new visual-ethics standard in retail
    beauty. the watermark itself became a graphic device signalling
    transparency. CVS x Aetna (2018 acquisition integration): the visual
    integration of a pharmacy-retail brand with a health-insurance brand
    required managing two visual identities within one corporate system.
