# ── Data
feels_like: Money moving at the speed of intention rather than institutional delay
core_belief: "Financial access isn't about being rich; it's about institutions getting out of your way"
creative_tension:
  - >-
    Playful personality (history of "cash, check, card" campaigns) balanced with serious financial infrastructure
  - "Global ubiquity that somehow doesn't feel corporate or diluted"
decision_filter: >-
  Does it make financial friction invisible? Or does it acknowledge friction exists and we're here to remove it?
signature_move: >-
  Overlapping P monogram (#0070BA and #003087) creating dimensional depth suggesting layered financial services in simple form
what_would_break_it: >-
  Adopting luxury financial services aesthetic or cold efficiency would destroy PayPal's core positioning as inclusive and demystifying
