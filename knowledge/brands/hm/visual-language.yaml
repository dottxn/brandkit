summary: >-
  Visual language for H&M. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-red"
      touchpoints:
        - "hm.com homepage and marketing pages"
        - "H&M social media channels"
        - "Global brand campaigns"
        - "Store exterior signage and shopping bags"
        - "H&M app"
      description: >-
        H&M Red (#CC071E, Pantone PMS 1795 C) dominant. the most
        recognisable colour in fast-fashion retail. HM Ampersand (Monotype,
        bespoke sans-serif developed 2007-2015) and HM Amperserif (Toshi
        Omagari/Monotype + The Studio, 2013) form the typographic system.
        Jörgen Andersson (CCO since December 2022) oversees the visual
        direction. The visual language balances accessibility and fashion
        aspiration. warmer and more democratic than Zara's editorial
        coolness, more fashion-aware than Primark or Shein. Photography
        ranges from editorial fashion to everyday lifestyle, reflecting
        H&M's 'fashion and quality at the best price' positioning.
        Compared to Zara (monochrome, editorial, luxury-adjacent) or
        Uniqlo (clean, functional, minimal colour), H&M uses colour,
        energy, and diversity as its visual differentiators.
      differs_from_default_by: >-
        This is the baseline. All other modes depart from this red-dominant,
        accessible-fashion, broadly-cast register.

    - name: "designer-collaboration"
      touchpoints:
        - "Designer collaboration campaigns (annual/bi-annual)"
        - "Collaboration-specific microsites and social media"
        - "In-store collaboration-branded sections"
        - "Launch event visuals"
      description: >-
        Designer collaborations receive distinct visual identities that
        blend the collaborator's aesthetic with H&M's system. Mugler x H&M
        (2023) used high-contrast, body-positive fashion photography.
        Glenn Martens x H&M (Autumn 2025) brings deconstructed Belgian
        design aesthetics. Each collaboration adapts the photography style,
        colour palette, and creative talent to the designer's world while
        maintaining H&M's red as a framing element. These campaigns are
        H&M's most visually ambitious moments. approaching luxury-brand
        creative standards.
      differs_from_default_by: >-
        The collaborating designer's aesthetic leads the visual direction.
        Photography quality and art direction elevate beyond the everyday
        brand register. H&M Red frames but doesn't dominate. Each
        collaboration creates a temporary visual sub-brand.

    - name: "h-and-m-studio"
      touchpoints:
        - "H&M Studio collection campaigns"
        - "Fashion week presentations"
        - "H&M Studio product pages on hm.com"
      description: >-
        H&M Studio is the directional sub-line. more fashion-forward
        photography, more editorial styling, more conceptual art direction.
        AW25 used a brutalism-inspired visual theme. The photography
        approaches Zara's editorial standard but with H&M's warmer,
        more inclusive casting. Studio campaigns are H&M's answer to
        the 'cheap fast fashion' perception. visual proof that the
        brand can compete creatively.
      differs_from_default_by: >-
        More editorial, more conceptual, more fashion-forward than the
        core brand. Darker colour palettes, more experimental styling,
        and more directional photography. H&M Red is minimised in
        favour of campaign-specific palettes.

    - name: "group-sub-brands"
      touchpoints:
        - "COS (clean, architectural, premium)"
        - "ARKET (Scandinavian, utilitarian, warm)"
        - "& Other Stories (Parisian, eclectic, textural)"
        - "Weekday (youth, street, progressive)"
        - "Monki (playful, colourful, Gen-Z)"
      description: >-
        H&M Group operates multiple brands with entirely distinct visual
        identities. COS is the furthest from H&M. minimal, architectural,
        gallery-like photography by Oliver Hadlee Pearch, using muted
        palettes. ARKET uses warm Scandinavian tones and lifestyle
        photography. & Other Stories blends Parisian bohemian with textured,
        layered compositions. Weekday is darker, street-coded, and youth-
        oriented. Monki is the most colourful and playful. These brands
        share no visual DNA with H&M Red. they exist as independent
        visual propositions.
      differs_from_default_by: >-
        Entirely separate visual identities. No H&M Red. Different
        typefaces, colour palettes, photography styles, and creative
        teams. The only connection is corporate ownership.

  notes: >-
    H&M Group's multi-brand portfolio (COS, ARKET, & Other Stories,
    Weekday, Monki) means the company manages six distinct visual
    identities simultaneously. COS in particular competes with Zara at
    a premium-minimalist register while H&M competes with Zara at the
    accessible-fashion register.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "Sam Rock (photographer, SS25 'Notes On Being' campaign)"
    - "hm.com (observed February 2026)"
    - "H&M social media channels"
    - "Ann-Sofie Johansson (Creative Advisor since 2015, career from 1987)"
  subject_and_framing: >-
    Fashion lifestyle. models in clothing, photographed in real or styled
    environments. H&M's photography is warmer and more accessible than
    Zara's editorial register. Sam Rock (SS25 'Notes On Being' campaign)
    brings a documentary-inflected, warm-toned approach. The framing ranges
    from full-body fashion shots to lifestyle moments (walking, laughing,
    interacting). Group shots and diversity are more prominent than at Zara.
    Compared to Zara (high-fashion editorial, Meisel-photographed, cooler)
    or Primark (more promotional, less art-directed), H&M balances fashion
    aspiration with everyday relatability.
  casting_observed: >-
    Broadly diverse. multi-ethnic, multi-age, varied body types. H&M has
    been progressive in inclusive casting relative to its category. Celebrity
    collaborations (Mugler, Glenn Martens) bring high-fashion models and
    celebrity casting. Core brand campaigns use a wider range of casting
    than Zara. more everyday, more representative of the customer base.
  lighting_and_colour: >-
    Warm-to-neutral, natural lighting. Less dramatic than Zara (which uses
    more directional, editorial lighting). Campaign photography uses warm
    colour grading that reads as optimistic and accessible. H&M Red
    (#CC071E) appears in branding elements around photography but doesn't
    dominate the photographic palette itself.
  post_production: >-
    Moderate retouching. H&M uses a natural-looking post-production style
   skin texture visible, natural colour grading, less idealised than
    Zara but more polished than H&M's sub-brands like Weekday or Monki.
  visual_boundaries:
    stated_exclusions: >-
      H&M avoids overly sexualised imagery, aggressive retouching, and
      exclusionary casting. The brand's sustainability positioning also
      pushes against visual excess and disposability messaging.
    observed_exceptions: >-
      Designer collaborations (Mugler x H&M 2023) pushed into more
      provocative, body-conscious territory than the core brand typically
      occupies. closer to the collaborating designer's aesthetic.
    genuine_absence: >-
      Based on hm.com review: no overtly luxury-coded photography (that's
      Zara's territory), no street-style or user-generated content in
      primary brand contexts, no aggressive pricing graphics in campaign
      photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "HM Ampersand (Monotype, 2007-2015)"
    - "HM Amperserif (Toshi Omagari/Monotype + The Studio, 2013)"
    - "hm.com (observed February 2026)"
    - "Forsman & Bodenfors (Swedish creative agency)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Clean, thin-stroke navigation icons on hm.com. The icon system is
    functional and minimal. consistent with fast-fashion e-commerce
    conventions. No distinctive custom illustration or icon system.
  graphic_devices: >-
    The H&M logotype. the ampersand is the distinctive element. HM
    Ampersand (Monotype, bespoke, 2007-2015) was specifically designed
    so that the '&' carries equal visual weight to the 'H' and 'M.' HM
    Amperserif (Toshi Omagari, 2013) provides a serif companion for
    editorial contexts. H&M Red (#CC071E, Pantone PMS 1795 C) is a
    graphic device in itself. the red shopping bag is a globally
    recognised symbol of accessible fashion.
  motion_language: >-
    Observed in hm.com and campaign films: energetic, music-driven,
    fashion-film pacing. Campaign films use quick cuts, diverse model
    compositions, and contemporary music. The motion language is more
    energetic and accessible than Zara's slow, editorial pace. reflecting
    H&M's broader, more democratic positioning.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "HM Ampersand (Monotype, bespoke sans-serif, 2007-2015)"
    - "HM Amperserif (Toshi Omagari / Monotype + The Studio, 2013)"
    - "hm.com (observed February 2026)"
  signature_move: >-
    The bespoke H&M type system. HM Ampersand (sans-serif, 2007-2015,
    developed with Monotype) and HM Amperserif (serif companion, Toshi
    Omagari/Monotype, 2013). The system was designed to make the '&'
    central. not an afterthought between 'H' and 'M' but an equal
    typographic partner. The sans-serif/serif pairing gives H&M
    flexibility: Ampersand for everyday, accessible contexts; Amperserif
    for elevated, editorial moments (H&M Studio, designer collaborations).
    Compared to Zara (Helvetica Neue body with Baron's Didot logo) or
    Uniqlo (bespoke geometric sans), H&M's type system is the most
    explicitly designed around its brandmark.
  what_would_look_wrong: >-
    A standard Helvetica or Arial replacing HM Ampersand (the bespoke
    system carries the brand voice). A decorative or fashion-forward
    display face in everyday contexts. The serif used in casual, everyday
    marketing (Amperserif is reserved for elevated moments). Tight,
    condensed, overlapping type in the Zara style (H&M's typography is
    more open and accessible).
  case_convention: >-
    Mixed. Product categories and navigation on hm.com use uppercase.
    Product descriptions use sentence case. Campaign headlines vary
    some uppercase for emphasis, some sentence case for warmth. The
    brand name is always 'H&M' (uppercase with ampersand).
  display_vs_body: >-
    Display: HM Amperserif for elevated, editorial contexts (H&M Studio,
    designer collaborations, magazine-quality moments). HM Ampersand at
    heavier weights for everyday campaign headlines. Body: HM Ampersand
    at regular weight for product descriptions, navigation, and general
    content. The sans-serif carries the accessibility, the serif carries
    the aspiration.
  type_and_image: >-
    Type provides context and framing; photography dominates. Campaign
    headlines are typically overlaid on or adjacent to photography. On
    hm.com, type is functional. product names, prices, categories
    while photography sells the clothing. In designer collaborations,
    the collaborator's name in type shares visual weight with the
    campaign photography.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "hm.com (observed February 2026)"
    - "H&M app interface"
    - "H&M store environments"
  signature_composition: >-
    Grid-based e-commerce with fashion-editorial hero sections. hm.com
    alternates between large campaign hero images (full-width) and
    structured product grids. The layout is more promotional and grid-
    heavy than Zara (which uses a magazine scroll) but more fashion-
    forward than Primark or Shein. Campaign sections use large imagery
    with minimal overlay text. The overall approach balances editorial
    aspiration with commerce functionality.
  density_and_whitespace: >-
    Moderate density. Product grids are standard e-commerce density.
    Campaign hero sections use generous whitespace and large imagery.
    Compared to Zara (lower density, more magazine-like) or ASOS (denser,
    more product-forward), H&M sits in the middle. fashion-aware but
    commerce-practical.
  format_preferences: >-
    Campaign imagery uses portrait and square formats. Product photography
    is consistently portrait (full-body model shots). Hero banners use
    wide landscape formats. The overall orientation mirrors the vertical-
    scrolling mobile-first experience.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "early-adopter"
  relationship_to_trends: >-
    H&M adopts visual trends quickly. its speed-to-market in both
    product and marketing means it reflects current design directions
    within weeks. Designer collaborations bring trend leadership;
    core brand marketing follows trends rather than setting them.
  examples:
    - trend: "Designer-mass market collaborations"
      stance: "leader"
      evidence: >-
        H&M pioneered the designer-collaboration model in fast fashion
        (Karl Lagerfeld, 2004). Recent collaborations include Mugler x H&M
        (2023) and Glenn Martens (Autumn 2025). Each collaboration creates
        a distinct visual identity that elevates the brand's creative
        credentials.
      reasoning: >-
        H&M invented the format that Uniqlo, Target, and others now follow.
        The visual language of designer collaborations (distinct branding,
        elevated photography, limited availability) has become a category
        convention.
    - trend: "Inclusive casting in fashion photography"
      stance: "early-adopter"
      evidence: >-
        H&M has progressively diversified casting across age, size, ethnicity,
        and gender expression. The SS25 'Notes On Being' campaign (Sam Rock)
        uses diverse, documentary-style casting. Ann-Sofie Johansson (Creative
        Advisor since 2015) has overseen this evolution.
      reasoning: >-
        H&M adopted inclusive casting earlier and more comprehensively than
        most fast-fashion competitors, reflecting its 'fashion for all'
        positioning.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    H&M Red (#CC071E) as a framing element. HM Ampersand/Amperserif as
    the type system. The accessible, democratic tone. The H&M logotype.
  what_bends: >-
    Designer collaborations override the core visual language with the
    collaborator's aesthetic. Photography style shifts dramatically between
    core brand, Studio, and collaboration modes. Colour palette expands
    for seasonal and collaboration-specific campaigns. Creative teams
    change with each collaboration.
  notable_examples: >-
    Mugler x H&M (2023): high-contrast, body-positive, provocative fashion
    photography. the most visually radical H&M collaboration. Glenn Martens
    x H&M (Autumn 2025): Belgian deconstructionist aesthetic applied to
    fast fashion. H&M Studio AW25: brutalism-inspired visual direction
    that pushed the internal creative team beyond the accessible baseline.
    Forsman & Bodenfors (Swedish agency): long-standing creative partner
    for H&M's Swedish-market and global campaigns.
