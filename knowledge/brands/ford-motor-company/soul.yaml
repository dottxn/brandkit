summary: "Soul of Ford Motor Company. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The open road at dawn—possibility, freedom, American landscape unfolding ahead, practical magic. You're behind the wheel of something that works, something that will get you there, something that means something. The freedom isn't luxury freedom (which is private and exclusive); it's working freedom—the freedom to build, to travel, to live differently because you have reliable mobility. It feels like American possibility: get the truck, make the plan, build the life. Ford feels permanent because it's always worked.
core_belief: >-
  Mobility is freedom; giving people vehicles changes their story, expands their possibilities, is fundamentally empowering. Ford's belief isn't primarily about cars—it's about what cars enable. A truck isn't transportation; it's the tool that lets you build a business, move your family, pursue your dreams. The brand exists to serve that empowerment. Utility has soul; reliability is romance.
creative_tension:
  - >-
    Heritage craftsmanship vs. digital disruption: Ford built its equity through 120+ years of American manufacturing, consistent quality, and working-class authenticity. Simultaneously, Ford must lead the EV transition while maintaining that heritage equity. Can a brand that invented assembly-line manufacturing authentically become a technology company? Can century-old heritage coexist with digital future? Ford's answer is segmentation (Ford Blue for heritage, Model e for EV future) but unified visual identity. The tension is real and unresolved; the F-150 can't become a Tesla competitor without destroying brand equity, yet Ford must transform or die.
  - >-
    Blue-collar authenticity vs. luxury aspiration: Ford serves both commercial fleet operators (who value reliability and margin) and consumers chasing dreams of freedom and adventure. These are psychologically different buyers. Ford Pro speaks to operators; Ford consumer marketing speaks to dreamers. The brand must maintain authenticity with commercial users while remaining aspirational to consumers. Too much luxury focus alienates blue-collar origin; too much utilitarian focus limits premium aspirational positioning. Ford keeps both audiences by treating blue-collar work as genuinely aspirational—the dignity of labor becomes premium value.
decision_filter: >-
  Does this help people build better lives? Is it honest about Ford's heritage while credible about its future? The brand asks whether every design and messaging choice acknowledges both where Ford came from (manufacturing excellence, working-class service) and where it's going (EV transition, digital services, Ford Pro premium margins). False modernity (abandoning heritage for trendy positioning) fails the test. Nostalgic retreat (refusing EV transition) also fails. The filter requires honest navigation of both truths simultaneously.
signature_move: >-
  The blue oval frame—everything Ford uses must fit inside this shape, creating unity across 120+ years of diverse vehicles. It's a constraint that breeds creativity. Every vehicle model has unique design, but all live inside the same oval. It's the design equivalent of Ford's business model: modular constraint that enables variety. The oval has subtle depth, warmth (never cold geometry), and proportions refined across a century. It's impossible for competitors to own; it's been Ford's literal signature for decades. This constraint has given Ford more visual consistency than competitors could achieve with flexible systems.
what_would_break_it: >-
  Moving to a flat wordmark without the oval would destroy the constraint that creates coherence. Abandoning the Spencerian script for a modern sans-serif would erase the handwritten humanity in an industrial company. Positioning as trendy rather than trustworthy would contradict the heritage that is Ford's actual competitive advantage. Over-emphasizing EV transition at the cost of F-150 legacy would alienate the volume business. Over-emphasizing commercial/utilitarian positioning would lose the aspirational consumer market. Adopting the aesthetic of tech companies (white, minimalist, gesture-based) would undermine manufacturing credibility.
