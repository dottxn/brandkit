summary: >-
  Visual language for Jaguar. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules. Note: as of February 2026,
  the new identity (launched November 2024) is a paper identity with no
  production vehicles delivered. All observations are of the brand
  system, not real-world product deployment.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "new-identity-launch"
      touchpoints:
        - "jaguar.com (post-rebrand, November 2024)"
        - "Type 00 concept car reveal (Miami Art Week, December 2024)"
        - "Social media rebrand rollout (November 2024)"
        - "Press materials and brand films"
      description: >-
        Bold, fashion-forward, polarising. Full-bleed colour fields in
        saturated tones (Satin Rhodon Rose on the Type 00 concept car).
        New custom typeface by Monotype in all-caps at extreme scale.
        Four brand marks (Device Mark, Artist Mark, Makers Mark,
        Strikethrough) used interchangeably. No vehicle in the initial
        launch film — only people, colour, movement, and the new identity.
        The visual register is closer to Bottega Veneta or Acne Studios
        than to any automotive brand.
      differs_from_default_by: >-
        This is the current and only visual mode. There is no production
        vehicle portfolio, no dealership network operating under the new
        identity, and no customer-facing product experience yet.

    - name: "legacy-transition"
      touchpoints:
        - "Existing Jaguar vehicles still on roads and in dealerships"
        - "jaguar.com heritage and pre-owned sections"
        - "Owner communications"
      description: >-
        The previous Jaguar identity (leaper logo, serif typography,
        British luxury positioning) still exists in the real world
        through the existing vehicle fleet and dealer network. The
        visual transition between old and new has not been resolved
        publicly — there is a gap between the new identity and the
        physical reality of current Jaguar ownership.
      differs_from_default_by: >-
        This is the ghost of the previous identity that still operates
        in physical spaces while the new identity exists primarily in
        digital and press contexts.

  notes: >-
    This is a paper identity as of February 2026. The Type 00 is a
    concept car. No production vehicles have been delivered under the new
    brand. Jaguar launched a global creative account review in May 2025
    (Accenture Song was the incumbent). The visual system may change
    significantly before production vehicles reach market. This chunk
    should be re-evaluated when the first production car launches.

# ── Photography ──────────────────────────────────

photography:
  confidence: "low"
  primary_sources:
    - "Type 00 concept car photography (Miami Art Week, December 2024)"
    - "'Copy Nothing' rebrand launch film (November 2024)"
    - "jaguar.com post-rebrand imagery"
    - "Richard Stevens — Brand Design Director, Jaguar"
  subject_and_framing: >-
    The rebrand launch film featured no vehicles — only people in
    colourful, fashion-editorial styling, moving through abstract spaces.
    This generated 160M+ YouTube views and intense public reaction. The
    Type 00 concept car photography is architectural — the car as
    sculpture in gallery-like settings, Satin Rhodon Rose paint dominating
    the frame. People are styled, not cast as drivers or owners. The
    framing is fashion-editorial: full-length poses, geometric
    compositions, colour-coordinated wardrobe.
  casting_observed: >-
    The launch film cast androgynous models in bold, non-automotive
    styling — bright colours, architectural garments, movement-based
    posing. No traditional automotive casting (driver behind wheel,
    family by car, executive in suit). This was the most commented-upon
    element of the rebrand. No customer or owner photography exists
    under the new identity.
  lighting_and_colour: >-
    Saturated, warm, theatrical. The Type 00 in Satin Rhodon Rose is
    lit to emphasise the colour — it is the visual centrepiece. The
    launch film uses dramatic, fashion-show lighting. Nothing natural
    or documentary. The lighting approach is closer to a Gucci campaign
    than to anything in the automotive category. This is a deliberate
    departure from the previous Jaguar's cool, British, restrained
    lighting.
  post_production: >-
    Highly stylised. Colour grading is saturated and precise — each
    colour in the system (including the Rhodon Rose) is controlled
    exactly. The visual output has the production quality of a fashion
    brand, not an automotive manufacturer. The concept car images are
    rendered/retouched to sculptural perfection.
  visual_boundaries:
    stated_exclusions: >-
      Gerry McGovern (CCO) has stated the new Jaguar will 'copy nothing.'
      The brand explicitly rejects conventional automotive visual codes —
      roads, driving scenarios, performance metrics, competitive
      comparisons, heritage nostalgia.
    observed_exceptions: >-
      The heritage section of jaguar.com still shows traditional
      automotive photography. The transition between old and new identity
      is unresolved visually.
    genuine_absence: >-
      Based on all post-rebrand materials: no driving footage, no road
      settings, no speedometers or performance data, no traditional
      automotive lifestyle imagery. The absence of actual cars in the
      launch was the defining visual choice.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Accenture Song / Spark44 — brand identity (pre-review)"
    - "Monotype — custom typeface design"
    - "jaguar.com post-rebrand"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Not characterised — the new identity system has not deployed enough
    functional UI to establish an icon language. The focus has been on
    brand marks and typography rather than functional interface design.
  graphic_devices: >-
    Four interchangeable brand marks — Device Mark (geometric), Artist Mark
    (expressive), Makers Mark (craft-focused), and Strikethrough (the most
    reductive). The leaper cat has been retired from the primary identity
    (though it may return on vehicles — unconfirmed). The Monotype custom
    typeface itself functions as a graphic device — distinctive enough at
    large scale to be recognisable as a system. Bold colour fields
    (particularly the Satin Rhodon Rose associated with the Type 00) serve
    as the primary graphic structure.
  motion_language: >-
    Observed in the 'Copy Nothing' launch film: slow, fashion-paced,
    editorial. Long holds on colour and movement. The models walk, don't
    run. The pace is deliberate and confident — closer to a Prada film
    than a car commercial. No engine sounds, no speed, no dynamism in the
    traditional automotive sense. The motion language is about presence,
    not performance.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "medium"
  primary_sources:
    - "Monotype — custom typeface designed for Jaguar rebrand (2024)"
    - "jaguar.com post-rebrand"
    - "Type 00 reveal materials"
  signature_move: >-
    The Monotype custom typeface at extreme scale, all-caps, generously
    tracked. The letterforms are geometric and modernist — no reference
    to the previous serif identity. 'JAGUAR' in the new type is
    unrecognisable as the same brand at first glance. The tracking is
    wider than automotive convention — every letter breathes. This is the
    single most divisive typographic decision in recent automotive history.
  what_would_look_wrong: >-
    The previous serif typeface (immediately identified as 'old Jaguar').
    Tight tracking (contradicts the spacious, fashion-forward system).
    Lowercase (the system is built on uppercase authority). Any typeface
    with traditional British luxury connotations — no Baskerville, no
    Garamond, no Times. Condensed type (the system needs horizontal space
    to breathe).
  case_convention: >-
    Uppercase for the brand name, headlines, and most display applications.
    The uppercase convention is central to the new identity — it creates
    the wide, architectural quality that distinguishes the system. Sentence
    case for body text where deployed.
  display_vs_body: >-
    Display: Monotype custom — geometric, uppercase, wide-tracked, the face
    that carries the entire new identity. Body: insufficient deployment to
    characterise. The new identity has been expressed almost entirely in
    display typography — there is minimal body text in the post-rebrand
    materials because the brand is communicating through image, colour,
    and headline rather than information.
  type_and_image: >-
    Type dominates. In the rebrand launch, type appeared without vehicles.
    The typography is confident enough to stand alone on colour fields
    without photographic support. When type and image coexist (Type 00
    reveal), the type sits on the image at scale — not deferring, not
    competing, but asserting equal presence. This is the opposite of
    traditional automotive typography, which typically defers to the car.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "low"
  primary_sources:
    - "jaguar.com post-rebrand"
    - "Type 00 reveal event materials"
  signature_composition: >-
    Full-bleed colour fields with centred type or centred vehicle. The
    compositions are simple to the point of minimalism — one colour, one
    element, maximum impact. The simplicity is the statement. Compared to
    every other luxury automotive brand (Bentley, Aston Martin, Porsche),
    which use compositional complexity to signal luxury, Jaguar's post-
    rebrand layouts signal luxury through reduction and confidence.
  density_and_whitespace: >-
    Extremely low density. The rebrand materials are almost entirely
    whitespace (or colour-space). This is sustainable for a brand launch
    but untested for the information-density requirements of actual vehicle
    marketing (configurators, pricing, specifications, finance).
  format_preferences: >-
    Square and wide for digital. The launch film was 16:9. The colour
    fields work at any aspect ratio because they are abstract rather than
    compositionally dependent. This format-agnosticism may be intentional
    for a brand that needs to work across digital, physical, and
    experiential touchpoints.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "subverter"
  relationship_to_trends: >-
    The Jaguar rebrand deliberately subverts every convention of automotive
    visual identity. It follows fashion and art-world trends rather than
    automotive trends. Whether this is visionary or misguided is
    unresolved — the identity exists in isolation from a product.
  examples:
    - trend: "Fashion-forward automotive branding"
      stance: "leader"
      evidence: >-
        The 'Copy Nothing' launch (November 2024) and Type 00 reveal
        (Miami Art Week, December 2024) positioned Jaguar in fashion and
        art contexts rather than automotive contexts. The Satin Rhodon
        Rose colour, androgynous casting, and fashion-editorial photography
        were industry firsts for a major automotive brand.
      reasoning: >-
        Jaguar needed to signal total reinvention for its pivot to
        all-electric luxury. The fashion-forward approach creates distance
        from both the old Jaguar and from EV competitors (Tesla, Polestar,
        Lucid) who use tech-forward visual language.
    - trend: "Brand identity without product"
      stance: "leader"
      evidence: >-
        Launching a brand identity without showing the product (the rebrand
        film had no cars) is extremely rare for automotive. The launch
        generated 160M+ YouTube views precisely because it broke this
        convention. The approach mirrors fashion brand launches where
        the brand world precedes the product.
      reasoning: >-
        With no production vehicles ready, Jaguar turned the limitation
        into the strategy — launching the brand as a cultural statement
        before a product statement.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: ""
  what_stays: ""
  what_bends: ""
  notable_examples: >-
    No collaborations observed under the new identity. The rebrand is too
    recent and the product pipeline is not yet public. The Miami Art Week
    Type 00 reveal functioned as a cultural collaboration with the art
    world, but no formal brand partnerships have been announced. The
    previous Jaguar had notable collaborations (Jaguar x Hot Wheels,
    Jaguar in James Bond films) but these belong to the legacy identity
    and are not transferable to the current system.
