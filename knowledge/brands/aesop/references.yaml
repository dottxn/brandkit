    url: "https://romainlaprade.com/"
    context: "Travel campaigns, SPF campaign, Parsley Seeds campaign, RIMOWA x Aesop collaboration. architectural and still-life specialist"

  - name: "Lasse Kusk"
    role: photographer
    url: "https://www.shotbykusk.com/"
    context: "Campaign photography and official product photography. Danish, Tokyo-based since 2015"

  - name: "Luke Evans"
    role: photographer
    url: "https://www.luk-e.com/"
    context: "Always On campaign photography. also shoots for Fenty, Jo Malone, Tiffany"

  - name: "Henrik Bülow"
    role: photographer
    url: "https://www.commission.studio/projects/aesop-gloam-campaign"
    context: "Gloam fragrance campaign stills. self-reflection and the body in repose"

  - name: "Edvinas Bruzas"
    role: photographer
    url: "https://edvinasbruzas.com/"
    context: "Always On campaign. Lithuanian-born, London-based; also shoots for Kinfolk, Monocle, Dyson"

  - name: "Ollie Tomlinson"
    role: photographer
    url: "https://www.ollietomlinson.com/"
    context: "Store interior photography. Aesop Leeds, Islington, published in Dezeen"

  - name: "Simone Marcolin"
    role: photographer
    url: "https://simonemarcolin.com/"
    context: "Photographed Aesop Barcelona store (Barozzi Veiga). architectural and object specialist"

  # ── Film & motion ──
  - name: "Jan Vrhovnik"
    role: cinematographer
    url: "https://www.janvrhovnik.com/"
    context: "Fragrance film campaigns. 2023 Cannes Young Directors Award; also shoots for Balenciaga, Hermès, JW Anderson"

  - name: "Frederik Säll"
    role: motion-designer
    context: "Motion design direction for Gloam fragrance campaign via Commission Studio"

  # ── Set design ──
  - name: "Kei Yoshino"
    role: set-designer
    url: "https://www.kyoshino.com/"
    context: "Set design for Always On campaign. hand-crafted props, graphic play with objects and textures"

  # ── Architects ──
  - name: "Peter Zumthor"
    role: architect
    url: "https://www.pritzkerprize.com/laureates/2009"
    context: "His 'Atmospheres' is one of three books given to every architect before they begin an Aesop store"

  - name: "Paulo Mendes da Rocha"
    role: architect
    url: "https://www.pritzkerprize.com/laureates/2006"
    context: "Designed Aesop's São Paulo store. Brutalist material honesty"

  # ── Type designers ──
  - name: "Hermann Zapf"
    role: type-designer
    url: "https://fonts.adobe.com/designers/hermann-zapf"
    context: "Designed Optima (1958). Aesop's logotype typeface, inspired by Florentine gravestone inscriptions"

  - name: "Ian Party"
    role: type-designer
    url: "https://newglyph.com/"
    context: "Founded Swiss Typefaces, designed Suisse International. Aesop's primary body typeface"

publications:
  - title: "Atmospheres"
    author: "Peter Zumthor"
    relevance: "One of three books given to every architect before they begin an Aesop store. spatial philosophy of sensation and material"

  - title: "The Poetics of Space"
    author: "Gaston Bachelard"
    relevance: "Second of the three architect books. philosophical framework for how people inhabit and experience space"

  - title: "In Praise of Shadows"
    author: "Jun'ichirō Tanizaki"
    relevance: "Third architect book. the aesthetic of restraint, shadow, and patina that runs through Aesop's visual language"

