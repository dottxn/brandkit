summary: "Soul of Oatly. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  The punk rock band that played your high school cafeteria and suddenly made you realize the system you'd accepted was negotiable—irreverent, dangerous, but somehow more honest than the establishment.
core_belief: >-
  The status quo is not inevitable; it's a choice made by people with power, and you have the power to unmake that choice every time you buy something.
creative_tension:
  - >-
    Oatly is owned by Blackstone and major institutional investors, yet positions itself as an anti-establishment insurgent—the more successful the brand becomes, the more it must maintain its outsider credibility or collapse into hypocrisy.
  - >-
    The brand's radical transparency and irreverence is an actual marketing strategy, not an authentic expression. This creates an unsolvable paradox: can you be genuinely rebellious while strategically performing rebellion?
decision_filter: >-
  When faced with a fork, Oatly asks "Will this make the consumer smarter or just richer?" and always chooses the former, even when it costs revenue.
signature_move: >-
  The two-line logo with the integrated plant symbol replacing the stem of the "t"—a single gesture that simultaneously says "plant-based," "nature," "growth," and "we're not hiding what we are." No fluff, no ambiguity, pure intent.
what_would_break_it: >-
  Adopting a clean, modern, minimalist sans-serif like Helvetica or Futura. This would signal that Oatly has been cleaned up, professionalized, absorbed into the establishment. The hand-drawn typography is the brand's refusal to be polished into irrelevance.
