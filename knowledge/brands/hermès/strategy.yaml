# ── Data
purpose: >-
  We believe in the power of artisanal craftsmanship to create objects that connect people to their humanity and preserve exceptional know-how for future generations
mission: >-
  To create unique and original objects that elegantly satisfy the needs and desires of customers through the pursuit of excellence in each métier and service
vision: >-
  To perpetuate our unique position as the standard-bearer for handcrafted luxury and timeless elegance through sustained, organic growth while fiercely protecting heritage and artisanal values
values:
  - Excellence in craftsmanship
  - "Transmission of savoir-faire"
  - Entrepreneurial spirit
  - Respect for nature
  - Authenticity and heritage
  - Human values and community
