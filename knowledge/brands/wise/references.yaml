      visually. The Brand New reviews shape industry perception of what constitutes
      successful branding. Being featured (positively) in Brand New signals that
      Wise's rebrand meets critical design standards, not just commercial success.
    intellectual_lineage: >-
      Brand New represents a lineage of design criticism descended from critical
      design journalism (Eye Magazine, Design Observer, It's Nice That). Under
      Consideration's coverage of Wise treats the rebrand as a significant moment
      in fintech design history—not just a company update but a philosophical
      statement about how financial services can communicate. This critical
      framing legitimizes Wise's visual choices within the design community,
      creating what we might call "design credibility" alongside "business credibility."

  - title: "The Brand Identity: Ragged Edge × Wise Interview"
    authors:
      - "The Brand Identity editorial"
    date: 2023
    publication_type: "Designer interview"
    significance: >-
      Interview with Ragged Edge team about the rebrand process, reasoning, and
      strategic thinking. This publication makes the agency's creative process
      visible, explaining the philosophical decisions behind visual choices. For
      Wise's creative genealogy, the interview is critical because it documents
      the specific strategic thinking that led to each visual element. The interview
      format (question-response) allows the designers to explain not just "what we
      did" but "why we made this choice and what precedents influenced us."
    intellectual_lineage: >-
      The designer interview represents a lineage of design publication practice
      descended from Emigre Magazine and contemporary design publications (Design
      Observer, Abstract documentary series) that treat design process and
      reasoning as content worth publishing. This tradition positions designers
      as thinkers, not just makers, and values the explanation of reasoning as
