summary: Visual reasoning for BMW. Why the design choices work.

# ── Data
type_logic: >-
  BMW Type Global Pro is custom-built because Helvetica, its ancestor, is too familiar. the custom version signals precision without nostalgia. Geometric proportions (perfect circles in letterforms) reinforce engineering discipline. The font removes personality, placing all emphasis on the information
colour_logic: >-
  BMW Blue (#009ADA) is neither navy (which feels traditional) nor bright blue (which feels cheap). it occupies a space suggesting technological clarity. Black (#000000) and white (#FFFFFF) create absolute contrast without nuance. The palette rejects gradients or transitions; colors exist as statements
composition_philosophy: >-
  The kidney grille and angel eyes become compositional organizing forces. Top-left headline placement mirrors vehicle cockpit logic (driver's first sight line). Negative space isn't luxury. it's clarity, allowing the eye to move through information like a driver navigates space
what_would_break_it: >-
  Rounded corners, warm color temperatures, soft shadows, centered photography, or any design language that prioritizes visual comfort over technical clarity
