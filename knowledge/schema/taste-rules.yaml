# Taste Rules (Phase One)
#
# Purpose:
# - Encode a small set of "hard guardrails" for decision bundle coherence.
# - Prevent nonsensical combinations early, while the data-driven layer
#   (co-occurrence + norms) does most of the work.
#
# Rules should be:
# - few (<= 10 initially)
# - explicit and falsifiable
# - easy to delete if wrong
#
# Rule format:
# - id: stable identifier
# - if: one or more conditions {axis, value|value_in}
# - require: conditions that must also be true (all must pass)
# - forbid: conditions that must not be true (none may pass)
# - rationale: why this rule exists

version: "0.1"
last_updated: "2026-03-12"

rules:
  - id: "type_is_image_needs_structure"
    if:
      - axis: "type.type_image_relationship"
        value: "type_is_image"
    forbid:
      - axis: "layout.grid_type"
        value: "freeform"
    rationale: >-
      When type becomes the image, a fully freeform layout tends to collapse
      into noise. Require at least some grid discipline.

  - id: "ugc_photography_rare_with_cg_like_finish"
    if:
      - axis: "photo.camera_feel"
        value: "ugc"
    forbid:
      - axis: "photo.retouche_level"
        value: "cg_like"
    rationale: >-
      UGC posture signals authenticity; CG-like finish breaks that claim.

