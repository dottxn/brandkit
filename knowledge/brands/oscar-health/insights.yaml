# ── Data
learned_insights:
  - >-
    Healthcare brands that succeed emotionally do so by speaking conversationally about what insurance actually does (enable care) rather than what it is (financial structure)
  - >-
    "Hot Blue" works because it admits the original blue was dated without claiming the old brand wasn't trustworthy. it's an evolution, not a revolution
  - >-
    Whimsical illustration in healthcare isn't frivolous. it's the opposite of clinical dehumanization that makes patients feel like data points
  - >-
    "choice is power" only resonates when paired with actual UI/UX that demonstrates choice meaningfully, not as abstract marketing claim
  - >-
    Mixed typography (Heldane serif for warmth, Lettera sans for clarity) mirrors the brand's balanced approach: credible and caring
what_nobody_copies: >-
  The architectural decision to introduce legitimate whimsy into healthcare communications without sacrificing credibility. most insurance companies choose either playfulness OR authority, never both
