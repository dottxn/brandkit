summary: Visual reasoning for Tesla. Why the design choices work.

# ── Data
type_logic: >-
  Gotham and custom Tesla typefaces are geometric sans-serifs that abandon all humanistic curves. Gotham is authoritative. it's the typeface of infrastructure signs and government buildings. This grounds Tesla in the language of systems and public good, not personal luxury. The custom font extends this by stripping away anything superfluous. Together, they communicate "this typography was engineered, not designed." Kerning is tight and mathematical. Weights are absolute: bold or regular, nothing in between.
colour_logic: >-
  White (#FFFFFF) and black (#000000) are the only morally neutral colors. they're the absence of subjective preference. Tesla Red (#E31937) appears only at moments of critical emphasis (call-to-action, performance metrics), and it's a pure red with no warmth. it's the emergency brake color, the warning light color. This palette suggests that beauty is incidental to function. The minimization of color is a philosophical statement: "We have solved the problem of how to present information. Color would only muddy it."
composition_philosophy: >-
  Negative space is the primary design element. Content is positioned with such scarcity that every element becomes monumental. Asymmetrical layouts (product frame-right, text-left-justified) create tension that feels like motion. Grids are invisible but absolute. nothing is placed loosely. The effect is that a single car on a white background with three words of text below it contains more information than a traditional car advertisement's entire production budget. This is minimalism as maximalism: maximum clarity through absolute reduction.
what_would_break_it: >-
  The moment Tesla adopts a rounded sans-serif (Circular, Cereal, Montserrat), the brand loses its connection to geometric precision. Rounded forms feel democratic and friendly. they're the typeface of everyday consumer brands and friendly startups. Tesla needs the rigid geometry of Gotham, the stark corners, the refusal to comfort. Similarly, any introduction of warm tones (rose gold, champagne, sunset orange) would undermine the laboratory coldness. The brand exists in the color temperature of x-rays and clean rooms. Finally, any composition that centers human emotion (close-up faces, expressions of joy, celebration) would make Tesla feel like every other lifestyle brand. The grandeur of the brand comes from treating humans as scale reference points in landscapes of technology, not as the focal point.
