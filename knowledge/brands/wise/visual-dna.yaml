composition_logic: >-
  Wise's composition descends from Donald Norman's principle that great
  design *disappears* in service of task completion. The transfer flow
  is the compositional hero — every other element serves clarity of that
  single action. The visual hierarchy is typographic (heavy-weight Sans at
  display scale) and chromatic (the green draws attention) rather than
  spatial (elements don't rely on position for meaning). Information density
  is moderate: Wise chooses to show comparison data (your rate vs. bank rates)
  because transparency requires making the cost *visible*. This rejects the
  minimalist trend that treats information as clutter. Instead, Wise believes
  information is *empowering* — if you can see what you're really paying,
  you can choose. The composition must communicate that choice is *possible*
  and *meaningful*. Whitespace exists not as luxury but as *clarity* — each
  section of the transfer flow (amount, currency, recipient, fee summary)
  appears in its own visual space with enough separation that attention can
  move cleanly from step to step. The Tapestries patterns provide visual
  rhythm in marketing contexts without adding cognitive noise — the patterns
  are ornamental in placement but cultural in meaning. Layout at all scales
  (mobile-first, tablet, desktop) maintains this composition logic: the
  transfer flow is always the priority; supporting information (rates,
  testimonials, feature explanations) appears as secondary layer. The
  composition says: "You can understand this without expertise. Here's the
  action. Here's what it costs. Here's what you get." It's utilitarian
  composition descended from Swiss International Style (Müller-Brockmann's
  grids, 1960s) but humanized through warm typography and cultural pattern-
  making rather than pure geometric restraint.
