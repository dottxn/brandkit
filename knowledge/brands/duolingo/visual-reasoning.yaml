summary: Visual reasoning for Duolingo. Why the design choices work.

# ── Data
type_logic: >-
  Feather Bold is custom and specifically designed with rounded, wing-tipped letterforms inspired by Duo's feathery form. This isn't decoration. it's visual theology. The rounded edges feel organic and non-threatening, which matters for a brand directing guilt-based behavioral messaging. Harsh geometric typefaces would feel authoritarian. The custom nature also signals that Duolingo invests in craft and detail despite the simple, playful aesthetic. DIN Next Rounded provides a secondary option that maintains roundness (psychological warmth) while offering utilitarian clarity when needed (course navigation, button labels).
colour_logic: >-
  Feather Green (#58CC02) is the primary, and it's intentionally bright and hard to miss. It reads as "go," "growth," and "available" simultaneously. Mask Green (#89E219) is slightly lighter. used for secondary actions. The accent colors (#1CB0F6 blue, #FAA918 orange, #D33131 red) are deployed sparingly in UI feedback (correct answer, streak celebration, missed reminder). The palette is expansive (five colors) but used with hierarchy. green dominates and commands attention, while other colors provide micro-feedback. This prevents visual chaos while allowing personality to come through in learner celebrations. The brightness of the green means it works on every background and reads at every scale.
composition_philosophy: >-
  Layouts prioritize Duo as the focal point whenever possible. The mascot is often centered or prominent, creating emotional anchor points throughout the experience. Whitespace is generous around core actions (lesson buttons, streak counter) but Duo illustrations can violate margins and boundaries. This creates visual contrast between systematic UI and chaotic, personality-driven character animation. The composition philosophy is "systematic framework with character permitted to break the rules." This prevents the app from feeling sterile while maintaining navigational clarity. Rounds corners throughout (buttons, cards, Duo's features) reinforce the humanist typeface choice. everything feels safe and friendly rather than sharp.
what_would_break_it: >-
  Removing Duo entirely or making Duo's expressions subtle and corporate. The moment the mascot becomes a generic badge instead of an expressive character with emotional stakes in your learning journey, the brand loses its psychological leverage. Duolingo's real innovation is that Duo creates social obligation (you're disappointing a friend, not failing a test). Sanitizing Duo into a logo would hollow out the entire experience.
