summary: "Anti-patterns for Eventbrite. What this brand would never do."

# ── Data
visual:
  - pattern: "Minimalist, corporate design suggesting ticketing efficiency"
    reasoning: >-
      This would reposition Eventbrite as utility rather than community experience. Minimal design communicates "we're getting out of your way," which is wrong for category. Events are joyful and chaotic; design should reflect that energy.
  - pattern: "Serif typefaces or thin, delicate fonts"
    reasoning: >-
      These suggest authority, tradition, formality. Events are informal, contemporary, youthful. Serif or thin fonts would alienate Gen Z and signal that events are serious rather than fun. Founders Grotesk's bold presence is the tone of voice made visible.
  - pattern: Natural photography without stylization or graphic layering
    reasoning: >-
      Eventbrite's visual approach requires layering (gradients, illustrations, typography, photography). Single-layer, clean-background photography would feel bland and corporate. The multiple visual languages coexisting creates visual density that mirrors event complexity.
  - pattern: "Single, consistent color palette"
    reasoning: >-
      Using traditional brand colors (navy blue, muted tones) instead of vibrant neon gradients would position Eventbrite as corporate platform rather than cultural hub. The neon gradients are essential to the positioning. they signal energy, youth, and alternative culture.
strategic:
  - pattern: Competing with traditional ticketing on price or convenience
    reasoning: >-
      Eventbrite's moat is discovery and community positioning, not ticketing efficiency. Ticketmaster dominates ticketing logistics; Eventbrite's advantage is cultural curation. Competing on ticketing mechanics would be unwinnable.
  - pattern: Attempting to position toward mainstream events only
    reasoning: >-
      This would abandon Eventbrite's actual strength. the ability to surface micro-events, niche communities, and underrepresented cultures. The long-tail strategy of serving thousands of small events is more valuable than thousands of large concerts.
  - pattern: Smooth voice and consensus positioning instead of eccentric personality
    reasoning: >-
      Eventbrite's voice should feel culturally embedded, slightly weird, unexpected. Smoothing into corporate consensus would make the brand indistinguishable from bland tech platforms. Eccentricity is feature, not bug.
  - pattern: Overemphasizing algorithm and AI at the expense of human curation
    reasoning: >-
      If Eventbrite's discovery feels purely algorithmic, the positioning (we understand your culture, we know your people) collapses. Technology should remain invisible; discovery should feel like recommendation from someone with taste.
tonal:
  - pattern: Earnest sincerity about community and connection
    reasoning: >-
      The tone should celebrate community without being sentimental about it. Events are simultaneously joyful and slightly absurd (humans gathering to eat pizza, listen to someone read poetry, etc.). The tone should honor both aspects without apology.
  - pattern: "Trend-chasing or moment-specific references"
    reasoning: >-
      Eventbrite should sound culturally aware and present, but references that are hyper-current date quickly. The voice should age well and remain relevant across seasons and trends. Owning a cultural moment is different from chasing trends.
  - pattern: Defensive positioning about niche events or subcultures
    reasoning: >-
      The tone should be celebratory and confident about all community types. from protest marches to medieval fair conventions. No judgment, no defensiveness. Celebration of diversity is embedded in the voice.
  - pattern: Corporate or formal language about empowerment
    reasoning: >-
      "Empower" sounds buzzword-y when it's corporate speak. The tone should sound like community talking about community, not executives talking about consumer empowerment. Authenticity requires voice that comes from inside culture, not outside observing it.
cultural:
  - pattern: Response to social isolation requires validation of human connection value
    reasoning: >-
      Events became rare or virtual; rebuilding the value of physical gathering is cultural work. Eventbrite's positioning validates the belief that being together matters culturally and not just socially.
  - pattern: >-
      Gen Z experience economy values (experiences > possessions) require repositioning beyond transactional ticketing
    reasoning: >-
      Eventbrite must frame events as identity formation and community membership, not consumption. This is shift from "buy a ticket" to "become part of something."
  - pattern: Niche community celebration is increasingly valuable as mainstream culture fragments
    reasoning: >-
      Subcultures and niche interests are becoming primary cultural drivers. Eventbrite's ability to surface micro-events and connect dispersed communities around shared interests is massive competitive advantage.
  - pattern: FOMO as cultural force requires responsible transformation from anxiety to opportunity
    reasoning: >-
      FOMO is legitimate phenomenon. Rather than dismissing it or exploiting it maliciously, Eventbrite transforms it to positive motivation: "find your people, don't miss the moments that matter to you." This is reframing, not denying.
