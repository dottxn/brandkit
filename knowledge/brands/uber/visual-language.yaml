summary: >-
  Visual language for Uber. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-black"
      touchpoints:
        - "uber.com homepage and marketing pages"
        - "Uber app (ride-hailing interface)"
        - "Global brand campaigns"
        - "Uber social media channels"
        - "OOH advertising"
      description: >-
        Black (#000000) and white (#FFFFFF) dominant. a monochrome palette
        with Safety Blue as a functional accent. The 2018 Wolff Olins
        rebrand (Forest Young, ECD) established the current visual system
        replacing the controversial 2016 'atom' logo with a clean 'UBER'
        wordmark in Uber Move (MCKL / Jeremy Mickel, 2018). Katie Dill
        (Head of Design, ex-Airbnb/Lyft) oversees the visual system. Peter
        Markatos (ECD Brand Experience) manages brand expression. The
        U-Frame composition system uses a grid based on the letter 'U'
        proportions to structure layouts. Frontify brand management platform
        (since 2021) governs brand consistency globally. Base design system
        (base.uber.com) standardises product UI. Compared to Lyft (pink,
        friendlier, more personality-driven) or Bolt (green, European-
        focused), Uber's visual language is the most minimal and the
        most authority-coded in ride-hailing.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this black-and-
        white, Uber Move-set, U-Frame-composed register.

    - name: "uber-eats"
      touchpoints:
        - "Uber Eats app"
        - "ubereats.com"
        - "Uber Eats marketing and campaigns"
        - "Restaurant partner marketing materials"
        - "Uber Eats delivery packaging and bags"
      description: >-
        Green (#06C167, 'Uber Eats Green') replaces black as the dominant
        colour. The Uber Eats visual language is warmer, more appetising,
        and more promotional than the ride-hailing brand. Food photography
        is the hero content. close-up, appetising, warm-lit. The green
        serves as a clear visual separator from ride-hailing Uber (black).
        jkr agency expanded the brand to 'go anywhere, get anything'
        the visual language now encompasses grocery, alcohol, and
        convenience delivery alongside restaurant food.
      differs_from_default_by: >-
        Green replaces black. Food photography replaces map/city imagery.
        The register is warmer, more appetising, more promotional. The
        visual language serves commerce (ordering food) rather than utility
        (getting a ride).

    - name: "uber-for-business"
      touchpoints:
        - "Uber for Business portal"
        - "Enterprise sales and marketing materials"
        - "Corporate travel and expense management"
        - "Uber Freight marketing"
      description: >-
        More structured, more corporate. The monochrome palette remains
        but the visual language adopts more conventional B2B SaaS
        conventions. data visualisations, case studies, structured
        layouts, and enterprise-credible photography. Uber Freight uses
        its own visual sub-language with logistics and supply-chain
        imagery. The enterprise mode demonstrates that Uber's minimal
        visual system can flex corporate without losing its identity.
      differs_from_default_by: >-
        More structured and corporate. Data visualisations and case
        studies replace lifestyle content. The visual language serves
        enterprise procurement rather than consumer engagement.

  notes: >-
    Uber's visual system spans ride-hailing, food delivery, grocery,
    freight, enterprise, and increasingly autonomous vehicles. The
    monochrome base with product-specific colour coding (black for rides,
    green for Eats) provides a scalable framework. The 2018 Wolff Olins
    rebrand was a deliberate reset after the Travis Kalanick-era branding
    controversy.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "uber.com (observed February 2026)"
    - "Uber brand campaigns"
    - "Uber Eats food and lifestyle photography"
    - "2018 Wolff Olins rebrand photography direction"
  subject_and_framing: >-
    Two primary photography modes: city/mobility and food. Ride-hailing:
    urban environments, city streets, maps, and the Uber interface shown
    in context. People in motion. getting in cars, walking city streets,
    arriving at destinations. The framing emphasises movement and urban
    life. Uber Eats: food photography dominates. close-up, warm-lit,
    appetising. Restaurant and delivery scenes. Compared to Lyft (warmer,
    pinker, more personal. 'Lyft' feels like a friend; 'Uber' feels
    like a service) or DoorDash (more food-forward, red-accented),
    Uber's photography is the most architecturally minimal.
  casting_observed: >-
    Diverse, urban, multi-ethnic. Ride-hailing photography shows a global
    cross-section of urban life. professionals, travellers, everyday
    commuters. No celebrity casting. The casting reflects Uber's global,
    egalitarian positioning. the service is for everyone, everywhere.
  lighting_and_colour: >-
    Ride-hailing: neutral-to-cool, urban natural lighting. City environments
    at various times of day. the lighting communicates 24/7 availability.
    Uber Eats: warm, appetising food lighting. the standard food-photography
    warmth that makes food look appealing. The monochrome brand palette
    means photography carries the colour variety.
  post_production: >-
    Clean, moderate processing. Ride-hailing photography is colour-corrected
    to feel urban and contemporary. Food photography follows standard food-
    photography post-production. warmth, saturation, sharpness. No
    distinctive artistic post-production.
  visual_boundaries:
    stated_exclusions: >-
      Uber avoids imagery that feels luxury or exclusive (repositioned from
      the original 'everyone's private driver' premium positioning). The
      brand avoids promotional, deal-coded imagery in primary brand contexts.
    observed_exceptions: >-
      Uber Reserve and Uber Black marketing adopt a more premium register
      darker, more luxurious photography that echoes the original Uber
      positioning before the 2018 rebrand.
    genuine_absence: >-
      Based on uber.com review: no overtly promotional photography, no
      price-comparison imagery, no competitive references, no rural or
      suburban settings in primary brand photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "2018 Wolff Olins rebrand (Forest Young, ECD)"
    - "U-Frame composition system"
    - "Base design system (base.uber.com)"
    - "uber.com (observed February 2026)"
  uses_illustration: true
  illustration_style: >-
    Uber uses a flat, minimal illustration system for instructional
    contexts. onboarding flows, safety features, empty states, and help
    content. The illustrations use the monochrome palette with Safety
    Blue accents. The style is functional and informational. closer to
    infographic than art. Compared to Lyft (more playful, more
    personality-driven illustration) or Grab (more colourful, more
    Southeast Asian-coded), Uber's illustration is the most minimal.
  illustration_role: >-
    Instructional and navigational. Illustration appears in safety
    features (share your trip, verify your ride), onboarding, empty
    states, and help content. It supplements the map-based visual
    experience rather than replacing it.
  icon_style: >-
    The Base design system (base.uber.com) defines a comprehensive icon
    system. minimal, monochrome, consistent stroke weight. Vehicle-type
    icons (UberX, Uber Black, Uber XL, Uber Pool) use simple silhouettes.
    Navigation icons follow standard mobile conventions. The map pin and
    car-on-map are the most distinctive Uber icons.
  graphic_devices: >-
    The UBER wordmark (Uber Move, MCKL/Jeremy Mickel, 2018). clean,
    geometric, uppercase. The U-Frame. a composition grid based on the
    letter 'U' proportions, used to structure marketing layouts, product
    frames, and advertising compositions. The map interface itself is a
    graphic device. the real-time map with car dots, route lines, and
    ETAs is Uber's most recognisable visual element after the wordmark.
    Safety Blue as an accent colour for trust-critical moments (verification,
    safety features).
  motion_language: >-
    Map-based motion. car icons moving along route lines in real time.
    This is Uber's signature motion language, experienced by hundreds of
    millions of users. The real-time map animation is both functional
    (showing where your driver is) and emotionally satisfying (watching
    the car approach). App transitions follow Base design system motion
    principles. smooth, fast, functional. Brand marketing uses urban
    movement. cars, cities, people in motion.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Uber Move (MCKL / Jeremy Mickel, 2018. Display + Text optical sizes)"
    - "2018 Wolff Olins rebrand"
    - "Base design system (base.uber.com)"
    - "uber.com (observed February 2026)"
  signature_move: >-
    Uber Move (MCKL / Jeremy Mickel, 2018). a custom geometric sans-serif
    with Display and Text optical sizes. Jeremy Mickel (MCKL, Minneapolis)
    designed both Uber Move and Pepsi Owners. he specialises in custom
    typefaces for global brands. Uber Move's geometry is clean and
    contemporary. slightly squarish proportions with generous x-height
    for screen legibility. The Display variant uses tighter spacing and
    more refined details; the Text variant is optimised for small-size
    readability across interfaces. The typeface replaced a period of
    typographic instability (the 2016 rebrand had used a different type
    system that lasted only two years).
  what_would_look_wrong: >-
    A serif typeface (Uber is entirely sans-serif). A warm, rounded
    sans-serif (contradicts the geometric precision). The pre-2018
    typography (associated with the Kalanick era). Any typeface that
    reads as playful or casual (Uber's tone is efficient and authoritative,
    not friendly. that's Lyft's territory).
  case_convention: >-
    The UBER wordmark is uppercase. Product names use title case ('Uber
    Eats,' 'Uber Black,' 'Uber Reserve'). Body text uses sentence case.
    Marketing headlines vary between uppercase (for impact) and sentence
    case (for warmth).
  display_vs_body: >-
    Display: Uber Move Display. tighter spacing, more refined details,
    used for marketing headlines, campaign type, and brand moments. Body:
    Uber Move Text. optimised for small-size screen reading, used across
    the app interface, product descriptions, and documentation. The
    optical size distinction (Display vs Text) is more technically
    sophisticated than most brand type systems. it ensures typographic
    quality across all sizes.
  type_and_image: >-
    Type provides functional context in the ride-hailing experience
    ETAs, prices, addresses, driver names. The map interface is the visual
    hero; type serves it. In marketing, the UBER wordmark and campaign
    type sit cleanly against photography or colour fields. The U-Frame
    composition system structures the type-image relationship.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "uber.com (observed February 2026)"
    - "Uber app interface"
    - "U-Frame composition system"
    - "Base design system"
  signature_composition: >-
    Map-centred. The Uber app's primary composition is a full-screen map
    with a bottom sheet for interaction. this layout pattern has been
    adopted by virtually every ride-hailing and delivery app. The map
    dominates; UI elements float above it. Marketing uses the U-Frame
    system. a grid based on the letter 'U' proportions that structures
    advertising and campaign layouts into consistent, modular compositions.
    uber.com uses clean, sectioned layouts with generous whitespace.
    Compared to Lyft (similar map-centred layout but warmer, more
    personality-injected) or Grab (more complex, more feature-rich
    super-app layout), Uber's composition is the most architecturally
    minimal.
  density_and_whitespace: >-
    Low density in the ride-hailing app. the map fills most of the screen,
    with minimal UI overlay. Marketing uses generous whitespace, consistent
    with the monochrome, minimal brand register. Uber Eats is denser
    food listings, restaurant cards, and category navigation create a
    commerce-standard density. The Base design system defines spacing
    scales that maintain consistency across contexts.
  format_preferences: >-
    Map-first vertical format for the ride-hailing app. Card-based product
    listings for Uber Eats. The U-Frame system accommodates various aspect
    ratios for advertising. Marketing materials tend toward landscape for
    OOH and square for social.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    Uber set the visual standard for ride-hailing apps (map-centred
    interface, bottom-sheet interaction) and selectively adopts broader
    design trends when they serve utility. The 2018 rebrand was a
    deliberate reset toward design-industry best practices.
  examples:
    - trend: "Map-centred app interfaces"
      stance: "leader"
      evidence: >-
        Uber's map-centred ride-hailing interface (full-screen map, floating
        bottom sheet, real-time car tracking) established the visual standard
        for the entire ride-hailing and delivery category. Lyft, Bolt, Grab,
        and Gojek all follow this layout pattern.
      reasoning: >-
        Uber's interface pattern is now so ubiquitous that it's difficult to
        remember that it was a design innovation. The map-centred approach
        solved a fundamental UX problem (showing where you are and where
        your ride is) that became the category standard.
    - trend: "Design systems in tech"
      stance: "early-adopter"
      evidence: >-
        Base design system (base.uber.com) is one of the most comprehensive
        public design systems in tech. covering components, tokens, motion,
        accessibility, and brand guidelines. Frontify (brand management
        platform, since 2021) governs brand consistency at global scale.
      reasoning: >-
        Uber's scale (operating in 70+ countries, 10,000+ cities) demands
        systematic design governance. Base represents an industry-leading
        approach to design-system maturity.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    The UBER wordmark in Uber Move. The monochrome base palette. The
    map-centred interface pattern. The U-Frame composition system. Safety
    Blue for trust-critical moments.
  what_bends: >-
    Uber Eats introduces green and food-specific visual language. Uber
    Freight adopts logistics-specific imagery. City-specific activations
    adapt to local cultural contexts. Product tiers (Uber Black, Reserve)
    introduce premium visual registers.
  notable_examples: >-
    Uber x Wolff Olins (2018 rebrand): Forest Young (ECD) created the
    visual system that replaced the controversial 2016 identity. a
    deliberate corporate rehabilitation through design. Uber x jkr (brand
    expansion): extended the visual identity from ride-hailing to 'go
    anywhere, get anything'. encompassing Eats, grocery, alcohol, and
    convenience delivery. Uber Eats x restaurant partners: the visual
    system accommodates thousands of restaurant brands within Uber's
    framework. each restaurant maintains its own visual identity within
    the Uber Eats chrome.
