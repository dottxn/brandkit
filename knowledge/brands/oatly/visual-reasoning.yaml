summary: Visual reasoning for Oatly. Why the design choices work.

# ── Data
type_logic: >-
  Oatly's custom hand-drawn typography is intentionally imperfect—characters vary in weight, spacing is irregular, baselines dance. This is the opposite of what most brands pursue (perfect legibility systems). But it works for Oatly because imperfection signals authenticity and humanity. A hand-drawn character can't be mass-produced perfectly; it retains traces of the human hand that made it. In a category dominated by sleek corporate sans-serifs, hand-drawn typography is a refusal. The typography says "we're not trying to look corporate because we're not a corporation first, we're a people-driven mission." This choice would be catastrophic for a bank or insurance company (where imperfection signals untrustworthiness), but it's essential for Oatly (where corporate perfection signals inauthenticity).
colour_logic: >-
  The three-color system (#4A90E2 blue, #7ED321 green, #F5A623 yellow) is deliberately primary-school bright. These aren't sophisticated designer colors; they're the colors of childhood, of rebellion, of energy. The brightness prevents the brand from looking premium or aspirational, which would contradict the "accessible movement" positioning. Blue represents calmness and trustworthiness (you're safe with us), green represents growth and nature (we're environmentally conscious), yellow represents energy and youth (we're not establishment). The palette is deployed boldly—not as accent colors, but as primary colors that occupy huge surface area. This is the opposite of minimalist design, which is coded as "wealthy, sophisticated, refined." Oatly chooses visibility and honesty over elegance.
composition_philosophy: >-
  Every surface is copy-heavy and dense with information. There are no quiet moments on Oatly packaging. White space is minimal by design—the brand refuses the aesthetic distance that signals luxury or sophistication. The philosophy is abundance: if you want to know something, it's here. If you want to smile, the copy gives you permission. Layouts treat the back and side panels as equally important as the front, making the entire box a communication device. This forces the consumer to engage with the package fully, rotating it, reading it, discovering jokes and information throughout. Most food companies design packaging for the shelf moment (first 3 seconds); Oatly designs for the cabinet moment (engaged reading).
what_would_break_it: >-
  Adopting a clean, minimalist aesthetic with lots of white space and a single sans-serif typeface. This would immediately signal that Oatly has been absorbed by design trends and corporate sensibility. Removing or minimizing the copy on packaging, replacing it with minimalist photography of oat fields or beautiful product shots. Using dark, muted, "sophisticated" colors like deep greens and charcoals instead of the primary-school brights. Collaborating visually with premium lifestyle brands without maintaining irreverent voice—a partnership with Acne or Dieter Rams would feel like selling out. Using realistic photography of dairy (to show contrast) without the irreverent copy that makes comparison funny rather than preachy. Adopting a mascot or cartoon character that rounds the sharp edges of the brand's personality.
