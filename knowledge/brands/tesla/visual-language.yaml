summary: >-
  Visual language for Tesla. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "product-configurator"
      touchpoints:
        - "tesla.com vehicle pages and configurator"
        - "Tesla app interface"
        - "Tesla retail store displays"
        - "Vehicle delivery experience"
      description: >-
        Product isolated on clean background. white, grey, or contextual
        environment. 3D renders and photography that emphasise vehicle form,
        paint finish, and design details. The configurator IS the shopping
        experience. no dealership, no salesperson, the website does the
        selling. Tesla sans-serif (Göran Söderström / Letters from Sweden,
        designed 2014) for all UI and marketing text. The visual register
        is minimal, tech-forward, and product-dominant. closer to Apple's
        product pages than to any automotive competitor. Franz von
        Holzhausen (Chief Designer since 2008) defines the vehicle design
        language that the marketing visual language serves.
      differs_from_default_by: >-
        This is the baseline. All other modes depart from this clean,
        minimal, configurator-native register.

    - name: "cybertruck-industrial"
      touchpoints:
        - "tesla.com/cybertruck product pages"
        - "Cybertruck marketing and launch photography"
        - "Cybertruck-specific social content"
        - "tesla.com/cybertruck configurator"
      description: >-
        Harder, darker, more aggressive. The Cybertruck's visual language
        departs from the rest of the Tesla range. unpainted stainless
        steel, flat angular panels, industrial material finish. The
        marketing photography is moodier and more dramatic than the
        standard Tesla product register. darker environments, harder
        lighting, the vehicle's angular silhouette emphasised. The visual
        register is closer to a concept car or industrial sculpture than
        to the friendly, accessible register of Model 3/Y. The Model Y
        2025 refresh has begun adopting some Cybertruck design elements
        (angular light bar, more aggressive front fascia), suggesting
        the Cybertruck aesthetic may influence the broader product line.
      differs_from_default_by: >-
        Darker, more angular, more confrontational. The smooth, minimal
        baseline register is replaced by industrial aggression. This is
        the most polarising visual mode in the automotive industry.

    - name: "software-ui"
      touchpoints:
        - "Tesla vehicle touchscreen interface (UI V12, software 2024.14)"
        - "Tesla app interface"
        - "Full Self-Driving (FSD) visualisation display"
        - "Energy products UI (Powerwall, Solar)"
      description: >-
        Dark interface, minimal chrome, data-forward. The in-vehicle UI
        (V12, updated 2024.14) uses a dark background with the Tesla
        sans-serif and simple iconography. The FSD visualisation is
        distinctively Tesla. a real-time 3D rendering of the car's
        surroundings with detected objects highlighted. The software UI
        is intentionally plain. functionality over decoration. Compared
        to Mercedes MBUX (more luxurious, more ambient-lit) or BMW iDrive
        (more structured, more information-dense), Tesla's UI is the
        most minimal and the most phone-like.
      differs_from_default_by: >-
        Screen-native rather than marketing-native. The vehicle UI is the
        most-seen expression of the Tesla visual language. every driver
        interacts with it daily. The minimal quality of the marketing
        extends into the actual product experience.

  notes: >-
    Tesla's visual language is shaped by unusual constraints: $0 traditional
    advertising budget (all marketing is owned media, social media via Elon
    Musk's 180M+ X followers, and word of mouth), direct-to-consumer sales
    (no dealership visual systems to manage), and software-defined product
    (the vehicle's visual experience updates via OTA). The brand has
    experienced significant reputation challenges (2024-2025) that may
    affect future visual strategy.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "tesla.com vehicle pages and configurator imagery (observed February 2026)"
    - "Tesla delivery and event photography"
    - "Franz von Holzhausen. Chief Designer (since 2008)"
    - "Tesla social media and owner-generated content"
  subject_and_framing: >-
    Vehicle-dominant. the car fills the frame, shot at angles that
    emphasise design lines and proportions. tesla.com uses 3D renders
    alongside photography. the configurator imagery is rendered, while
    lifestyle and event content is photographic. Vehicle is typically
    shown in clean environments. empty roads, open landscapes, minimal
    urban contexts. The framing emphasises the vehicle's silhouette and
    design details (headlights, wheel design, roofline). Compared to
    BMW (more dynamic, more driving-focused) or Mercedes (more luxurious,
    more lifestyle-integrated), Tesla's photography is more static and
    more design-focused. the vehicle is presented as a design object
    rather than a driving experience.
  casting_observed: >-
    Almost no people in Tesla's marketing photography. The vehicle is
    the sole subject. When people appear, they are shown getting into,
    out of, or sitting in the vehicle. the interaction is functional.
    No celebrity endorsement. Owner-generated content (a significant
    portion of Tesla's visual presence) shows real owners and their
    vehicles. The 2017 Project Loveday campaign invited owners to create
    ads. the user-generated aesthetic is a de facto part of the brand's
    photographic identity.
  lighting_and_colour: >-
    Clean, high-key, tech-precise. Vehicle renders use controlled studio
    lighting designed to show paint colour and surface finish accurately.
    The configurator imagery is evenly lit with soft gradients. Outdoor
    photography uses natural light. open sky, golden hour, clean horizons.
    The colour world is dominated by the vehicles' own colours (white,
    black, red, blue, midnight silver) against neutral environments.
    Guardsman Red (#CC0000) is the brand accent colour but it's used
    sparingly in marketing. the vehicles' own palette drives the colour
    experience.
  post_production: >-
    Vehicle imagery is heavily controlled. whether rendered or photographed,
    the surface quality, reflections, and colour accuracy are precise.
    3D renders are the primary hero imagery and are colour-accurate to
    physical vehicles. Lifestyle photography is lightly graded to maintain
    the clean, tech-forward aesthetic. No heavy artistic grading.
  visual_boundaries:
    stated_exclusions: >-
      Tesla positions against traditional automotive visual codes
      no racetrack photography, no family-in-SUV scenarios, no dealer
      showroom imagery, no competitive comparison advertising. The brand
      also avoids the premium-luxury visual codes of Mercedes, BMW, or
      Audi (no dark, moody, lifestyle-aspiration photography).
    observed_exceptions: >-
      Cybertruck marketing introduces darker, more dramatic photography
      that is unusual for Tesla's typically clean register. Some market-
      specific content uses more conventional automotive photography
      (driving shots, road contexts).
    genuine_absence: >-
      Based on tesla.com review: no traditional advertising photography,
      no celebrity or lifestyle casting, no price-prominent marketing
      (prices appear in configurator only), no dealer or showroom imagery,
      no competitive references. The visual world is remarkably sparse.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "Tesla wordmark and T logo"
    - "tesla.com interface and vehicle UI"
    - "FSD (Full Self-Driving) visualisation"
    - "Tesla energy product graphics"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Minimal, thin-line, monochrome. The vehicle UI (V12) uses a simple
    icon set. navigation, media, climate, and vehicle controls. The
    icons are functional and undecorated. The Tesla app mirrors this
    style. Not a distinctive brand element. the minimalism extends to
    icon design.
  graphic_devices: >-
    The Tesla 'T' logo. a geometric, symmetrical mark that references
    an electric motor cross-section (designed by RO Studio, 2003). The
    'T' is used sparingly and at small scale. on the vehicle nose, on
    the website, on the app icon. It is not a dominant compositional
    element in the way that BMW's roundel or Mercedes's star is.
    Guardsman Red (#CC0000) as an accent in the UI and marketing (the
    'Order Now' button, the energy product graphs). The FSD real-time
    visualisation. a unique graphic expression that no competitor has
    replicated at Tesla's level.
  motion_language: >-
    Observed on tesla.com and in-vehicle UI: smooth, minimal, physics-
    based. Vehicle configurator transitions are smooth 3D rotations.
    The FSD visualisation is real-time 3D rendering. UI animations are
    functional. panels slide, content fades. No decorative motion.
    tesla.com product pages use scroll-triggered reveals similar to
    Apple's approach. the vehicle appears, rotates, and details emerge
    as the user scrolls. The motion language is restrained and technical.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Tesla sans-serif (Göran Söderström / Letters from Sweden, designed 2014)"
    - "tesla.com observed February 2026"
    - "Tesla vehicle UI typography"
  signature_move: >-
    Tesla sans-serif (Göran Söderström / Letters from Sweden, 2014). a
    clean, geometric, tech-modern typeface used across all touchpoints
    from website to vehicle UI to marketing. The type is thin-to-medium
    weight at clean sizes. never bold, never compressed, never decorative.
    The typographic signature is extreme restraint: the type exists to
    present information without adding personality. This is deliberate
    the vehicle design IS the personality, and the type steps aside.
    Compared to BMW (BMW Type, more architectural), Mercedes (Corporate
    A, more luxurious), or Audi (Audi Type, more engineered), Tesla's
    type is the most minimal and the most Silicon Valley.
  what_would_look_wrong: >-
    Bold or heavy type (contradicts the thin, clean register). Serif type
    (too traditional, too luxury-automotive). A humanist sans-serif (too
    warm for the tech-forward positioning). Condensed type (too aggressive).
    Any typeface with visible personality. Tesla's type is deliberately
    personality-free.
  case_convention: >-
    Sentence case throughout. 'Tesla' capitalised. Model names use
    capitalisation (Model S, Model 3, Model X, Model Y, Cybertruck).
    No uppercase in headlines. the type is quiet and informational.
  display_vs_body: >-
    Tesla sans-serif serves both display and body at different weights.
    Display: Tesla Light or Regular at generous sizes. clean, modern,
    unhurried. Body: Tesla Regular at readable sizes. functional and
    minimal. The single-family approach is consistent with the brand's
    minimalism. one typeface, used everywhere, without variation.
  type_and_image: >-
    Type and vehicle imagery are separated. headlines above or below
    the vehicle, never overlaid. The vehicle is never obscured by
    typography. On tesla.com, the scroll reveals vehicle imagery first,
    then type follows. The hierarchy is vehicle first, type second. the
    design object speaks, the words explain. This is similar to Apple's
    type-and-image relationship and distinct from traditional automotive
    advertising where headlines can be as prominent as the vehicle.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "tesla.com (observed February 2026)"
    - "Tesla app interface"
    - "Tesla retail store displays"
  signature_composition: >-
    Centred vehicle, full-width, scroll-to-reveal. tesla.com vehicle
    pages are vertical scrolls. each section reveals a feature (range,
    performance, interior, safety) with the vehicle centred in the frame.
    The composition is borrowed directly from Apple's product-page
    approach. centred, minimal, scroll-driven. The configurator is the
    most distinctive composition: the vehicle rendered in real-time 3D
    with colour, wheel, and interior options applied live. Compared to
    BMW (more dynamic, asymmetric compositions), Mercedes (more luxurious,
    more lifestyle-integrated), or Audi (more architectural, more grid-
    based), Tesla's layout is the most minimal and the most Apple-
    influenced.
  density_and_whitespace: >-
    Very low density on vehicle pages. one feature per scroll section,
    generous whitespace, the vehicle dominant. The configurator is
    moderately dense (option selections, pricing) but visually clean.
    Spec pages are denser but follow the same minimal typography. Tesla
    uses more whitespace than any traditional automotive brand. the
    minimalism is the differentiation.
  format_preferences: >-
    Landscape for vehicle photography (the car's proportions drive the
    format). Full-width for web. The configurator uses landscape with
    the vehicle centred. Mobile layouts stack vertically. No distinctive
    format preference beyond following the vehicle's proportions.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "leader"
  relationship_to_trends: >-
    Tesla defined the visual standard for electric vehicle brands
    the minimal, tech-forward, direct-to-consumer visual language has been
    adopted by Rivian, Lucid, Polestar, and other EV startups. The brand
    leads through product design rather than marketing design.
  examples:
    - trend: "Direct-to-consumer automotive marketing"
      stance: "leader"
      evidence: >-
        Tesla's $0 advertising budget and online-only sales model
        eliminated the dealership visual system entirely. The website
        configurator IS the showroom. This approach has been adopted by
        Rivian, Lucid, and other EV brands, and has influenced legacy
        automakers' digital retail strategies.
      reasoning: >-
        By removing the dealership layer, Tesla removed an entire category
        of automotive visual language (showroom photography, dealer POS,
        salesperson interactions). The visual identity is controlled
        entirely by the brand.
    - trend: "Minimal, tech-forward automotive design language"
      stance: "leader"
      evidence: >-
        Tesla's clean, button-less vehicle interiors (centred touchscreen,
        minimal physical controls) defined the visual standard that
        competitors now follow. The vehicle UI design (V12). dark,
        minimal, full-screen. has influenced every new EV's interior
        display approach.
      reasoning: >-
        Franz von Holzhausen's vehicle design philosophy (maximum
        simplicity, minimum decoration) extends from the physical product
        into the marketing visual language. The product design and the
        brand design are the same thing.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "rigid"
  what_stays: >-
    Tesla sans-serif typography. The minimal, clean visual register. The
    'T' logo. The vehicle-dominant composition. Production quality. No
    collaboration positions Tesla outside the tech-forward, EV context.
  what_bends: >-
    Very little. Tesla does not engage in traditional brand collaborations.
    The brand's visual identity is almost entirely self-contained. no
    co-branded products, no fashion partnerships, no celebrity
    endorsements. The visual system bends only for functional reasons
    (different vehicle lines, energy products vs. automotive).
  notable_examples: >-
    Tesla does not have notable brand collaborations in the traditional
    sense. The closest equivalents are: SpaceX cross-references (the
    Tesla Roadster sent to space, the Cybertruck's Starship-influenced
    stainless steel), which are more Elon Musk brand synergies than
    formal collaborations. The vehicle itself is the collaboration
    canvas. owners customise and wrap their vehicles, and this owner-
    generated visual diversity is a de facto part of the brand's visual
    ecosystem.
