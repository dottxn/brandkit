summary: "Anti-patterns for Etsy. What this brand would never do."

# ── Data
visual:
  - pattern: Sterile product photography
    reasoning: >-
      Objects require context and maker story or they become indistinguishable from mass-produced goods. Clinical lighting kills authenticity.
  - pattern: "Corporate sans-serif fonts (Gotham, Montserrat)"
    reasoning: >-
      These fonts are designed for efficiency and scale. Guardian Sans' humanist curves signal that Etsy chose warmth over optimization.
  - pattern: Minimalist layouts with excessive whitespace
    reasoning: >-
      While whitespace can signal luxury, on Etsy it reads as emptiness. Products and maker stories must feel abundant, slightly cluttered, alive.
  - pattern: Stock photography or styled product shots
    reasoning: >-
      The moment a product leaves the maker's context, it becomes just another object. Etsy must show how things exist in actual lives.
strategic:
  - pattern: Competing on price or convenience
    reasoning: >-
      This inverts Etsy's entire value proposition. The brand should be positioning itself as the SLOWEST, most EXPENSIVE, most INCONVENIENT option because that friction is proof of authenticity.
  - pattern: "Platforming celebrity or influencer sellers above creator-nobodies"
    reasoning: >-
      This destroys Etsy's egalitarian promise. The algorithm and curation must continually surface unknown makers, or the brand becomes hierarchical gatekeeping like it claims to oppose.
  - pattern: Adding algorithmic recommendations without transparency
    reasoning: >-
      If Etsy's algorithm feels like black-box discovery, it risks feeling automated and corporate. Transparency and maker agency must remain visible.
  - pattern: "Expanding into mass-produced goods to \"broaden appeal\""
    reasoning: >-
      This is the existential threat. Etsy's identity depends on enforcing what "belongs" on the platform. Dilution would be brand suicide.
tonal:
  - pattern: Saccharine warmth or forced inspirationalism
    reasoning: >-
      Etsy's voice must feel earned, not performed. Calling every maker "an artist" rings false if the platform doesn't structurally back it up. Authenticity requires refusing sentimentality.
  - pattern: Corporate empowerment language
    reasoning: >-
      Phrases like "monetize your passion" or "build your empire" sound corporate. Etsy's language should feel like it came from makers talking to other makers, not marketing departments.
  - pattern: "Trend-focused or moment-chasing communication"
    reasoning: >-
      Etsy stands outside trend cycles. Its tone should feel timeless, slightly old-fashioned, deliberately out-of-step with fast culture.
  - pattern: Apologetic or defensive positioning
    reasoning: >-
      Etsy shouldn't position itself as the "alternative". that suggests defensiveness. The brand voice should be absolutely confident that handmade and vintage are the primary forms of human value.
cultural:
  - pattern: "Alignment with fast-fashion critique requires specific competitors and positioning"
    reasoning: >-
      Etsy became the anti-Shein, but not by explicitly naming Shein. The positioning is implicit: we've been saying the opposite of speed-culture for 20 years.
  - pattern: Feminist economics positioning
    reasoning: >-
      Early Etsy tapped into female economic independence narratives. This remains structurally true (70%+ Etsy sellers are female), but the brand must keep this visible without ever explicitly claiming it.
  - pattern: Localism and sustainability positioning
    reasoning: >-
      Etsy benefits from alignment with climate conscience, local economies, and anti-globalism. But if the brand ever seems like it's using sustainability as marketing (rather than consequence of handmade philosophy), it loses credibility.
  - pattern: Craft nostalgia during digital overwhelm
    reasoning: >-
      Etsy positioned handmade as antidote to algorithmic anxiety and digital emptiness. This remains culturally true but requires continually proving that the platform itself isn't succumbing to automation logic.
