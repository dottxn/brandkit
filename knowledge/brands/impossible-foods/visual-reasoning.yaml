summary: Visual reasoning for Impossible Foods. Why the design choices work.

# ── Data
type_logic: >-
  Sans Meat custom typeface with flared strokes feels hand-painted—directly referencing the aesthetic of actual butcher shop signs and vintage market signage. The flares (extensions at terminal points) mimic the flourishes of hand-painted letters where brushwork naturally creates overflow. The geometry is imperfect in ways that suggest human hand rather than mathematical construction, which grounds the brand in craft tradition. The boldness (heavy weight) ensures shelf visibility and commands attention in crowded meat aisles. This is not a modern digital typeface (which would signal startup/tech company); it's a heritage typeface deployed in contemporary context. Using this custom typeface exclusively (not substituting with existing butcher-style fonts) ensures proprietary brand language that competitors cannot easily replicate. The typeface carries the brand's core message visually: we're legitimate butcher-shop competitors, not design-forward plant food brand.
colour_logic: >-
  Red gradients (#CC0000 bright red for raw state, #8B0000 deep burgundy for cooked state, #FF6B6B bright highlight for seared) reference actual meat color transformation during cooking—a visual language that communicates "this is meat at different temperatures." This isn't arbitrary color choice; it's documentary color that educates the viewer subconsciously. The red is warm, appetite-stimulating, historically associated with meat and butcher shops. Against white or kraft paper backgrounds, the red jumps forward with high contrast, ensuring shelf visibility in meat sections. The color restraint (only red family, no secondary accent colors) keeps visual focus pure and undiluted. Applied with gradient or texture (not flat) to suggest natural meat variation rather than industrial uniformity. The saturation is high enough to command attention but not so bright it reads as artificial or synthetic.
composition_philosophy: >-
  Bold packaging hierarchy with uppercase typography for shelf-impact in crowded meat aisles. Product information arranged to maximize legibility at reading distance (weight, nutrition, cook instructions prominent). Stylized woodcut illustrations of meat cuts occupy negative space, reinforcing butcher shop visual language. Graphic elements echo styrofoam meat packing (sticker-style labels, cut diagrams, packaging aesthetics borrowed from actual butcher displays). Layouts are structured to read quickly in fast-paced retail environments. No decorative flourishes or white space for contemplation; every element serves communication or category positioning. Photography (when used) shows extreme close-up of product texture and "bleed" characteristics, proving sensory claims through visual evidence. Overall philosophy: design in service of category authenticity and competitive shelf presence. Everything screams "meat."
what_would_break_it: >-
  Adopting contemporary minimalist design (clean sans-serif, ample white space, subtle colors); moving to health-focused messaging or wellness language ("nutrient-dense," "plant-based protein"); incorporating environmental claims into primary visual hierarchy; shifting packaging to plant/green color palette; using lifestyle photography showing salads or healthy eating moments; adopting playful, modern illustration style; moving to lowercase or script typography; removing visual references to butcher shop tradition; changing red to more "natural" plant-based colors (greens, earth tones); adding secondary brand colors that dilute red impact; adopting sustainability or ethical positioning as primary messaging; using testimonials from vegans or health advocates; moving product to alternative/specialty foods section rather than meat section; incorporating vegetable imagery; adopting the aesthetic of vegan food brands; using modern sans-serif typefaces; diluting the "bleed" and texture messaging in photography; softening language to include ethical or wellness claims; creating design that looks trendy rather than authentic to butcher tradition.
