summary: "Soul of Strava. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A scoreboard where the score is measured not in points but in effort—every athlete, every movement, celebrated equally because motion itself is the victory.
core_belief: >-
  Effort is the truest form of human expression; community emerges from witnessing each other's effort, not comparing final times.
creative_tension:
  - >-
    Celebrating individual achievement while creating peer competition that motivates without discouraging slower athletes.
  - >-
    Operating as a social network while avoiding the toxicity that defines most social platforms by anchoring everything in physical effort.
decision_filter: >-
  Does this celebrate the person who ran their first 5K as much as the Olympic qualifier? If the answer is conditional, we redesigned wrong.
signature_move: >-
  International Orange (#FC5200) used as the action color that represents the visible exertion on an athlete's face—the specific orange of race bibs and effort made visible.
what_would_break_it: >-
  Introducing performance tiers, achievement badges, or any visual system that separates athletes into categories. The brand succeeds because everyone's effort looks the same.
