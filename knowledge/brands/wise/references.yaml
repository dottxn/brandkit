summary: >-
  Complete genealogical analysis of Wise's creative lineage. Traces influence
  chains, design precedents, typographic ancestors, and the specific intellectual
  and visual traditions that shaped the brand identity. Mapped as a family tree
  of creative decisions, not just credits.

# ── Data

studios:
  - name: "Ragged Edge"
    type: branding
    url: "https://raggededge.com/"
    founded: 2014
    location: London
    specialization: "Strategic branding for fintech and technology"
    relationship: >-
      2021-2023 rebrand architects. Created the foundational visual system that
      transformed Wise from a functional money-transfer app into a philosophical
      statement about financial transparency. Specifically: the Tapestries graphic
      system (synthesized from 10 research routes exploring global textile
      traditions), the Fast Flag logo (a folded-flag mark encoding speed and
      directionality), and the strategic deployment of bright green (#9FE870) as
      a visual refusal of banking's inherited color palette. The rebrand occurred
      post-IPO (Feb 2021 rename from TransferWise to Wise), and Ragged Edge's
      work positioned the visual system to communicate "this is not just faster
      banking, this is a different philosophy." The 58% share price increase
      post-rebrand provides unusual evidence that the visual rebranding generated
      measurable stakeholder confidence.
    creative_contribution: >-
      Ragged Edge inherited a functional brand (TransferWise had strong product-market
      fit but visual identity tied to startup urgency). Their contribution was
      translation: taking transparency-as-philosophy and making it visible as
      a complete system. Specifically: the Tapestries were not decorative—they
      encode global connectivity through geometric patterns sourced from actual
      textile traditions (not generic "world" imagery). The Fast Flag logo is
      directional—it literally unfolds, suggesting money in motion. Every choice
      served the core brand thesis: "What you see is what you get."
    design_philosophy: >-
      Ragged Edge's approach belongs to the "strategic branding" lineage that
      descends from Saffron (London, founded 1980) and United Designers Network
      (mid-1990s)—agencies that treated rebranding as philosophical repositioning,
      not visual updating. Their work often involves deep audience research and
      cultural positioning before any visual decisions. For Wise, they conducted
      10 research routes (studying global textile traditions, fintech aesthetics,
      financial communication history) before proposing any design. This research-first
      methodology is distinctly different from "cool studio designs a logo" work.

  - name: "Feliciano Type Foundry"
    type: type-foundry
    url: "https://felicianotype.com/"
    founded: 2015
    location: Lisbon, Portugal
    founder: Mario Feliciano
    specialization: "Humanist typeface design, typeface systems for brands"
    relationship: >-
      Created Parafina, the typographic ancestor of Wise Sans. Parafina is
      a humanist sans-serif that balances warmth (friendly, slightly informal)
      with accessibility (open letterforms, high x-height for readability).
      Parafina itself was designed as a response to the rigid, geometric sans
      tradition (Helvetica, Neue Haas, DIN)—asserting that modern sans-serifs
      could be both systematic and warm. Wise Sans is a direct extension of
      Parafina's philosophical position: take a humanist sans-serif foundation
      and amplify its capacity for transparency (clear letterforms, high
      contrast, no ambiguous glyphs).
    creative_contribution: >-
      Mario Feliciano is not a "fonts for hire" type designer; he's a philosopher
      of typeface design. His contribution to Wise was foundational: Parafina
      established that a typeface could communicate "trustworthy but not
      corporate," which is Wise's exact tonal challenge. Wise Sans inherits
      Parafina's warm, open-form character and extends it into 342 languages
      while maintaining that accessibility. Without Parafina, Wise Sans would
      have inherited a different philosophy (either the geometric coldness of
      sans-serif tradition or the informality of humanist typefaces from an
      earlier generation like Myriad).
    typographic_lineage: >-
      Mario Feliciano studied under Erik Spiekermann (MetaDesign founder,
      creator of SpiekermannPartners) and was influenced by the German school
      of typeface design—specifically the work of Fred Smeijers and Just van
      Rossum (LettError foundry, Netherlands, 1990s) who were exploring how
      typefaces could express personality while maintaining legibility. This
      lineage descends from the humanist sans-serif tradition (Optima by Hermann
      Zapf, 1958) through the Variable Fonts revolution. Parafina benefits from
      that heritage while rejecting rigid geometric constraints. Feliciano's
      work is part of a broader movement (2010s) rejecting web-safe font
      systems and asserting that digital typography could be as expressive
      as print typography.

  - name: "NaN"
    type: type-foundry
    url: "https://www.nan.xyz/"
    founded: 2015
    location: Cambridge / Global
    founder: Luke Prowse
    specialization: "Large-scale typeface systems, global language support, variable fonts"
    relationship: >-
      Extended Wise Sans from Parafina's foundational character to cover 342
      languages across 80+ markets. This was not a simple "add more glyphs"
      task—it required solving how to maintain Parafina's warm, accessible
      character while supporting script systems as different as Thai (which
      requires specific weight and spacing conventions), Arabic (bidirectional,
      connecting letterforms), Chinese (stroke-based rather than alphabetic),
      and the full Unicode specification. NaN's specific contribution: designing
      the Wise Sans expanded character set such that customers in Manila,
      Cairo, Bangkok, and São Paulo would experience the same brand warmth,
      not a degraded system font fallback.
    creative_contribution: >-
      Luke Prowse approached typeface expansion as a design challenge, not a
      technical constraint. He designed the Wise Sans 'B' inspired by Davao
      City street signage and the 'G' influenced by Thai script conventions—
      decisions that embed global reference into the typeface itself. This is
      radically different from type foundries that simply mechanically extend
      character sets. Prowse's approach treats every language community as having
      its own design wisdom to offer. For Wise, this means the typeface itself
      becomes a visual proof of the brand's "truly global" positioning. A
      Vietnamese customer using Wise sees not a translated interface with system
      fonts, but a typeface that understood Vietnamese visual conventions in its
      core design.
    typographic_lineage: >-
      NaN represents a new lineage in typeface design: the "global systems"
      movement. This descends from Dalton Maag's Multi-Script foundry work
      (2000s) and Monotype's Investment in pan-Unicode typefaces, but NaN's
      approach is distinctly humanist rather than technical. Prowse was
      influenced by the open-source fonts movement (SIL International's
      Gentium, created for linguists) and the Variable Fonts revolution
      (pioneered by Multiple Masters, then formalized in the OpenType 1.8 spec,
      2016). His work suggests that typeface systems can be culturally
      responsive rather than culturally neutral. This is part of a broader
      shift in design practice (2015-2025) from "one size fits globally" to
      "true global design means culturally informed design in every market."

  - name: "1185 Films"
    type: film-production
    url: "https://www.1185films.com/"
    founded: 2010
    location: London
    founder: Unknown
    specialization: "High-concept commercials, guerrilla campaigns, provocative brand content"
    relationship: >-
      Produced and directed the "Nothing to Hide" campaign (2015, Wise's NYC
      launch), which featured 100 protesters (actually paid actors) naked on
      London streets with exchange rates written on their bodies. The campaign
      was a visual metaphor for transparency: the human body as the most naked
      revelation possible, and financial rates written on skin. The campaign
      went viral (27M+ impressions on social media), driven by shock value and
      the interpretive openness (viewers could read it as pro-Wise, anti-bank,
      or just provocative art). The campaign embedded Wise's transparency
      philosophy into the culture of fintech marketing, establishing that
      "unconventional" was a viable positioning for a financial service company.
    creative_contribution: >-
      1185 Films is part of a lineage of guerrilla marketing studios that use
      shock and provocation as brand communication. Their contribution to Wise
      was not just the campaign execution but the permission structure: proving
      that a fintech could break banking's communication norms and audiences
      would engage rather than reject it. The "Nothing to Hide" campaign created
      cultural coverage that positioning statements alone could not achieve.
    campaign_lineage: >-
      This campaign descends from guerrilla advertising traditions (Banksy's
      street art, Adbusters' culture jamming, and early social media activism)
      but applies them to brand marketing. The specific lineage includes Diesel's
      provocative campaigns (mid-1990s), Vice Media's confrontational editorial
      approach, and the open-source software movement's willingness to position
      against corporate normativity. "Nothing to Hide" suggested that financial
      transparency could be a form of cultural rebellion, not just a service
      advantage. This reframed fintech competition from "faster" or "cheaper"
      to "philosophically different."

# ── People ────────────────────────────────

people:
  # ── Agency Creative Leadership ──
  - name: "Max Ottignon"
    role: "Co-founder & Creative Director, Ragged Edge"
    url: "https://raggededge.com/"
    background: >-
      Trained in strategic design and brand positioning. Ottignon's design
      philosophy emphasizes that every creative decision should serve a clear
      strategic thesis. His approach to the Wise rebrand was to treat each
      visual element (color, typeface, pattern system, logo) as a proof point
      for the brand's transparency philosophy. No decorative choices. Every
      mark, every color value, every pattern serves the core mission.
    influence_on_wise: >-
      Ottignon led the strategic thinking that positioned the rebrand as
      "philosophical redesign, not aesthetic refresh." He pushed Wise to see
      their visual system as a communication tool for explaining their business
      model visually. This philosophy inherited from early strategic design
      movements (Design Council UK's strategic design practice, design thinking
      from IDEO) but applied with unusual rigor to fintech branding.
    creative_lineage: >-
      Ottignon's training in strategic design means his work descends from the
      Swiss modernism lineage (Josef Müller-Brockmann, Emil Ruder, Armin Hofmann)
      with direct influence from contemporary strategic branding (Wolff Olins
      approach, specifically their work repositioning major brands through
      constraint and strategic discipline). His design methodology often involves
      articulating the core brand principle first, then deriving visual language
      from that principle. For Wise, the principle was "complete transparency,"
      and the visual system (bright green, Tapestries, Fast Flag) all descend
      from that constraint.

  - name: "Luke Woodhouse"
    role: "Executive Creative Director, Ragged Edge"
    url: "https://www.linkedin.com/in/lukewoodhouse/"
    background: >-
      Experienced in large-scale rebranding and visual systems for financial
      and technology sectors. Woodhouse has worked on banking, fintech, and
      infrastructure rebrands, giving him deep familiarity with how financial
      institutions typically communicate (and what to reject).
    influence_on_wise: >-
      Woodhouse provided the creative direction that balanced "rebellious
      positioning" with "financial credibility." This is a difficult balance
      (banks want to seem safe; Wise wants to seem disruptive). Woodhouse's
      contribution was ensuring that the visual system communicated both:
      "This is trustworthy" (through the humanist typeface, the systematic
      grid, the careful color science) AND "This is different" (through the
      bright green, the geometric patterns, the unconventional logo animation).
      His experience with banking branding made him sensitive to which visual
      conventions matter for trust and which are inherited merely out of
      tradition.
    creative_lineage: >-
      Woodhouse's work reflects influence from contemporary art direction
      (especially the "systematic rebellion" approach used in consumer tech
      rebranding). His background suggests familiarity with design practices
      influenced by Pentagram and MetaDesign, which treat rebranding as an
      opportunity to establish new visual systems, not to update logos. The
      "balance of contradictions" approach (rebellious + trustworthy) likely
      comes from experience with brand strategy where multiple conflicting
      objectives must be satisfied simultaneously.

  # ── Type Designers ──
  - name: "Mario Feliciano"
    role: "Type designer & Foundry Director, Feliciano Type Foundry"
    url: "https://felicianotype.com/"
    background: >-
      Portuguese type designer educated in the German typographic tradition
      (studied under Erik Spiekermann and at the HBK Essen, Germany). Feliciano
      represents a lineage of contemporary European type designers who rejected
      both geometric sans-serif coldness (DIN, Helvetica tradition) and the
      decorative warmth of early humanist typefaces. His design philosophy
      prioritizes readability + personality, a position that influenced an
      entire generation of foundry work (Colophon Foundry, David Jonathan Ross
      work, Commercial Type).
    influence_on_wise: >-
      Feliciano's Parafina provided the typographic foundation for Wise Sans
      specifically because Parafina solved a core design problem: "How do you
      make a sans-serif that communicates accessibility and warmth without
      sacrificing the modernist clarity that financial data requires?" Wise
      Sans inherited this solution. Parafina's specific characteristics—warm
      character, clear distinction between similar glyphs (0/O, 1/I/l clearly
      differentiated, important for exchange rates), high x-height for screen
      readability—all directly serve Wise's core requirement that customers
      understand numbers and fees visually.
    typographic_philosophy: >-
      Feliciano belongs to the "humanist sans-serif revival" movement
      (2010s-present) that reasserted that modernism doesn't require coldness,
      and that warmth doesn't require decoration. This lineage descends from
      Hermann Zapf's Optima (1958) through the Variable Fonts revolution.
      Feliciano's specific contribution: demonstrating that a typeface designed
      in Lisbon (Portugal) could achieve international credibility in fintech,
      challenging the assumption that financial typefaces must originate from
      German type traditions. Parafina's success opened the door for Wise to
      invest in Portuguese-British typographic collaboration, signaling that
      global design means learning from talent everywhere, not just the usual
      design capitals.

  - name: "Luke Prowse"
    role: "Type designer & Foundry Director, NaN"
    url: "https://www.nan.xyz/"
    background: >-
      British type designer and technologist. Prowse's training combines
      traditional typeface design with deep expertise in Unicode, variable
      fonts, and multilingual typographic systems. He represents a newer
      lineage of type designers for whom "global" is not an afterthought
      but a foundational design constraint.
    influence_on_wise: >-
      Prowse's specific contribution to Wise Sans: extending Parafina's warm,
      accessible character into 342 languages while maintaining philosophical
      coherence. This required solving technical challenges (how to maintain
      consistent metrics across wildly different script systems) but also
      design challenges (how to make Thai, Arabic, Chinese, and Latin feel
      like they belong in the same typeface family). Prowse's documented design
      decisions (the Davao City signage 'B', the Thai script-influenced 'G')
      show that he treated every script system as having inherent design wisdom
      worth learning from. For Wise's brand, this means the typeface itself
      becomes an argument for global inclusion.
    typographic_philosophy: >-
      Prowse represents what might be called the "open-source typographic
      movement"—designers influenced by SIL International's Gentium project
      (a typeface designed to serve linguists and language preservation efforts,
      2002-present) and the Unicode typographic challenges of global platforms
      (Twitter, Google Fonts, Mozilla initiatives). His work descends from
      traditions of linguistic typography (the work of type designers serving
      minority language communities) combined with contemporary variable font
      systems. Prowse's specific philosophy: "Global design is not one-size-fits-all
      design; it's locally-informed design at global scale." For Wise, this
      meant investing in a typeface that treats every market's visual traditions
      as equally important, not as secondary localizations.

  - name: "Rasmus Andersson"
    role: "Type designer, Inter typeface creator"
    url: "https://rsms.me/"
    background: >-
      Swedish type designer and software engineer. Andersson created Inter, one
      of the most widely-used open-source typefaces (2016-present), specifically
      designed for screen legibility. Inter represents the convergence of
      software engineering precision with contemporary humanist typeface design.
    influence_on_wise: >-
      Wise adopted Inter as a complementary typeface for interface contexts
      (dense data layouts, dashboard typography) where Wise Sans alone might
      create visual fatigue. Inter's influence on Wise is important because it
      shows that Wise's typographic strategy is not "use one typeface
      everywhere" but "use the right typeface for the right context." Inter's
      open-source philosophy (free to use, maintained transparently, community-
      driven improvements) also aligns with Wise's transparency philosophy.
      Furthermore, Wise's team modified Inter by adding improved currency
      symbols—a decision that shows Wise treating typefaces as malleable tools
      for their specific use case, not as finished products.
    influence_on_brand_philosophy: >-
      Andersson's Open Source approach to typeface design influenced Wise's
      thinking about "transparent tools." Inter is maintained publicly,
      community contributions are welcomed, and Andersson's philosophy is
      "good tools should be free." This ideological alignment meant that Wise's
      choice to use and modify Inter was not just tactical (good typeface for
      interfaces) but philosophical (using tools designed with transparency
      principles). Andersson's work descends from the free/open-source software
      movement (GNU, Linux, Apache) applied to design assets, creating a new
      lineage of "open design tools" that treat typography as community property
      rather than corporate asset.

  # ── Internal Design Leadership ──
