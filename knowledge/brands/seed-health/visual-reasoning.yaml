summary: Visual reasoning for Seed Health. Why the design choices work.

# ── Data
type_logic: >-
  Seed Sans Variable (custom variable font family) provides flexibility and contemporary precision. The variable characteristics allow typeface to adapt from headlines (generous spacing) to body copy (tighter spacing) while maintaining coherence. The humanist base prevents scientific coldness; the geometric precision prevents woo-ish softness. Including scientific character sets acknowledges that this is serious science.
colour_logic: >-
  Original strict minimal evolved to scientific framework. dark teal (#1B4A3C) suggests growth and life; sage green (#6BA582) suggests natural-ness without being cliché; light aqua (#E8F4F0) suggests clarity and clean science. The expanded palette ties to product categories (different colors for different probiotic strains), making color functional rather than decorative. The palette avoids pharmaceutical blues entirely, suggesting this is different category.
composition_philosophy: >-
  Modular system centering the Seed dot as organizational device. The dot functions as lens (framing), portal (connecting scientific to accessible), and story device (each application different but visually coherent). Typography-led hierarchy supports information density required for educated consumers. Composition tends toward clean modernism balanced by organic imagery of actual microbes and natural systems.
what_would_break_it: >-
  Adopting wellness industry's soft pastels or pharmaceutical industry's clinical coldness would undermine Seed's positioning as rigorous science made accessible and beautiful.
