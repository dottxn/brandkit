summary: >-
  Visual language for Domino's. How the brand looks structurally
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-dominos"
      touchpoints:
        - "dominos.com homepage and ordering"
        - "Domino's brand campaigns"
        - "Domino's social media channels"
        - "Domino's corporate communications"
      description: >-
        Domino's Red (#E31837) and Domino's Blue (#006491) dominant. a
        high-contrast red-blue palette that is among the most recognisable
        in QSR (quick-service restaurants). Domino's Sans Display/Text
        (Monotype, 2025, based on TT Commons Pro. 'doughier' letterforms)
        is the newest brand typeface, replacing Pizza Press (Terrance
        Weinzierl/Monotype, 2014, commissioned by CP+B). Kate Trumbull
        (EVP/CMO) oversees marketing. WorkInProgress (agency of record,
        extended through 2027) leads campaigns. The three-dot domino tile
        logo. representing the original three Domino's locations. has
        been in use since 1965 with periodic refinements. The 'Cravemark'
        (2025). an audio-visual brand device featuring 'Dommmino's' with
        Shaboozey. adds sonic and visual distinctiveness. Pizza Tracker
        (launched 2008, 100M+ orders tracked) is both a product feature
        and a visual signature. Compared to Pizza Hut (red roof, more
        casual-dining-coded) or Papa John's (green/red, more ingredient-
        quality-coded), Domino's visual language is the most delivery-
        technology-coded and the most ordering-experience-forward.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red-blue,
        Domino's Sans-set, three-dot-logoed register.

    - name: "dominos-ordering-experience"
      touchpoints:
        - "Domino's app ordering interface"
        - "dominos.com ordering flow"
        - "Pizza Tracker"
        - "AnyWare ordering platforms (Alexa, Slack, etc.)"
      description: >-
        Technology-forward, ordering-centred. The ordering experience mode
        is Domino's most distinctive visual context. the Pizza Builder,
        Pizza Tracker, and AnyWare multi-platform ordering create a visual
        language of food customisation, order progress, and delivery
        tracking. The Pizza Tracker (100M+ orders tracked) uses a step-
        progress visualisation that has become iconic. The visual language
        must make ordering fast, satisfying, and engaging. gamification
        elements, progress animations, and completion celebrations.
      differs_from_default_by: >-
        Technology interface dominates. Pizza Builder customisation and
        Pizza Tracker progress visualisation become the primary visual
        content. The register shifts from brand marketing to ordering
        utility with gamification.

    - name: "dominos-store-delivery"
      touchpoints:
        - "Domino's store exterior and interior design"
        - "Delivery vehicle branding"
        - "Pizza box and packaging design (JKR, 2016)"
        - "Domino's uniform design"
      description: >-
        Physical-environment-coded. The store and delivery mode extends
        the visual identity into physical space. store frontage, interior
        design, pizza boxes (JKR, 2016 packaging redesign), delivery bags,
        and vehicle branding. The three-dot domino tile logo dominates
        physical applications. Red-blue colour blocking creates high
        visibility for delivery vehicles and store signage. JKR's 2016
        packaging redesign elevated the pizza box from functional container
        to brand expression.
      differs_from_default_by: >-
        Physical materials and environmental design. JKR packaging design.
        High-visibility signage conventions. The visual register serves
        physical brand recognition rather than digital interaction.

  notes: >-
    Domino's is unusual in that its technology (Pizza Tracker, AnyWare,
    app ordering) is a core part of the visual identity. the ordering
    experience is as visually distinctive as the brand marketing. The
    evolution from Pizza Press (2014) to Domino's Sans (2025) signals
    ongoing typographic investment.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "dominos.com (observed February 2026)"
    - "Domino's marketing campaigns"
    - "Domino's social media content"
  subject_and_framing: >-
    Food-hero and delivery-experience-coded. Domino's photography centres
    on pizza. close-up food photography showing cheese pull, toppings,
    crust texture, and fresh-from-oven presentation. Delivery moments
    (door delivery, unboxing, group sharing) provide the secondary
    subject. The photography must make pizza look irresistible and
    delivery feel immediate. Compared to Pizza Hut (more dining-occasion-
    coded) or Papa John's (more ingredient-quality-coded, 'Better
    Ingredients'), Domino's photography is the most delivery-and-
    convenience-coded.
  casting_observed: >-
    Diverse, everyday, casual. Domino's casting shows families, friend
    groups, sports-viewing gatherings, and individual occasions
    reflecting the broad democratic appeal of pizza delivery. Delivery
    drivers and store team members appear prominently. Domino's humanises
    its delivery operation. No celebrity casting in standard marketing
    (though the Shaboozey 'Cravemark' partnership adds musical culture).
  lighting_and_colour: >-
    Warm, appetising, food-photography-standard. Pizza photography uses
    warm lighting that emphasises melted cheese, crispy crust, and fresh
    toppings. The Domino's Red influences warm colour tones. Delivery
    and lifestyle contexts use natural, casual lighting. The overall
    colour temperature is warm and inviting.
  post_production: >-
    Standard food-photography processing. colour-enhanced to maximise
    appetising quality. Pizza imagery receives careful treatment to show
    texture, freshness, and generous toppings. The processing is industry-
    standard QSR. designed to trigger craving.
  visual_boundaries:
    stated_exclusions: >-
      Domino's avoids fine-dining or gourmet-restaurant photography
      (contradicts the accessible, delivery-convenience positioning).
      The brand avoids slow, contemplative food photography. the visual
      language emphasises speed and satisfaction.
    observed_exceptions: >-
      Some premium product launches (speciality pizzas) use slightly
      more elevated food photography.
    genuine_absence: >-
      Based on dominos.com review: no restaurant-interior photography
      (Domino's is delivery-coded), no celebrity-chef imagery, no
      ingredient-origin storytelling photography.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Three-dot domino tile logo (since 1965)"
    - "Pizza Tracker interface"
    - "JKR (2016 packaging)"
    - "'Cravemark' (2025)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    The three-dot domino tile. Domino's primary mark since 1965,
    representing the original three store locations. The mark is one of
    the most recognisable icons in QSR. Pizza Tracker step icons show
    order progress (prep, bake, quality check, delivery). Menu-category
    icons (pizza, sides, desserts, drinks) follow standard QSR
    conventions. Deal and coupon icons use red-blue brand colours.
  graphic_devices: >-
    The three-dot domino tile. the primary brand mark, appearing on
    store signage, packaging, vehicle branding, and all brand applications.
    The three dots (representing the original three stores) have become
    one of QSR's most enduring visual devices. Domino's Red (#E31837)
    and Blue (#006491). the high-contrast colour pair creates instant
    recognition. The red-blue combination is among the most ownable
    colour duos in fast food. The Pizza Tracker progress bar. a step-
    based progress visualisation that tracks orders through preparation,
    baking, quality check, and delivery. The 'Cravemark' (2025). an
    audio-visual brand device featuring the elongated 'Dommmino's'
    pronunciation with Shaboozey, adding sonic identity to the visual
    system. JKR packaging (2016). the pizza box redesign elevated
    packaging from functional container to brand canvas.
  motion_language: >-
    Pizza Tracker animations. step-completion celebrations, delivery-
    progress indicators. The domino tile logo animates with tile-flip
    and dot-sequence movements. Marketing videos use fast-cut, appetite-
    driven compositions. pizza preparation, delivery speed, sharing
    moments. The 'Cravemark' introduces audio-synced visual motion.
    The motion language is energetic, fast-paced, and satisfaction-coded.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Domino's Sans Display/Text (Monotype, 2025, based on TT Commons Pro)"
    - "Pizza Press (Terrance Weinzierl/Monotype, 2014, commissioned by CP+B)"
    - "dominos.com (observed February 2026)"
  signature_move: >-
    Domino's Sans Display and Text (Monotype, 2025, based on TT Commons
    Pro). described as having 'doughier' letterforms, the typeface
    introduces softened, rounded qualities that reference pizza dough's
    organic texture. This is the most food-referential typographic
    decision in QSR. The previous Pizza Press (Terrance Weinzierl/
    Monotype, 2014, commissioned by CP+B for the 2014 rebrand) was one
    of the first custom typefaces in pizza delivery. Monotype's involvement
    in both typefaces (a decade apart) demonstrates Domino's sustained
    typographic investment. The evolution from Pizza Press to Domino's
    Sans reflects the brand's maturation from 'pizza company that
    delivers' to technology-forward delivery platform. Compared to Pizza
    Hut (no distinctive custom type) or Papa John's (no custom type),
    Domino's typographic investment is the most significant in pizza.
  what_would_look_wrong: >-
    A thin, elegant typeface (contradicts the bold, accessible QSR
    register). A serif typeface (Domino's is entirely sans-serif). A
    geometric, technical typeface (contradicts the warm, food-coded
    character). Pizza Press (now superseded, signals the 2014-2025 era).
  case_convention: >-
    'Domino's' uses title case with apostrophe. Product names use title
    case ('Pizza Tracker,' 'AnyWare'). Menu items use title case. Body
    text uses sentence case. Marketing headlines use mixed case. some
    ALL CAPS for promotional emphasis (more aggressive than most brands
    in this database, reflecting QSR advertising conventions).
  display_vs_body: >-
    Display: Domino's Sans Display at heavy weights for marketing
    headlines, promotional graphics, and campaign type. the 'doughier'
    character is most visible at large sizes. Body: Domino's Sans Text
    at regular weight for menu descriptions, ordering interface text,
    and website content. The Display/Text separation provides optimised
    rendering at different sizes.
  type_and_image: >-
    Typography serves ordering information. menu items, prices, deal
    descriptions, customisation options. In marketing, bold type competes
    with pizza photography for attention. QSR advertising convention
    requires both food imagery and promotional text at high visual weight.
    In the Pizza Tracker, type provides order-status information alongside
    progress visualisation.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "dominos.com (observed February 2026)"
    - "Domino's app ordering interface"
    - "Pizza Tracker"
  signature_composition: >-
    Ordering-first, menu-grid-dominant. dominos.com and the Domino's app
    prioritise the ordering flow. menu browsing, Pizza Builder
    customisation, cart management, and checkout. The Pizza Tracker
    occupies a distinctive compositional space. a progress-bar narrative
    that tracks orders in real time. The composition is conversion-
    optimised. designed to move customers from menu browsing to completed
    order as efficiently as possible. Compared to Pizza Hut (more menu-
    browsing-coded) or Uber Eats (marketplace-aggregation-coded),
    Domino's layout is the most ordering-flow-optimised.
  density_and_whitespace: >-
    High density in menu and ordering contexts. QSR convention requires
    showing many options with prices, deals, and customisation. Promotional
    sections are visually aggressive with large food photography, bold
    type, and deal messaging. The Pizza Builder uses moderate density for
    customisation options.
  format_preferences: >-
    Mobile-first for ordering (Domino's app is the primary ordering
    channel). Store signage follows QSR standard formats. Pizza boxes
    (JKR, 2016) use the box surface as brand canvas. Marketing materials
    use standard digital advertising formats.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "early-adopter"
  relationship_to_trends: >-
    Domino's is an aggressive technology adopter in QSR. the brand leads
    in ordering technology (AnyWare, Pizza Tracker) and adapts its visual
    identity to accommodate new platforms.
  examples:
    - trend: "Food-referential custom typography in QSR"
      stance: "leader"
      evidence: >-
        Domino's Sans (Monotype, 2025) with 'doughier' letterforms that
        reference pizza dough texture is the most explicitly food-
        referential typographic decision in QSR. The prior Pizza Press
        (2014) was also among the first custom typefaces in pizza delivery.
      reasoning: >-
        Typography in QSR is typically generic. Domino's choice to encode
        food texture in letterform design creates a unique connection
        between visual identity and product experience.
    - trend: "Order-tracking as visual brand experience"
      stance: "leader"
      evidence: >-
        Pizza Tracker (launched 2008, 100M+ orders tracked) established
        the visual pattern of real-time order tracking that was later
        adopted by Uber Eats, DoorDash, and virtually every food-delivery
        platform. The tracker's step-progress visualisation became a
        category standard.
      reasoning: >-
        Domino's proved that order tracking could be a brand experience
        the visual anticipation of watching an order progress through
        stages creates engagement and satisfaction beyond the food itself.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    Three-dot domino tile logo. Domino's Red (#E31837) and Blue (#006491).
    Domino's Sans typeface. The Pizza Tracker visual pattern. The ordering-
    technology-forward register.
  what_bends: >-
    AnyWare platform integrations adapt to partner interfaces (Alexa,
    Slack, smartwatch, car displays). Franchisee marketing introduces
    local variations. The 'Cravemark' (Shaboozey partnership) adds
    cultural-music elements. JKR packaging (2016) creates physical-
    environment brand expression. International markets adapt the visual
    system for local QSR conventions.
  notable_examples: >-
    Domino's x Monotype (Domino's Sans, 2025): the type foundry created
    'doughier' letterforms based on TT Commons Pro. the second Domino's
    custom typeface (after Pizza Press, also Monotype, 2014). Domino's x
    JKR (2016 packaging): the London agency elevated the pizza box from
    commodity container to brand canvas. Domino's x WorkInProgress (AOR,
    extended through 2027): the agency leads marketing campaigns including
    the 'Cravemark' introduction. Domino's x Shaboozey ('Cravemark',
    2025): the musical partnership adds audio-visual brand identity
    the elongated 'Dommmino's' pronunciation creates a distinctive sonic
    and visual device. Domino's x CP+B (Pizza Press, 2014): the agency
    commissioned the first custom Domino's typeface, establishing the
    brand's typographic ambition.
