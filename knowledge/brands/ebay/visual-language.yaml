summary: >-
  Visual language for eBay. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-multicolour"
      touchpoints:
        - "ebay.com homepage and marketing pages"
        - "eBay brand campaigns and advertising"
        - "eBay social media channels"
        - "eBay corporate communications"
      description: >-
        Four-colour heritage — Red (#E53238), Blue (#0064D2), Yellow
        (#F5AF02), Green (#86B817) — carried through the eBay wordmark.
        Market Sans (custom typeface developed with Form agency, NYC)
        serves as the brand typeface. The November 2024 eBay Evo update
        introduced a comprehensive visual evolution: a 280-page brand
        playbook, 136-colour accessible palette (expanding significantly
        from the four-colour heritage), 2,700+ brand assets, custom
        illustration library, and story-driven photography direction.
        Emma White (Head of Design Programs) oversees design governance.
        The wordmark overlapping letters (the 'e,' 'b,' 'a,' 'y' each
        in a different colour, slightly overlapping) communicate the
        marketplace's diversity and connection. Market Sans is open-source
        on GitHub (ebay-font repository). Compared to Amazon (orange
        arrow, utilitarian) or Etsy (orange, craft-coded), eBay's visual
        language is the most heritage-multicolour in e-commerce.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this four-colour,
        Market Sans-set, marketplace-coded register.

    - name: "seller-commerce"
      touchpoints:
        - "eBay seller tools and dashboard"
        - "Seller Hub analytics and management"
        - "eBay for Business marketing"
        - "Seller community resources"
      description: >-
        More functional, more data-driven. The seller-facing visual
        language prioritises usability over brand expression — analytics
        dashboards, listing tools, and performance metrics use a cleaner,
        more neutral register. The four-colour palette appears as accent
        rather than dominant. Data visualisations and business-tool
        interfaces follow standard SaaS conventions. The visual language
        must serve both individual sellers (casual, personal) and
        enterprise merchants (professional, data-demanding).
      differs_from_default_by: >-
        More neutral and functional. Data visualisations replace lifestyle
        imagery. The visual register serves commerce operations rather
        than brand storytelling. The four-colour heritage recedes behind
        functional UI.

    - name: "ebay-evo-storytelling"
      touchpoints:
        - "eBay brand campaigns (post-November 2024 Evo)"
        - "eBay editorial and cultural content"
        - "eBay community storytelling"
        - "eBay social media campaigns"
      description: >-
        The eBay Evo system (November 2024) introduced a story-driven
        visual approach — photography that tells seller and buyer
        stories, a 136-colour accessible palette that extends far
        beyond the four-colour heritage, and illustration that brings
        warmth and personality. This mode represents eBay's visual
        evolution from transactional marketplace to community-driven
        commerce platform. The visual language celebrates the unique,
        unexpected nature of eBay's marketplace — vintage finds, collector
        items, small-business stories.
      differs_from_default_by: >-
        Richer colour palette (136 colours vs four heritage colours).
        Story-driven photography replaces product-grid imagery.
        Illustration adds warmth and personality. The register shifts
        from transactional to community-storytelling.

  notes: >-
    eBay's November 2024 Evo update represents the most comprehensive
    visual investment in the brand's history — the 280-page playbook
    and 2,700+ assets indicate a systematic approach to visual
    governance that the brand has historically lacked. The Lippincott
    2012 redesign established the overlapping-letter wordmark; eBay Evo
    builds on this foundation.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "ebay.com (observed February 2026)"
    - "eBay Evo brand playbook (November 2024)"
    - "eBay brand campaigns"
  subject_and_framing: >-
    Story-driven — the eBay Evo system (November 2024) established a
    photography direction focused on the stories behind buying and
    selling. Seller stories: people in their workshops, garages, and
    studios with their unique inventory. Buyer stories: the delight of
    finding something unexpected or rare. Product photography shows the
    diversity of eBay's marketplace — vintage fashion, collectibles,
    electronics, auto parts, and everything in between. Compared to
    Amazon (product-on-white, utilitarian, conversion-optimised) or
    Etsy (craft-coded, maker-focused, lifestyle-styled), eBay's
    photography emphasises the unique and unexpected nature of the
    marketplace.
  casting_observed: >-
    Diverse, authentic, community-coded. Sellers of all types — from
    sneaker collectors to vintage-furniture dealers to small-business
    owners. The casting reflects eBay's position as a marketplace for
    everyone, emphasising real sellers and real buyers rather than
    models or aspirational imagery.
  lighting_and_colour: >-
    The Evo photography direction uses warm, natural lighting that feels
    authentic and inviting. Seller environments (workshops, stores,
    garages) are lit to look real, not staged. Product photography varies
    by category — from clean studio shots for electronics to styled
    compositions for fashion and home goods. The 136-colour accessible
    palette provides a broad range of environmental colour treatments.
  post_production: >-
    Moderate processing. The story-driven direction favours authenticity
    over polish — photography should feel real and relatable. Colour
    treatment aligns with the Evo palette. Product photography follows
    category-standard post-production conventions.
  visual_boundaries:
    stated_exclusions: >-
      eBay avoids luxury-exclusive or aspirational-lifestyle photography.
      The brand positions as democratic and accessible — anyone can buy
      and sell. The photography avoids anything that reads as corporate
      or institutional.
    observed_exceptions: >-
      eBay Luxury (watches, handbags, fine jewellery) adopts a more
      premium register — darker backgrounds, more controlled lighting,
      more refined staging.
    genuine_absence: >-
      Based on ebay.com review: no celebrity endorsement photography,
      no abstract or artistic photography in brand contexts, no
      technology-product photography (eBay is a marketplace, not a
      tech product).

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "eBay Evo custom illustration library (November 2024)"
    - "Four-colour overlapping wordmark (Lippincott, 2012)"
    - "136-colour accessible palette"
    - "ebay.com (observed February 2026)"
  uses_illustration: true
  illustration_style: >-
    The eBay Evo system (November 2024) introduced a custom illustration
    library — warm, colourful, and community-coded. The illustrations
    use the expanded 136-colour palette and depict marketplace scenarios:
    finding unique items, seller success stories, community connections.
    The style is approachable and slightly whimsical — it communicates
    the joy of discovery and the diversity of the eBay marketplace.
    Compared to Amazon (minimal illustration, functional only) or Etsy
    (craft-influenced illustration, handmade-coded), eBay's illustration
    is the most community-narrative-driven.
  illustration_role: >-
    Brand storytelling, feature explanation, and seasonal campaigns.
    Illustrations appear in marketing materials, app empty states,
    onboarding flows, and category navigation. The custom library
    provides visual storytelling tools that photography alone cannot
    achieve — illustrating concepts like 'community commerce,' 'unique
    finds,' and 'seller success.'
  icon_style: >-
    Category icons use a consistent style within the Evo system —
    colourful, rounded, and friendly. The overlapping-letter wordmark
    functions as both logo and icon. Navigation icons follow standard
    e-commerce conventions. The Evo system defines specific icon
    treatments for the expanded product categories.
  graphic_devices: >-
    The overlapping-letter wordmark (Lippincott, 2012) — the four
    coloured letters (e, b, a, y) each in Red, Blue, Yellow, and Green,
    slightly overlapping, communicate connection and marketplace
    diversity. The 136-colour accessible palette (eBay Evo, November
    2024) — a dramatic expansion from four colours to 136, all tested
    for accessibility compliance. The four heritage colours remain
    identifiable within the broader palette. Market Sans itself, open-
    source on GitHub, functions as a graphic device that demonstrates
    eBay's community-sharing ethos.
  motion_language: >-
    The Evo system introduced more defined motion guidelines. The
    overlapping wordmark letters animate with playful, marketplace-
    coded movements. Category transitions use smooth, browsing-
    appropriate motion. The motion language is friendly and inviting —
    it communicates discovery and delight rather than speed or urgency.
    Compared to Amazon (minimal, conversion-focused motion) or Etsy
    (gentle, craft-coded motion), eBay's motion is the most playful
    among major marketplaces.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Market Sans (custom, developed with Form agency, NYC)"
    - "eBay-font repository on GitHub (open-source)"
    - "eBay Evo brand playbook (November 2024)"
    - "ebay.com (observed February 2026)"
  signature_move: >-
    Market Sans (developed with Form agency, NYC) — a custom sans-serif
    designed for eBay's marketplace context. The typeface is open-source,
    available on GitHub (ebay-font repository) — a decision that aligns
    with eBay's marketplace ethos of openness and community. The name
    'Market' directly references the marketplace positioning. Market
    Sans has a geometric foundation with humanist details — professional
    enough for commerce, warm enough for community. Compared to Amazon
    (Amazon Ember, proprietary, utilitarian) or Etsy (no custom typeface,
    less typographic investment), eBay's open-source approach to brand
    typography is distinctive — it invites community participation in
    the brand identity.
  what_would_look_wrong: >-
    A serif typeface in digital contexts (eBay is entirely sans-serif
    digitally). A heavy, aggressive display typeface (contradicts the
    friendly, accessible register). The pre-2012 wordmark typography
    (associated with the earlier, less refined brand). A generic system
    font (Market Sans is the identity — replacing it with Helvetica or
    Inter removes brand distinction).
  case_convention: >-
    'eBay' uses lowercase 'e' with uppercase 'B' — a distinctive
    camelCase convention that has been consistent since the brand's
    founding. Product names use title case ('eBay Motors,' 'eBay Luxury').
    Category names use title case. Body text uses sentence case.
    Marketing headlines vary.
  display_vs_body: >-
    Display: Market Sans at heavier weights for marketing headlines and
    campaign type. The Evo system defines specific display usage within
    the 280-page playbook. Body: Market Sans at regular weight for all
    interface text, product descriptions, and content. The single-
    typeface system creates consistency across the diverse marketplace
    experience.
  type_and_image: >-
    Typography provides product metadata — titles, prices, descriptions,
    seller information. Product imagery dominates the visual hierarchy
    on listing pages. In brand marketing (post-Evo), type and
    photography share space with the story-driven approach — headlines
    tell stories, photography illustrates them. The overlapping-letter
    wordmark bridges typography and graphic design.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "ebay.com (observed February 2026)"
    - "eBay app interface"
    - "eBay Evo brand playbook"
  signature_composition: >-
    Product-grid marketplace layout — the visual composition that defines
    online marketplaces. eBay uses a grid of product listings with
    images, titles, prices, and seller ratings. Search results support
    both grid view and list view. The homepage balances curated content
    (trending categories, deals, editorial picks) with personalised
    recommendations. Compared to Amazon (denser, more data-per-listing,
    more conversion-optimised) or Etsy (more lifestyle-curated, more
    Pinterest-influenced), eBay's layout is the most traditional
    marketplace format.
  density_and_whitespace: >-
    Moderate density. Product grids are compact but scannable. The Evo
    update introduced slightly more generous spacing and cleaner
    information hierarchy. Marketing pages use more whitespace than
    product pages. The marketplace must accommodate millions of seller-
    generated product images of varying quality — the layout provides
    structure around diverse visual content.
  format_preferences: >-
    Product images use square (1:1) format in grid views. Hero banners
    use landscape format. The eBay app is mobile-first for browsing and
    purchasing. The overlapping-letter wordmark is horizontal.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    eBay historically lagged behind design trends — the platform's visual
    identity was functional rather than designed. The November 2024 Evo
    update represents a deliberate catch-up and modernisation.
  examples:
    - trend: "Open-source brand assets"
      stance: "early-adopter"
      evidence: >-
        Market Sans is open-source on GitHub (ebay-font repository) —
        making eBay one of the few major e-commerce companies to open-
        source its brand typeface. This parallels Reddit's open-source
        approach with Reddit Sans.
      reasoning: >-
        Open-sourcing the brand typeface aligns with eBay's marketplace
        ethos — the platform enables open commerce, and the open-source
        typeface extends this philosophy to design. It also helps sellers
        create eBay-consistent marketing materials.
    - trend: "Comprehensive brand system playbooks"
      stance: "late-adopter"
      evidence: >-
        The eBay Evo 280-page playbook and 2,700+ asset library (November
        2024) brings eBay's brand governance to the level that competitors
        like Amazon and Apple have maintained for years. The 136-colour
        accessible palette demonstrates commitment to contemporary
        accessibility standards.
      reasoning: >-
        eBay's marketplace model (millions of sellers creating their own
        listings) makes brand consistency unusually challenging. The Evo
        system provides tools for both internal teams and the broader
        seller community.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "chameleon"
  what_stays: >-
    The four-colour overlapping wordmark. Market Sans. The four heritage
    colours (Red, Blue, Yellow, Green). The marketplace-for-everyone
    positioning.
  what_bends: >-
    Sellers create their own visual identities within eBay's marketplace
    framework — custom store designs, product photography, and brand
    presentations. Category-specific visual treatments (eBay Motors, eBay
    Luxury, eBay Refurbished) adapt the brand for different commerce
    contexts. The 136-colour Evo palette provides extensive flexibility
    for seasonal and campaign variations. Regional marketplaces adapt
    to local cultural contexts.
  notable_examples: >-
    eBay x Lippincott (2012 redesign): the consultancy created the
    overlapping-letter wordmark that has defined eBay's visual identity
    for over a decade — replacing the connected-letter original with a
    more contemporary, flexible mark. eBay x Form agency (Market Sans):
    the NYC-based agency developed the custom typeface that anchors eBay's
    typographic identity — subsequently open-sourced for community use.
    eBay Evo (November 2024): the most comprehensive visual system in
    eBay's history — 280-page playbook, 2,700+ assets, custom
    illustration library, 136-colour accessible palette. This system
    represents eBay's most significant investment in design governance
    and brand consistency.
