summary: "Soul of Wayfair. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A universe of possibility organized into sensible patterns—overwhelm transformed into exploration, abundance made navigable.
core_belief: >-
  Every person deserves to love where they live; economics and logistics should be invisible friction, not gates to beautiful homes.
creative_tension:
  - >-
    Offering 18+ million products (overwhelming abundance) while maintaining shopping simplicity that doesn't paralyzed decision-making.
  - >-
    Being a B2B2C marketplace while maintaining consumer-first positioning and consistent brand voice across diverse suppliers.
decision_filter: >-
  Does this help someone find their home feeling, or does it get in the way? Every feature flows through this single question.
signature_move: >-
  The purple (#7B189F) used as the color of transformation—taking what was overwhelming (18 million products) and making it feel like creative opportunity.
what_would_break_it: >-
  Abandoning supplier diversity for a curated collection, or switching to minimalist aesthetic that hides the scale advantage in the database.
