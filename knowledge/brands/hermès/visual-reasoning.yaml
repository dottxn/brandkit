summary: Visual reasoning for Hermès. Why the design choices work.

# ── Data
type_logic: >-
  Memphis Bold combined with a custom Hermès serif feel deliberately chosen rather than mathematically derived. The letter forms contain irregularities. slight inconsistencies in weight, slightly off-kilter serifs. that suggest handwork rather than computer precision. This is the opposite of geometric sans-serifs like Futura that Nike uses. Where Nike's typography says "athletic precision," Hermès' says "artisanal imperfection that's actually deliberate." The serif choice is unexpected in luxury. most luxury brands moved to sans-serif decades ago. By returning to serif and making it distinctly hand-drawn, Hermès communicates cultural confidence. The brand isn't following trends; it's setting them retroactively. In a design system where every choice must feel inevitable, Memphis Bold feels like the only possible choice.
colour_logic: >-
  The signature orange (#F37022) is the most radical luxury color choice in fashion history. It wasn't selected for sophistication. it was born from wartime material scarcity in the 1940s. Hermès simply didn't have access to the traditional luxury colors (navy, burgundy, forest green) and created their signature from constraint. This story (limitation breeds identity) is more powerful than any narrative about "choosing orange because it's bold." The color psychology works because it's warm without being aggressive, visible without being loud, and completely owning-able to one brand. No competitor can use this orange without referencing Hermès. The supporting palette of white and black create maximum contrast, allowing the orange to be deployed in restraint. On bags, the orange appears as lining, packaging, or subtle hardware. never dominating the composition. This discipline is what makes the orange iconic rather than garish.
composition_philosophy: >-
  Every Hermès image (whether product photography, packaging, or retail environment) maintains significant breathing room. The product is never centered in a frame filled with context; it's positioned with generous white space around it, allowing it to command attention through presence rather than surrounded spectacle. This compositional restraint mirrors the art principle of negative space as design. In a product catalog, most luxury brands would showcase multiple products densely arranged to demonstrate range. Hermès often photographs a single object on a plain background, letting its craftsmanship speak. The composition is architectural. each element has a purpose, nothing is accidental or decorative. Asymmetry is employed sparingly, and only when it suggests handcraft. Symmetry dominates, representing control and precision. The overall effect is that every layout feels "designed" without revealing the hand of design. the mark of mastery.
what_would_break_it: >-
  - Using Helvetica, Arial, or Montserrat for primary branding would destroy the artisanal positioning
  - Adding bright, saturated seasonal trend colors beyond the core palette
  - Logo proliferation across every product surface and packaging element
  - Adopting a warm, friendly tone in communications instead of formal restraint
  - Switching to mass-market distribution channels or expanding retail aggressively
  - Artificial urgency marketing ("Limited availability," "Last season") that contradicts structural scarcity
  - Product photography with artificial styling, studio props, or heavily retouched surfaces
  - Celebrity endorsements or influencer collaborations seeking external validation
  - Explaining the craft in marketing instead of trusting the object to demonstrate quality
  - Sans-serif typography that feels corporate rather than handcrafted
