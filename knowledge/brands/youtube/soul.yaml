summary: "Soul of YouTube. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  An infinite stage where the spotlight is permanently on whoever is performing, and the audience's job is simply to find what calls to them.
core_belief: >-
  The best content comes from people with something to share, not people with permits to broadcast; democratization requires absolute creator confidence.
creative_tension:
  - >-
    Facilitating both the creator economy and entertainment consumption without letting either dominate the other's visibility.
  - >-
    Operating at massive institutional scale while maintaining startup culture and rapid iteration that small creator communities depend on.
decision_filter: >-
  Does this increase the visibility of creator content, or does it increase YouTube's visibility? If it's the latter, we've gotten the priority wrong.
signature_move: >-
  The red play button (#FF0000) as the most recognized symbol on the internet—a shape that means "something you want is here, press this."
what_would_break_it: >-
  Prioritizing YouTube's brand over creator brands, or manipulating algorithmic recommendations to favor content that serves the platform over what creators want to make.
