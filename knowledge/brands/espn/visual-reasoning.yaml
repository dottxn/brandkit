summary: Visual reasoning for ESPN. Why the design choices work.

# ── Data
type_logic: >-
  ESPN's custom typeface (based on Stop font from 1971) is bold, geometric, and unmistakably sports. it carries visual authority and intensity. The letterforms feel like they're about to move, suggesting kinetic energy. Helvetica Neue Bold appears in supporting applications, providing reliable contrast. The geometric foundation signals clarity and data-driven journalism while the custom derivation makes it specifically ESPN
colour_logic: >-
  ESPN Red (#DA020E, #FF0033) is intense, unapologetic, confident. it's not about luxury or sophistication, it's about passion and immediacy. White (#FFFFFF) and black (#000000) create absolute contrast without nuance. Grey (#48494A) appears as supporting neutral. Colors don't harmonize; they compete, reflecting how sports itself is about competition. No pastels, no subtlety
composition_philosophy: >-
  Grid-based layouts with strong hierarchical typography reflect how sports is consumed. statistics, standings, scores alongside narrative. The white line serves as visual organizing principle, creating continuity across diverse content types. Negative space is minimal (crowded, busy); this reflects the information-dense sports news environment. Bold color blocking creates visual impact. Motion is implied through diagonal angles and kinetic type applications
what_would_break_it: >-
  Cool-colored palette dominance, symmetrical centered layouts, removing the white line as organizing principle, lifestyle aspirational imagery, neutral reporting tone, or design language that treats sports as background instead of central human drama
