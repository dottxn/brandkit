summary: Visual reasoning for Jaguar. Why the design choices work.

# ── Data
type_logic: >-
  The custom JaGUar wordmark abandons symmetry for visual tension—uppercase "J" and "GU" contrasts with lowercase "ar," creating asymmetrical energy that reads as contemporary art rather than corporate identity. The geometric construction (sharp corners, consistent stroke weights) references modernist design movements of the 1920s-1930s (constructivism, De Stijl) while the mixed case speaks to digital-age irreverence. This isn't handwriting or script (too heritage-coded); it's engineered geometry with deliberate rule-breaking. The typeface exists only as custom form, impossible to download or replicate, giving Jaguar proprietary visual authority. Most automotive brands use established typefaces (Futura, custom sans-serifs); Jaguar creating its own signals that this is not business-as-usual—this is art direction at the boardroom level.
colour_logic: >-
  #FFD700 (gold-yellow), #FF0000 (red), #0000FF (blue) are painter's primaries applied to automotive luxury—reference to Renaissance art education and contemporary art movements, not automotive tradition. These aren't metallics (too precious) or pastels (too weak); they're pure, vibrant, and slightly childlike. The colors work together as a limited palette (not rainbow chaos) and are always applied with texture or gradient movement, never flat. Competitor luxury brands (Mercedes, Rolls-Royce, Bentley) use heritage blues, blacks, grays, silvers—colors that say "stable, timeless, trusted." Jaguar's colors say "look at me, I'm dangerous, I'm new, I'm not trying to reassure you." The cultural meaning: Jaguar associates luxury with emotional intensity and visual excitement rather than accumulated taste. High contrast against white backgrounds ensures prominence; the colors appear to vibrate, creating visual urgency in editorial and packaging contexts.
composition_philosophy: >-
  Asymmetric layouts inspired by modernist graphic design (Swiss style but broken) and contemporary art presentation. The strikethrough pattern functions as organizing device—everything better "flows through" the line or gets "struck through." Whitespace is editorial (not corporate), treated as intentional emptiness that makes content feel curated rather than organized. Typography hierarchy follows art direction (biggest, boldest text) rather than information hierarchy (what's most important functionally). Product photography avoids center-frame placement; subjects are positioned in thirds with negative space. Layout density is deliberately minimal, suggesting exclusivity and editorial authority. The overall composition reads more like Contemporary Art magazine than automotive branding guideline—rules exist to be broken, and that controlled rule-breaking IS the system.
what_would_break_it: >-
  Returning to heritage visual identity (the traditional leaper, elegant curves); adopting minimalist restraint and Dieter Rams-influenced "less is more" philosophy; losing fearless color in favor of corporate grays/blacks/whites; shifting to professional sans-serif like Helvetica or DIN; centering the vehicle as hero rather than people/abstract visuals; creating perfectly balanced, symmetrical layouts; using matte finishes instead of textured gradients; adopting photography that emphasizes product specifications over emotional expression; diluting the palette to include earth tones or pastels; moving to all caps or lowercase-only wordmarks; implementing a corporate design system based on grids and consistency rather than artistic freedom; hiring a traditional automotive design agency to "normalize" the brand; creating brand guidelines that emphasize legibility over impact; adopting a heritage-focused tone that references Jaguar's racing history; softening the strikethrough pattern to a subtle accent rather than universal language.
