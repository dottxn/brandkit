summary: >-
  Visual language for YouTube. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-red"
      touchpoints:
        - "youtube.com homepage and brand pages"
        - "YouTube app across devices"
        - "YouTube brand campaigns and marketing"
        - "YouTube social media channels"
        - "YouTube Creator events (VidCon, YouTube Brandcast)"
      description: >-
        YouTube Red (#FF0000) dominant — the most recognisable colour in
        online video. The play-button logo (rounded rectangle + triangle,
        redesigned 2017) is the primary mark. YouTube Sans (Saffron +
        Letterjuice Barcelona + URW++, 2017; updated to v4 2019) is the
        custom typeface. The 2024 logo update lightened the wordmark and
        made the play button more vibrant. A comprehensive 2026 visual
        identity refresh (led by Kieran Mistry) introduced the first
        motion identity system, an illustration framework with Gesture
        Systems, and a display typeface with Sharp Type supporting 9
        global scripts. Almost Black (#282828) was updated to full black
        in 2024. Matías Duarte (VP Design, Google) provides design
        leadership. Compared to TikTok (black, vertical-first, younger-
        coded) or Twitch (purple, gaming-coded), YouTube's visual language
        is the most broadly recognisable and the most colour-ownable.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red-dominant,
        play-button-anchored, YouTube Sans-set register.

    - name: "creator-platform"
      touchpoints:
        - "YouTube Studio (creator dashboard)"
        - "YouTube Partner Programme marketing"
        - "Creator-facing documentation and tools"
        - "YouTube Creator Awards (play button trophies)"
      description: >-
        Tool-focused, creator-empowering. YouTube Studio uses a darker,
        more dashboard-like visual language. The Creator Awards programme
        (Silver, Gold, Diamond play-button trophies) is a distinctive
        visual system — physical objects that function as status symbols
        in the creator community. Creator-facing materials use a more
        functional, less brand-expressive register. The visual language
        serves the creator's needs rather than YouTube's brand expression.
      differs_from_default_by: >-
        Darker, more tool-like interface. Less red, more neutral chrome.
        The play button appears as status symbols (Creator Awards) rather
        than brand marks. The visual language shifts from consumer brand
        to professional tool.

    - name: "youtube-kids"
      touchpoints:
        - "YouTube Kids app"
        - "YouTube Kids marketing and parent-facing content"
        - "youtubekids.com"
      description: >-
        Bright, playful, rounded. YouTube Kids (designed by Hello Monday)
        uses a multicolour palette, rounded shapes, and child-friendly
        typography. The play-button logo is modified with softer edges.
        The visual language is the most significant departure from the
        core YouTube brand — deliberately child-safe, parent-reassuring,
        and distinct from the main platform's visual language.
      differs_from_default_by: >-
        Multicolour replaces red-dominant. Rounded, playful shapes replace
        angular UI. Child-friendly typography replaces YouTube Sans. The
        visual language prioritises safety and age-appropriateness over
        brand consistency.

    - name: "youtube-music-premium"
      touchpoints:
        - "YouTube Music app and web player"
        - "YouTube Premium marketing"
        - "YouTube Music playlists and editorial content"
      description: >-
        Music-focused, darker, more atmospheric. YouTube Music uses a
        darker colour scheme with the red play button as an accent. The
        visual language approaches Spotify's dark-mode aesthetic but
        maintains the YouTube red. YouTube Premium marketing uses a cleaner,
        more minimal register to communicate premium quality.
      differs_from_default_by: >-
        Darker backgrounds, more atmospheric. Music and audio content
        imagery replaces video thumbnails. The red appears as accent rather
        than dominant colour. More ambient, less information-dense than
        the core platform.

  notes: >-
    YouTube's visual system must accommodate billions of creator-generated
    thumbnails and channel brands. The 2026 visual identity refresh
    (first motion identity, illustration framework, 9-script display
    typeface) represents the most comprehensive visual evolution since
    the 2017 redesign. YouTube Shorts (vertical short-form video)
    introduces additional visual contexts that compete with TikTok's
    aesthetic.

# ── Photography ──────────────────────────────────

photography:
  confidence: "low"
  primary_sources:
    - "youtube.com and YouTube marketing (observed February 2026)"
    - "YouTube Brandcast and creator event photography"
    - "YouTube Culture & Trends reports"
  subject_and_framing: >-
    YouTube uses minimal brand photography — the platform's visual content
    is creator-generated. Brand photography appears in corporate marketing,
    creator events (VidCon, Brandcast), and annual campaigns like YouTube
    Rewind (discontinued 2019). Event photography captures the creator
    community — diverse, energetic, celebratory. Product marketing uses
    device mockups showing the YouTube interface rather than traditional
    photography. Compared to TikTok (more creator-portrait-forward) or
    Instagram (more aspirational-lifestyle), YouTube's brand photography
    is the most platform-functional.
  casting_observed: >-
    Creator community representation — diverse in age, ethnicity, content
    type, and audience size. YouTube Brandcast features high-profile
    creators alongside traditional media executives. No single casting
    aesthetic — the diversity of the creator community IS the casting.
  lighting_and_colour: >-
    Event photography uses warm, stage-lit environments. Brand marketing
    uses clean, bright studio lighting. The red (#FF0000) appears in
    environmental elements (stage graphics, branded objects) rather than
    in the photography itself.
  post_production: >-
    Clean, standard corporate-event and marketing photography. No
    distinctive post-production treatment. Photography serves the brand
    functionally rather than artistically.
  visual_boundaries:
    stated_exclusions: >-
      YouTube brand photography avoids creator-specific promotion (the
      platform is neutral toward all creators). The brand avoids content-
      category bias in its own photography — representing gaming, beauty,
      education, music, and all categories equally.
    observed_exceptions: >-
      YouTube Originals marketing (before its discontinuation) used more
      entertainment-standard key art and photography.
    genuine_absence: >-
      Based on YouTube marketing: no lifestyle photography, no celebrity
      endorsement photography (beyond creator partnerships), no product
      photography in the traditional sense. The brand communicates
      primarily through its interface, logo, and colour.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "high"
  primary_sources:
    - "Play-button logo (rounded rectangle + triangle, redesigned 2017, updated 2024)"
    - "YouTube Red (#FF0000)"
    - "2026 visual identity refresh — Gesture Systems illustration framework"
    - "YouTube Sans (Saffron + Letterjuice Barcelona + URW++, 2017)"
  uses_illustration: true
  illustration_style: >-
    The 2026 visual identity refresh introduced Gesture Systems — YouTube's
    first comprehensive illustration framework. The system uses expressive,
    hand-drawn-feeling gestures combined with the play-button motif. This
    represents YouTube's first significant investment in brand illustration
    as a systematic visual tool. Prior to 2026, illustration was minimal
    and inconsistent across the brand.
  illustration_role: >-
    Post-2026 refresh: illustration appears in marketing campaigns, creator-
    facing materials, and platform feature explanations. The Gesture Systems
    framework provides a visual vocabulary for communicating YouTube's
    brand values (creativity, community, expression) without relying solely
    on creator content or photography.
  icon_style: >-
    The play button (rounded rectangle with triangle) IS the primary icon
    — it functions as logo, icon, and graphic device simultaneously.
    Platform icons follow Google's Material Design system. YouTube-specific
    feature icons (Shorts lightning bolt, Live red dot, Super Chat icons)
    create a product-level icon language within the Material framework.
  graphic_devices: >-
    The play button — the single most recognisable icon in online video.
    YouTube Red (#FF0000) — the colour itself identifies the brand (updated
    from a darker red pre-2017). The 2026 display typeface (Sharp Type, 9
    global scripts) provides a new graphic tool for international brand
    expression. The Creator Awards play-button trophies (Silver at 100K,
    Gold at 1M, Diamond at 10M subscribers) are physical graphic devices
    that have become cultural objects in the creator economy.
  motion_language: >-
    The 2026 refresh introduced YouTube's first motion identity system —
    the play button animates with a defined set of transitions and
    behaviours. Prior to this, motion language was inconsistent. The
    play button's triangle-to-content reveal is the signature transition.
    Platform animations follow Material Design motion principles (shared
    axis transitions, container transforms). YouTube Shorts uses more
    dynamic, TikTok-influenced vertical transitions.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "YouTube Sans (Saffron agency + Letterjuice Barcelona + URW++, 2017; v4 2019)"
    - "2026 display typeface (Sharp Type, 9 global scripts)"
    - "youtube.com (observed February 2026)"
  signature_move: >-
    YouTube Sans (Saffron + Letterjuice Barcelona + URW++, 2017, updated
    to v4 2019) — a custom geometric sans-serif that references the play
    button's geometry in its letter construction. Rounded terminals and
    geometric circles echo the logo's rounded rectangle. The 2026 display
    typeface (Sharp Type) expands YouTube's typographic system to 9 global
    scripts — one of the most comprehensive international type investments
    by a tech platform. The typography is friendly, geometric, and
    platform-neutral — designed to work alongside billions of creator
    thumbnails without competing for attention.
  what_would_look_wrong: >-
    A serif typeface (YouTube is entirely geometric sans-serif). A
    condensed, aggressive typeface (contradicts the open, friendly tone).
    Roboto (Google's system typeface) used as the primary brand face (YouTube
    Sans distinguishes the brand from Google's broader identity). Type
    that competes with creator thumbnail text for attention.
  case_convention: >-
    'YouTube' uses camelCase (capital Y, capital T). Product names use
    title case ('YouTube Music,' 'YouTube Premium,' 'YouTube Shorts').
    Marketing text uses sentence case. Creator Award levels use title
    case ('Silver Play Button').
  display_vs_body: >-
    Display: The 2026 display typeface (Sharp Type) for campaign headlines
    and brand-moment type — bolder, more expressive, supporting 9 global
    scripts. YouTube Sans at heavier weights for standard marketing
    headlines. Body: YouTube Sans at regular weight for interface text,
    descriptions, and general content. The platform also uses Roboto (Google's
    system font) for certain UI contexts. The display-to-body relationship
    is unified by the geometric, rounded aesthetic.
  type_and_image: >-
    Type is subordinate to video content. On the YouTube platform, type
    provides metadata (titles, descriptions, view counts) while creator
    thumbnails and video content dominate visually. In brand marketing,
    type shares space with the play-button logo and illustration (post-
    2026 refresh). The typography is designed to organise and contextualise
    rather than to be the visual hero.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "youtube.com (observed February 2026)"
    - "YouTube app across devices"
    - "YouTube Shorts vertical format"
  signature_composition: >-
    Thumbnail grid — the visual composition that defines online video.
    youtube.com uses horizontal rows of video thumbnails (16:9 aspect
    ratio) with title, creator name, view count, and timestamp metadata.
    This grid layout has been copied by virtually every video platform.
    YouTube Shorts introduces a full-screen vertical composition (9:16)
    that mirrors TikTok's layout. The homepage balances algorithmic
    personalisation with category navigation. Compared to TikTok (single-
    video full-screen, swipe-to-next) or Twitch (live-stream-dominant,
    sidebar-heavy), YouTube's layout is the most grid-based and browsing-
    oriented.
  density_and_whitespace: >-
    Moderate density. The thumbnail grid is compact but breathable —
    consistent spacing between cards creates a clean browsing experience.
    The 2024 UI refresh introduced more whitespace and cleaner card
    boundaries. YouTube Shorts is full-bleed with no whitespace (video
    fills the entire screen). Creator Studio (dashboard) is denser —
    data tables, analytics charts, and management tools.
  format_preferences: >-
    16:9 landscape for standard video thumbnails and content. 9:16 vertical
    for Shorts. Square for certain social media contexts. The platform
    supports multiple aspect ratios but 16:9 remains the default visual
    format for YouTube.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    YouTube sets some visual trends (the thumbnail grid as an interface
    pattern) while adapting to others (vertical short-form video from
    TikTok). The 2026 visual identity refresh represents the most
    proactive design investment in the platform's history.
  examples:
    - trend: "Vertical short-form video"
      stance: "early-adopter"
      evidence: >-
        YouTube Shorts (launched 2020-2021) adopted TikTok's vertical,
        full-screen, swipe-to-next format. The visual language of Shorts
        (full-bleed vertical video, overlay controls, algorithmic feed)
        mirrors TikTok's aesthetic closely.
      reasoning: >-
        YouTube adopted the vertical short-form format quickly to
        compete with TikTok, adapting its visual system to a format it
        didn't originate.
    - trend: "Multi-script global brand typography"
      stance: "leader"
      evidence: >-
        The 2026 display typeface (Sharp Type, 9 global scripts) is one
        of the most comprehensive international type investments by a tech
        platform — supporting Latin, Arabic, Cyrillic, Devanagari, Japanese,
        Korean, Thai, and other scripts with a single cohesive design system.
      reasoning: >-
        YouTube's 2B+ monthly active users across virtually every country
        require typography that works globally. The investment in 9-script
        type sets a new standard for global brand typography.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "adaptive"
  what_stays: >-
    YouTube Red (#FF0000). The play-button logo. YouTube Sans. The
    thumbnail-grid layout as a platform pattern. The creator-neutral
    brand positioning.
  what_bends: >-
    Creator channels introduce their own visual identities within
    YouTube's framework (custom thumbnails, channel art, branding). YouTube
    Kids adopts an entirely different visual language. YouTube Music shifts
    to a darker, more atmospheric register. Platform features (Shorts,
    Live, Super Chat) introduce their own visual sub-systems.
  notable_examples: >-
    YouTube x creators: the platform hosts billions of creator-defined
    visual identities — YouTube's greatest visual collaboration is the
    freedom it gives creators to define their own aesthetics within its
    framework. YouTube x Google (parent): YouTube maintains its own visual
    identity separate from Google's Material You system, though it uses
    Material Design foundations. YouTube Rewind (2010-2019): annual
    collaborative videos that created bespoke visual identities celebrating
    the year's creator content — the most elaborate visual collaborations
    YouTube produced before the format was discontinued.
