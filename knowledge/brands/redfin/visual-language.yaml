summary: >-
  Visual language for Redfin. How the brand looks structurally —
  photography art direction, type treatment, layout, graphic language,
  visual modes, and collaboration rules.

# ── Visual Modes ─────────────────────────────────

visual_modes:
  modes:
    - name: "brand-redfin-red"
      touchpoints:
        - "redfin.com homepage and marketing pages"
        - "Redfin brand campaigns"
        - "Redfin social media channels"
        - "Redfin corporate communications"
      description: >-
        Redfin Red (#A02021, Mexican Red) dominant — a deep, confident
        red that distinguishes Redfin from Zillow's blue and Realtor.com's
        red-orange. Libre Franklin (Pablo Impallari, open-source, 2016)
        serves as the primary web typeface, selected by designer Carey
        Spies when Redfin's Helvetica licence ended in late 2016 — chosen
        for its shared font-family lineage with Benton Sans and Franklin
        Gothic. Matt Lerner (SVP Product and Design, ex-Walk Score co-
        founder, joined November 2017) leads product and design. The 2017
        design language initiative (Carey Spies) established comprehensive
        documentation for typography, colour, spacing, and components.
        The Caregiver brand archetype guides visual decisions — customer-
        first service, advocacy, and trustworthiness. The house-and-
        location-pin logo combines real estate (house) with technology
        (map pin). Compared to Zillow (more marketplace-aggregation-coded,
        more data-dense) or Realtor.com (more listing-service-coded),
        Redfin's visual language is the most agent-service-coded and the
        most map-technology-forward.
      differs_from_default_by: >-
        This is the baseline. All other modes reference this red, Libre
        Franklin-set, map-technology-forward register.

    - name: "redfin-search-map"
      touchpoints:
        - "Redfin map-based home search"
        - "Interactive neighbourhood maps"
        - "Draw-tool custom search areas"
        - "School district and amenity overlays"
      description: >-
        Map-dominant, data-rich. The search experience is Redfin's most
        distinctive visual context — an interactive map with colour-coded
        property pins (dark green for MLS listings, pink for FSBO, purple
        for foreclosures, blue for sold), draw-tool area selection, school
        district overlays, and price-range colour coding. The map-and-
        listing split-screen composition defines Redfin's primary user
        experience. Compared to Zillow (also map-forward but more listing-
        grid-coded) or Opendoor (address-entry-centred), Redfin's search
        mode is the most cartographically sophisticated.
      differs_from_default_by: >-
        Interactive map dominates. Colour-coded data visualisation replaces
        brand graphics. The visual register shifts from brand marketing
        to geographic data navigation.

    - name: "redfin-listing-detail"
      touchpoints:
        - "Property detail pages (2020 redesign)"
        - "Full-screen photo galleries"
        - "Agent profile sections"
        - "Activity stats and neighbourhood data"
      description: >-
        Photography-hero, information-structured. The 2020 listing detail
        page redesign increased image sizes by 35%, positioned the
        neighbourhood map at the top, and reorganised information into
        collapsible sections (Property Details, Activity Stats,
        Neighbourhood Data, Tax Information, Schools, Public Records).
        'Activity Stats' (Viewed, Favourited, X'd-Out, Toured) is a
        unique data visualisation showing real user engagement with
        properties. Professional photography is provided free to all
        listing clients.
      differs_from_default_by: >-
        Property photography dominates at 35% larger scale. Structured
        information sections replace map navigation. Activity Stats
        visualisation is unique to this mode.

  notes: >-
    Redfin's visual identity was developed primarily in-house rather
    than through agency partnerships — reflecting its engineering-driven
    culture. The 2017 design language initiative established foundations
    that continue to guide the visual system. Redfin Redesign AI
    (December 2023, powered by Roomvu) introduces generative AI-powered
    home visualisation. Dark mode (iOS) launched with dark-background-
    adapted colour treatments.

# ── Photography ──────────────────────────────────

photography:
  confidence: "medium"
  primary_sources:
    - "redfin.com (observed February 2026)"
    - "Redfin professional photography service"
    - "2020 listing detail page redesign"
  subject_and_framing: >-
    Professional property photography at service-standard quality.
    Redfin provides professional DSLR photography free to all listing
    clients — a competitive differentiator. Property photography follows
    professional standards: wide-angle at waist height, tripod-stabilised,
    all lights on, blinds open, neutral staging colours (light greys,
    off-whites). The 2020 redesign increased image sizes 35% — making
    photography the hero of listing pages. Brand photography shows
    home-buying moments — tours, discoveries, keys-in-hand celebrations.
    A 2013 Redfin study found professionally photographed homes sold
    faster and for more ($11,200+ for $400K-$500K homes). Compared to
    Zillow (user-uploaded, quality-variable) or Opendoor (institutional-
    standard), Redfin's photography service is the most agent-service-
    integrated.
  casting_observed: >-
    Diverse, home-buyer-coded. Agent profiles include professional
    headshots. Brand photography shows families, couples, and individuals
    in home-buying contexts — reflecting the broad demographic of
    homebuyers and sellers.
  lighting_and_colour: >-
    Bright, natural, warm. Property photography maximises natural light
    — open blinds, all lights on, golden-hour exteriors. The lighting
    creates bright, airy, welcoming environments. Brand photography
    uses warm, natural lighting in home contexts.
  post_production: >-
    Clean, accurate. Property photography aims for faithful representation
    — accurate colour balance, clean lines, no heavy manipulation. Redfin
    Redesign AI (December 2023) offers AI-powered visualisation of
    design styles (modern, rustic, Scandinavian, etc.) as an opt-in
    enhancement.
  visual_boundaries:
    stated_exclusions: >-
      Redfin avoids aspirational-luxury-only property imagery — the
      platform serves all price points. Avoids traditional realtor-
      marketing conventions (glamour headshots, sold-sticker celebrations).
    observed_exceptions: >-
      Some marketing materials use more lifestyle-aspirational imagery
      for brand campaigns.
    genuine_absence: >-
      Based on redfin.com review: no celebrity imagery, no luxury-
      exclusive positioning, no abstract-technology imagery disconnected
      from real estate.

# ── Illustration & Graphic Language ──────────────

graphic_language:
  confidence: "medium"
  primary_sources:
    - "House-and-location-pin logo"
    - "Map colour-coding system"
    - "Carey Spies (2017 design language)"
    - "redfin.com (observed February 2026)"
  uses_illustration: false
  illustration_style: ""
  illustration_role: ""
  icon_style: >-
    Map-pin colour system — the most distinctive icon element. Property
    type pins: dark green (MLS), pink (FSBO), purple (foreclosed), blue
    (sold). School icons for district visualisation. Standard real estate
    feature icons. The colour-coded pin system creates an immediately
    readable map interface.
  graphic_devices: >-
    The house-and-location-pin logo — combining a house silhouette with
    a map pin, immediately communicating 'property search' and 'location
    technology.' The geometric simplicity works at all scales. Redfin Red
    (#A02021) — the deep red is the primary chromatic identifier,
    distinguishing Redfin from Zillow's blue. The colour-coded map pin
    system — multiple colours encoding property type and status on the
    interactive map. The draw-tool search area — users can draw custom
    search boundaries, creating personalised map shapes. Activity Stats
    visualisation — the Viewed/Favourited/X'd-Out/Toured data display
    on listing pages.
  motion_language: >-
    Functional, performance-first. Map interactions (zoom, pan, pin
    hover, draw-tool) use smooth, responsive animation. The brand
    follows a 'every millisecond counts' philosophy — motion serves
    speed and clarity. No distinctive branded motion language beyond
    functional interaction animation.

# ── Typography in Practice ───────────────────────

type_treatment:
  confidence: "high"
  primary_sources:
    - "Libre Franklin (Pablo Impallari, open-source, 2016)"
    - "Sentinel and Benton Sans (print typefaces)"
    - "Carey Spies (typography documentation, 2017)"
    - "redfin.com (observed February 2026)"
  signature_move: >-
    Libre Franklin (Pablo Impallari, 2016, open-source) — selected by
    designer Carey Spies from three finalists (alongside Source Sans and
    Open Sans) when Redfin's Helvetica licence ended in late 2016. The
    selection was driven by lineage: Libre Franklin descends from Franklin
    Gothic, the same font family tree as Benton Sans (one of Redfin's
    premium print typefaces). This heritage connection gives Libre
    Franklin typographic kinship with the print identity without the
    licensing cost. Sentinel and Benton Sans (premium, print-only
    licences) provide the typographic foundation that Libre Franklin
    extends to web. The zero-budget constraint that led to Libre Franklin
    reflects Redfin's engineering-pragmatic culture — finding high-quality
    open-source solutions rather than commissioning custom typefaces.
    Compared to Zillow (no distinctive type) or Opendoor (Graphik,
    Commercial Type), Redfin's typography is pragmatic and lineage-
    connected rather than aspirationally custom.
  what_would_look_wrong: >-
    A decorative or display typeface (contradicts the functional,
    trustworthy register). A serif typeface in the web interface
    (Sentinel is print-only). A heavy, aggressive typeface (Redfin's
    Caregiver archetype requires approachable warmth). Generic system
    fonts (Libre Franklin was specifically chosen for its Franklin
    Gothic lineage).
  case_convention: >-
    'Redfin' uses title case. Product names use title case ('Redfin
    Estimate,' 'Redfin Redesign,' 'Redfin Premier'). Body text uses
    sentence case. Marketing headlines use sentence case. The brand
    avoids ALL CAPS.
  display_vs_body: >-
    Display: Libre Franklin at bold weights for website headlines and
    marketing type. Body: Libre Franklin at regular weight for all web
    content, property descriptions, and interface text. Print materials
    use Sentinel (serif) and Benton Sans (sans) at premium weights.
    The web/print distinction reflects the licensing arrangement rather
    than a deliberate typographic strategy.
  type_and_image: >-
    Typography provides critical real estate information — property
    prices, addresses, features, neighbourhood data, school ratings,
    agent details. Numbers are hero content (price, square footage,
    bed/bath count). In the map interface, type is minimal — pins and
    colour coding communicate more than text. In listing detail pages,
    type provides structured property information alongside large
    photography.

# ── Layout & Composition ─────────────────────────

layout:
  confidence: "medium"
  primary_sources:
    - "redfin.com (observed February 2026)"
    - "2020 listing detail page redesign"
    - "8px grid system"
  signature_composition: >-
    Map-and-listing split-screen. Redfin's most distinctive layout is
    the search experience — an interactive map on one side with property
    listings on the other (toggle between list and map views). This
    split-screen composition defines the primary user experience and
    distinguishes Redfin from competitors. The 2020 listing detail
    redesign uses a photography-hero composition — 35% larger images
    at top, neighbourhood map immediately visible, collapsible
    information sections below. An 8px grid system with card-based
    content blocks provides consistent spacing. Compared to Zillow
    (similar split-screen but more information-dense) or Opendoor
    (address-input-centred), Redfin's layout is the most map-
    interaction-forward.
  density_and_whitespace: >-
    Moderate density. Search results balance property information with
    map space. Listing detail pages distribute information across
    collapsible sections — preventing cognitive overload while
    maintaining comprehensive property data. Card-based layouts use
    subtle drop shadows and rounded corners for depth. Overall
    impression: clean, functional, information-accessible.
  format_preferences: >-
    Desktop-first for search (map interaction requires screen space).
    Mobile-adaptive for the app (touch-optimised map with draw tool).
    Property photography uses landscape format for interiors.
    Toggle between list and map views in responsive layouts.

# ── Trend Posture ────────────────────────────────

trend_posture:
  overall: "selective-adopter"
  relationship_to_trends: >-
    Redfin adopts design trends that serve real estate search
    efficiency and customer advocacy — visual decisions are driven by
    user research and the Caregiver brand archetype.
  examples:
    - trend: "AI-powered visual tools in real estate"
      stance: "early-adopter"
      evidence: >-
        Redfin Redesign (December 2023, powered by Roomvu) — an AI tool
        that generates visualisations of homes in different design styles
        (modern, rustic, Scandinavian, etc.). The tool adds a visual-
        imagination layer to property browsing.
      reasoning: >-
        AI visualisation helps buyers see potential rather than current
        state — addressing a key barrier in home-purchase decision-
        making. The tool extends Redfin's technology-forward positioning
        into generative AI.
    - trend: "Dark mode in property search apps"
      stance: "selective-adopter"
      evidence: >-
        Redfin iOS dark mode — with approximately 40% of iOS sessions
        occurring between 6pm-7am and more than half of those users
        having devices set to dark mode. The implementation uses
        desaturated Redfin Red to reduce optical vibration on dark
        backgrounds.
      reasoning: >-
        Home browsing is often an evening activity. Dark mode serves
        both user comfort and the practical reality of when people
        search for homes.

# ── Collaboration Rules ──────────────────────────

collaboration:
  flexibility: "selective"
  what_stays: >-
    Redfin Red (#A02021). House-and-location-pin logo. Libre Franklin
    typeface. Map-and-listing split-screen layout. Colour-coded pin
    system. The Caregiver-archetype visual register.
  what_bends: >-
    Redfin Premier (luxury segment) uses elevated photography and
    marketing treatment. Agent marketing tools (self-service platform)
    introduce personalised visual elements. Dark mode adapts the colour
    system for evening browsing. Redfin Redesign AI introduces
    generative visual content. Regional marketing adapts property
    photography for local markets.
  notable_examples: >-
    Redfin x Carey Spies (2017 design language): the designer established
    the comprehensive visual system — typography documentation, colour
    system, spacing standards, and component library — that continues to
    guide Redfin's visual identity. The pragmatic approach (Libre Franklin
    selected within zero budget from open-source options) reflects
    Redfin's engineering culture. Redfin x Roomvu (Redfin Redesign,
    December 2023): the AI-powered home visualisation partnership
    extends Redfin's visual language into generative design — buyers
    can visualise properties in different styles. Redfin x 2020 listing
    detail redesign: the 35% image-size increase and reorganised
    information architecture made property photography the visual hero
    of listing pages — a design decision validated by higher engagement.
