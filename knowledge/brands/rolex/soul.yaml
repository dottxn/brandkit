summary: "Soul of Rolex. How it feels, what drives it, what would destroy it."

# ── Data
feels_like: >-
  A mechanical poem made of metal—something that will outlast its owner and tell the story of what the owner accomplished while wearing it.
core_belief: >-
  Constraint is the source of perfection. Every limitation (no planned obsolescence, no quarterly updates, no trending aesthetics) forces Rolex toward timeless design.
creative_tension:
  - >-
    "Rolex must feel exclusive and unattainable, yet accessible enough that someone actually buys it and wears it daily. The moment it feels impossible to own, it stops being a watch for achievement and becomes a museum piece."
  - >-
    "Rolex celebrates heritage and tradition while competing through innovation. It can't be a nostalgic brand or a tech brand—it's forced to be both simultaneously."
decision_filter: >-
  "Will this decision make the watch last longer, function better, or age more beautifully? If it's for marketing, the answer is no."
signature_move: >-
  The five-pointed crown (#A37E2C) rendered in solid gold on dark green—a single gesture that says dominance, precision, and permanence without needing words. The crown isn't aspirational; it's earned.
what_would_break_it: >-
  Introducing a digital screen or transparent case back showing the mechanism. The moment Rolex reveals the insides, it stops being about the wearer's achievement and starts being about the brand's engineering. Mystery is part of the power.
