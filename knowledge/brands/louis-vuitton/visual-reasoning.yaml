summary: Visual reasoning for Louis Vuitton. Why the design choices work.

# ── Data
type_logic: >-
  Futura Medium and Bold. geometric sans-serif designed by Paul Renner in 1927. communicates timelessness in a way that no contemporary typeface can. The clean lines, mathematical proportions, and perfect balance between positive and negative space make it feel neither old nor new, just "right." Most luxury brands change typography every 10-15 years, treating it as a design element to be refreshed. Louis Vuitton's commitment to a 99-year-old typeface proves that the best design choices transcend time. Futura's geometric precision also mirrors the architectural thinking Louis Vuitton applies to product design. every proportion justified, nothing accidental. The bold weight hierarchy creates presence without needing decoration. When combined with the monogram pattern, the typography recedes into support, allowing the canvas and material to command attention.
colour_logic: >-
  Brown (#453630) and gold (#9B7E4B) work together because they reference actual materials. leather and precious metal. without being literal copies of them. The brown is warm and organic, never appearing corporate or cold. The gold brings prestige without gaudiness. Together, they create what luxury actually is: natural materials elevated through human mastery. These colors work across all contexts. photography, digital, physical products. because they're grounded in material truth rather than trend. The restraint is radical: while competitors deploy multi-color palettes to show range, Louis Vuitton proves that color discipline signals confidence. The addition of black and white for secondary applications creates maximum flexibility within minimum palette. This palette approach is the opposite of fast fashion's seasonal color trends.
composition_philosophy: >-
  Layouts feature architectural precision with elements arranged using classical proportions (often golden ratio principles). The monogram pattern provides visual richness without density. patterns have breathing room between repetitions. Typography is deployed sparingly, never competing with the material or product. White space functions not as emptiness but as confidence. the product is so strong it doesn't need surrounding decoration. Product photography emphasizes construction details, material texture, and architectural edges. The framing is often frontal and formal, reminiscent of museum display. When lifestyle photography appears, it's carefully curated to show elegant, sophisticated contexts. never casual or playful. The overall composition philosophy treats every layout as potential archival material, as if asking "would this layout still feel timeless in a museum exhibit?"
what_would_break_it: >-
  - Introducing seasonal trendy colors (millennial pink, teal, sage green) to the palette
  - Switching primary typeface from Futura to contemporary sans-serif (Circular, Montserrat, custom tech-font)
  - Applying the monogram decoratively without structural integration into products
  - Adopting casual, conversational tone in communications instead of formal authority
  - Expanding distribution aggressively to high-volume retail channels or convenience platforms
  - Celebrity or influencer endorsement partnerships seeking external validation
  - Lifestyle photography emphasizing aspirational scenarios rather than product craftsmanship
  - Over-explaining the heritage and history in marketing materials
  - Abandoning the monogram system for disparate design approaches in new categories
  - Using warm, friendly visual language or color psychology typical of accessible luxury brands
