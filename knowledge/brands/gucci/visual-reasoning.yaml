summary: Visual reasoning for Gucci. Why the design choices work.

# ── Data
type_logic: >-
  Granjon Roman works because it's European in origin, editorial in character, and subtly unbalanced in its serif proportions—it suggests refinement that's slightly off-kilter, mirroring Gucci's ability to be both classical and subversive. The serif structure feels like it's written in ink from 1921, then cut with a razor from 2024. Custom Gucci Sans provides utilitarian contrast, proving the brand can communicate efficiency when needed, but Granjon is where the brand's soul lives—in sustained, earned attention.
colour_logic: >-
  The palette is intentionally restrained (three colors) to create maximum impact for each deployment. Gold (#BD9302) as a precious metal carries heritage value and psychological weight. Bangladesh Green (#0A6A56) is deeply saturated, refusing pastels—it's a color that demands respect. Rufous Red (#A82B11) is warm but sophisticated, never bright or childish. The stripe pattern works because those two colors are complementary opposites creating visual friction, yet historically rooted in the brand's 1970s Web stripe. Within this constraint lives infinite visual possibility—the same three colors, layered differently, create different moods.
composition_philosophy: >-
  Layouts embrace visual density through deliberate layering—multiple typefaces, overlapping graphic elements, ornate details that create depth. White space is used strategically (not generously) to let key elements breathe. The ornate layouts mirror the maximalist aesthetic that defines fashion-forward luxury: more is not just more, it's better when every element reflects craft. Gucci's visual density says "worth studying, worth time, worth attention." Clean grids would be a lie about what the brand actually values.
what_would_break_it: >-
  Removing the gold monogram entirely or replacing it with a flat, modern icon. The double-G works because it's ornate, metallic-looking, and feels like heritage rendered in precious material. A minimalist rebrand to compete with contemporary luxury (think flat design) would erase the visual vocabulary that creates permission for eccentricity. The moment Gucci looks "modern" in the way everyone expects, it becomes ordinary.
