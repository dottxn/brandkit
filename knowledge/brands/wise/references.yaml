    date: 2023
    publication_type: "Critical design journalism"
    significance: >-
      Under Consideration's Brand New section provides critical analysis of major
      rebrands. Their coverage of the Ragged Edge rebrand positioned Wise's visual
      system within contemporary design criticism, analyzing how the bright green,
